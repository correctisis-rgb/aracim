  function toast(msg) {
    var el = document.createElement("div");
    el.className = "toast";
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(function () { el.remove(); }, 3200);
  }

  function toastWithUndo(msg, onUndo) {
    document.querySelectorAll(".toast").forEach(function (el) { el.remove(); });
    var el = document.createElement("div");
    el.className = "toast toast-undo";
    var msgSpan = document.createElement("span");
    msgSpan.textContent = msg;
    var btn = document.createElement("button");
    btn.type = "button";
    btn.className = "toast-undo-btn";
    btn.textContent = "↩ Geri Al";
    el.appendChild(msgSpan);
    el.appendChild(btn);
    document.body.appendChild(el);
    var timer = setTimeout(function () { el.remove(); }, 6500);
    btn.addEventListener("click", function () {
      clearTimeout(timer);
      el.remove();
      onUndo();
    });
  }

  function showConfirm(opts) {
    var backdrop = document.createElement("div");
    backdrop.className = "modal-backdrop confirm-backdrop";
    var box = document.createElement("div");
    box.className = "modal confirm-modal";
    box.innerHTML =
      '<div class="modal-head"><h3>' + esc(opts.title || "Emin misin?") + '</h3></div>' +
      '<p class="confirm-message">' + esc(opts.message || "") + '</p>' +
      '<div class="confirm-actions">' +
        '<button type="button" class="btn-secondary" id="confirm-cancel">' + esc(opts.cancelLabel || "Vazgeç") + '</button>' +
        '<button type="button" class="' + (opts.danger ? "btn-danger" : "btn-primary") + '" id="confirm-ok">' + esc(opts.confirmLabel || "Onayla") + '</button>' +
      '</div>';
    backdrop.appendChild(box);
    function cleanup() { backdrop.remove(); }
    box.addEventListener("click", function (ev) { ev.stopPropagation(); });
    backdrop.addEventListener("click", function (ev) {
      if (ev.target === backdrop) { cleanup(); if (opts.onCancel) opts.onCancel(); }
    });
    box.querySelector("#confirm-cancel").addEventListener("click", function () { cleanup(); if (opts.onCancel) opts.onCancel(); });
    box.querySelector("#confirm-ok").addEventListener("click", function () { cleanup(); if (opts.onConfirm) opts.onConfirm(); });
    document.body.appendChild(backdrop);
    box.querySelector("#confirm-ok").focus();
  }

  // ---------- Paylaşılabilir masraf raporu (görsel) ----------
  function buildReportCanvas(list, carLabel) {
    var W = 820;
    var pad = 36;
    var rowH = 46;
    var headerH = 168;
    var footerH = 40;
    var H = headerH + Math.max(list.length, 1) * rowH + footerH;

    var canvas = document.createElement("canvas");
    var scale = 2; // keskin görsel için
    canvas.width = W * scale;
    canvas.height = H * scale;
    var ctx = canvas.getContext("2d");
    ctx.scale(scale, scale);

    // arkaplan
    ctx.fillStyle = "#1B1F24";
    ctx.fillRect(0, 0, W, H);

    // başlık bandı
    ctx.fillStyle = "#242930";
    ctx.fillRect(0, 0, W, headerH);

    ctx.fillStyle = "#F2A93B";
    ctx.font = "700 21px Arial, sans-serif";
    ctx.fillText("🚘 GARAJ DEFTERİ — MASRAF RAPORU", pad, 42);

    ctx.fillStyle = "#EDEEF0";
    ctx.font = "600 16px Arial, sans-serif";
    ctx.fillText(carLabel, pad, 70);

    var total = list.reduce(function (s, e) { return s + (e.amount || 0); }, 0);
    var dates = list.map(function (e) { return e.date; }).filter(Boolean).sort();
    var rangeLabel = dates.length ? (fmtDateTR(dates[0]) + " – " + fmtDateTR(dates[dates.length - 1])) : "";

    ctx.fillStyle = "#8B939D";
    ctx.font = "12.5px Arial, sans-serif";
    ctx.fillText(rangeLabel + " · " + list.length + " kayıt", pad, 92);

    ctx.fillStyle = "#F2A93B";
    ctx.font = "700 24px 'JetBrains Mono', monospace";
    ctx.fillText("Toplam: " + fmtTL(total), pad, 128);

    ctx.fillStyle = "#8B939D";
    ctx.font = "10.5px Arial, sans-serif";
    ctx.fillText("Oluşturulma: " + new Date().toLocaleString("tr-TR"), pad, 150);

    // satırlar
    list.forEach(function (e, i) {
      var rowY = headerH + i * rowH;
      if (i % 2 === 1) {
        ctx.fillStyle = "#20242A";
        ctx.fillRect(0, rowY, W, rowH);
      }
      var cat = catById(e.category);
      var car = (state.cars || []).find(function (c) { return c.id === e.carId; });

      ctx.fillStyle = cat.color;
      ctx.font = "18px Arial, sans-serif";
      ctx.fillText(cat.emoji, pad, rowY + 29);

      ctx.fillStyle = "#EDEEF0";
      ctx.font = "600 14px Arial, sans-serif";
      ctx.fillText(cat.label + (car ? " · " + car.name : ""), pad + 34, rowY + 20);

      ctx.fillStyle = "#8B939D";
      ctx.font = "11.5px Arial, sans-serif";
      var noteText = e.note ? e.note : "—";
      if (noteText.length > 46) noteText = noteText.slice(0, 45) + "…";
      ctx.fillText(noteText, pad + 34, rowY + 36);

      ctx.fillStyle = "#8B939D";
      ctx.font = "11.5px 'JetBrains Mono', monospace";
      ctx.fillText(fmtDateTR(e.date), W - 250, rowY + 27);

      ctx.fillStyle = "#EDEEF0";
      ctx.font = "700 14px 'JetBrains Mono', monospace";
      ctx.textAlign = "right";
      ctx.fillText(fmtTL(e.amount), W - pad, rowY + 27);
      ctx.textAlign = "left";
    });

    // alt bilgi
    ctx.fillStyle = "#8B939D";
    ctx.font = "10.5px Arial, sans-serif";
    ctx.fillText("Garaj Defteri ile oluşturuldu", pad, H - 16);

    return canvas;
  }

  function shareExpenseReport() {
    var list = getFilteredLogExpenses().slice().sort(function (a, b) { return new Date(a.date) - new Date(b.date); });
    if (!list.length) { toast("Paylaşılacak masraf kaydı yok."); return; }

    var car = (state.cars || []).find(function (c) { return c.id === state.selectedCarId; });
    var carLabel = car ? car.name : (logFiltersActive() && state.logFilters.carId !== "all"
      ? ((state.cars || []).find(function (c) { return c.id === state.logFilters.carId; }) || {}).name || "Seçili Araç"
      : "Tüm Araçlar");

    var canvas = buildReportCanvas(list, carLabel);
    canvas.toBlob(function (blob) {
      if (!blob) { toast("Rapor oluşturulamadı."); return; }
      var fileName = "masraf-raporu-" + todayStr() + ".png";

      var file;
      try { file = new File([blob], fileName, { type: "image/png" }); } catch (e) { file = null; }

      if (file && navigator.canShare && navigator.canShare({ files: [file] })) {
        navigator.share({ files: [file], title: "Masraf Raporu", text: carLabel + " masraf raporu" })
          .catch(function (err) { if (err && err.name !== "AbortError") toast("Paylaşım yapılamadı, görsel indiriliyor."); });
      } else {
        var url = URL.createObjectURL(blob);
        var a = document.createElement("a");
        a.href = url;
        a.download = fileName;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
        toast("Rapor görsel olarak indirildi.");
      }
    }, "image/png");
  }

  function loginAs(fbUser) {
    // Firestore önbelleği (enablePersistence) henüz açılmamışsa veya ilk
    // anlık görüntü daha ulaşmamışsa bile, bu cihazda daha önce görülmüş
    // profil bilgisi (ad/avatar) varsa hemen onu göster — böylece internetsiz
    // açılışta ekran kısa süreliğine bile boş/isimsiz kalmaz.
    var cachedProfile = getLocalData("profile_" + fbUser.uid, null);
    state.currentUser = {
      id: fbUser.uid,
      name: (cachedProfile && cachedProfile.name) || fbUser.displayName || "Kullanıcı",
      email: (cachedProfile && cachedProfile.email) || fbUser.email,
      avatar: (cachedProfile && cachedProfile.avatar) || null
    };
    state.householdId = fbUser.uid;
    state.householdMembers = [];
    state.householdDataLoaded = false;
    state.selectedCarId = "all";
    state.view = "panel";
    state.modal = null;
    state.accountMenuOpen = false;
    render();

    if (pendingAuthAction) {
      logLoginEvent(fbUser, pendingAuthAction);
      pendingAuthAction = null;
    }

    // Destek talepleri: kullanıcı kendi taleplerini canlı takip edebilsin diye,
    // admin ise yeni/açık taleplerin sayısını hesap menüsünde rozet olarak
    // görebilsin diye, giriş anında ilgili dinleyiciler kurulur.
    subscribeMySupportRequests(fbUser.uid);
    if (isAdminUser({ email: fbUser.email })) subscribeAdminSupportBadge();

    if (unsubscribeUserDoc) unsubscribeUserDoc();
    if (unsubscribeHouseholdDoc) { unsubscribeHouseholdDoc(); unsubscribeHouseholdDoc = null; }
    var docRef = db.collection("users").doc(fbUser.uid);
    unsubscribeUserDoc = docRef.onSnapshot(function (snap) {
      if (!snap.exists) {
        var createPatch = buildMemberProfileEntry(fbUser.uid, fbUser.displayName || "Kullanıcı", fbUser.email);
        createPatch.name = fbUser.displayName || "Kullanıcı";
        createPatch.email = fbUser.email;
        createPatch.avatar = null;
        createPatch.members = [fbUser.uid];
        createPatch.cars = state.cars || [];
        createPatch.expenses = state.expenses || [];
        createPatch.familyMembers = state.familyMembers || [];
        createPatch.budgets = state.budgets || {};
        createPatch.drivers = state.drivers || [];
        createPatch.createdAt = firebase.firestore.FieldValue.serverTimestamp();
        docRef.set(createPatch, { merge: true }).catch(function (err) { console.error(err); });
        return;
      }
      var data = snap.data() || {};
      if (!state.currentUser || state.currentUser.id !== fbUser.uid) return;

      // Kimlik bilgisi (isim/e-posta/avatar) her zaman kişinin kendi belgesinden gelir;
      // ortak bir haneye katılınca bile kendi adı değişmez.
      state.currentUser = { id: fbUser.uid, name: data.name || fbUser.displayName || "Kullanıcı", email: data.email || fbUser.email, avatar: data.avatar || null };
      setLocalData("profile_" + fbUser.uid, { name: state.currentUser.name, email: state.currentUser.email, avatar: state.currentUser.avatar });

      // Bu kişi kendi hane belgesinde (memberProfiles/members) henüz kayıtlı
      // değilse ekleyelim (bkz. ensureSelfInHousehold).
      ensureSelfInHousehold(fbUser.uid, data);

      var targetHousehold = data.householdId || fbUser.uid;
      if (targetHousehold === fbUser.uid) {
        // Kendi hanesi: aynı belge hem kimlik hem paylaşılan veri kaynağı
        if (unsubscribeHouseholdDoc) { unsubscribeHouseholdDoc(); unsubscribeHouseholdDoc = null; }
        state.householdId = fbUser.uid;
        applyHouseholdData(data);
      } else if (state.householdId !== targetHousehold) {
        subscribeHousehold(targetHousehold);
      }

      render();
    }, function (err) {
      console.error(err);
      // fallback to local storage if offline error occurs
      if(!state.cars || !state.expenses) {
        state.cars = getLocalData("cars", []);
        state.expenses = getLocalData("expenses", []);
        state.familyMembers = getLocalData("family", []);
        state.budgets = getLocalData("budgets", {});
        state.drivers = getLocalData("drivers", []);
        render();
        tryOpenPendingDeepLink();
      }
    });
  }

  function buildMemberProfileEntryWithMembers(uidVal, name, email) {

    patch.members = firebase.firestore.FieldValue.arrayUnion(uidVal);

  }

  // Kullanıcı, "Koda Katıl" alanına bazen (özellikle telefonda WhatsApp/SMS'te
  // mesaj balonuna uzun basıp kopyalayınca) sadece kodu değil, davet
  // mesajının TAMAMINI yapıştırıyor. Bu fonksiyon, ne yapıştırılırsa
  // yapıştırılsın (tek başına kod / linkli tam mesaj / başında-sonunda
  // fazladan boşluk vb.) içinden gerçek davet kodunu otomatik ayıklar.
  function extractHouseholdCode(rawText) {
    var text = (rawText || "").trim();
    if (!text) return "";
    // Zaten tek parça, boşluksuz bir metinse (kullanıcı kodu elle yazmış ya
    // da tek başına kopyalamış) olduğu gibi kabul et.
    if (!/\s/.test(text)) return text;
    // Mesaj şablonundaki "Davet Kodu: XXXX" satırını ara.
    var labelMatch = text.match(/Davet\s*Kodu\s*:?\s*([A-Za-z0-9-]+)/i);
    if (labelMatch) return labelMatch[1];
    // Bulunamazsa: metindeki en uzun saf harf+rakam(+tire) parçasını kod say.
    // (Linkler nokta/slash içerdiği için bu taramaya girmez, davet kodları
    // ise alfanumerik + tek bir tire içeren kimliklerdir.)
    var tokens = text.match(/[A-Za-z0-9-]{12,80}/g) || [];
    if (!tokens.length) return text;
    tokens.sort(function (a, b) { return b.length - a.length; });
    return tokens[0];
  }

  function joinHousehold(rawCode) {
    var raw = extractHouseholdCode(rawCode);
    if (!raw) { toast("Lütfen bir davet kodu gir."); return; }
    var sep = raw.indexOf("-");
    if (sep === -1) {
      toast("Bu davet kodu artık geçerli değil. Hane sahibinden 'Kodu Yenile' sonrası güncel kodu iste.");
      return;
    }
    var code = raw.slice(0, sep);
    var token = raw.slice(sep + 1);
    if (!state.currentUser) return;
    var myUid = state.currentUser.id;
    if (code === state.householdId) { toast("Zaten bu ortak hanedesin."); return; }
    showConfirm({
      title: "Ortak Haneye Katıl",
      message: "Bu işlemle kendi araç/masraf kayıtların yerine, kodun sahibinin ortak hanesindeki veriler kullanılmaya başlanacak. Devam edilsin mi?",
      confirmLabel: "Katıl",
      danger: true,
      onConfirm: function () {
        var targetRef = db.collection("users").doc(code);
        targetRef.get().then(function (snap) {
          if (!snap.exists) { throw { code: "not-found" }; }
          var data = snap.data() || {};
          if (!data.inviteToken || data.inviteToken !== token) {
            throw { code: "invalid-token" };
          }
          var patch = buildMemberProfileEntry(myUid, state.currentUser.name, state.currentUser.email);
          patch.members = firebase.firestore.FieldValue.arrayUnion(myUid);
          // Güvenlik kuralı, bu alanın dokümandaki güncel inviteToken ile
          // birebir eşleştiğini zorunlu kılıyor — yani gerçek/güncel davet
          // kodunu bilmeyen biri bu yazma işlemini asla geçemez.
          patch.inviteTokenUsed = token;
          return targetRef.set(patch, { merge: true });
        }).then(function () {
          return db.collection("users").doc(myUid).set({ householdId: code }, { merge: true });
        }).then(function () {
          subscribeHousehold(code);
          closeModal();
          state.modal = { type: "profile" };
          render();
          toast("Ortak haneye katıldın.");
        }).catch(function (err) {
          console.error(err);
          if (err && err.code === "invalid-token") {
            toast("Davet kodu geçersiz ya da yenilenmiş. Güncel kodu hane sahibinden tekrar iste.");
          } else if (err && err.code === "not-found") {
            toast("Bu koda ait bir ortak hane bulunamadı.");
          } else {
            toast("Katılma başarısız oldu: izin reddedildi.");
          }
        });
      }
    });
  }

  function leaveHousehold() {
    if (!state.currentUser) return;
    var myUid = state.currentUser.id;
    if (state.householdId === myUid) { toast("Zaten kendi hanendesin."); return; }
    var oldHouseholdId = state.householdId;
    showConfirm({
      title: "Ortak Haneden Ayrıl",
      message: "Bu ortak hesaptan ayrılacak ve kendi tek kullanıcı hanene döneceksin. Emin misin?",
      confirmLabel: "Ayrıl",
      danger: true,
      onConfirm: function () {
        var householdRef = db.collection("users").doc(oldHouseholdId);
        var ownRef = db.collection("users").doc(myUid);
        var removePatch = {};
        removePatch.members = firebase.firestore.FieldValue.arrayRemove(myUid);
        removePatch["memberProfiles." + myUid] = firebase.firestore.FieldValue.delete();
        householdRef.update(removePatch).catch(function (err) { console.error(err); });
        ownRef.set({ householdId: firebase.firestore.FieldValue.delete() }, { merge: true }).then(function () {
          if (unsubscribeHouseholdDoc) { unsubscribeHouseholdDoc(); unsubscribeHouseholdDoc = null; }
          state.householdId = myUid;
          return ownRef.get();
        }).then(function (snap) {
          applyHouseholdData(snap.data() || {});
          closeModal();
          state.modal = { type: "profile" };
          render();
          toast("Ortak haneden ayrıldın.");
        }).catch(function (err) {
          console.error(err);

  // "Uygulamayı Paylaş" ile gönderilen ?a2hs=1 linki açıldığında, kullanıcı
  // giriş ekranını görmeden/hiçbir menüde gezinmeden doğrudan "Ana Ekrana
  // Ekle" akışıyla karşılansın diye çağrılır. Parametre URL'den hemen
  // temizlenir ki sayfa daha sonra yenilendiğinde tekrar tetiklenmesin.
  function maybeAutoTriggerAddToHomeScreen() {
    var params;
    try { params = new URLSearchParams(window.location.search); } catch (e) { return; }
    if (params.get("a2hs") !== "1") return;
    params.delete("a2hs");
    var rest = params.toString();
    try { window.history.replaceState({}, "", window.location.pathname + (rest ? "?" + rest : "")); } catch (e) {}
    if (isRunningStandalone()) return; // zaten yüklüyse sessizce hiçbir şey yapma
    // beforeinstallprompt olayı (varsa) sayfa yüklenir yüklenmez ateşlenmiş
    // olsun diye native istemi göstermeden kısa bir an bekleniyor —
    // böylece mümkün olduğunda tarayıcının kendi tek dokunuşluk kurulum
    // istemi kullanılır, olmazsa (ör. iOS) elle ekleme talimatı gösterilir.
    setTimeout(function () { addAppToHomeScreen(); }, 900);
  }

  // ---------- derived data ----------
  function getVisibleExpenses() {
    if (state.selectedCarId === "all") return state.expenses || [];
    return (state.expenses || []).filter(function (e) { return e.carId === state.selectedCarId; });
  }

  function logFiltersActive() {
    var f = state.logFilters || {};
    return !!(f.search || (f.category && f.category !== "all") || (f.carId && f.carId !== "all") || f.dateFrom || f.dateTo);
  }

  function getFilteredLogExpenses() {
    var list = getVisibleExpenses();
    var f = state.logFilters || {};
    if (state.selectedCarId === "all" && f.carId && f.carId !== "all") {
      list = list.filter(function (e) { return e.carId === f.carId; });
    }
    if (f.category && f.category !== "all") {
      list = list.filter(function (e) { return e.category === f.category; });
    }
    if (f.dateFrom) {
      list = list.filter(function (e) { return e.date && e.date >= f.dateFrom; });
    }
    if (f.dateTo) {
      list = list.filter(function (e) { return e.date && e.date <= f.dateTo; });
    }
    if (f.search) {
      var q = f.search.toLocaleLowerCase("tr-TR");
      list = list.filter(function (e) {
        var cat = catById(e.category);
        var car = (state.cars || []).find(function (c) { return c.id === e.carId; });
        var hay = [cat.label, e.note || "", car ? car.name : "", fmtDateTR(e.date)].join(" ").toLocaleLowerCase("tr-TR");
        return hay.indexOf(q) !== -1;
      });
    }
    return list;
  }

  function monthKey(d) { return d.getFullYear() + "-" + d.getMonth(); }

  function recalcCarCurrentKm(carId) {
    var car = (state.cars || []).find(function (c) { return c.id === carId; });
    if (!car) return;
    var kmEntries = (state.expenses || []).filter(function (e) { return e.carId === carId && e.km != null; });
    if (!kmEntries.length) return; // hiç km'li kayıt yoksa dokunma (manuel girilmiş olabilir)
    var maxKm = kmEntries.reduce(function (m, e) { return Math.max(m, e.km); }, 0);
    if (car.currentKm !== maxKm) {
      state.cars = state.cars.map(function (c) { return c.id === carId ? Object.assign({}, c, { currentKm: maxKm }) : c; });
      persistCars();
    }
  }

  function computeCostPerKm(carId) {
    var fuelExpenses = (state.expenses || [])
      .filter(function (e) { return e.carId === carId && e.category === "yakit" && e.km != null; })
      .sort(function (a, b) { return a.km - b.km; });
    if (fuelExpenses.length < 2) return null;
    var recent = fuelExpenses.slice(-5); // en fazla son 5 kayıt (4 segment) üzerinden ortalama al
    var totalDist = 0, totalAmount = 0;
    for (var i = 1; i < recent.length; i++) {
      var dist = recent[i].km - recent[i - 1].km;
      if (dist > 0) { totalDist += dist; totalAmount += Number(recent[i].amount || 0); }
    }
    if (totalDist <= 0) return null;
    return totalAmount / totalDist;
  }

  function computeFuelStats(carId) {
    var fuelExpenses = (state.expenses || [])
      .filter(function (e) { return e.carId === carId && e.category === "yakit" && e.km != null && e.liter != null; })
      .sort(function (a, b) { return a.km - b.km; });
    if (fuelExpenses.length < 2) return null;
    var totalDist = 0, totalLiter = 0, segments = 0;
    for (var i = 1; i < fuelExpenses.length; i++) {
      var dist = fuelExpenses[i].km - fuelExpenses[i - 1].km;
      if (dist > 0) { totalDist += dist; totalLiter += fuelExpenses[i].liter; segments++; }
    }
    if (!segments || totalDist <= 0) return null;
    return { avgConsumption: (totalLiter / totalDist) * 100, totalDist: totalDist, totalLiter: totalLiter };
  }

  function computeDashboard() {
    var visible = getVisibleExpenses();
    var now = new Date();
    var thisKey = monthKey(now);
    var monthTotal = 0, buckets = {};
    visible.forEach(function (e) {
      var d = new Date(e.date), k = monthKey(d);
      buckets[k] = (buckets[k] || 0) + Number(e.amount || 0);
      if (k === thisKey) monthTotal += Number(e.amount || 0);
    });
    var otherKeys = Object.keys(buckets).filter(function (k) { return k !== thisKey; });
    var avg = otherKeys.length ? otherKeys.reduce(function (s, k) { return s + buckets[k]; }, 0) / otherKeys.length : null;
    var gaugePct = avg && avg > 0 ? Math.min(1, monthTotal / (avg * 1.6)) : (monthTotal > 0 ? 0.55 : 0);

    var catMap = {};
    visible.forEach(function (e) { catMap[e.category] = (catMap[e.category] || 0) + Number(e.amount || 0); });
    var categoryData = CATEGORIES.map(function (c) { return { name: c.label, value: catMap[c.id] || 0, color: c.color }; }).filter(function (d) { return d.value > 0; });

    var totalAllTime = visible.reduce(function (s, e) { return s + Number(e.amount || 0); }, 0);
    return { monthTotal: monthTotal, gaugePct: gaugePct, categoryData: categoryData, totalAllTime: totalAllTime };
  }

  // ---------- Analiz: aylık trend, bütçe, yakıt serileri ----------
  function computeMonthlyTrend(monthsBack) {
    var visible = getVisibleExpenses();
    var now = new Date();
    var months = [];
    for (var i = monthsBack - 1; i >= 0; i--) {
      var d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      months.push({ key: monthKey(d), label: MONTHS_TR[d.getMonth()] + " " + String(d.getFullYear()).slice(2), total: 0 });
    }
    visible.forEach(function (e) {
      if (!e.date) return;
      var k = monthKey(new Date(e.date));
      var bucket = null;
      for (var j = 0; j < months.length; j++) { if (months[j].key === k) { bucket = months[j]; break; } }
      if (bucket) bucket.total += Number(e.amount || 0);
    });
    return months;
  }

  function budgetKey() { return state.selectedCarId || "all"; }

  function computeBudgetInfo() {
    var key = budgetKey();
    var budget = (state.budgets || {})[key];
    var monthTotal = computeDashboard().monthTotal;
    if (!budget || budget <= 0) return { key: key, budget: null, spent: monthTotal, pct: 0, status: "none" };
    var pct = monthTotal / budget;
    var status = pct >= 1 ? "over" : pct >= 0.85 ? "watch" : "ok";
    return { key: key, budget: budget, spent: monthTotal, pct: Math.min(1, pct), rawPct: pct, status: status };
  }

  function computeFuelSeries(carId) {
    var fuelExpenses = (state.expenses || [])
      .filter(function (e) { return e.carId === carId && e.category === "yakit" && e.km != null; })
      .sort(function (a, b) { return a.km - b.km; });
    var consumptionSeries = [];
    for (var i = 1; i < fuelExpenses.length; i++) {
      var prev = fuelExpenses[i - 1], cur = fuelExpenses[i];
      var dist = cur.km - prev.km;
      if (dist <= 0) continue;
      var point = { date: cur.date, dateLabel: fmtDateTR(cur.date), costPerKm: Number(cur.amount || 0) / dist };
      if (cur.liter != null) point.consumption = (cur.liter / dist) * 100;
      consumptionSeries.push(point);
    }
    var priceSeries = fuelExpenses
      .filter(function (e) { return e.liter != null && e.liter > 0; })
      .sort(function (a, b) { return new Date(a.date) - new Date(b.date); })
      .map(function (e) { return { date: e.date, dateLabel: fmtDateTR(e.date), price: Number(e.amount || 0) / e.liter }; });
    return { consumptionSeries: consumptionSeries, priceSeries: priceSeries };
  }

  function kmUrgency(remaining) {
    if (remaining === null) return { key: "none", label: "Km bilgisi yok", color: "#8B939D" };
    var abs = groupThousands(String(Math.round(Math.abs(remaining))));
    if (remaining <= 0) return { key: "overdue", label: abs + " km geçti", color: "#E2574C" };
    if (remaining <= 1000) return { key: "soon", label: abs + " km kaldı", color: "#E2574C" };
    if (remaining <= 3000) return { key: "watch", label: abs + " km kaldı", color: "#F2A93B" };
    return { key: "ok", label: abs + " km kaldı", color: "#7BC67E" };
  }
  function tierOf(status) {
    if (status.key === "overdue" || status.key === "today" || status.key === "soon") return 0;
    if (status.key === "watch") return 1;
    if (status.key === "ok") return 2;
    return 3;
  }

  function computeSummaryItems() {
    var carsToProcess = state.cars || [];
    var relevant = state.selectedCarId === "all" ? carsToProcess : carsToProcess.filter(function (c) { return c.id === state.selectedCarId; });
    var items = [];
    relevant.forEach(function (c) {
      items.push({ carId: c.id, carName: c.name, carPhoto: c.photo, type: "Muayene", emoji: "🗓️", date: c.inspectionDate || null, apptKey: "inspectionDate", apptDate: (c.appointments && c.appointments.inspectionDate) || null });
      items.push({ carId: c.id, carName: c.name, carPhoto: c.photo, type: "Bakım / Servis (tarih)", emoji: "🔧", date: c.maintenanceDate || null, apptKey: "maintenanceDate", apptDate: (c.appointments && c.appointments.maintenanceDate) || null });
      items.push({ carId: c.id, carName: c.name, carPhoto: c.photo, type: "Trafik Sigortası", emoji: "🛡️", date: c.insuranceDate || null, apptKey: "insuranceDate", apptDate: (c.appointments && c.appointments.insuranceDate) || null });
      items.push({ carId: c.id, carName: c.name, carPhoto: c.photo, type: "Kasko", emoji: "🚙", date: c.kaskoDate || null, apptKey: "kaskoDate", apptDate: (c.appointments && c.appointments.kaskoDate) || null });
      items.push({ carId: c.id, carName: c.name, carPhoto: c.photo, type: "Vergi (MTV)", emoji: "💰", date: c.taxDate || null, apptKey: "taxDate", apptDate: (c.appointments && c.appointments.taxDate) || null });
      items.push({ carId: c.id, carName: c.name, carPhoto: c.photo, type: "Lastik Değişimi", emoji: "🛞", date: c.tireDate || null, apptKey: "tireDate", apptDate: (c.appointments && c.appointments.tireDate) || null });
    });
    items.forEach(function (it) {
      it.days = daysUntil(it.date);
      it.status = urgency(it.days);
      it.dateLabel = it.date ? fmtDateTR(it.date) : "Tarih girilmedi";
      if (it.apptDate) it.dateLabel += " · 📅 Randevu: " + fmtDateTR(it.apptDate);
      it.tier = tierOf(it.status);
      it.metric = it.days === null ? 99999 : it.days;
    });

    relevant.forEach(function (c) {
      if (c.maintenanceKm == null) return;
      var remaining = c.currentKm != null ? (c.maintenanceKm - c.currentKm) : null;
      var status = kmUrgency(remaining);
      items.push({
        carId: c.id, carName: c.name, carPhoto: c.photo, type: "Bakım / Servis (km)", emoji: "🔧",
        date: null, dateLabel: status.label, status: status, isKm: true,
        tier: tierOf(status), metric: remaining === null ? 99999 : remaining
      });
    });

    items.sort(function (a, b) { return a.tier !== b.tier ? a.tier - b.tier : a.metric - b.metric; });
    return items;
  }

  function bindAuthActions() {
    var authThemeBtn = document.getElementById("auth-theme-toggle");
    if (authThemeBtn) authThemeBtn.addEventListener("click", function () { toggleTheme(); });
    document.querySelectorAll('[data-action="auth-tab"]').forEach(function (btn) {
      btn.addEventListener("click", function () {
        state.authMode = btn.getAttribute("data-mode");
        state.authError = null;
        renderAuth();
      });
    });
    document.querySelectorAll(".pw-toggle").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var input = document.getElementById(btn.getAttribute("data-target"));
        if (!input) return;
        input.type = input.type === "password" ? "text" : "password";
        btn.textContent = input.type === "password" ? "👁️" : "🙈";
      });
    });
    var consentBox = document.getElementById("r-consent");
    if (consentBox) consentBox.addEventListener("change", function () {
      state.authConsentChecked = consentBox.checked;
      if (consentBox.checked) state.authConsentError = false;
    });
    var submit = document.getElementById("auth-submit");
    if (submit) submit.addEventListener("click", function () {
      if (state.authMode === "register") handleRegister(); else handleLogin();
    });
    var forgotBtn = document.getElementById("forgot-pass-link");
    if (forgotBtn) forgotBtn.addEventListener("click", handleForgotPassword);
    document.querySelectorAll(".auth-card input").forEach(function (input) {
      input.addEventListener("keydown", function (ev) {
        if (ev.key === "Enter") { ev.preventDefault(); if (submit) submit.click(); }
      });
    });
  }

  function handleRegister() {
    var name = document.getElementById("r-name").value.trim();
    var email = document.getElementById("r-email").value.trim();
    var pass = document.getElementById("r-pass").value;
    var pass2 = document.getElementById("r-pass2").value;

    if (name.length < 2) { state.authError = "Lütfen ad soyad gir."; renderAuth(); return; }
    if (!EMAIL_RE.test(email)) { state.authError = "Geçerli bir e-posta adresi gir."; renderAuth(); return; }
    if (pass.length < 6 || !PASSWORD_RE.test(pass)) { state.authError = PASSWORD_HINT; renderAuth(); return; }
    if (pass !== pass2) { state.authError = "Şifreler eşleşmiyor."; renderAuth(); return; }
    if (!state.authConsentChecked) {
      state.authConsentError = true;
      state.authError = "Devam etmek için Gizlilik Politikası ve KVKK Aydınlatma Metni ile Kullanım Şartları'nı kabul etmelisin.";
      renderAuth();
      return;
    }

    state.authError = null; state.authBusy = true; renderAuth();
    pendingAuthAction = "register";
    auth.createUserWithEmailAndPassword(email, pass).then(function (cred) {
      cred.user.sendEmailVerification().catch(function (err) { console.error(err); });
      return cred.user.updateProfile({ displayName: name }).then(function () {
        var patch = buildMemberProfileEntryWithMembers(cred.user.uid, name, email);
        patch.name = name; patch.email = email; patch.avatar = null;
        patch.cars = []; patch.expenses = []; patch.familyMembers = [];
        patch.createdAt = firebase.firestore.FieldValue.serverTimestamp();
        // KVKK: açık rıza/onay kaydı — hangi metin sürümünü, ne zaman kabul ettiği
        patch.consent = {
          policyVersion: LEGAL_DOC_VERSION,
          acceptedAt: firebase.firestore.FieldValue.serverTimestamp()
        };
        // merge:true kullanılır: aynı anda auth durum dinleyicisinin (loginAs)
        // tetiklediği paralel bir belge oluşturma yazımıyla çakışırsa, birbirlerinin
        // memberProfiles/members alanlarını ezmesinler.
        return db.collection("users").doc(cred.user.uid).set(patch, { merge: true });
      });
    }).then(function () {
      state.authBusy = false;
      toast("Hoş geldin, " + name.split(" ")[0] + "! Hesabın oluşturuldu.");
    }).catch(function (err) {
      state.authBusy = false;
      state.authError = authErrorMessage(err);
      renderAuth();
    });
  }

  function handleLogin() {
    var email = document.getElementById("l-email").value.trim();
    var pass = document.getElementById("l-pass").value;
    if (!email || !pass) { state.authError = "E-posta ve şifreni gir."; renderAuth(); return; }

    state.authError = null; state.authBusy = true; renderAuth();
    pendingAuthAction = "login";
    auth.signInWithEmailAndPassword(email, pass).then(function (cred) {
      state.authBusy = false;
      toast("Tekrar hoş geldin, " + (cred.user.displayName || "").split(" ")[0] + "!");
    }).catch(function (err) {
      state.authBusy = false;
      state.authError = authErrorMessage(err);
      renderAuth();
    });
  }

  function handleForgotPassword() {
    var emailInput = document.getElementById("l-email");
    var email = emailInput ? emailInput.value.trim() : "";
    if (!EMAIL_RE.test(email)) {
      state.authError = "Şifre sıfırlama bağlantısı göndermek için önce e-posta alanına geçerli bir adres gir.";
      renderAuth();
      return;
    }

    state.authError = null;
    var btn = document.getElementById("forgot-pass-link");
    if (btn) { btn.disabled = true; btn.textContent = "Gönderiliyor…"; }

    auth.sendPasswordResetEmail(email).then(function () {
      if (btn) { btn.disabled = false; btn.textContent = "Şifremi unuttum?"; }
      toast("Şifre sıfırlama bağlantısı " + email + " adresine gönderildi. Gelen kutunu (ve spam klasörünü) kontrol et.");
    }).catch(function (err) {
      if (btn) { btn.disabled = false; btn.textContent = "Şifremi unuttum?"; }
      if (err && err.code === "auth/user-not-found") {
        state.authError = "Bu e-posta ile kayıtlı bir hesap bulunamadı.";
      } else {
        state.authError = authErrorMessage(err);
      }
      renderAuth();
    });
  }

  function getOnboardingSteps() {
    var carsList = state.cars || [];
    var expensesList = state.expenses || [];
    return [
      { key: "car", label: "Aracını ekle", done: carsList.length > 0, actionLabel: "Araç Ekle", action: "open-add-car" },
      { key: "expense", label: "İlk masrafını gir", done: expensesList.length > 0, actionLabel: "Masraf Ekle", action: (carsList.length > 0 ? "open-add-expense" : null) },
      { key: "notif", label: "Bildirimleri aç (bakım hatırlatıcıları için)", done: state.notifStatus === "granted", actionLabel: "Bildirimleri Aç", action: (state.notifStatus !== "unsupported" && state.notifStatus !== "granted" ? "enable-notifications" : null) }
    ];
  }

  function renderOnboardingCard() {
    var steps = getOnboardingSteps();
    var allDone = steps.every(function (s) { return s.done; });
    if (allDone && !state.onboardingDismissed) {
      state.onboardingDismissed = true;
      setLocalData("onboarding_dismissed", true);
    }
    if (state.onboardingDismissed || allDone) return "";

    var html = '<section class="onboard-card" aria-label="Başlangıç rehberi">' +
      '<div class="onboard-head">' +
        '<div><p class="onboard-title">👋 Garaj Defteri\'ne hoş geldin!</p>' +
        '<p class="onboard-sub">Başlamak için şu birkaç adımı tamamla:</p></div>' +
        '<button type="button" class="icon-btn onboard-close" data-action="dismiss-onboarding" aria-label="Rehberi kapat" title="Kapat">✕</button>' +
      '</div>' +
      '<ul class="onboard-steps">';
    steps.forEach(function (s, i) {
      html += '<li class="onboard-step ' + (s.done ? "done" : "") + '">' +
        '<span class="onboard-step-badge">' + (s.done ? "✓" : (i + 1)) + '</span>' +
        '<span class="onboard-step-label">' + esc(s.label) + '</span>' +

        '</li>';
    });
    html += '</ul></section>';
    return html;
  }

  function renderDashboard(summaryItems) {

    // gauge panel
    html += '<section class="panel instrument-panel">' + gaugeSVG(d.gaugePct) +
      '<div class="odometer-row"><div class="odometer-label">TOPLAM (tüm zamanlar)</div>' +
      '<div class="odometer">' + fmtTL(d.totalAllTime).replace("₺", "") + '<span class="odo-currency">₺</span></div></div></section>';

    // category donut
    html += '<section class="panel"><h2>Kategori Dağılımı (tüm zamanlar)</h2>';

    if (car.transmission) detailBits.push(esc(car.transmission));
    if (car.plate) detailBits.push(esc(car.plate));

  // ---------- Hızlı randevu kaydı (Yaklaşan İşlemler'deki 📅 butonu) ----------
  // Araç düzenleme formundaki gizli "Randevu aldın mı?" bölümüne girmeden,
  // doğrudan ana ekrandan tek bir alan için randevu tarihi girilebilsin diye.
  // Aynı DueSnapshot mantığını (bkz. araç kaydetme handler'ı) tek alan için
  // uygular.
  var APPT_FIELD_LABELS = {
    inspectionDate: "Muayene", maintenanceDate: "Bakım / Servis",
    insuranceDate: "Trafik Sigortası", kaskoDate: "Kasko",
    taxDate: "Vergi (MTV)", tireDate: "Lastik Değişimi"
  };
  var APPT_FIELD_EMOJI = {
    inspectionDate: "🗓️", maintenanceDate: "🔧",
    insuranceDate: "🛡️", kaskoDate: "🚙",
    taxDate: "💰", tireDate: "🛞"
  };
  // sw.js'teki APPT_EXTERNAL_LINKS ile aynı liste. iOS bildirimlerde "Hayır"
  // aksiyon düğmesini WebKit kısıtlaması yüzünden gösteremediğimizden, aynı
  // "harici siteye git" seçeneğini randevu formunun içine de ekliyoruz.
  var APPT_EXTERNAL_LINKS = {
    inspectionDate: { url: "https://www.tuvturk.com.tr", label: "TÜVTÜRK'ten randevu al" }
  };
  function saveCarAppointmentField(carId, fieldKey, apptVal) {
    var car = (state.cars || []).find(function (c) { return c.id === carId; });
    if (!car) return;
    var prevAppt = car.appointments || {};
    var snapKey = fieldKey + "DueSnapshot";
    var appointments = Object.assign({}, prevAppt);
    appointments[fieldKey] = apptVal || null;
    if (!apptVal) {
      appointments[snapKey] = null;
    } else if (!prevAppt[fieldKey] || prevAppt[fieldKey] !== apptVal) {
      appointments[snapKey] = car[fieldKey] || null;
    } else {
      appointments[snapKey] = prevAppt[snapKey] != null ? prevAppt[snapKey] : (car[fieldKey] || null);
    }
    state.cars = (state.cars || []).map(function (c) { return c.id === carId ? Object.assign({}, c, { appointments: appointments }) : c; });
    persistCars();
    closeModal();
    render();
    toast(apptVal ? "Randevu kaydedildi." : "Randevu kaldırıldı.");
  }

  function buildQuickApptModal() {
    var m = state.modal || {};
    var car = (state.cars || []).find(function (c) { return c.id === m.carId; });
    var modal = document.createElement("div");
    modal.className = "modal";
    modal.addEventListener("click", function (ev) { ev.stopPropagation(); });
    var current = (car && car.appointments && car.appointments[m.key]) || "";
    var label = APPT_FIELD_LABELS[m.key] || m.label || "İşlem";
    var extLink = APPT_EXTERNAL_LINKS[m.key];
    modal.innerHTML =
      '<div class="modal-head"><h3>📅 Randevu — ' + esc(label) + '</h3><button class="icon-btn" data-action="close-modal" aria-label="Kapat">✕</button></div>' +
      '<p class="field-hint" style="margin-top:-4px">Randevu tarihi girersen bu işlem için vade hatırlatmaları durur; sadece randevudan 1 gün önce ve randevu günü bildirim alırsın.</p>' +
      '<label class="field"><span>Randevu tarihi</span><input type="date" id="qa-date" value="' + esc(current) + '" /></label>' +
      '<div class="budget-row">' +
      (current ? '<button type="button" class="btn-secondary full" id="qa-clear">Randevuyu Kaldır</button>' : '') +
      '<button type="button" class="btn-primary full" id="qa-save">Kaydet</button>' +
      '</div>' +
      (extLink ? '<a class="link-btn" href="' + esc(extLink.url) + '" target="_blank" rel="noopener noreferrer" style="display:block;text-align:center;margin-top:10px">Hayır, henüz almadım — ' + esc(extLink.label) + ' →</a>' : '');
    modal.querySelector("#qa-save").addEventListener("click", function () {
      var val = modal.querySelector("#qa-date").value || null;
      saveCarAppointmentField(m.carId, m.key, val);
    });
    var clearBtn = modal.querySelector("#qa-clear");
    if (clearBtn) clearBtn.addEventListener("click", function () { saveCarAppointmentField(m.carId, m.key, null); });
    return modal;
  }

  // Bildirimde birden fazla farklı tarihe bağlı hatırlatma birlikte
  // tetiklendiğinde (bkz. pendingDeepLink), tek bir randevu formuna
  // atlamak yerine kullanıcının hangisi için işlem yapacağını seçebileceği
  // bir liste ekranı gösteririz. Bir öğeye dokununca normal "open-quick-appt"
  // aksiyonu üzerinden ilgili randevu formu açılır.
  function buildReminderPickerModal() {
    var m = state.modal || {};
    var items = (m.items || []).map(function (it) {
      var car = (state.cars || []).find(function (c) { return c.id === it.carId; });
      return {
        carId: it.carId,
        key: it.key,
        carName: car ? car.name : "Araç",
        label: APPT_FIELD_LABELS[it.key] || it.key,
        emoji: APPT_FIELD_EMOJI[it.key] || "📌"
      };
    });
    var modal = document.createElement("div");
    modal.className = "modal";
    modal.addEventListener("click", function (ev) { ev.stopPropagation(); });
    var html = '<div class="modal-head"><h3>🔔 Hatırlatmalar</h3><button class="icon-btn" data-action="close-modal" aria-label="Kapat">✕</button></div>' +
      '<p class="field-hint" style="margin-top:-4px">Birden fazla hatırlatman var. Randevu almak ya da tarih güncellemek için birini seç:</p>' +
      '<ul class="err-list">' +
      items.map(function (it) {
        return '<li class="err-item">' +
          '<div class="err-item-msg">' + it.emoji + ' ' + esc(it.carName) + ' — ' + esc(it.label) + '</div>' +
          '<button type="button" class="btn-secondary full" data-action="open-quick-appt" data-car="' + esc(it.carId) + '" data-key="' + esc(it.key) + '" style="margin-top:8px">Randevu / Tarih Gir →</button>' +
          '</li>';
      }).join("") +
      '</ul>';
    modal.innerHTML = html;
    return modal;
  }

    var text = hasAppt ? ("📅 " + fmtDateTR(it.apptDate)) : "📅 Randevu Ekle";
    return '<button type="button" class="' + cls + '" data-action="open-quick-appt" data-car="' + it.carId + '" data-key="' + it.apptKey + '" title="' + (hasAppt ? "Randevuyu düzenle" : "Randevu tarihi ekle") + '">' + text + '</button>';
  }

    var title = it.type + " · " + it.carName;

    return '<button class="exp-del" data-action="add-to-calendar" data-title="' + esc(title) + '" data-date="' + esc(it.date) + '" data-notes="' + esc(notes) + '" title="Takvime ekle" aria-label="Takvime ekle">📅</button>';

  function renderUpcomingPanel(items) {

    var html = '<section class="panel span-2"><h2>Yaklaşan İşlemler</h2>';

        var showIcon = (it.status.key === "overdue" || it.status.key === "today" || it.status.key === "soon") ? "⚠️ " : (it.status.key === "ok" ? "✅ " : "");

  function gaugeSVG(pct) {
    var clamped = Math.max(0, Math.min(1, pct));
    var angle = -180 + clamped * 180;
    var rad = angle * Math.PI / 180;
    var cx = 110, cy = 108, r = 84;
    var nx = cx + r * 0.86 * Math.cos(rad), ny = cy + r * 0.86 * Math.sin(rad);
    function arc(s, e, radius) {
      var sr = s * Math.PI / 180, er = e * Math.PI / 180;
      var x1 = cx + radius * Math.cos(sr), y1 = cy + radius * Math.sin(sr);
      var x2 = cx + radius * Math.cos(er), y2 = cy + radius * Math.sin(er);
      var large = (e - s) > 180 ? 1 : 0;
      return "M " + x1 + " " + y1 + " A " + radius + " " + radius + " 0 " + large + " 1 " + x2 + " " + y2;
    }
    var d = window.__dashboardData;
    var monthTotal = d ? d.monthTotal : 0;
    return '<svg viewBox="0 0 220 130" class="gauge-svg" role="img" aria-label="Bu ayki harcama göstergesi">' +
      '<path d="' + arc(-180, -60, r) + '" stroke="#7BC67E" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.85"/>' +
      '<path d="' + arc(-60, -20, r) + '" stroke="#F2A93B" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.85"/>' +
      '<path d="' + arc(-20, 0, r) + '" stroke="#E2574C" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.85"/>' +
      '<line x1="' + cx + '" y1="' + cy + '" x2="' + nx + '" y2="' + ny + '" stroke="#EDEEF0" stroke-width="3" stroke-linecap="round"/>' +
      '<circle cx="' + cx + '" cy="' + cy + '" r="6" fill="#EDEEF0"/>' +
      '<text x="' + cx + '" y="' + (cy - 26) + '" text-anchor="middle" class="gauge-value">' + fmtTL(monthTotal) + '</text>' +
      '<text x="' + cx + '" y="' + (cy - 8) + '" text-anchor="middle" class="gauge-sub">BU AY</text>' +
      '</svg>';
  }

  function drawCharts() {
    if (typeof Chart === "undefined") return;

    var d = window.__dashboardData;
    var donutEl = document.getElementById("donutChart");
    if (d && donutEl && d.categoryData.length) {
      if (charts.donut) charts.donut.destroy();
      charts.donut = new Chart(donutEl, {
        type: "doughnut",
        data: {
          labels: d.categoryData.map(function (c) { return c.name; }),
          datasets: [{ data: d.categoryData.map(function (c) { return c.value; }), backgroundColor: d.categoryData.map(function (c) { return c.color; }), borderWidth: 0 }]
        },
        options: { plugins: { legend: { display: false }, tooltip: { callbacks: { label: function (ctx) { return ctx.label + ": " + fmtTL(ctx.parsed); } } } }, cutout: "62%" }
      });
    }

    var a = window.__analysisData;
    if (!a) return;

    var trendEl = document.getElementById("trendChart");
    if (trendEl && a.months && a.months.some(function (m) { return m.total > 0; })) {
      if (charts.trend) charts.trend.destroy();
      charts.trend = new Chart(trendEl, {
        type: "bar",
        data: {
          labels: a.months.map(function (m) { return m.label; }),
          datasets: [{ data: a.months.map(function (m) { return m.total; }), backgroundColor: "#F2A93B", borderRadius: 6, maxBarThickness: 46 }]
        },
        options: {
          maintainAspectRatio: false,
          plugins: { legend: { display: false }, tooltip: { callbacks: { label: function (ctx) { return fmtTL(ctx.parsed.y); } } } },
          scales: {
            x: { grid: { display: false }, ticks: { color: "#8B939D" } },
            y: { grid: { color: "#383F47" }, ticks: { color: "#8B939D" } }
          }
        }
      });
    }

    var consumptionEl = document.getElementById("consumptionChart");
    if (consumptionEl && a.fuelSeries) {
      var consPts = a.fuelSeries.consumptionSeries.filter(function (p) { return p.consumption != null; });
      if (consPts.length) {
        if (charts.consumption) charts.consumption.destroy();
        charts.consumption = new Chart(consumptionEl, {
          type: "line",
          data: {
            labels: consPts.map(function (p) { return p.dateLabel; }),
            datasets: [{ data: consPts.map(function (p) { return p.consumption; }), borderColor: "#4FA8D8", backgroundColor: "#4FA8D833", tension: 0.3, fill: true, pointRadius: 3 }]
          },
          options: {
            maintainAspectRatio: false,
            plugins: { legend: { display: false }, tooltip: { callbacks: { label: function (ctx) { return ctx.parsed.y.toFixed(1).replace(".", ",") + " L/100km"; } } } },
            scales: {
              x: { grid: { display: false }, ticks: { color: "#8B939D" } },
              y: { grid: { color: "#383F47" }, ticks: { color: "#8B939D" } }
            }
          }
        });
      }
    }

    var priceEl = document.getElementById("priceChart");
    if (priceEl && a.fuelSeries && a.fuelSeries.priceSeries.length > 1) {
      if (charts.price) charts.price.destroy();
      charts.price = new Chart(priceEl, {
        type: "line",
        data: {
          labels: a.fuelSeries.priceSeries.map(function (p) { return p.dateLabel; }),
          datasets: [{ data: a.fuelSeries.priceSeries.map(function (p) { return p.price; }), borderColor: "#C77DE0", backgroundColor: "#C77DE033", tension: 0.3, fill: true, pointRadius: 3 }]
        },
        options: {
          maintainAspectRatio: false,
          plugins: { legend: { display: false }, tooltip: { callbacks: { label: function (ctx) { return fmtTL(ctx.parsed.y) + "/L"; } } } },
          scales: {
            x: { grid: { display: false }, ticks: { color: "#8B939D" } },
            y: { grid: { color: "#383F47" }, ticks: { color: "#8B939D" } }
          }
        }
      });
    }
  }

  function renderAnalysisPanel() {
    var carsList = state.cars || [];
    var selectedCar = carsList.find(function (c) { return c.id === state.selectedCarId; });
    var scopeLabel = selectedCar ? selectedCar.name : "Tüm Araçlar";
    var months = computeMonthlyTrend(6);
    var budgetInfo = computeBudgetInfo();
    var fuelSeries = null;

    var html = '<main class="gd-grid">';

    // trend chart
    html += '<section class="panel span-2"><h2>Aylık Harcama Trendi — ' + esc(scopeLabel) + ' (Son 6 Ay)</h2>';
    if (!months.some(function (m) { return m.total > 0; })) {

      '<div class="qr-canvas-wrap" id="household-qr-canvas"></div>' +
      '<p class="qr-code-text">' + esc(code) + '</p>' +
      '<div class="budget-row">' +
        '<button type="button" class="btn-secondary full" id="qr-copy">📋 Kodu Kopyala</button>' +
        '<button type="button" class="btn-primary full" id="qr-share">📤 Paylaş</button>' +
      '</div>';

    if (code) {
      if (window.qrcode) {
        try {
          var qr = qrcode(0, "M");
          qr.addData(code);
          qr.make();
          modal.querySelector("#household-qr-canvas").innerHTML = qr.createSvgTag({ cellSize: 5, margin: 4, scalable: true });
        } catch (e) {
          console.error(e);
          modal.querySelector("#household-qr-canvas").innerHTML = '<p class="empty-hint">QR kod oluşturulamadı.</p>';
        }
      } else {
        modal.querySelector("#household-qr-canvas").innerHTML = '<p class="empty-hint">QR kütüphanesi yüklenemedi.</p>';
      }
    } else {
      modal.querySelector("#household-qr-canvas").innerHTML = '<p class="empty-hint">Kod bulunamadı.</p>';
    }

    var qrCopyBtn = modal.querySelector("#qr-copy");
    if (qrCopyBtn) qrCopyBtn.addEventListener("click", function () {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(code).then(function () { toast("Kod kopyalandı."); }).catch(function () { toast("Kopyalanamadı, elle seçip kopyalayabilirsin."); });
      } else {
        toast("Kopyalanamadı, elle seçip kopyalayabilirsin.");
      }
    });
    var qrShareBtn = modal.querySelector("#qr-share");
    if (qrShareBtn) qrShareBtn.addEventListener("click", function () { shareHouseholdInvite(); });

    return modal;
  }

  function buildHouseholdScanModal() {
    var modal = document.createElement("div");
    modal.className = "modal";
    modal.addEventListener("click", function (ev) { ev.stopPropagation(); });
    modal.innerHTML =
      '<div class="modal-head"><h3>📷 QR Okut</h3><button class="icon-btn" data-action="close-modal" aria-label="Kapat">✕</button></div>' +
      '<p class="field-hint" style="margin-top:-4px">Ortak hane sahibinin sana gösterdiği davet QR kodunu kameraya tut.</p>' +
      '<div class="qr-scan-wrap"><video id="qr-scan-video" autoplay playsinline muted></video><div class="qr-scan-frame"></div></div>' +
      '<canvas id="qr-scan-canvas" style="display:none;"></canvas>' +
      '<p class="field-hint" id="qr-scan-status">Kamera açılıyor…</p>' +
      '<button type="button" class="btn-secondary full" data-action="close-modal">İptal</button>';

    var video = modal.querySelector("#qr-scan-video");
    var canvas = modal.querySelector("#qr-scan-canvas");
    var statusEl = modal.querySelector("#qr-scan-status");
    var ctx = canvas.getContext("2d", { willReadFrequently: true });
    var done = false;

    function tick() {
      if (done) return;
      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        var imageData;
        try {
          imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        } catch (e) {
          imageData = null;
        }
        var result = (imageData && window.jsQR) ? jsQR(imageData.data, imageData.width, imageData.height) : null;
        if (result && result.data) {
          done = true;
          var scannedCode = result.data.trim();
          stopQrScan();
          closeModal();
          state.modal = { type: "profile" };
          render();
          joinHousehold(scannedCode);
          return;
        }
      }
      qrScanRAF = requestAnimationFrame(tick);
    }

    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      statusEl.textContent = "Bu cihaz/tarayıcı kamera erişimini desteklemiyor.";
    } else if (!window.jsQR) {
      statusEl.textContent = "QR okuma kütüphanesi yüklenemedi, internet bağlantını kontrol et.";
    } else {
      navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(function (stream) {
        qrScanStream = stream;
        video.srcObject = stream;
        statusEl.textContent = "Kodu çerçeve içine getir…";
        qrScanRAF = requestAnimationFrame(tick);
      }).catch(function (err) {
        console.error(err);
        statusEl.textContent = "Kameraya erişilemedi: izin verildiğinden emin ol.";
      });
    }

    return modal;
  }

  // KVKK "unutulma hakkı" — hesabı ve tüm ilişkili verileri kalıcı olarak siler.
  function deleteAccountAndData(currentPassword) {
    var fbUser = auth.currentUser;
    if (!fbUser) return;
    var myUid = fbUser.uid;
    var wasInOtherHousehold = state.householdId && state.householdId !== myUid;
    var oldHouseholdId = state.householdId;

    toast("Hesabın siliniyor…");
    var credential = firebase.auth.EmailAuthProvider.credential(fbUser.email, currentPassword);
    fbUser.reauthenticateWithCredential(credential).then(function () {
      // Ortak bir hanenin üyesiyse, önce o haneden kendini çıkar.
      if (wasInOtherHousehold) {
        var removePatch = {};
        removePatch.members = firebase.firestore.FieldValue.arrayRemove(myUid);
        removePatch["memberProfiles." + myUid] = firebase.firestore.FieldValue.delete();
        return db.collection("users").doc(oldHouseholdId).update(removePatch).catch(function (err) { console.error(err); });
      }
    }).then(function () {
      // Kendi veri belgesini (araçlar, masraflar, fotoğraflar, aktivite geçmişi vb.) sil.
      return db.collection("users").doc(myUid).delete();
    }).then(function () {
      // Firebase Authentication hesabını sil.
      return fbUser.delete();
    }).then(function () {
      try {
        ["cars", "expenses", "pending_sync_count", "notif_history", "activity_log_seen", "notif_history_seen"].forEach(function (k) {
          try { localStorage.removeItem("gd_" + k); } catch (e2) {}
        });
      } catch (e) {}
      closeModal();
      toast("Hesabın ve tüm verilerin kalıcı olarak silindi.");
    }).catch(function (err) {
      console.error(err);
      if (err && err.code === "auth/wrong-password") {
        toast("Şifre hatalı. Hesabın silinmedi.");
      } else {
        toast("Hesap silinirken bir hata oluştu: " + authErrorMessage(err));
      }
    });
  }

  function fmtDateTime(ts) {
    try {
      var d = ts && typeof ts.toDate === "function" ? ts.toDate() : (ts ? new Date(ts) : null);
      if (!d || isNaN(d.getTime())) return "—";
      return d.toLocaleString("tr-TR", { day: "2-digit", month: "2-digit", year: "numeric", hour: "2-digit", minute: "2-digit" });
    } catch (e) { return "—"; }
  }

  function renderRunLogRecipients(r) {
    var list = r.recipients || r.results || r.details || r.users || null;
    if (!list || !list.length) return "";

    // Yeni format: her giriş bir hane, içinde üye kırılımı var (bkz.
    // send-reminders.js -> recipients.push({ household, members })). Ortak
    // hanede kimin bildirim aldığını (sadece toplam token sayısı değil, ad/
    // e-posta ve kaç cihazına gittiğini) burada gösteriyoruz.
    if (list[0] && list[0].members) {
      var groupHtml = "";
      list.forEach(function (group) {
        groupHtml += '<div class="mon-recipient-group">' +
          '<div class="mon-recipient-group-title">🏠 ' + esc(group.household || "Hane") + '</div>' +
          '<ul class="mon-recipients">' +
          (group.members || []).map(function (m) {
            var label = m.name || m.email || "Bilinmeyen kullanıcı";
            var devText = (m.deviceCount != null) ? (m.deviceCount + " cihaz") : "";
            var ok = m.success !== false;
            return '<li class="mon-recipient-row">' +
              '<span class="mon-recipient-email">' + esc(label) + (m.email && m.name ? ' <span class="mon-recipient-sub">(' + esc(m.email) + ')</span>' : '') + '</span>' +
              '<span class="mon-recipient-sub">' + esc(devText) + '</span>' +
              (ok ? '<span class="mon-badge ok">✓</span>' : '<span class="mon-badge bad">✗' + (m.failed ? (' ' + m.failed) : '') + '</span>') +
              '</li>';
          }).join("") +
          '</ul></div>';
      });
      return groupHtml;
    }

    // Eski (düz) format ile geriye dönük uyumluluk.
    var html = '<ul class="mon-recipients">';
    list.forEach(function (u) {
      var email = u.email || u.userEmail || u.name || u.id || "Bilinmeyen kullanıcı";
      var ok = u.success !== false && !u.error;
      html += '<li class="mon-recipient-row"><span class="mon-recipient-email">' + esc(email) + '</span>' +
        (ok ? '<span class="mon-badge ok">✓</span>' : '<span class="mon-badge bad">✗' + (u.error ? (' ' + esc(String(u.error))) : '') + '</span>') +
        '</li>';
    });
    html += '</ul>';
    return html;
  }

      html += '<p class="mon-loading">Yükleniyor…</p>';
    } else if (monitoring.mySupportRequestsError) {
      html += '<p class="mon-empty">Talepler alınamadı: ' + esc(monitoring.mySupportRequestsError) + '</p>';
    } else if (!myRows.length) {
      html += '<p class="mon-empty">Henüz gönderdiğin bir destek talebi yok.</p>';
    } else {
      html += '<ul class="err-list">';
      myRows.forEach(function (r) {
        var isResolved = r.status === "resolved";
        html += '<li class="err-item">' +
          '<div class="err-item-head">' +
            '<span class="err-item-time">' + fmtDateTime(r.createdAt) + '</span>' +
            (isResolved ? '<span class="mon-badge ok">✓ Çözüldü</span>' : '<span class="mon-badge warn">⏳ İnceleniyor</span>') +
          '</div>' +
          '<div class="err-item-msg">' + esc(r.message || "") + '</div>' +
        '</li>';
      });
      html += '</ul>';
    }

    modal.innerHTML = html;

    var msgEl = modal.querySelector("#support-msg");
    var countEl = modal.querySelector("#support-charcount");
    var hpEl = modal.querySelector("#support-hp");
    var sendBtn = modal.querySelector("#support-send");
    msgEl.addEventListener("input", function () {
      countEl.textContent = msgEl.value.length + " / 1000";
    });

    // Bekleme süresi dolana kadar butonu kilitli tutup geri sayımı gösterir.
    var cooldownInterval = null;
    function tickCooldown() {
      var remaining = supportCooldownRemainingMs();
      if (sentToday >= SUPPORT_DAILY_LIMIT) { return; } // günlük sınır zaten devrede, dokunma
      if (remaining <= 0) {
        sendBtn.disabled = false;
        sendBtn.textContent = "🐞 Sorunu Gönder";
        if (cooldownInterval) { clearInterval(cooldownInterval); cooldownInterval = null; }
        return;
      }
      sendBtn.disabled = true;
      sendBtn.textContent = "⏳ " + Math.ceil(remaining / 1000) + " sn sonra tekrar dene";
    }
    if (!limitReached && cooldownRemaining > 0) {
      tickCooldown();
      cooldownInterval = setInterval(tickCooldown, 1000);
    }

    sendBtn.addEventListener("click", function () {
      // Honeypot doluysa büyük olasılıkla bot: kullanıcıya normalmiş gibi
      // davranıp sessizce hiçbir şey göndermeden çık.
      if (hpEl && hpEl.value) {
        toast("Bildirimin için teşekkürler, en kısa sürede inceleyeceğiz.");
        closeModal();
        return;
      }
      if (supportSendsLast24h() >= SUPPORT_DAILY_LIMIT) {
        toast("Bugün için destek talebi gönderme sınırına ulaştın. Lütfen yarın tekrar dene ya da " + SUPPORT_EMAIL + " adresine yaz.");
        return;
      }
      var remaining = supportCooldownRemainingMs();
      if (remaining > 0) {
        toast("Çok sık deneme yapıyorsun, " + Math.ceil(remaining / 1000) + " saniye sonra tekrar dene.");
        return;
      }
      var message = msgEl.value.trim();
      if (!message) { toast("Lütfen sorununu kısaca açıkla."); return; }
      if (message.length < SUPPORT_MIN_LENGTH) { toast("Lütfen sorununu biraz daha ayrıntılı yaz (en az " + SUPPORT_MIN_LENGTH + " karakter)."); return; }
      if (isDuplicateSupportMessage(message)) { toast("Bu talebi zaten gönderdin, ekibimiz inceliyor."); return; }
      if (!db) { toast("Bağlantı kurulamadı, tekrar dene."); return; }

      var btn = sendBtn;
      btn.disabled = true; btn.textContent = "Gönderiliyor…";

      submitSupportRequest(message).then(function () {
        if (cooldownInterval) { clearInterval(cooldownInterval); cooldownInterval = null; }
        setLocalData("last_support_send", Date.now());
        toast("Bildirimin için teşekkürler, en kısa sürede inceleyeceğiz.");
        closeModal();
      }).catch(function (err) {
        btn.disabled = false; btn.textContent = "🐞 Sorunu Gönder";
        if (err && err.code === "support/daily-limit") {
          toast("Bugün için destek talebi gönderme sınırına ulaştın. Lütfen yarın tekrar dene ya da " + SUPPORT_EMAIL + " adresine yaz.");
        } else if (err && err.code === "permission-denied") {
          toast("Çok sık deneme yaptın ya da günlük sınıra ulaştın. Lütfen biraz sonra tekrar dene.");
        } else {
          toast("Gönderilemedi: " + (err && err.message ? err.message : err));
        }
      });
    });

    return modal;
  }

      '<label class="field"><span>Mesaj</span><textarea id="ann-body" maxlength="300" rows="4" placeholder="Örn. Bu gece 02:00–03:00 arası sistem bakımda olacak, bu süre boyunca uygulamaya erişim kesintili olabilir." style="width:100%; background:var(--bg); border:1px solid var(--border); border-radius:8px; color:var(--text); padding:10px; font-size:14px; font-family:inherit; resize:vertical;"></textarea></label>' +
      '<p class="km-ocr-status" id="ann-charcount">0 / 300</p>' +
      '<button type="button" class="btn-primary full" id="ann-send" style="margin-top:6px">📢 Tüm Kullanıcılara Gönder</button>';

    var bodyEl = modal.querySelector("#ann-body");
    var countEl = modal.querySelector("#ann-charcount");
    bodyEl.addEventListener("input", function () {
      countEl.textContent = bodyEl.value.length + " / 300";
    });

    modal.querySelector("#ann-send").addEventListener("click", function () {
      var title = modal.querySelector("#ann-title").value.trim();
      var body = bodyEl.value.trim();
      if (!title) { toast("Lütfen bir başlık yaz."); return; }
      if (!body) { toast("Lütfen bir mesaj yaz."); return; }

      showConfirm({
        title: "Duyuruyu Gönder",
        message: '"' + title + '" başlıklı bu mesaj tüm kullanıcılara push bildirimi olarak gönderilecek. Emin misin?',
        confirmLabel: "Gönder",
        onConfirm: function () {
          var btn = modal.querySelector("#ann-send");
          btn.disabled = true; btn.textContent = "Gönderiliyor…";
          if (!auth.currentUser) {
            btn.disabled = false; btn.textContent = "📢 Tüm Kullanıcılara Gönder";
            toast("Oturum bulunamadı, tekrar giriş yapın.");
            return;
          }
          auth.currentUser.getIdToken().then(function (idToken) {
            return fetch(ANNOUNCEMENT_TRIGGER_URL, {
              method: "POST",
              headers: {
                "Authorization": "Bearer " + idToken,
                "Content-Type": "application/json"
              },
              body: JSON.stringify({ title: title, body: body })
            });
          }).then(function (r) {
            return r.json().then(function (data) { return { ok: r.ok, data: data }; });
          }).then(function (result) {
            if (result.ok && result.data && result.data.ok) {
              toast(`Duyuru gönderildi: ${result.data.sentCount} cihaza ulaştı.`);
              closeModal();
            } else {
              var msg = (result.data && result.data.error) ? result.data.error : "bilinmeyen hata";
              btn.disabled = false; btn.textContent = "📢 Tüm Kullanıcılara Gönder";
              toast("Duyuru gönderilemedi: " + msg);
            }
          }).catch(function (err) {
            console.error(err);
            btn.disabled = false; btn.textContent = "📢 Tüm Kullanıcılara Gönder";
            toast("Duyuru gönderilemedi: " + (err && err.message ? err.message : err));
          });
        }
      });
    });

    return modal;
  }
