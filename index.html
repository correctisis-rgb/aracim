    tryOpenPendingDeepLink();
    ensureInviteToken(dataDocId(), data);
  }
  // Kendi hanemizdeysek ve henüz bir inviteToken üretilmemişse (eski
  // hesaplar ya da ilk kayıt), sessizce bir tane oluşturup hane belgesine
  // yazar. Sadece hane sahibi kendi belgesine yazdığı için başka birinin
  // hanesinde bu asla tetiklenmez.
  function ensureInviteToken(docId, data) {
    if (!state.currentUser || !docId) return;
    if (docId !== state.currentUser.id) return; // sadece kendi hanemizde
    if (data.inviteToken) return;
    var token = generateInviteToken();
    db.collection("users").doc(docId).set({ inviteToken: token }, { merge: true })
      .catch(function (err) { console.error(err); });
  }
  // Şu anki kullanıcının, verilen hane belgesinde (memberProfiles/members)
  // kendi kaydı yoksa ekler. Hem kendi hanesi hem de sonradan katıldığı
  // paylaşılan bir hane için kullanılabilir — bu sayede "hane sahibi
  // üyeyi göremiyor" gibi senaryolar, katılma sırası ne olursa olsun
  // kendiliğinden düzelir. arrayUnion kullanır, asla mevcut üyeleri silmez.
  function ensureSelfInHousehold(householdDocId, data) {
    if (!state.currentUser) return;
    var myUid = state.currentUser.id;
    var members = data.members || [];
    var hasProfile = data.memberProfiles && data.memberProfiles[myUid];
    if (members.indexOf(myUid) === -1 || !hasProfile) {
      var patch = buildMemberProfileEntry(myUid, state.currentUser.name, state.currentUser.email);
      patch.members = firebase.firestore.FieldValue.arrayUnion(myUid);
      db.collection("users").doc(householdDocId).set(patch, { merge: true })
        .catch(function (err) {
          console.error(err);
          // Bu hanede artık üye değilsek (hane sahibi bizi çıkarmış olabilir),
          // kendimizi tekrar eklemeye çalışmak izin hatası verir ve bu sonsuz
          // döngüye yol açabilir. Böyle bir durumda kendi (boş) hanemize dönelim.
          if (err && err.code === "permission-denied" && householdDocId !== myUid) {
            handleHouseholdAccessRevoked();
          }
        });
    }
  }
  // ---------- Üye rolleri: "sadece görüntüleyebilir" / "düzenleyebilir" ----------
  // Hane sahibi her zaman tam yetkilidir. Diğer üyelerin rolü
  // memberProfiles.{uid}.role alanında tutulur ("edit" ya da "view").
  // Rol hiç ayarlanmamışsa (bu özellik eklenmeden önce katılmış üyeler
  // dahil) varsayılan "edit" kabul edilir — bkz. firestore.rules.
  function myHouseholdRole() {
    if (!state.currentUser) return "edit";
    if (state.householdId === state.currentUser.id) return "owner";
    var mine = (state.householdMembers || []).find(function (m) { return m.uid === state.currentUser.id; });
    return (mine && mine.role) || "edit";
  }
  // ---------- Üye yetkileri: ayrıntılı checkbox tabanlı izinler ----------
  // Her üye için memberProfiles.{uid}.perms altında ayrı ayrı saklanan
  // izinler. Bu alan hiç ayarlanmamışsa (özellik eklenmeden önce katılmış
  // üyeler dahil) eski "role" alanından ("edit"/"view") makul bir varsayılan
  // türetilir, böylece mevcut üyelerin erişimi aniden değişmez.
  var ALL_HOUSEHOLD_PERMS = ["seeCars", "seeDrivers", "seeExpenses", "addExpense", "manage", "backup", "report", "bulkImport", "activityLog", "offline"];
  function normalizeMemberPerms(p) {
    if (p && p.perms && typeof p.perms === "object") {
      var pr = p.perms;
      return {
        seeCars: pr.seeCars !== false,
        seeDrivers: pr.seeDrivers !== false,
        seeExpenses: pr.seeExpenses !== false,
        addExpense: pr.addExpense !== false,
        manage: pr.manage !== false,
        backup: pr.backup !== false,
        report: pr.report !== false,
        bulkImport: pr.bulkImport !== false,
        activityLog: pr.activityLog !== false,
        offline: pr.offline !== false
      };
    }
    // Geriye dönük uyumluluk: perms hiç yoksa eski role alanına bak.
    var legacyView = !!(p && p.role === "view");
    return {
      seeCars: true,
      seeDrivers: true,
      seeExpenses: true,
      addExpense: !legacyView,
      manage: !legacyView,
      backup: true,
      report: true,
      bulkImport: true,
      activityLog: true,
      offline: true
    };
  }
  function myHouseholdPermsRaw() {
    if (!state.currentUser) return normalizeMemberPerms(null);
    // Hane sahibi her zaman tam yetkilidir; kendine kısıtlama koyamaz.
    if (state.householdId === state.currentUser.id) {
      return { seeCars: true, seeDrivers: true, seeExpenses: true, addExpense: true, manage: true, backup: true, report: true, bulkImport: true, activityLog: true, offline: true };
    }
    var mine = (state.householdMembers || []).find(function (m) { return m.uid === state.currentUser.id; });
    return mine ? mine.perms : normalizeMemberPerms(null);
  }
  // ---------- Üyeye özel araç/şoför erişim kısıtlaması ----------
  // Hane sahibi ve kısıtlaması olmayan üyeler için carIds/driverIds null
  // döner (tam erişim). Kısıtlı bir üye içinse sadece kendisine atanan
  // araç/şoför id dizisi döner (boş dizi dahil — hiçbirini görmez demektir).
  function myAccessRestriction() {
    if (!state.currentUser) return { carIds: null, driverIds: null };
    if (state.householdId === state.currentUser.id) return { carIds: null, driverIds: null };
    var mine = (state.householdMembers || []).find(function (m) { return m.uid === state.currentUser.id; });
    if (!mine) return { carIds: null, driverIds: null };
    return { carIds: mine.carIds || null, driverIds: mine.driverIds || null };
  }
  function visibleCarsForMe() {
    var all = state.cars || [];
    var r = myAccessRestriction();
    if (!r.carIds) return all;
    return all.filter(function (c) { return r.carIds.indexOf(c.id) !== -1; });
  }
  function visibleDriversForMe() {
    var all = state.drivers || [];
    var r = myAccessRestriction();
    if (!r.driverIds) return all;
    return all.filter(function (d) { return r.driverIds.indexOf(d.id) !== -1; });
  }
  // Hane dokümanındaki license.expiresAt (Firestore Timestamp) alanına göre
  // durum hesaplar. Admin hesabı lisans kısıtlamasından her zaman muaftır.
  function licenseExpiresAtMillis() {
    var lic = state.license;
    if (!lic || !lic.expiresAt) return null;
    if (typeof lic.expiresAt.toMillis === "function") return lic.expiresAt.toMillis();
    if (typeof lic.expiresAt.seconds === "number") return lic.expiresAt.seconds * 1000;
    var t = new Date(lic.expiresAt).getTime();
    return isNaN(t) ? null : t;
  }
  function getLicenseStatus() {
    var ms = licenseExpiresAtMillis();
    if (!ms) return { state: "none", daysLeft: 0, expiresAtMs: null };
    var daysLeft = Math.ceil((ms - Date.now()) / (24 * 60 * 60 * 1000));
    if (ms <= Date.now()) return { state: "expired", daysLeft: 0, expiresAtMs: ms };
    if (daysLeft <= 7) return { state: "expiring", daysLeft: daysLeft, expiresAtMs: ms };
    return { state: "active", daysLeft: daysLeft, expiresAtMs: ms };
  }
  function isLicenseLocked() {
    if (!state.currentUser) return false;
    if (isAdminUser(state.currentUser)) return false;
    var s = getLicenseStatus().state;
    return s === "none" || s === "expired";
  }
  function lacksOfflinePerm() {
    if (!state.currentUser) return false;
    if (state.householdId === state.currentUser.id) return false; // hane sahibi her zaman muaf
    return !myHouseholdPermsRaw().offline;
  }
  function isOfflineLockedForMe() {
    if (!state.online) return lacksOfflinePerm();
    return false;
  }
  function myHouseholdPerms() {
    var perms = myHouseholdPermsRaw();
    // Lisans yoksa/süresi dolmuşsa hane genelinde salt-okunur moda geç:
    // ekleme/düzenleme/silme, masraf ekleme, yedekleme ve toplu içe
    // aktarma kapanır. Görüntüleme (seeCars/seeExpenses/seeDrivers/report/
    // activityLog) etkilenmez, "dosyaları görsün" gereksinimi bu şekilde
    // karşılanır.
    if (isLicenseLocked()) {
      perms = Object.assign({}, perms, { manage: false, addExpense: false, backup: false, bulkImport: false });
    }
    // Çevrimdışıyken: sadece "offline" yetkisi açık olan üyeler işlem
    // yapabilir. Hane sahibi bu kısıtlamadan her zaman muaftır.
    if (isOfflineLockedForMe()) {
      perms = Object.assign({}, perms, { manage: false, addExpense: false, backup: false, bulkImport: false });
    }
    return perms;
  }
  function hasHouseholdPerm(key) {
    return !!myHouseholdPerms()[key];
  }
  function canEditHousehold() {
    return hasHouseholdPerm("manage");
  }
  // Hane sahibinin, kendi hanesindeki bir üyenin rolünü değiştirmesi için.
  // memberProfiles alt-alanına sadece "role" yazıldığı için (leaf-level
  // merge), üyenin mevcut name/email bilgisi silinmez — bkz.
  // buildMemberProfileEntry üzerindeki merge notu.
  function setMemberRole(memberUid, newRole) {
    if (!state.currentUser || state.householdId !== state.currentUser.id) return;
    if (memberUid === state.currentUser.id) return; // hane sahibi kendi rolünü değiştiremez
    var patch = { memberProfiles: {} };
    patch.memberProfiles[memberUid] = { role: newRole };
    db.collection("users").doc(state.currentUser.id).set(patch, { merge: true })
      .then(function () {
        toast(newRole === "view" ? "Üye artık sadece görüntüleyebilir." : "Üyeye düzenleme yetkisi verildi.");
      })
      .catch(function (err) {
        console.error(err);
        toast("Rol güncellenemedi: " + (err && err.message ? err.message : err));
      });
  }
  // Hane sahibinin, bir üyenin ayrıntılı (checkbox tabanlı) izinlerini ve
  // araç/şoför erişim kısıtlamasını güncellemesi için. memberProfiles
  // alt-alanına sadece bu üç anahtar yazıldığından üyenin mevcut
  // name/email/role bilgisi silinmez (leaf-level merge).
  // carIds/driverIds: null = kısıtlama yok (tüm araç/şoförleri görür),
  // dizi (boş dahi) = sadece o dizideki id'leri görür.
  function setMemberPerms(memberUid, permsObj, carIds, driverIds) {
    if (!state.currentUser || state.householdId !== state.currentUser.id) return;
    if (memberUid === state.currentUser.id) return; // hane sahibi kendi yetkisini kısıtlayamaz
    var patch = { memberProfiles: {} };
    patch.memberProfiles[memberUid] = {
      perms: permsObj,
      carIds: Array.isArray(carIds) ? carIds : null,
      driverIds: Array.isArray(driverIds) ? driverIds : null
    };
    return db.collection("users").doc(state.currentUser.id).set(patch, { merge: true })
      .then(function () {
        toast("Üye yetkileri güncellendi.");
        // Kaydettikten sonra ana ekrana değil, Hesabım ekranındaki üye
        // listesine geri dön — hane sahibi arka arkaya birden fazla üyenin
        // yetkisini düzenlerken her seferinde Hesabım'ı yeniden açmak
        // zorunda kalmasın.
        state.modal = { type: "profile" };
        render();
      })
      .catch(function (err) {
        console.error(err);
        toast("Yetkiler güncellenemedi: " + (err && err.message ? err.message : err));
      });
  }

  // Bir üye, hane sahibinin hesabını kapatma sürecini başlatması (bkz.
  // requestOwnerAccountDeletion) yüzünden mi yoksa hane sahibi kendisini
  // hane listesinden çıkardığı için mi erişimini kaybetti — bu ikisini
  // ayırt edip handleHouseholdAccessRevoked()'a doğru mesajı verebilmek
  // için son görülen pendingDeletion durumunu burada saklıyoruz.
  var lastKnownHouseholdWasPendingDeletion = false;
  function subscribeHousehold(householdId) {
    if (unsubscribeHouseholdDoc) { unsubscribeHouseholdDoc(); unsubscribeHouseholdDoc = null; }
    state.householdId = householdId;
    lastKnownHouseholdWasPendingDeletion = false;
    var ref = db.collection("users").doc(householdId);
    unsubscribeHouseholdDoc = ref.onSnapshot(function (snap) {
      if (!snap.exists) return;
      var data = snap.data() || {};
      lastKnownHouseholdWasPendingDeletion = !!data.pendingDeletion;
      applyHouseholdData(data);
      ensureSelfInHousehold(householdId, data);
      render();
    }, function (err) {
      console.error(err);
      // Hane sahibi bizi ortak haneden çıkarmış olabilir, ya da hane sahibi
      // hesabını kapatma sürecini tamamlamış (bekleme süresi doldu ve
      // veriler kalıcı olarak silindi) olabilir: her iki durumda da bu
      // dokümanı okuma iznimiz kesilir (permission-denied). Sessizce takılı
      // kalmak yerine kendi (boş) hanemize otomatik dönelim.
      if (err && err.code === "permission-denied") {
        handleHouseholdAccessRevoked(lastKnownHouseholdWasPendingDeletion);
      }
    });
  }

  function handleHouseholdAccessRevoked(householdWasBeingDeleted) {
    if (!state.currentUser) return;
    var myUid = state.currentUser.id;
    if (state.householdId === myUid) return; // zaten kendi hanemizdeyiz, alakasız bir hata
    if (unsubscribeHouseholdDoc) { unsubscribeHouseholdDoc(); unsubscribeHouseholdDoc = null; }
    var ownRef = db.collection("users").doc(myUid);
    ownRef.set({ householdId: firebase.firestore.FieldValue.delete() }, { merge: true })
      .catch(function (err) { console.error(err); })
      .then(function () { return ownRef.get(); })
      .then(function (snap) {
        state.householdId = myUid;
        var ownData = snap.data() || {};
        applyHouseholdData(ownData);
        ensureSelfInHousehold(myUid, ownData);
        toast(householdWasBeingDeleted
          ? "Ortak hanenin sahibi hesabını kapattı. Verilerine artık erişilemiyor; kendi hanene döndürüldün."
          : "Ortak haneden çıkarıldın, kendi hanene döndürüldün.");
        render();
      })
      .catch(function (err) { console.error(err); });
  }

  // --- Offline & Cloud Sync ---
  // Çevrimdışıyken yapılan her değişiklik burada sayılır; "X kayıt
  // senkronize edilecek" rozeti bu sayaca göre gösterilir. Bağlantı
  // dönüp syncOfflineData() başarıyla tamamlanınca sıfırlanır.
  //
  // Tek bir kullanıcı işlemi (ör. "masraf ekle") aslında birden fazla
  // persist* çağrısını art arda tetikleyebilir (masraf verisi + aktivite
  // geçmişi kaydı + gerekirse aracın km bilgisi) — bunların hepsi aynı
  // senkron çağrısı içinde (aynı "tick"te) gerçekleşir. Kullanıcıya "1 işlem
  // yaptım ama 2-3 kayıt senkronize edilecek diyor" diye yanlış bir sayı
  // göstermemek için, aynı tick içindeki ardışık markPendingSync()
  // çağrıları tek bir artışa indirgeniyor (microtask ile ertelenip toplanıyor).
  var pendingSyncBumpQueued = false;
  function markPendingSync() {
    if (pendingSyncBumpQueued) return;
    pendingSyncBumpQueued = true;
    Promise.resolve().then(function () {
      pendingSyncBumpQueued = false;
      state.pendingSyncCount = (state.pendingSyncCount || 0) + 1;
      setLocalData("pending_sync_count", state.pendingSyncCount);
      render();
    });
  }
  function clearPendingSync() {
    state.pendingSyncCount = 0;
    setLocalData("pending_sync_count", 0);
  }
  // Bazı eylemler (yedek geri yükleme, araç silme/geri alma) birden fazla
  // alanı (cars, expenses, drivers...) aynı anda değiştiriyor. Bunları ayrı
  // ayrı persistX() çağrısıyla göndermek her biri için ayrı bir Firestore
  // round-trip'i demek; bunun yerine tek bir set() çağrısında birleştiriyoruz.
  var PERSIST_FIELD_MAP = {
    cars: { local: "cars", get: function () { return state.cars; } },
    expenses: { local: "expenses", get: function () { return state.expenses; } },
    family: { local: "family", firestoreKey: "familyMembers", get: function () { return state.familyMembers; } },
    budgets: { local: "budgets", get: function () { return state.budgets; } },
    drivers: { local: "drivers", get: function () { return state.drivers; } },
    activityLog: { local: "activity_log", get: function () { return state.activityLog; } }
  };
  function persistFields(keys) {
    var patch = {};
    keys.forEach(function (k) {
      var cfg = PERSIST_FIELD_MAP[k];
      if (!cfg) return;
      var val = cfg.get();
      setLocalData(cfg.local, val);
      patch[cfg.firestoreKey || k] = val;
    });
    if (!state.online) { markPendingSync(); return; }
    var docId = dataDocId();
    if (!docId) return;
    db.collection("users").doc(docId).set(patch, { merge: true })
      .catch(function (err) { console.error(err); });
  }

    setLocalData("cars", state.cars);

  // Araç silindiğinde, o araca ait vade/randevu/km hatırlatma dedup
  // anahtarları (bkz. send-reminders.js -> stateKey = car.id + "_" + ...)
  // notifState içinde sonsuza kadar kalmasın diye temizler. notifState
  // sadece hatırlatma script'i tarafından okunur, burada tam alan olarak
  // (merge:true ile) geri yazılır — bu yüzden önce mevcut hâlini okumamız
  // gerekiyor.
  function cleanupNotifStateForCar(carId) {
    var docId = dataDocId();
    if (!docId || !carId) return;
    var prefix = carId + "_";
    db.collection("users").doc(docId).get().then(function (snap) {
      if (!snap.exists) return;
      var notifState = (snap.data() || {}).notifState || {};
      var changed = false;
      var cleaned = {};
      Object.keys(notifState).forEach(function (key) {
        if (key.indexOf(prefix) === 0) { changed = true; return; }
        cleaned[key] = notifState[key];
      });
      if (!changed) return;
      return db.collection("users").doc(docId).set({ notifState: cleaned }, { merge: true });
    }).catch(function (err) { console.error("notifState temizliği başarısız:", err); });
  }

  // tutulur, ondan daha yeni kayıt varsa hesap menüsünde küçük bir nokta
  // gösterilir.
  function notifHistoryTimestampMs(entry) {
    var ts = entry && entry.sentAt;
    if (!ts) return 0;
    if (typeof ts.toDate === "function") return ts.toDate().getTime();
    if (typeof ts.seconds === "number") return ts.seconds * 1000;
    var d = new Date(ts);
    return isNaN(d.getTime()) ? 0 : d.getTime();
  }

  function appointmentActivityFieldDefs() {

  function formatActivityFieldValue(type, value) {
    if (type === "date") return value ? fmtDateTR(value) : "—";
    if (type === "number") return (value === null || value === undefined || value === "") ? "—" : groupThousands(String(value));
    if (type === "decimal") return (value === null || value === undefined || value === "") ? "—" : numberToDisplay(value, true);
    if (type === "money") return fmtTL(value || 0);
    if (type === "category") return value ? catById(value).label : "—";
    if (type === "car") {
      var c = (state.cars || []).find(function (x) { return x.id === value; });
      return c ? c.name : "—";
    }
    if (type === "carList") {
      var ids = Array.isArray(value) ? value : (value ? [value] : []);
      var names = ids.map(function (id) {
        var cc = (state.cars || []).find(function (x) { return x.id === id; });
        return cc ? cc.name : null;
      }).filter(Boolean);
      return names.length ? names.join(", ") : "—";
    }
    if (type === "payer") {
      if (!value) return "Ben";
      var m = (state.familyMembers || []).find(function (x) { return x.id === value; });
      return m ? m.name : "—";
    }
    if (type === "photo") return value ? "Var" : "Yok";
    if (type === "bool") return value ? "Evet" : "Hayır";
    return (value === null || value === undefined || value === "") ? "—" : String(value);
  }
  // İki obje arasında değişen alanları bulur (düzenleme kayıtları için).
  function diffActivityFields(oldObj, newObj, fieldDefs) {
    var changes = [];
    fieldDefs.forEach(function (f) {
      var oldVal = oldObj ? oldObj[f.key] : undefined;
      var newVal = newObj ? newObj[f.key] : undefined;
      oldVal = oldVal === undefined ? null : oldVal;
      newVal = newVal === undefined ? null : newVal;
      var changed = String(oldVal == null ? "" : oldVal) !== String(newVal == null ? "" : newVal);
      if (!changed) return;
      changes.push({ label: f.label, from: formatActivityFieldValue(f.type, oldVal), to: formatActivityFieldValue(f.type, newVal) });
    });
    return changes;
  }
  // Bir objenin doldurulmuş alanlarının anlık görüntüsü (ekleme/silme kayıtları için).
  function snapshotActivityFields(obj, fieldDefs) {
    var out = [];
    fieldDefs.forEach(function (f) {
      var val = obj ? obj[f.key] : undefined;
      if (val === null || val === undefined || val === "") return;
      out.push({ label: f.label, value: formatActivityFieldValue(f.type, val) });
    });
    return out;
  }

  // --- Push Notifications ---
  function enableNotifications() {
    if (!state.currentUser) { toast("Bildirimleri açmak için giriş yapmalısın."); return; }
    messagingReady.then(function (m) {
      if (!m) { toast("Bu tarayıcı bildirimleri desteklemiyor."); return; }
      Notification.requestPermission().then(function (perm) {
        if (perm !== "granted") {
          toast("Bildirim izni verilmedi. Tarayıcı ayarlarından değiştirebilirsin.");
          state.notifStatus = "denied";
          render();
          return;
        }
        swRegPromise.then(function (reg) {
          if (!reg) { throw new Error("Service worker kaydı bulunamadı. Sayfayı yenileyip tekrar deneyin."); }
          return m.getToken({ vapidKey: VAPID_KEY, serviceWorkerRegistration: reg });
        }).then(function (token) {
          if (!token) { toast("Bildirim anahtarı alınamadı."); return; }
          return db.collection("users").doc(state.currentUser.id).set({
            fcmTokens: firebase.firestore.FieldValue.arrayUnion(token)
          }, { merge: true });
        }).then(function () {
          state.notifStatus = "granted";
          toast("Bildirimler açıldı. Yaklaşan işlemler için hatırlatma alacaksın.");
          render();
        }).catch(function (err) {
          console.error(err);
          toast("Bildirim kaydı başarısız oldu: " + (err && err.message ? err.message : err));
        });
      });
    });
  }

  function disableNotifications() {
    if (!state.currentUser) return;
    messagingReady.then(function (m) {
      if (!m) return;
      swRegPromise.then(function (reg) {
        return m.getToken({ vapidKey: VAPID_KEY, serviceWorkerRegistration: reg || undefined });
      }).then(function (token) {
        if (!token) return;
        return db.collection("users").doc(state.currentUser.id).set({
          fcmTokens: firebase.firestore.FieldValue.arrayRemove(token)
        }, { merge: true });
      }).then(function () {
        state.notifStatus = "default";
        toast("Bildirimler kapatıldı.");
        render();
      }).catch(function (err) { console.error(err); });
    });
  }

  function supportTimestampMs(entry, field) {
    var ts = entry && entry[field];
    if (!ts) return 0;
    if (typeof ts.toDate === "function") return ts.toDate().getTime();
    if (typeof ts.seconds === "number") return ts.seconds * 1000;
    var d = new Date(ts);
    return isNaN(d.getTime()) ? 0 : d.getTime();

  // Kullanıcının kendi taleplerinden "çözüldü" olarak işaretlenmiş en

  function hasUnseenSupportUpdate() {
    var list = monitoring.mySupportRequests || [];
    var resolved = list.filter(function (r) { return r.status === "resolved"; });
    if (!resolved.length) return false;
    var lastSeen = getLocalData("support_seen", 0);
    var latest = 0;
    resolved.forEach(function (r) {
      var t = supportTimestampMs(r, "updatedAt") || supportTimestampMs(r, "createdAt");
      if (t > latest) latest = t;
    });
    return latest > lastSeen;
  }

    var latest = 0;
    list.forEach(function (r) {
      var t = supportTimestampMs(r, "updatedAt") || supportTimestampMs(r, "createdAt");
      if (t > latest) latest = t;
    });
    setLocalData("support_seen", latest || Date.now());
  }
  // Art arda gönderme denemeleri (ör. spam amaçlı çift/hızlı tıklama)
  // arasında bekletmek için basit bir istemci taraflı bekleme süresi.
  function supportCooldownRemainingMs() {
    var last = getLocalData("last_support_send", 0);
    var remaining = SUPPORT_COOLDOWN_MS - (Date.now() - last);
    return remaining > 0 ? remaining : 0;
  }
  // Kullanıcının kendi (canlı senkronize edilen) talep listesinden son 24
  // saatteki gönderim sayısını çıkarır; ek bir Firestore sorgusu gerekmez.
  function supportSendsLast24h() {
    var list = monitoring.mySupportRequests || [];
    var since = Date.now() - 24 * 60 * 60 * 1000;
    return list.filter(function (r) { return supportTimestampMs(r, "createdAt") >= since; }).length;
  }
  // Aynı mesajın kısa süre içinde tekrar gönderilmesini (yanlışlıkla ya da
  // bilinçli spam amaçlı) engellemek için son talebiyle karşılaştırır.
  function isDuplicateSupportMessage(message) {
    var list = monitoring.mySupportRequests || [];
    if (!list.length) return false;
    var last = list[0]; // en yeni kayıt en başta (bkz. subscribeMySupportRequests sıralaması)
    if (!last || (last.message || "").trim().toLowerCase() !== message.trim().toLowerCase()) return false;
    var age = Date.now() - supportTimestampMs(last, "createdAt");
    return age >= 0 && age < SUPPORT_DUPLICATE_WINDOW_MS;
  }

  // Destek talebini gönderir. Bekleme süresi ve günlük limit istemci
  // tarafında zaten önceden kontrol edilir (hızlı geri bildirim için), ama
  // ASIL yaptırım burada, sunucu tarafında (firestore.rules) uygulanır:
  // "supportRequests" ve "supportRateLimits" dokümanları TEK bir Firestore
  // transaction'ı içinde birlikte yazılır. Kurallar (rules) bu iki yazımı
  // ayrı ayrı doğrular; biri reddedilirse transaction'ın TAMAMI iptal olur.
  // Böylece biri tarayıcı konsolundan doğrudan "supportRequests" koleksiyonuna
  // yazmaya çalışsa bile (istemci kodunu atlayarak), eşlik eden geçerli bir
  // "supportRateLimits" güncellemesi olmadan istek kurallar tarafından
  // reddedilir.
  function submitSupportRequest(message) {
    if (!db || !state.currentUser) return Promise.reject({ code: "no-user" });
    var uid = state.currentUser.id;
    var rateRef = db.collection("supportRateLimits").doc(uid);
    var reqRef = db.collection("supportRequests").doc();
    var serverNow = firebase.firestore.FieldValue.serverTimestamp();
    return db.runTransaction(function (tx) {
      return tx.get(rateRef).then(function (rateSnap) {
        var data = rateSnap.exists ? rateSnap.data() : null;
        var rateDoc;
        if (!data) {
          rateDoc = { count: 1, lastSentAt: serverNow, windowStart: serverNow };
        } else {
          var windowStartMs = supportTimestampMs(data, "windowStart");
          var windowExpired = !windowStartMs || (Date.now() - windowStartMs) > SUPPORT_WINDOW_MS;
          if (windowExpired) {
            rateDoc = { count: 1, lastSentAt: serverNow, windowStart: serverNow };
          } else {
            if ((data.count || 0) >= SUPPORT_DAILY_LIMIT) {
              throw { code: "support/daily-limit" };
            }
            rateDoc = { count: (data.count || 0) + 1, lastSentAt: serverNow, windowStart: data.windowStart };
          }
        }
        tx.set(rateRef, rateDoc);
        tx.set(reqRef, {
          message: message.slice(0, 1000),
          userId: uid,
          userEmail: state.currentUser.email || null,
          userName: state.currentUser.name || null,
          appVersion: APP_VERSION,
          url: window.location.href,
          userAgent: navigator.userAgent,
          status: "open",
          createdAt: serverNow
        });
      });
    });
  }

  // --- İstemci taraflı hata yakalama ---
  var CLIENT_ERROR_LOG_LIMIT = 15;
  var clientErrorLogCount = 0;
  var clientErrorSeen = {};
  function logClientError(info) {
    try {
      if (!db || !navigator.onLine) return;
      if (clientErrorLogCount >= CLIENT_ERROR_LOG_LIMIT) return;
      var key = (info.message || "") + "|" + (info.source || "");
      if (clientErrorSeen[key]) return;
      clientErrorSeen[key] = true;
      clientErrorLogCount++;
      db.collection("errorLogs").add({
        message: (info.message || "Bilinmeyen hata").slice(0, 800),
        stack: (info.stack || "").slice(0, 2000),
        source: info.source || "",
        line: info.line || null,
        col: info.col || null,
        url: window.location.href,
        userAgent: navigator.userAgent,
        userId: state.currentUser ? state.currentUser.id : null,
        userEmail: state.currentUser ? state.currentUser.email : null,
        appVersion: APP_VERSION,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      }).catch(function () { /* sessizce yok say */ });
    } catch (e) { /* hata izleme kendisi hata üretmesin */ }
  }
  window.addEventListener("error", function (ev) {
    logClientError({ message: ev.message, source: ev.filename, line: ev.lineno, col: ev.colno, stack: ev.error && ev.error.stack });
  });
  window.addEventListener("unhandledrejection", function (ev) {
    var reason = ev.reason;
    logClientError({
      message: "Unhandled promise rejection: " + (reason && reason.message ? reason.message : String(reason)),
      stack: reason && reason.stack
    });
  });

  function toast(msg) {
    var el = document.createElement("div");
    el.className = "toast";
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(function () { el.remove(); }, 3200);
  }

  function toastWithUndo(msg, onUndo) {
    document.querySelectorAll(".toast").forEach(function (el) { el.remove(); });
    var el = document.createElement("div");
    el.className = "toast toast-undo";
    var msgSpan = document.createElement("span");
    msgSpan.textContent = msg;
    var btn = document.createElement("button");
    btn.type = "button";
    btn.className = "toast-undo-btn";
    btn.textContent = "↩ Geri Al";
    el.appendChild(msgSpan);
    el.appendChild(btn);
    document.body.appendChild(el);
    var timer = setTimeout(function () { el.remove(); }, 6500);
    btn.addEventListener("click", function () {
      clearTimeout(timer);
      el.remove();
      onUndo();
    });
  }

  function showConfirm(opts) {
    var backdrop = document.createElement("div");
    backdrop.className = "modal-backdrop confirm-backdrop";
    var box = document.createElement("div");
    box.className = "modal confirm-modal";
    box.innerHTML =
      '<div class="modal-head"><h3>' + esc(opts.title || "Emin misin?") + '</h3></div>' +
      '<p class="confirm-message">' + esc(opts.message || "") + '</p>' +
      '<div class="confirm-actions">' +
        '<button type="button" class="btn-secondary" id="confirm-cancel">' + esc(opts.cancelLabel || "Vazgeç") + '</button>' +
        '<button type="button" class="' + (opts.danger ? "btn-danger" : "btn-primary") + '" id="confirm-ok">' + esc(opts.confirmLabel || "Onayla") + '</button>' +
      '</div>';
    backdrop.appendChild(box);
    function cleanup() { backdrop.remove(); }
    box.addEventListener("click", function (ev) { ev.stopPropagation(); });
    backdrop.addEventListener("click", function (ev) {
      if (ev.target === backdrop) { cleanup(); if (opts.onCancel) opts.onCancel(); }
    });
    box.querySelector("#confirm-cancel").addEventListener("click", function () { cleanup(); if (opts.onCancel) opts.onCancel(); });
    box.querySelector("#confirm-ok").addEventListener("click", function () { cleanup(); if (opts.onConfirm) opts.onConfirm(); });
    document.body.appendChild(backdrop);
    box.querySelector("#confirm-ok").focus();
  }

  // ---------- Paylaşılabilir masraf raporu (görsel) ----------
  function buildReportCanvas(list, carLabel) {
    var W = 820;
    var pad = 36;
    var rowH = 46;
    var headerH = 168;
    var footerH = 40;
    var H = headerH + Math.max(list.length, 1) * rowH + footerH;

    var canvas = document.createElement("canvas");
    var scale = 2; // keskin görsel için
    canvas.width = W * scale;
    canvas.height = H * scale;
    var ctx = canvas.getContext("2d");
    ctx.scale(scale, scale);

    // arkaplan
    ctx.fillStyle = "#1B1F24";
    ctx.fillRect(0, 0, W, H);

    // başlık bandı
    ctx.fillStyle = "#242930";
    ctx.fillRect(0, 0, W, headerH);

    ctx.fillStyle = "#F2A93B";
    ctx.font = "700 21px Arial, sans-serif";
    ctx.fillText("🚘 GARAJ DEFTERİ — MASRAF RAPORU", pad, 42);

    ctx.fillStyle = "#EDEEF0";
    ctx.font = "600 16px Arial, sans-serif";
    ctx.fillText(carLabel, pad, 70);

    var total = list.reduce(function (s, e) { return s + (e.amount || 0); }, 0);
    var dates = list.map(function (e) { return e.date; }).filter(Boolean).sort();
    var rangeLabel = dates.length ? (fmtDateTR(dates[0]) + " – " + fmtDateTR(dates[dates.length - 1])) : "";

    ctx.fillStyle = "#8B939D";
    ctx.font = "12.5px Arial, sans-serif";
    ctx.fillText(rangeLabel + " · " + list.length + " kayıt", pad, 92);

    ctx.fillStyle = "#F2A93B";
    ctx.font = "700 24px 'JetBrains Mono', monospace";
    ctx.fillText("Toplam: " + fmtTL(total), pad, 128);

    ctx.fillStyle = "#8B939D";
    ctx.font = "10.5px Arial, sans-serif";
    ctx.fillText("Oluşturulma: " + new Date().toLocaleString("tr-TR"), pad, 150);

    // satırlar
    list.forEach(function (e, i) {
      var rowY = headerH + i * rowH;
      if (i % 2 === 1) {
        ctx.fillStyle = "#20242A";
        ctx.fillRect(0, rowY, W, rowH);
      }
      var cat = catById(e.category);
      var car = (state.cars || []).find(function (c) { return c.id === e.carId; });

      ctx.fillStyle = cat.color;
      ctx.font = "18px Arial, sans-serif";
      ctx.fillText(cat.emoji, pad, rowY + 29);

      ctx.fillStyle = "#EDEEF0";
      ctx.font = "600 14px Arial, sans-serif";
      ctx.fillText(cat.label + (car ? " · " + car.name : ""), pad + 34, rowY + 20);

      ctx.fillStyle = "#8B939D";
      ctx.font = "11.5px Arial, sans-serif";
      var noteText = e.note ? e.note : "—";
      if (noteText.length > 46) noteText = noteText.slice(0, 45) + "…";
      ctx.fillText(noteText, pad + 34, rowY + 36);

      ctx.fillStyle = "#8B939D";
      ctx.font = "11.5px 'JetBrains Mono', monospace";
      ctx.fillText(fmtDateTR(e.date), W - 250, rowY + 27);

      ctx.fillStyle = "#EDEEF0";
      ctx.font = "700 14px 'JetBrains Mono', monospace";
      ctx.textAlign = "right";
      ctx.fillText(fmtTL(e.amount), W - pad, rowY + 27);
      ctx.textAlign = "left";
    });

    // alt bilgi
    ctx.fillStyle = "#8B939D";
    ctx.font = "10.5px Arial, sans-serif";
    ctx.fillText("Garaj Defteri ile oluşturuldu", pad, H - 16);

    return canvas;
  }

  function shareExpenseReport() {
    var list = getFilteredLogExpenses().slice().sort(function (a, b) { return new Date(a.date) - new Date(b.date); });
    if (!list.length) { toast("Paylaşılacak masraf kaydı yok."); return; }

    var car = (state.cars || []).find(function (c) { return c.id === state.selectedCarId; });
    var carLabel = car ? car.name : (logFiltersActive() && state.logFilters.carId !== "all"
      ? ((state.cars || []).find(function (c) { return c.id === state.logFilters.carId; }) || {}).name || "Seçili Araç"
      : "Tüm Araçlar");

    var canvas = buildReportCanvas(list, carLabel);
    canvas.toBlob(function (blob) {
      if (!blob) { toast("Rapor oluşturulamadı."); return; }
      var fileName = "masraf-raporu-" + todayStr() + ".png";

      var file;
      try { file = new File([blob], fileName, { type: "image/png" }); } catch (e) { file = null; }

          .catch(function (err) { if (err && err.name !== "AbortError") toast("Paylaşım yapılamadı, görsel indiriliyor."); });
      } else {

    }, "image/png");
  }

  // ---------- Otomatik Yedekleme ----------
  var AUTO_BACKUP_INTERVAL_MS = {
    off: 0,
    daily: 24 * 60 * 60 * 1000,
    weekly: 7 * 24 * 60 * 60 * 1000,
    monthly: 30 * 24 * 60 * 60 * 1000
  };

  // Chrome/Edge/Android gibi tarayıcılarda kullanıcı bir klasör seçebilir ve
  // yedekler doğrudan (indirme penceresi açılmadan) o klasöre yazılır.
  // iOS Safari ve Firefox bu API'yi desteklemez; onlarda yedek her zaman
  // İndirilenler klasörüne iner (mevcut/eski davranış).
  var SUPPORTS_FS_ACCESS = typeof window !== "undefined" && typeof window.showDirectoryPicker === "function";

  function getAutoBackupSettings() {
    var s = getLocalData("autoBackupSettings", null);
    if (!s || typeof s !== "object") s = {};
    return {
      interval: AUTO_BACKUP_INTERVAL_MS.hasOwnProperty(s.interval) ? s.interval : "off",
      lastBackupAt: s.lastBackupAt || null
    };
  }

  function setAutoBackupSettings(patch) {
    var current = getAutoBackupSettings();
    var next = Object.assign({}, current, patch);
    setLocalData("autoBackupSettings", next);
    return next;
  }

  function autoBackupIntervalLabel(interval) {
    if (interval === "daily") return "Günlük";
    if (interval === "weekly") return "Haftalık";
    if (interval === "monthly") return "Aylık";
    return "Kapalı";
  }

  // ---- Seçilen yedekleme klasörünü tarayıcıda (IndexedDB) saklama ----
  // FileSystemDirectoryHandle nesnesi JSON'a çevrilemez, bu yüzden
  // localStorage değil, klonlanabilir nesneleri saklayabilen IndexedDB
  // kullanılıyor. Hiçbir şey sunucuya gönderilmiyor; tamamen cihaz yerelinde.
  var BACKUP_HANDLE_DB = "gd_backup_handles";
  var BACKUP_HANDLE_STORE = "handles";
  var BACKUP_HANDLE_KEY = "backupDir";

  function openBackupHandleDB() {
    return new Promise(function (resolve, reject) {
      if (!window.indexedDB) { reject(new Error("indexeddb-yok")); return; }
      var req = indexedDB.open(BACKUP_HANDLE_DB, 1);
      req.onupgradeneeded = function () { req.result.createObjectStore(BACKUP_HANDLE_STORE); };
      req.onsuccess = function () { resolve(req.result); };
      req.onerror = function () { reject(req.error); };
    });
  }
  function setStoredBackupDirHandle(handle) {
    return openBackupHandleDB().then(function (db) {
      return new Promise(function (resolve, reject) {
        var tx = db.transaction(BACKUP_HANDLE_STORE, "readwrite");
        tx.objectStore(BACKUP_HANDLE_STORE).put(handle, BACKUP_HANDLE_KEY);
        tx.oncomplete = function () { resolve(); };
        tx.onerror = function () { reject(tx.error); };
      });
    });
  }
  function getStoredBackupDirHandle() {
    if (!SUPPORTS_FS_ACCESS) return Promise.resolve(null);
    return openBackupHandleDB().then(function (db) {
      return new Promise(function (resolve, reject) {
        var tx = db.transaction(BACKUP_HANDLE_STORE, "readonly");
        var req = tx.objectStore(BACKUP_HANDLE_STORE).get(BACKUP_HANDLE_KEY);
        req.onsuccess = function () { resolve(req.result || null); };
        req.onerror = function () { reject(req.error); };
      });
    }).catch(function () { return null; });
  }
  function clearStoredBackupDirHandle() {
    return openBackupHandleDB().then(function (db) {
      return new Promise(function (resolve, reject) {
        var tx = db.transaction(BACKUP_HANDLE_STORE, "readwrite");
        tx.objectStore(BACKUP_HANDLE_STORE).delete(BACKUP_HANDLE_KEY);
        tx.oncomplete = function () { resolve(); };
        tx.onerror = function () { reject(tx.error); };
      });
    }).catch(function () {});
  }

  // Kullanıcıya klasör seçtiren dialog. Tarayıcı güvenliği gereği SADECE bir
  // buton tıklaması (kullanıcı jesti) içinden çağrılabilir.
  function chooseBackupFolder() {
    if (!SUPPORTS_FS_ACCESS) { toast("Tarayıcın klasör seçmeyi desteklemiyor, yedek İndirilenler klasörüne inecek."); return Promise.resolve(false); }
    return window.showDirectoryPicker({ id: "garaj-defteri-yedek", mode: "readwrite" }).then(function (handle) {
      return setStoredBackupDirHandle(handle).then(function () { return true; });
    }).catch(function (e) {
      if (e && e.name !== "AbortError") toast("Klasör seçilemedi.");
      return false;
    });
  }

  // Uygulama açıldığında/verisi geldiğinde bir kez çağrılır; ayarlanan
  // periyot dolmuşsa yedeği sessizce alır (klasör seçiliyse oraya yazar,
  // yoksa İndirilenler klasörüne indirir) ve son yedekleme zamanını günceller.
  // Kullanıcı etkileşimi gerektirmez.
  function maybeRunAutoBackup() {
    if (autoBackupCheckedThisSession) return;
    autoBackupCheckedThisSession = true;
    var settings = getAutoBackupSettings();
    var ms = AUTO_BACKUP_INTERVAL_MS[settings.interval];
    if (!ms) return; // "Kapalı"
    if (!state.cars || !state.cars.length) return; // yedeklenecek veri henüz gelmediyse bekle
    var lastMs = settings.lastBackupAt ? new Date(settings.lastBackupAt).getTime() : 0;
    if (isNaN(lastMs)) lastMs = 0;
    if (Date.now() - lastMs < ms) return; // henüz zamanı gelmedi
    exportData({ silent: true }).then(function (result) {
      setAutoBackupSettings({ lastBackupAt: new Date().toISOString() });
      toast(result.savedToFolder ? "Otomatik yedek klasöre kaydedildi: " + result.fileName : "Otomatik yedek indirildi.");
      if (state.modal && state.modal.type === "profile") render();
    });
  }

  // Yedeği seçilen klasöre (varsa ve izin sessizce onaylanabiliyorsa) ya da
  // İndirilenler klasörüne kaydeder. { userGesture:true } geçilirse (örn. bir
  // buton tıklamasından çağrıldıysa) gerekirse izin isteme diyaloğu açılabilir.
  function exportData(opts) {
    opts = opts || {};
    var payload = { cars: state.cars, expenses: state.expenses, family: state.familyMembers, budgets: state.budgets, drivers: state.drivers, exportedAt: new Date().toISOString() };
    var json = JSON.stringify(payload, null, 2);
    var slug = state.currentUser ? state.currentUser.name.toLowerCase().replace(/[^a-z0-9ığüşöç]+/gi, "-").replace(/^-+|-+$/g, "") : "yedek";
    var fileName = "garaj-defteri-" + slug + "-" + todayStr() + ".json";

    function downloadFallback() {
      var blob = new Blob([json], { type: "application/json" });
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url;
      a.download = fileName;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      return { savedToFolder: false, fileName: fileName };
    }

    function finish(result) {
      if (!opts.silent) {
        setAutoBackupSettings({ lastBackupAt: new Date().toISOString() });
        toast(result.savedToFolder ? "Yedek klasöre kaydedildi: " + result.fileName : "Yedek indirildi.");
      }
      return result;
    }

    return getStoredBackupDirHandle().then(function (dirHandle) {
      if (!dirHandle) return downloadFallback();
      return dirHandle.queryPermission({ mode: "readwrite" }).then(function (perm) {
        if (perm !== "granted" && opts.userGesture) {
          return dirHandle.requestPermission({ mode: "readwrite" });
        }
        return perm;
      }).then(function (perm) {
        if (perm !== "granted") {
          if (opts.userGesture) toast("Klasöre yazma izni verilmedi, yedek İndirilenler klasörüne indirildi.");
          return downloadFallback();
        }
        return dirHandle.getFileHandle(fileName, { create: true }).then(function (fileHandle) {
          return fileHandle.createWritable();
        }).then(function (writable) {
          return writable.write(json).then(function () { return writable.close(); });
        }).then(function () {
          return { savedToFolder: true, fileName: fileName };
        });
      });
    }).catch(function (e) {
      console.error("Klasöre yedekleme başarısız, indirmeye dönülüyor:", e);
      return downloadFallback();
    }).then(finish);
  }

  function importData(file) {
    var reader = new FileReader();
    reader.onload = function () {
      try {
        var data = JSON.parse(reader.result);
        if (!data || !Array.isArray(data.cars) || !Array.isArray(data.expenses)) throw new Error("invalid");
        showConfirm({
          title: "Yedeği Geri Yükle",
          message: "Mevcut veriler bu yedekle değiştirilecek. Devam edilsin mi?",
          confirmLabel: "Devam Et",
          danger: true,
          onConfirm: function () {
            state.cars = data.cars;
            state.expenses = data.expenses;
            state.familyMembers = data.family || [];
            state.budgets = data.budgets || {};
            state.drivers = Array.isArray(data.drivers) ? data.drivers : [];
            persistFields(["cars", "expenses", "family", "budgets", "drivers"]);
            toast("Yedek geri yüklendi.");
            render();
          }
        });
      } catch (e) {
        toast("Dosya okunamadı. Geçerli bir yedek dosyası seçtiğinizden emin olun.");
      }
    };
    reader.readAsText(file);
  }

  function loginAs(fbUser) {
    // Firestore önbelleği (enablePersistence) henüz açılmamışsa veya ilk
    // anlık görüntü daha ulaşmamışsa bile, bu cihazda daha önce görülmüş
    // profil bilgisi (ad/avatar) varsa hemen onu göster — böylece internetsiz
    // açılışta ekran kısa süreliğine bile boş/isimsiz kalmaz.
    var cachedProfile = getLocalData("profile_" + fbUser.uid, null);
    state.currentUser = {
      id: fbUser.uid,
      name: (cachedProfile && cachedProfile.name) || fbUser.displayName || "Kullanıcı",
      email: (cachedProfile && cachedProfile.email) || fbUser.email,
      avatar: (cachedProfile && cachedProfile.avatar) || null
    };
    state.householdId = fbUser.uid;
    state.householdMembers = [];
    state.householdDataLoaded = false;
    state.selectedCarId = "all";
    state.view = "panel";
    state.modal = null;
    state.accountMenuOpen = false;
    render();

    if (pendingAuthAction) {
      logLoginEvent(fbUser, pendingAuthAction);
      pendingAuthAction = null;
    }

    // Destek talepleri: kullanıcı kendi taleplerini canlı takip edebilsin diye,
    // admin ise yeni/açık taleplerin sayısını hesap menüsünde rozet olarak
    // görebilsin diye, giriş anında ilgili dinleyiciler kurulur.
    subscribeMySupportRequests(fbUser.uid);
    if (isAdminUser({ email: fbUser.email })) subscribeAdminSupportBadge();

    if (unsubscribeUserDoc) unsubscribeUserDoc();
    if (unsubscribeHouseholdDoc) { unsubscribeHouseholdDoc(); unsubscribeHouseholdDoc = null; }
    var docRef = db.collection("users").doc(fbUser.uid);
    unsubscribeUserDoc = docRef.onSnapshot(function (snap) {
      if (!snap.exists) {
        var createPatch = buildMemberProfileEntry(fbUser.uid, fbUser.displayName || "Kullanıcı", fbUser.email);
        createPatch.name = fbUser.displayName || "Kullanıcı";
        createPatch.email = fbUser.email;
        createPatch.avatar = null;
        createPatch.members = [fbUser.uid];
        createPatch.cars = state.cars || [];
        createPatch.expenses = state.expenses || [];
        createPatch.familyMembers = state.familyMembers || [];
        createPatch.budgets = state.budgets || {};
        createPatch.drivers = state.drivers || [];
        createPatch.createdAt = firebase.firestore.FieldValue.serverTimestamp();
        docRef.set(createPatch, { merge: true }).catch(function (err) { console.error(err); });
        return;
      }
      var data = snap.data() || {};
      if (!state.currentUser || state.currentUser.id !== fbUser.uid) return;

      // Kimlik bilgisi (isim/e-posta/avatar) her zaman kişinin kendi belgesinden gelir;
      // ortak bir haneye katılınca bile kendi adı değişmez.
      state.currentUser = { id: fbUser.uid, name: data.name || fbUser.displayName || "Kullanıcı", email: data.email || fbUser.email, avatar: data.avatar || null };
      setLocalData("profile_" + fbUser.uid, { name: state.currentUser.name, email: state.currentUser.email, avatar: state.currentUser.avatar });

      // Bu kişi kendi hane belgesinde (memberProfiles/members) henüz kayıtlı
      // değilse ekleyelim (bkz. ensureSelfInHousehold).
      ensureSelfInHousehold(fbUser.uid, data);

      var targetHousehold = data.householdId || fbUser.uid;
      if (targetHousehold === fbUser.uid) {
        // Kendi hanesi: aynı belge hem kimlik hem paylaşılan veri kaynağı
        if (unsubscribeHouseholdDoc) { unsubscribeHouseholdDoc(); unsubscribeHouseholdDoc = null; }
        state.householdId = fbUser.uid;
        applyHouseholdData(data);
      } else if (state.householdId !== targetHousehold) {
        subscribeHousehold(targetHousehold);
      }

      render();
    }, function (err) {
      console.error(err);
      // fallback to local storage if offline error occurs
      if(!state.cars || !state.expenses) {
        state.cars = getLocalData("cars", []);
        state.expenses = getLocalData("expenses", []);
        state.familyMembers = getLocalData("family", []);
        state.budgets = getLocalData("budgets", {});
        state.drivers = getLocalData("drivers", []);
        render();
        tryOpenPendingDeepLink();
      }
    });
  }

  function buildMemberProfileEntryWithMembers(uidVal, name, email) {
    var patch = buildMemberProfileEntry(uidVal, name, email);
    patch.members = firebase.firestore.FieldValue.arrayUnion(uidVal);
    return patch;
  }

  // Kullanıcı, "Koda Katıl" alanına bazen (özellikle telefonda WhatsApp/SMS'te
  // mesaj balonuna uzun basıp kopyalayınca) sadece kodu değil, davet
  // mesajının TAMAMINI yapıştırıyor. Bu fonksiyon, ne yapıştırılırsa
  // yapıştırılsın (tek başına kod / linkli tam mesaj / başında-sonunda
  // fazladan boşluk vb.) içinden gerçek davet kodunu otomatik ayıklar.
  function extractHouseholdCode(rawText) {
    var text = (rawText || "").trim();
    if (!text) return "";
    // Zaten tek parça, boşluksuz bir metinse (kullanıcı kodu elle yazmış ya
    // da tek başına kopyalamış) olduğu gibi kabul et.
    if (!/\s/.test(text)) return text;
    // Mesaj şablonundaki "Davet Kodu: XXXX" satırını ara.
    var labelMatch = text.match(/Davet\s*Kodu\s*:?\s*([A-Za-z0-9-]+)/i);
    if (labelMatch) return labelMatch[1];
    // Bulunamazsa: metindeki en uzun saf harf+rakam(+tire) parçasını kod say.
    // (Linkler nokta/slash içerdiği için bu taramaya girmez, davet kodları
    // ise alfanumerik + tek bir tire içeren kimliklerdir.)
    var tokens = text.match(/[A-Za-z0-9-]{12,80}/g) || [];
    if (!tokens.length) return text;
    tokens.sort(function (a, b) { return b.length - a.length; });
    return tokens[0];
  }

  function joinHousehold(rawCode) {
    var raw = extractHouseholdCode(rawCode);
    if (!raw) { toast("Lütfen bir davet kodu gir."); return; }
    var sep = raw.indexOf("-");
    if (sep === -1) {
      toast("Bu davet kodu artık geçerli değil. Hane sahibinden 'Kodu Yenile' sonrası güncel kodu iste.");
      return;
    }
    var code = raw.slice(0, sep);
    var token = raw.slice(sep + 1);
    if (!state.currentUser) return;
    var myUid = state.currentUser.id;
    if (code === state.householdId) { toast("Zaten bu ortak hanedesin."); return; }
    showConfirm({
      title: "Ortak Haneye Katıl",
      message: "Bu işlemle kendi araç/masraf kayıtların yerine, kodun sahibinin ortak hanesindeki veriler kullanılmaya başlanacak. Devam edilsin mi?",
      confirmLabel: "Katıl",
      danger: true,
      onConfirm: function () {
        var targetRef = db.collection("users").doc(code);
        targetRef.get().then(function (snap) {
          if (!snap.exists) { throw { code: "not-found" }; }
          var data = snap.data() || {};
          if (!data.inviteToken || data.inviteToken !== token) {
            throw { code: "invalid-token" };
          }
          var patch = buildMemberProfileEntry(myUid, state.currentUser.name, state.currentUser.email);
          patch.members = firebase.firestore.FieldValue.arrayUnion(myUid);
          // Güvenlik kuralı, bu alanın dokümandaki güncel inviteToken ile
          // birebir eşleştiğini zorunlu kılıyor — yani gerçek/güncel davet
          // kodunu bilmeyen biri bu yazma işlemini asla geçemez.
          patch.inviteTokenUsed = token;
          return targetRef.set(patch, { merge: true });
        }).then(function () {
          return db.collection("users").doc(myUid).set({ householdId: code }, { merge: true });
        }).then(function () {
          subscribeHousehold(code);
          closeModal();
          state.modal = { type: "profile" };
          render();
          toast("Ortak haneye katıldın.");
        }).catch(function (err) {
          console.error(err);
          if (err && err.code === "invalid-token") {
            toast("Davet kodu geçersiz ya da yenilenmiş. Güncel kodu hane sahibinden tekrar iste.");
          } else if (err && err.code === "not-found") {
            toast("Bu koda ait bir ortak hane bulunamadı.");
          } else {
            toast("Katılma başarısız oldu: izin reddedildi.");
          }
        });
      }
    });
  }

  function leaveHousehold() {
    if (!state.currentUser) return;
    var myUid = state.currentUser.id;
    if (state.householdId === myUid) { toast("Zaten kendi hanendesin."); return; }
    var oldHouseholdId = state.householdId;
    showConfirm({
      title: "Ortak Haneden Ayrıl",
      message: "Bu ortak hesaptan ayrılacak ve kendi tek kullanıcı hanene döneceksin. Emin misin?",
      confirmLabel: "Ayrıl",
      danger: true,
      onConfirm: function () {
        var householdRef = db.collection("users").doc(oldHouseholdId);
        var ownRef = db.collection("users").doc(myUid);
        var removePatch = {};
        removePatch.members = firebase.firestore.FieldValue.arrayRemove(myUid);
        // NOT: memberProfiles.{uid} kasıtlı olarak SİLİNMİYOR. Eskiden
        // burada FieldValue.delete() ile tamamen kaldırılıyordu; bu da,
        // kişi haneden ayrılıp AYNI haneye tekrar katıldığında
        // memberProfiles kaydının (dolayısıyla rol/perms ayarının) sıfırdan
        // oluşturulmasına ve varsayılan TAM yetkiyle geri dönmesine yol
        // açıyordu (bkz. normalizeMemberPerms — ne perms ne role varsa tam
        // yetki varsayılır). Kaydı members'tan çıkarıp memberProfiles'ta
        // bırakınca, joinHousehold()'daki set(merge:true) sadece
        // name/email alanlarını güncelliyor ve mevcut role/perms alanları
        // (Firestore'un yaprak-seviyeli merge davranışı sayesinde) aynen
        // korunuyor. state.householdMembers listesi zaten sadece "members"
        // dizisindeki uid'leri gösterecek şekilde filtrelendiği için
        // (bkz. applyHouseholdData), ayrılan kişi hane sahibine "hâlâ üye"
        // gibi görünmez.
        // ÖNEMLİ: Hane belgesindeki dinleyiciyi, çıkış yazısını göndermeden
        // ÖNCE (senkron olarak) kapatıyoruz. Aksi halde, çıkışın yerel
        // (optimistic) yansıması bu dinleyiciye anında düşer ve
        // ensureSelfInHousehold — "kendi kaydım yoksa geri ekle" mantığıyla
        // az önce members'tan çıkardığımız kendi kaydımızı hane sahibinin
        // belgesine geri yazmaya çalışır. Ağ gecikmesine bağlı olarak bu,
        // hane sahibinin tarafında ayrılan üyenin "hayalet" gibi kalmasına
        // ya da geri gelmesine yol açabiliyordu. Dinleyiciyi önce kapatmak
        // bu yarışı tamamen ortadan kaldırır.
        var savedUnsubscribe = unsubscribeHouseholdDoc;
        if (unsubscribeHouseholdDoc) { unsubscribeHouseholdDoc(); unsubscribeHouseholdDoc = null; }
        householdRef.update(removePatch).then(function () {
          return ownRef.set({ householdId: firebase.firestore.FieldValue.delete() }, { merge: true });
        }).then(function () {
          state.householdId = myUid;
          return ownRef.get();
        }).then(function (snap) {
          applyHouseholdData(snap.data() || {});
          closeModal();
          state.modal = { type: "profile" };
          render();
          toast("Ortak haneden ayrıldın.");
        }).catch(function (err) {
          console.error(err);
          // Çıkış işlemi başarısız oldu: dinleyiciyi geri açıp eski haneye
          // bağlı kalalım, aksi halde kullanıcı ne kendi hanesinde ne de
          // ortak hanede canlı güncelleme alan bir ara durumda kalır.
          if (state.householdId === oldHouseholdId) { subscribeHousehold(oldHouseholdId); }
          else { unsubscribeHouseholdDoc = savedUnsubscribe; }
          toast("Ayrılma işlemi başarısız oldu, tekrar dene.");
          render();
        });
      }
    });
  }

  function removeHouseholdMember(memberUid, memberName) {
    if (!state.currentUser) return;
    if (state.householdId !== state.currentUser.id) { toast("Sadece hane sahibi üye çıkarabilir."); return; }
    if (memberUid === state.currentUser.id) return;
    showConfirm({
      title: "Üyeyi Haneden Çıkar",
      message: (memberName || "Bu üye") + " ortak hanenden çıkarılacak ve artık ortak araç/masraf verilerine erişemeyecek. Emin misin?",
      confirmLabel: "Çıkar",
      danger: true,
      onConfirm: function () {
        var householdRef = db.collection("users").doc(state.currentUser.id);
        var removePatch = {};
        removePatch.members = firebase.firestore.FieldValue.arrayRemove(memberUid);
        // NOT: memberProfiles.{uid} burada da kasıtlı olarak SİLİNMİYOR
        // (bkz. leaveHousehold() içindeki aynı konudaki not). Böylece hane
        // sahibi bu kişiyi ileride yeni bir davet koduyla tekrar haneye
        // alırsa, daha önce ayarladığı rol/yetkiler sıfırlanıp varsayılan
        // TAM yetkiyle geri gelmez.
        // Üye çıkarılırken davet kodu da otomatik yenilenir: aksi halde
        // çıkarılan kişi elindeki (hâlâ geçerli) eski kodla anında geri
        // katılabilirdi. "Kodu Yenile" butonu bunu manuel yapmak içindir,
        // ama kovma anında güvenlik varsayılan olmalı.
        removePatch.inviteToken = generateInviteToken();
        householdRef.update(removePatch).then(function () {
          toast("Üye ortak haneden çıkarıldı ve davet kodu güvenlik için yenilendi.");
          state.modal = { type: "profile" };
          render();
        }).catch(function (err) {
          console.error(err);
          toast("Üye çıkarılamadı: " + authErrorMessage(err));
        });
      }
    });
  }

  // ---------- Ortak hane davet kodu paylaşımı ----------
  function renewHouseholdInviteCode() {
    if (!state.currentUser) return;
    if (state.householdId !== state.currentUser.id) { toast("Sadece hane sahibi kodu yenileyebilir."); return; }
    showConfirm({
      title: "Davet Kodunu Yenile",
      message: "Mevcut davet kodu geçersiz olacak. Daha önce paylaştığın kod/QR ile artık kimse katılamayacak. Devam edilsin mi?",
      confirmLabel: "Yenile",
      danger: true,
      onConfirm: function () {
        var newToken = generateInviteToken();
        db.collection("users").doc(state.currentUser.id).set({ inviteToken: newToken }, { merge: true })
          .then(function () {
            toast("Davet kodu yenilendi. Eski kod artık çalışmıyor.");
            closeModal();
            state.modal = { type: "profile" };
            render();
          })
          .catch(function (err) {
            console.error(err);
            toast("Kod yenilenemedi: " + authErrorMessage(err));
          });
      }
    });
  }

  function buildHouseholdInviteMessage(code) {
    var myName = (state.currentUser && state.currentUser.name) ? state.currentUser.name : "Ben";
    return myName + " seni Aracım (Garaj Defteri) uygulamasında ortak hesabına davet ediyor 🚗\n" +
      "Birlikte araç masraflarını takip edelim.\n\n" +
      "Davet Kodu: " + code + "\n\n" +
      "Uygulama yüklü değilse önce şu linkten aç ve kayıt ol:\n" + APP_SHARE_URL + "\n\n" +
      "Sonra: Hesabım > Ortak Hesap bölümüne bu kodu yapıştırıp 'Koda Katıl' de yeter 👍";
  }

  function isIOSDevice() {
    return /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
  }

  function shareHouseholdInvite() {
    if (!state.householdId || !state.householdInviteToken) { toast("Paylaşılacak davet kodu bulunamadı."); return; }
    var code = buildInviteCode(state.householdId, state.householdInviteToken);
    var message = buildHouseholdInviteMessage(code);

    if (navigator.share) {
      navigator.share({ title: "Aracım - Ortak Hesap Daveti", text: message }).catch(function (err) {
        if (err && err.name !== "AbortError") showShareChoices("Davet Kodunu Gönder", message);
      });
    } else {
      showShareChoices("Davet Kodunu Gönder", message);
    }
  }

  // ---------- Genel uygulama paylaşımı ----------
  function buildAppShareMessage() {
    var myName = (state.currentUser && state.currentUser.name) ? state.currentUser.name : "Ben";
    return myName + " Aracım (Garaj Defteri) uygulamasıyla araç masraflarını takip ediyor 🚗\n" +
      "Sen de dene, kayıt olması bir dakika sürüyor. Linke dokunduğunda ana ekranına eklemen için yönlendirileceksin:\n\n" + APP_INSTALL_URL;
  }

  function shareApp() {
    var message = buildAppShareMessage();
    if (navigator.share) {
      navigator.share({ title: "Aracım - Garaj Defteri", text: message }).catch(function (err) {
        if (err && err.name !== "AbortError") showShareChoices("Uygulamayı Gönder", message);
      });
    } else {
      showShareChoices("Uygulamayı Gönder", message);
    }
  }

  // Hem davet kodu hem genel uygulama paylaşımı için ortak seçim penceresi:
  // WhatsApp / SMS / metni kopyala.
  function showShareChoices(heading, message) {
    var encoded = encodeURIComponent(message);
    var backdrop = document.createElement("div");
    backdrop.className = "modal-backdrop confirm-backdrop";
    var box = document.createElement("div");
    box.className = "modal confirm-modal";
    box.innerHTML =
      '<div class="modal-head"><h3>' + esc(heading) + '</h3></div>' +
      '<p class="confirm-message">Aşağıdaki mesaj hazır — göndermek istediğin uygulamayı seç:</p>' +
      '<p class="field-hint" style="white-space:pre-wrap; background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:10px; max-height:160px; overflow-y:auto;">' + esc(message) + '</p>' +
      '<div class="confirm-actions" style="justify-content:stretch;">' +
        '<a class="btn-primary full" style="background:#25D366; text-decoration:none;" target="_blank" rel="noopener noreferrer" href="https://wa.me/?text=' + encoded + '">📱 WhatsApp\'tan Gönder</a>' +
        '<a class="btn-secondary full" style="text-decoration:none;" href="sms:' + (isIOSDevice() ? '&' : '?') + 'body=' + encoded + '">💬 SMS ile Gönder</a>' +
        '<button type="button" class="btn-secondary full" id="invite-share-copy">📋 Metni Kopyala</button>' +
        '<button type="button" class="btn-secondary full" id="invite-share-close">Kapat</button>' +
      '</div>';
    backdrop.appendChild(box);
    function cleanup() { backdrop.remove(); }
    box.addEventListener("click", function (ev) { ev.stopPropagation(); });
    backdrop.addEventListener("click", function (ev) { if (ev.target === backdrop) cleanup(); });
    box.querySelector("#invite-share-close").addEventListener("click", cleanup);
    box.querySelector("#invite-share-copy").addEventListener("click", function () {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(message).then(function () { toast("Mesaj kopyalandı."); }).catch(function () { toast("Kopyalanamadı, elle seçip kopyalayabilirsin."); });
      } else {
        toast("Kopyalanamadı, elle seçip kopyalayabilirsin.");
      }
    });
    document.body.appendChild(backdrop);
  }

  // ---------- Ana ekrana ekle (PWA install) ----------
  function addAppToHomeScreen() {
    if (isRunningStandalone()) { toast("Uygulama zaten ana ekranda yüklü. 👍"); return; }

    if (deferredInstallPrompt) {
      var promptEvent = deferredInstallPrompt;
      deferredInstallPrompt = null;
      promptEvent.prompt();
      promptEvent.userChoice.then(function (choice) {
        if (choice.outcome === "accepted") {
          toast("Uygulama ana ekrana ekleniyor…");
        } else {
          toast("İstersen istediğin zaman tekrar deneyebilirsin.");
        }
      }).catch(function () {});
    } else if (isIOSDevice()) {
      showAddToHomeScreenInstructions(
        "Ana Ekrana Ekle (iPhone/iPad)",
        "1️⃣ Safari'nin alt menüsünde 'Paylaş' simgesine dokun (kare + yukarı ok).\n\n" +
        "2️⃣ Açılan listede 'Ana Ekrana Ekle' seçeneğini bul ve dokun.\n\n" +
        "3️⃣ Sağ üstteki 'Ekle' butonuna dokun — uygulama artık ana ekranında."
      );
    } else {
      showAddToHomeScreenInstructions(
        "Ana Ekrana Ekle",
        "Tarayıcının sağ üst köşesindeki menüye (⋮ veya ≡) dokun, ardından 'Ana ekrana ekle' ya da 'Uygulamayı yükle' seçeneğine dokun.\n\n" +
        "Bu seçeneği görmüyorsan tarayıcı zaten en güncel değildir ya da uygulama daha önce yüklenmiştir."
      );
    }
  }

  function showAddToHomeScreenInstructions(heading, text) {
    var backdrop = document.createElement("div");
    backdrop.className = "modal-backdrop confirm-backdrop";
    var box = document.createElement("div");
    box.className = "modal confirm-modal";
    box.innerHTML =
      '<div class="modal-head"><h3>' + esc(heading) + '</h3></div>' +
      '<p class="field-hint" style="white-space:pre-wrap;">' + esc(text) + '</p>' +
      '<div class="confirm-actions" style="justify-content:stretch;">' +
        '<button type="button" class="btn-primary full" id="a2hs-ok">Anladım</button>' +
      '</div>';
    backdrop.appendChild(box);
    function cleanup() { backdrop.remove(); }
    box.addEventListener("click", function (ev) { ev.stopPropagation(); });
    backdrop.addEventListener("click", function (ev) { if (ev.target === backdrop) cleanup(); });
    box.querySelector("#a2hs-ok").addEventListener("click", cleanup);
    document.body.appendChild(backdrop);
  }

  // "Uygulamayı Paylaş" ile gönderilen ?a2hs=1 linki açıldığında, kullanıcı
  // giriş ekranını görmeden/hiçbir menüde gezinmeden doğrudan "Ana Ekrana
  // Ekle" akışıyla karşılansın diye çağrılır. Parametre URL'den hemen
  // temizlenir ki sayfa daha sonra yenilendiğinde tekrar tetiklenmesin.
  function maybeAutoTriggerAddToHomeScreen() {
    var params;
    try { params = new URLSearchParams(window.location.search); } catch (e) { return; }
    if (params.get("a2hs") !== "1") return;
    params.delete("a2hs");
    var rest = params.toString();
    try { window.history.replaceState({}, "", window.location.pathname + (rest ? "?" + rest : "")); } catch (e) {}
    if (isRunningStandalone()) return; // zaten yüklüyse sessizce hiçbir şey yapma
    // beforeinstallprompt olayı (varsa) sayfa yüklenir yüklenmez ateşlenmiş
    // olsun diye native istemi göstermeden kısa bir an bekleniyor —
    // böylece mümkün olduğunda tarayıcının kendi tek dokunuşluk kurulum
    // istemi kullanılır, olmazsa (ör. iOS) elle ekleme talimatı gösterilir.
    setTimeout(function () { addAppToHomeScreen(); }, 900);
  }

  function logout() {
    if (unsubscribeUserDoc) { unsubscribeUserDoc(); unsubscribeUserDoc = null; }
    if (unsubscribeHouseholdDoc) { unsubscribeHouseholdDoc(); unsubscribeHouseholdDoc = null; }
    if (unsubscribeAdminSupportBadge) { unsubscribeAdminSupportBadge(); unsubscribeAdminSupportBadge = null; }
    if (unsubscribeMySupportRequests) { unsubscribeMySupportRequests(); unsubscribeMySupportRequests = null; }
    monitoring.openSupportCount = 0;

  function init() {

    // değerlendirmek için birkaç saatte bir otomatik yedekleme kontrolünü
    // tekrar tetikle.
    setInterval(function () {
      autoBackupCheckedThisSession = false;
      maybeRunAutoBackup();
    }, 6 * 60 * 60 * 1000);
    window.addEventListener("online", function () { 
      state.online = true; 
      syncOfflineData();
      if (state.currentUser) render(); 
    });
    window.addEventListener("offline", function () { 
      state.online = false; 
      if (state.currentUser) {

        monitoring.mySupportRequests = null;
        state.currentUser = null;
        autoBackupCheckedThisSession = false;
        renderAuth();

  // ---------- derived data ----------
  // ---------- Araç / Şoför arama-filtreleme ----------
  function buildEntitySearchBoxHTML(inputId, clearAction, value, placeholder, ariaLabel) {
    return '<div class="entity-search-wrap">' +
      '<input type="search" id="' + inputId + '" placeholder="' + esc(placeholder) + '" value="' + esc(value || "") + '" aria-label="' + esc(ariaLabel) + '" />' +
      (value ? '<button type="button" class="entity-search-clear" data-action="' + clearAction + '" aria-label="Aramayı temizle" title="Aramayı temizle">✕</button>' : '') +
    '</div>';
  }

  function normalizeSearchText(s) {
    try { return (s || "").toLocaleLowerCase("tr-TR"); } catch (e) { return (s || "").toLowerCase(); }
  }

  function filterCarsByText(list, query) {
    var q = normalizeSearchText((query || "").trim());
    if (!q) return list;
    return list.filter(function (c) {
      var hay = normalizeSearchText((c.name || "") + " " + (c.plate || ""));
      return hay.indexOf(q) !== -1;
    });
  }

  function filterDriversByText(list, query) {
    var q = normalizeSearchText((query || "").trim());
    if (!q) return list;
    return list.filter(function (d) {
      var carNames = (d.carIds || []).map(function (cid) {
        var c = (state.cars || []).find(function (x) { return x.id === cid; });
        return c ? (c.name + " " + (c.plate || "")) : "";
      }).join(" ");
      var hay = normalizeSearchText([d.name || "", d.phone || "", carNames].join(" "));
      return hay.indexOf(q) !== -1;
    });
  }

  function debounce(fn, wait) {
    var t = null;
    return function () {
      var args = arguments;
      var ctx = this;
      clearTimeout(t);
      t = setTimeout(function () { fn.apply(ctx, args); }, wait);
    };
  }

  function bindEntitySearchFilters() {
    var carSearchEl = document.getElementById("car-filter-search");
    if (carSearchEl) carSearchEl.addEventListener("input", debounce(function () {
      state.carFilterText = carSearchEl.value;
      render();
    }, 200));
    var driverSearchEl = document.getElementById("driver-filter-search");
    if (driverSearchEl) driverSearchEl.addEventListener("input", debounce(function () {
      state.driverFilterText = driverSearchEl.value;
      render();
    }, 200));
  }

  function getVisibleExpenses() {
    var base = state.expenses || [];
    var r = myAccessRestriction();
    if (r.carIds) base = base.filter(function (e) { return r.carIds.indexOf(e.carId) !== -1; });
    if (state.selectedCarId === "all") return base;
    return base.filter(function (e) { return e.carId === state.selectedCarId; });
  }

  function logFiltersActive() {
    var f = state.logFilters || {};
    return !!(f.search || (f.category && f.category !== "all") || (f.carId && f.carId !== "all") || f.dateFrom || f.dateTo);
  }

  function getFilteredLogExpenses() {
    var list = getVisibleExpenses();
    var f = state.logFilters || {};
    if (state.selectedCarId === "all" && f.carId && f.carId !== "all") {
      list = list.filter(function (e) { return e.carId === f.carId; });
    }
    if (f.category && f.category !== "all") {
      list = list.filter(function (e) { return e.category === f.category; });
    }
    if (f.dateFrom) {
      list = list.filter(function (e) { return e.date && e.date >= f.dateFrom; });
    }
    if (f.dateTo) {
      list = list.filter(function (e) { return e.date && e.date <= f.dateTo; });
    }
    if (f.search) {
      var q = f.search.toLocaleLowerCase("tr-TR");
      list = list.filter(function (e) {
        var cat = catById(e.category);
        var car = (state.cars || []).find(function (c) { return c.id === e.carId; });
        var hay = [cat.label, e.note || "", car ? car.name : "", fmtDateTR(e.date)].join(" ").toLocaleLowerCase("tr-TR");
        return hay.indexOf(q) !== -1;
      });
    }
    return list;
  }

  function monthKey(d) { return d.getFullYear() + "-" + d.getMonth(); }

  function recalcCarCurrentKm(carId) {
    var car = (state.cars || []).find(function (c) { return c.id === carId; });
    if (!car) return;
    var kmEntries = (state.expenses || []).filter(function (e) { return e.carId === carId && e.km != null; });
    if (!kmEntries.length) return; // hiç km'li kayıt yoksa dokunma (manuel girilmiş olabilir)
    var maxKm = kmEntries.reduce(function (m, e) { return Math.max(m, e.km); }, 0);
    if (car.currentKm !== maxKm) {
      state.cars = state.cars.map(function (c) { return c.id === carId ? Object.assign({}, c, { currentKm: maxKm }) : c; });
      persistCars();
    }
  }

  function computeCostPerKm(carId) {
    var fuelExpenses = (state.expenses || [])
      .filter(function (e) { return e.carId === carId && e.category === "yakit" && e.km != null; })
      .sort(function (a, b) { return a.km - b.km; });
    if (fuelExpenses.length < 2) return null;
    var recent = fuelExpenses.slice(-5); // en fazla son 5 kayıt (4 segment) üzerinden ortalama al
    var totalDist = 0, totalAmount = 0;
    for (var i = 1; i < recent.length; i++) {
      var dist = recent[i].km - recent[i - 1].km;
      if (dist > 0) { totalDist += dist; totalAmount += Number(recent[i].amount || 0); }
    }
    if (totalDist <= 0) return null;
    return totalAmount / totalDist;
  }

  function computeFuelStats(carId) {
    var fuelExpenses = (state.expenses || [])
      .filter(function (e) { return e.carId === carId && e.category === "yakit" && e.km != null && e.liter != null; })
      .sort(function (a, b) { return a.km - b.km; });
    if (fuelExpenses.length < 2) return null;
    var totalDist = 0, totalLiter = 0, segments = 0;
    for (var i = 1; i < fuelExpenses.length; i++) {
      var dist = fuelExpenses[i].km - fuelExpenses[i - 1].km;
      if (dist > 0) { totalDist += dist; totalLiter += fuelExpenses[i].liter; segments++; }
    }
    if (!segments || totalDist <= 0) return null;
    return { avgConsumption: (totalLiter / totalDist) * 100, totalDist: totalDist, totalLiter: totalLiter };
  }

  function computeDashboard() {
    var visible = getVisibleExpenses();
    var now = new Date();
    var thisKey = monthKey(now);
    var monthTotal = 0, buckets = {};
    visible.forEach(function (e) {
      var d = new Date(e.date), k = monthKey(d);
      buckets[k] = (buckets[k] || 0) + Number(e.amount || 0);
      if (k === thisKey) monthTotal += Number(e.amount || 0);
    });
    var otherKeys = Object.keys(buckets).filter(function (k) { return k !== thisKey; });
    var avg = otherKeys.length ? otherKeys.reduce(function (s, k) { return s + buckets[k]; }, 0) / otherKeys.length : null;
    var gaugePct = avg && avg > 0 ? Math.min(1, monthTotal / (avg * 1.6)) : (monthTotal > 0 ? 0.55 : 0);

    var catMap = {};
    visible.forEach(function (e) { catMap[e.category] = (catMap[e.category] || 0) + Number(e.amount || 0); });
    var categoryData = CATEGORIES.map(function (c) { return { name: c.label, value: catMap[c.id] || 0, color: c.color }; }).filter(function (d) { return d.value > 0; });

    var totalAllTime = visible.reduce(function (s, e) { return s + Number(e.amount || 0); }, 0);
    return { monthTotal: monthTotal, gaugePct: gaugePct, categoryData: categoryData, totalAllTime: totalAllTime };
  }

  // ---------- Analiz: aylık trend, bütçe, yakıt serileri ----------
  function computeMonthlyTrend(monthsBack) {
    var visible = getVisibleExpenses();
    var now = new Date();
    var months = [];
    for (var i = monthsBack - 1; i >= 0; i--) {
      var d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      months.push({ key: monthKey(d), label: MONTHS_TR[d.getMonth()] + " " + String(d.getFullYear()).slice(2), total: 0 });
    }
    visible.forEach(function (e) {
      if (!e.date) return;
      var k = monthKey(new Date(e.date));
      var bucket = null;
      for (var j = 0; j < months.length; j++) { if (months[j].key === k) { bucket = months[j]; break; } }
      if (bucket) bucket.total += Number(e.amount || 0);
    });
    return months;
  }

  function budgetKey() { return state.selectedCarId || "all"; }

  function computeBudgetInfo() {
    var key = budgetKey();
    var budget = (state.budgets || {})[key];
    var monthTotal = computeDashboard().monthTotal;
    if (!budget || budget <= 0) return { key: key, budget: null, spent: monthTotal, pct: 0, status: "none" };
    var pct = monthTotal / budget;
    var status = pct >= 1 ? "over" : pct >= 0.85 ? "watch" : "ok";
    return { key: key, budget: budget, spent: monthTotal, pct: Math.min(1, pct), rawPct: pct, status: status };
  }

  function computeFuelSeries(carId) {
    var fuelExpenses = (state.expenses || [])
      .filter(function (e) { return e.carId === carId && e.category === "yakit" && e.km != null; })
      .sort(function (a, b) { return a.km - b.km; });
    var consumptionSeries = [];
    for (var i = 1; i < fuelExpenses.length; i++) {
      var prev = fuelExpenses[i - 1], cur = fuelExpenses[i];
      var dist = cur.km - prev.km;
      if (dist <= 0) continue;
      var point = { date: cur.date, dateLabel: fmtDateTR(cur.date), costPerKm: Number(cur.amount || 0) / dist };
      if (cur.liter != null) point.consumption = (cur.liter / dist) * 100;
      consumptionSeries.push(point);
    }
    var priceSeries = fuelExpenses
      .filter(function (e) { return e.liter != null && e.liter > 0; })
      .sort(function (a, b) { return new Date(a.date) - new Date(b.date); })
      .map(function (e) { return { date: e.date, dateLabel: fmtDateTR(e.date), price: Number(e.amount || 0) / e.liter }; });
    return { consumptionSeries: consumptionSeries, priceSeries: priceSeries };
  }

  function kmUrgency(remaining) {
    if (remaining === null) return { key: "none", label: "Km bilgisi yok", color: "#8B939D" };
    var abs = groupThousands(String(Math.round(Math.abs(remaining))));
    if (remaining <= 0) return { key: "overdue", label: abs + " km geçti", color: "#E2574C" };
    if (remaining <= 1000) return { key: "soon", label: abs + " km kaldı", color: "#E2574C" };
    if (remaining <= 3000) return { key: "watch", label: abs + " km kaldı", color: "#F2A93B" };
    return { key: "ok", label: abs + " km kaldı", color: "#7BC67E" };
  }
  function tierOf(status) {
    if (status.key === "overdue" || status.key === "today" || status.key === "soon") return 0;
    if (status.key === "watch") return 1;
    if (status.key === "ok") return 2;
    return 3;
  }

  function computeSummaryItems() {
    var carsToProcess = state.cars || [];
    var relevant = state.selectedCarId === "all" ? carsToProcess : carsToProcess.filter(function (c) { return c.id === state.selectedCarId; });
