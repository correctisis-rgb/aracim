  function normalizeHeaderKey(s) {
    return String(s || "").toLowerCase()
      .replace(/ı/g, "i").replace(/İ/g, "i").replace(/ğ/g, "g").replace(/ü/g, "u")
      .replace(/ş/g, "s").replace(/ö/g, "o").replace(/ç/g, "c")
      .replace(/[^a-z0-9]+/g, "");
  }
  function matchFieldForHeader(headerRaw, fieldDefs, usedKeys) {
    var norm = normalizeHeaderKey(headerRaw);
    if (!norm) return null;
    for (var i = 0; i < fieldDefs.length; i++) {
      if (usedKeys[fieldDefs[i].key]) continue;
      if (normalizeHeaderKey(fieldDefs[i].label) === norm) return fieldDefs[i];
    }
    for (var j = 0; j < fieldDefs.length; j++) {
      if (usedKeys[fieldDefs[j].key]) continue;
      var fl = normalizeHeaderKey(fieldDefs[j].label);
      if (fl && (fl.indexOf(norm) !== -1 || norm.indexOf(fl) !== -1)) return fieldDefs[j];
    }
    return null;
  }
  function parseNumberCell(v) {
    if (v === null || v === undefined || v === "") return null;
    if (typeof v === "number") return v;
    var s = String(v).trim().replace(/\s/g, "");
    if (s.indexOf(",") !== -1 && s.indexOf(".") === -1) s = s.replace(",", ".");
    else s = s.replace(/\.(?=\d{3})/g, "").replace(",", ".");
    var n = parseFloat(s);
    return isNaN(n) ? null : n;
  }
  function parseBoolCell(v) {
    var s = String(v || "").trim().toLowerCase();
    return ["evet", "true", "1", "x", "yes", "var"].indexOf(s) !== -1;
  }
  function parseDateCell(v) {
    if (v === null || v === undefined || v === "") return null;
    if (v instanceof Date && !isNaN(v.getTime())) return v.toISOString().slice(0, 10);
    if (typeof v === "number") {
      try {
        var parsed = XLSX.SSF.parse_date_code(v);
        if (parsed) return parsed.y + "-" + String(parsed.m).padStart(2, "0") + "-" + String(parsed.d).padStart(2, "0");
      } catch (e) { /* yoksay */ }
      return null;
    }
    var s = String(v).trim();
    if (!s) return null;
    var m1 = s.match(/^(\d{1,2})[.\/-](\d{1,2})[.\/-](\d{4})$/);
    if (m1) return m1[3] + "-" + m1[2].padStart(2, "0") + "-" + m1[1].padStart(2, "0");
    var m2 = s.match(/^(\d{4})[.\/-](\d{1,2})[.\/-](\d{1,2})$/);
    if (m2) return m2[1] + "-" + m2[2].padStart(2, "0") + "-" + m2[3].padStart(2, "0");
    return null;
  }
  function downloadImportTemplate(entity) {
    var fields = entity === "drivers" ? driverImportFieldDefs() : carImportFieldDefs();
    var headers = fields.map(function (f) { return f.label; });
    var exampleCar = ["Kamyon 1", "Kamyon", "34 AB 123", "Mercedes Actros", "2019", "Dizel", "Manuel", 400, "15.08.2026", "15.09.2026", "01.12.2026", "01.12.2026", "ABC Sigorta", "POL123456", "01.01.2027", "01.10.2026", "WDB1234567890", 125000, 135000];

    var infoWs = XLSX.utils.aoa_to_sheet(infoRows);

    XLSX.utils.book_append_sheet(wb, ws, entity === "drivers" ? "Şoförler" : "Araçlar");
    XLSX.utils.book_append_sheet(wb, infoWs, "Nasıl Kullanılır");
    XLSX.writeFile(wb, (entity === "drivers" ? "sofor-sablonu" : "arac-sablonu") + ".xlsx");
  }
  function parseImportWorkbook(arrayBuffer, entity) {
    var wb = XLSX.read(arrayBuffer, { type: "array", cellDates: true });
    var sheet = wb.Sheets[wb.SheetNames[0]];
    var rows = XLSX.utils.sheet_to_json(sheet, { header: 1, raw: true, defval: "" });
    if (!rows.length) return { records: [], errors: ["Dosyada veri bulunamadı."] };

    var fieldDefs = entity === "drivers" ? driverImportFieldDefs() : carImportFieldDefs();
    var usedKeys = {};
    var colMap = rows[0].map(function (h) {
      var f = matchFieldForHeader(h, fieldDefs, usedKeys);
      if (f) usedKeys[f.key] = true;
      return f;
    });

    var records = [];
    var errors = [];
    if (!colMap.some(Boolean)) {
      errors.push("Sütun başlıkları tanınamadı. Lütfen şablon dosyasındaki başlıkları kullanın.");
    }
    for (var r = 1; r < rows.length; r++) {
      var row = rows[r];
      if (!row || row.every(function (c) { return c === "" || c === null || c === undefined; })) continue;
      var obj = {};
      colMap.forEach(function (f, idx) {
        if (!f) return;
        var raw = row[idx];
        if (f.type === "number") obj[f.key] = parseNumberCell(raw);
        else if (f.type === "date") obj[f.key] = parseDateCell(raw);
        else if (f.type === "bool") obj[f.key] = parseBoolCell(raw);
        else if (f.type === "plateList") obj[f.key] = String(raw || "").split(/[,;]/).map(function (s) { return s.trim(); }).filter(Boolean);
        else obj[f.key] = (raw === null || raw === undefined) ? "" : String(raw).trim();
      });
      var requiredMissing = fieldDefs.filter(function (f) { return f.required; }).some(function (f) { return !obj[f.key]; });
      if (requiredMissing) {
        errors.push("Satır " + (r + 1) + ": zorunlu alan(lar) boş, atlandı.");
        continue;
      }
      records.push(obj);
    }
    return { records: records, errors: errors };
  }
  function commitBulkImport(entity, rows) {
    if (!rows || !rows.length) return;
    if (entity === "cars") {
      var startLen = (state.cars || []).length;
      var newCars = rows.map(function (r, i) {

          id: uid(),
          color: CAR_COLORS[(startLen + i) % CAR_COLORS.length],
          name: r.name, vehicleType: r.vehicleType || "", plate: r.plate || "", brand: r.brand || "",
          year: r.year || "", fuelType: r.fuelType || "", transmission: r.transmission || "",
          tankCapacity: r.tankCapacity != null ? r.tankCapacity : null,
          inspectionDate: r.inspectionDate || null, maintenanceDate: r.maintenanceDate || null,
          insuranceDate: r.insuranceDate || null, kaskoDate: r.kaskoDate || null,
          insuranceCompany: r.insuranceCompany || "", policyNo: r.policyNo || "",
          taxDate: r.taxDate || null, tireDate: r.tireDate || null, vin: r.vin || "",
          currentKm: r.currentKm != null ? r.currentKm : null,
          maintenanceKm: r.maintenanceKm != null ? r.maintenanceKm : null,
          photo: null, ruhsat: null
        };
      });
      state.cars = (state.cars || []).concat(newCars);
      persistCars();
      logActivity("car", "add", { summary: "Excel ile " + newCars.length + " araç toplu içe aktarıldı." });
      toast(newCars.length + " araç içe aktarıldı.");
    } else {
      var newDrivers = rows.map(function (r) {
        var carIds = (r.plates || []).map(function (plate) {
          var norm = plate.replace(/\s+/g, "").toUpperCase();
          var found = (state.cars || []).find(function (c) { return (c.plate || "").replace(/\s+/g, "").toUpperCase() === norm; });
          return found ? found.id : null;
        }).filter(Boolean);
        return {
          id: uid(), name: r.name, phone: r.phone || "", carIds: carIds,
          licenseClass: r.licenseClass || "", licenseExpiry: r.licenseExpiry || null,
          srcType: r.srcType || "", srcExpiry: r.srcExpiry || null,
          psikoteknikExpiry: r.psikoteknikExpiry || null, healthReportExpiry: r.healthReportExpiry || null,
          worksAbroad: !!r.worksAbroad,
          passportNo: r.worksAbroad ? (r.passportNo || "") : "",
          passportExpiry: r.worksAbroad ? (r.passportExpiry || null) : null,
          visaCountry: r.worksAbroad ? (r.visaCountry || "") : "",
          visaNo: r.worksAbroad ? (r.visaNo || "") : "",
          visaExpiry: r.worksAbroad ? (r.visaExpiry || null) : null
        };
      });
      state.drivers = (state.drivers || []).concat(newDrivers);
      persistDrivers();
      logActivity("driver", "add", { summary: "Excel ile " + newDrivers.length + " şoför toplu içe aktarıldı." });
      toast(newDrivers.length + " şoför içe aktarıldı.");
    }
    closeModal();
    render();
  }

      var file = ev.target.files[0];
      if (!file) return;
      var reader = new FileReader();
      reader.onload = function () {
        try {
          var result = parseImportWorkbook(reader.result, entity);
          state.modal = { type: "bulkImport", entity: entity, rows: result.records, errors: result.errors };
          render();
        } catch (e) {
          toast("Dosya okunamadı. Lütfen .xlsx veya .csv formatında bir dosya seçin.");
        }
      };
      reader.readAsArrayBuffer(file);
    });
    var confirmBtn = modal.querySelector("#f-bi-confirm");
    if (confirmBtn) {
      confirmBtn.addEventListener("click", function () { commitBulkImport(entity, rows); });
    }

    return modal;
  }

  // ---------- Excel / PDF Rapor Dışa Aktarma ----------
  function excelCellValue(type, value) {
    if (type === "date") return value ? fmtDateTR(value) : "";
    if (type === "bool") return value ? "Evet" : "Hayır";
    if (type === "carList") {
      var ids = Array.isArray(value) ? value : (value ? [value] : []);
      return ids.map(function (id) { var c = (state.cars || []).find(function (x) { return x.id === id; }); return c ? c.name : null; }).filter(Boolean).join(", ");
    }
    if (value === null || value === undefined) return "";
    return value;
  }
  // Sütun genişliğini sadece başlığa göre değil, en uzun hücre içeriğine
  // göre hesaplar; böylece VIN, tarih aralığı gibi uzun değerler taşmaz.
  function autoColWidths(headers, rows, minW, maxW) {
    minW = minW || 10;
    maxW = maxW || 40;
    return headers.map(function (h, i) {
      var longest = String(h || "").length;

      var barAreaX = margin + labelW;
      var barAreaW = pageW - margin - labelW - valueW - margin;
      var maxVal = Math.max.apply(null, chartCars.map(function (c) { return carTotals[c.id] || 0; }).concat([1]));
      var barH = 12, barGap = 7;
      var chartY = 54;
      doc.setFont("DejaVuSans", "normal");
      chartCars.forEach(function (c, i) {
        var y = chartY + i * (barH + barGap);
        var val = carTotals[c.id] || 0;
        doc.setFontSize(8.5);
        doc.setTextColor(27, 31, 36);
        var carName = c.name.length > 14 ? c.name.slice(0, 13) + "…" : c.name;
        doc.text(carName, margin, y + barH - 3);
        var rgb = pdfHexToRgb(c.color);
        doc.setFillColor(238, 240, 243);
        doc.roundedRect(barAreaX, y, barAreaW, barH, 2, 2, "F");
        var w = Math.max(val > 0 ? 4 : 0, (val / maxVal) * barAreaW);
        doc.setFillColor(rgb[0], rgb[1], rgb[2]);
        doc.roundedRect(barAreaX, y, w, barH, 2, 2, "F");
        doc.setFontSize(8.5);
        doc.text(fmtTL(val), barAreaX + barAreaW + 8, y + barH - 3);
      });
      var tableStartY = chartY + chartCars.length * (barH + barGap) + 20;
      var summaryBody = chartCars.map(function (c) { return [c.name, fmtTL(carTotals[c.id] || 0)]; });
      summaryBody.push(["TOPLAM", fmtTL(grandTotal)]);
      doc.autoTable({
        startY: tableStartY,
        head: [["Araç", "Toplam"]],
        body: summaryBody,
        styles: { fontSize: 9.5, font: "DejaVuSans", fontStyle: "normal", cellPadding: { top: 5, right: 5, bottom: 5, left: 5 } },
        headStyles: { fillColor: pdfTint(color, 0.75), textColor: [27, 31, 36], font: "DejaVuSans", fontStyle: "bold", fontSize: 9.5, lineWidth: 0 },
        alternateRowStyles: { fillColor: [245, 246, 248] },
        didParseCell: function (data) {
          if (data.row.section === "body" && data.row.index === summaryBody.length - 1) {
            data.cell.styles.fontStyle = "bold";
            data.cell.styles.fillColor = [230, 234, 238];
          }
        },
        margin: { left: margin, right: margin }
      });
    }

    pdfAddFooter(doc, margin, "Dönem: " + rangeLabel);
    doc.save(opts.filename + "-" + todayStr() + pdfRangeSuffix(opts.dateFrom, opts.dateTo) + ".pdf");
    toast(opts.title + " PDF raporu indirildi.");
  }

    return intPart;
  }

  // ---------- events ----------
  function bindGlobalActions() {
    document.querySelectorAll("[data-action]").forEach(function (el) {
      if (el.getAttribute("role") === "button" && el.tagName !== "BUTTON") {
        el.addEventListener("keydown", function (ev) {
          if (ev.key === "Enter" || ev.key === " ") { ev.preventDefault(); el.click(); }
        });
      }
      el.addEventListener("click", function (ev) {
        var action = el.getAttribute("data-action");
        // Sadece görüntüleyebilen üyeler bu eylemleri tetikleyemez (ilgili
        // düğmeler CSS ile zaten gizleniyor; bu, programatik/eski DOM
        // durumlarına karşı ikinci bir savunma katmanı).
        var MANAGE_ONLY_ACTIONS = ["open-add-car", "open-edit-car", "delete-car", "open-edit-expense", "delete-expense", "open-add-driver", "open-edit-driver", "delete-driver", "open-quick-appt"];
        var ADD_EXPENSE_ACTIONS = ["open-add-expense"];
        var BACKUP_ACTIONS = ["export-data"];
        var REPORT_ACTIONS = ["open-export-report", "share-report"];
        var BULK_IMPORT_ACTIONS = ["open-bulk-import"];
        var ACTIVITY_LOG_ACTIONS = ["open-activity-log"];
        var SEE_EXPENSES_VIEWS = ["panel", "analiz"]; // maliyet verisi içeren görünümler
        var LICENSE_LOCKED_ACTIONS = MANAGE_ONLY_ACTIONS.concat(ADD_EXPENSE_ACTIONS, BACKUP_ACTIONS, BULK_IMPORT_ACTIONS);
        if (isLicenseLocked() && LICENSE_LOCKED_ACTIONS.indexOf(action) !== -1) {
          toast("Lisans süreniz doldu. Devam etmek için Hesabım bölümünden yeni bir lisans kodu girin.");
          state.modal = { type: "profile" };
          render();
          return;
        }
        if (isOfflineLockedForMe() && LICENSE_LOCKED_ACTIONS.indexOf(action) !== -1) {
          toast("Çevrimdışıyken işlem yapma yetkin yok. İnternet bağlantısı gelince tekrar dene.");
          return;
        }
        var actionPerms = myHouseholdPerms();
        if (MANAGE_ONLY_ACTIONS.indexOf(action) !== -1 && !actionPerms.manage) {
          toast("Bu hanede araç/şoför/masraf düzenleme yetkin yok.");
          return;
        }
        if (ADD_EXPENSE_ACTIONS.indexOf(action) !== -1 && !actionPerms.addExpense) {
          toast("Bu hanede masraf ekleme yetkin yok.");
          return;
        }
        if (BACKUP_ACTIONS.indexOf(action) !== -1 && !actionPerms.backup) {
          toast("Bu hanede yedekleme yapma yetkin yok.");
          return;
        }
        if (REPORT_ACTIONS.indexOf(action) !== -1 && !actionPerms.report) {
          toast("Bu hanede rapor alma yetkin yok.");
          return;
        }
        if (BULK_IMPORT_ACTIONS.indexOf(action) !== -1 && !actionPerms.bulkImport) {
          toast("Bu hanede toplu içe aktarma yetkin yok.");
          return;
        }
        if (ACTIVITY_LOG_ACTIONS.indexOf(action) !== -1 && !actionPerms.activityLog) {
          toast("Bu hanede aktivite geçmişini görme yetkin yok.");
          return;
        }
        if (action === "set-view" && SEE_EXPENSES_VIEWS.indexOf(el.getAttribute("data-view")) !== -1 && !actionPerms.seeExpenses) {
          toast("Bu hanede masrafları görüntüleme yetkin yok.");
          return;
        }
        if (action === "select-car") { state.selectedCarId = el.getAttribute("data-car"); state.logVisibleCount = 20; render(); }
        else if (action === "toggle-cars-expanded") { state.carsTabsExpanded = !state.carsTabsExpanded; render(); }
        else if (action === "toggle-drivers-expanded") { state.driversListExpanded = !state.driversListExpanded; render(); }
        else if (action === "toggle-driver-upcoming-expanded") { state.driverUpcomingExpanded = !state.driverUpcomingExpanded; render(); }
        else if (action === "load-more-calendar") { state.calendarVisibleCount = (state.calendarVisibleCount || 20) + 20; render(); }
        else if (action === "load-more-summary") { state.summaryVisibleCount = (state.summaryVisibleCount || 20) + 20; render(); }
        else if (action === "clear-car-filter") { state.carFilterText = ""; render(); }
        else if (action === "load-more-log") {
          var prevScrollYForLog = window.scrollY;
          state.logVisibleCount = (state.logVisibleCount || 20) + 20;
          render();
          window.scrollTo(0, prevScrollYForLog);
        }
        else if (action === "clear-driver-filter") { state.driverFilterText = ""; render(); }
        else if (action === "set-view") { state.view = el.getAttribute("data-view"); render(); }
        else if (action === "set-main-section") {
          ev.stopPropagation();
          state.mainSection = el.getAttribute("data-section");
          state.accountMenuOpen = false;
          render();
        }
        else if (action === "dismiss-onboarding") { state.onboardingDismissed = true; setLocalData("onboarding_dismissed", true); render(); }
        else if (action === "open-add-car") { state.modal = { type: "addCar" }; render(); }
        else if (action === "open-edit-car") { state.modal = { type: "editCar", carId: el.getAttribute("data-car") }; render(); }
        else if (action === "open-quick-appt") {
          state.modal = { type: "quickAppt", carId: el.getAttribute("data-car"), key: el.getAttribute("data-key") };
          render();
        }
        else if (action === "open-add-expense") { state.modal = { type: "addExpense" }; render(); }
        else if (action === "copy-plate") {
          var plateVal = el.getAttribute("data-plate") || "";
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(plateVal).then(function () {
              toast("Plaka kopyalandı: " + plateVal);
            }).catch(function () { toast("Kopyalanamadı, plakayı elle yazabilirsin: " + plateVal); });
          } else {
            toast("Kopyalanamadı, plakayı elle yazabilirsin: " + plateVal);
          }
        }
        else if (action === "open-edit-expense") { state.modal = { type: "editExpense", expenseId: el.getAttribute("data-id") }; render(); }
        else if (action === "delete-expense") {
          var id = el.getAttribute("data-id");
          showConfirm({
            title: "Masrafı Sil",
            message: "Bu masraf kaydını silmek istediğine emin misin? Silme sonrası kısa bir süre geri alabilirsin.",
            confirmLabel: "Sil",
            danger: true,
            onConfirm: function () {
              var deleted = (state.expenses || []).find(function (e) { return e.id === id; });
              if (!deleted) return;
              var deletedIndex = (state.expenses || []).indexOf(deleted);
              var deletedCatInfo = catById(deleted.category);
              var deletedCar = (state.cars || []).find(function (c) { return c.id === deleted.carId; });
              var deletedCarName = deletedCar ? deletedCar.name : "";
              state.expenses = (state.expenses || []).filter(function (e) { return e.id !== id; });
              persistExpenses();
              if (deleted.carId) recalcCarCurrentKm(deleted.carId);
              logActivity("expense", "delete", { carId: deleted.carId, carName: deletedCarName, summary: deletedCatInfo.label + " masrafı silindi (" + fmtTL(deleted.amount) + ")", snapshot: snapshotActivityFields(deleted, expenseActivityFieldDefs()) });
              render();
              toastWithUndo("Masraf silindi.", function () {
                state.expenses = state.expenses || [];
                state.expenses.splice(Math.min(deletedIndex, state.expenses.length), 0, deleted);
                persistExpenses();
                if (deleted.carId) recalcCarCurrentKm(deleted.carId);
                logActivity("expense", "restore", { carId: deleted.carId, carName: deletedCarName, summary: deletedCatInfo.label + " masrafı geri alındı (" + fmtTL(deleted.amount) + ")", snapshot: snapshotActivityFields(deleted, expenseActivityFieldDefs()) });
                render();
                toast("Masraf geri alındı.");
              });
            }
          });
        }
        else if (action === "open-lightbox") {
          ev.stopPropagation();
          state.lightbox = el.getAttribute("data-src");
          state.lightboxCaption = el.getAttribute("data-caption") || "Görsel";
          renderLightbox();
        }
        else if (action === "delete-car") {
          var carId = el.getAttribute("data-car");
          showConfirm({
            title: "Aracı Sil",
            message: "Bu aracı ve tüm masraf kayıtlarını silmek istediğinize emin misiniz? Silme sonrası kısa bir süre geri alabilirsiniz.",
            confirmLabel: "Sil",
            danger: true,
            onConfirm: function () {
              var deletedCar = (state.cars || []).find(function (c) { return c.id === carId; });
              var deletedCarIndex = (state.cars || []).indexOf(deletedCar);
              var deletedExpenses = (state.expenses || []).filter(function (e) { return e.carId === carId; });
              var driversWithCar = (state.drivers || []).filter(function (d) { return (d.carIds || []).indexOf(carId) !== -1; }).map(function (d) { return d.id; });
              var prevSelectedCarId = state.selectedCarId;
              state.cars = (state.cars || []).filter(function (c) { return c.id !== carId; });
              state.expenses = (state.expenses || []).filter(function (e) { return e.carId !== carId; });
              if (driversWithCar.length) {
                state.drivers = (state.drivers || []).map(function (d) {
                  return driversWithCar.indexOf(d.id) !== -1 ? Object.assign({}, d, { carIds: (d.carIds || []).filter(function (cid) { return cid !== carId; }) }) : d;
                });
              }
              if (state.selectedCarId === carId) state.selectedCarId = "all";
              persistFields(driversWithCar.length ? ["cars", "expenses", "drivers"] : ["cars", "expenses"]);
              render();
              cleanupNotifStateForCar(carId);
              logActivity("car", "delete", { carId: carId, carName: deletedCar ? deletedCar.name : "", summary: "Araç silindi: " + (deletedCar ? deletedCar.name : "") + " (" + deletedExpenses.length + " masraf kaydıyla birlikte)", snapshot: snapshotActivityFields(deletedCar, carActivityFieldDefs()) });
              toastWithUndo("Araç ve " + deletedExpenses.length + " masraf kaydı silindi.", function () {
                if (deletedCar) {
                  state.cars = state.cars || [];
                  state.cars.splice(Math.min(deletedCarIndex, state.cars.length), 0, deletedCar);
                  state.selectedCarId = prevSelectedCarId;
                }
                state.expenses = (state.expenses || []).concat(deletedExpenses);
                if (driversWithCar.length) {
                  state.drivers = (state.drivers || []).map(function (d) {
                    return driversWithCar.indexOf(d.id) !== -1 ? Object.assign({}, d, { carIds: (d.carIds || []).concat([carId]) }) : d;
                  });
                }
                persistFields(driversWithCar.length ? ["cars", "expenses", "drivers"] : ["cars", "expenses"]);
                logActivity("car", "restore", { carId: carId, carName: deletedCar ? deletedCar.name : "", summary: "Araç geri alındı: " + (deletedCar ? deletedCar.name : ""), snapshot: snapshotActivityFields(deletedCar, carActivityFieldDefs()) });
                render();
                toast("Araç geri alındı.");
              });
            }
          });
        }
        else if (action === "close-modal") { closeModal(); }
        else if (action === "back-to-profile") { ev.stopPropagation(); state.modal = { type: "profile" }; render(); }
        else if (action === "close-modal-backdrop" && ev.target === el) {
          if (state.modal && state.modal.type === "memberPerms") { state.modal = { type: "profile" }; render(); }
          else closeModal();
        }
        else if (action === "clear-log-filters") {
          state.logFilters = { search: "", category: "all", carId: "all", dateFrom: "", dateTo: "" };
          state.logVisibleCount = 20;
          render();
        }
        else if (action === "share-report") { shareExpenseReport(); }
        else if (action === "add-to-calendar") {
          downloadICS(el.getAttribute("data-title"), el.getAttribute("data-date"), el.getAttribute("data-notes"));
        }
        else if (action === "export-data") { exportData({ userGesture: true }); }
        else if (action === "open-bulk-import") {
          ev.stopPropagation();
          state.modal = { type: "bulkImport", entity: "cars", rows: null, errors: [] };
          state.accountMenuOpen = false;
          render();
        }
        else if (action === "open-export-report") {
          ev.stopPropagation();
          state.modal = { type: "exportReport" };
          state.accountMenuOpen = false;
          render();
        }
        else if (action === "enable-notifications") { enableNotifications(); }
        else if (action === "disable-notifications") { disableNotifications(); }
        else if (action === "toggle-account-menu") { ev.stopPropagation(); state.accountMenuOpen = !state.accountMenuOpen; render(); }
        else if (action === "toggle-theme") { ev.stopPropagation(); toggleTheme(); }
        else if (action === "trigger-reminders") { ev.stopPropagation(); state.accountMenuOpen = false; triggerReminders(); render(); }
        else if (action === "open-announcement") {
          ev.stopPropagation();
          if (!isAdminUser(state.currentUser)) return;
          state.modal = { type: "announcement" };
          state.accountMenuOpen = false;
          render();
        }
        else if (action === "open-profile") { ev.stopPropagation(); state.modal = { type: "profile" }; state.accountMenuOpen = false; render(); loadMyLogins(); }
        else if (action === "open-notif-history") {
          ev.stopPropagation();
          state.modal = { type: "notifHistory" };
          state.accountMenuOpen = false;
          markNotifHistorySeen();
          render();
        }
        else if (action === "open-activity-log") {
          ev.stopPropagation();
          state.modal = { type: "activityLog" };
          state.accountMenuOpen = false;
          markActivityLogSeen();
          render();
        }
        else if (action === "open-add-driver") { state.modal = { type: "addDriver" }; render(); }
        else if (action === "open-edit-driver") { state.modal = { type: "editDriver", driverId: el.getAttribute("data-id") }; render(); }
        else if (action === "delete-driver") {
          var driverId = el.getAttribute("data-id");
          showConfirm({
            title: "Şoförü Sil",
            message: "Bu şoförü silmek istediğine emin misin?",
            confirmLabel: "Sil",
            danger: true,
            onConfirm: function () {
              var deletedDriver = (state.drivers || []).find(function (d) { return d.id === driverId; });
              var deletedDriverIndex = (state.drivers || []).indexOf(deletedDriver);
              state.drivers = (state.drivers || []).filter(function (d) { return d.id !== driverId; });
              persistDrivers();
              logActivity("driver", "delete", { summary: "Şoför silindi: " + (deletedDriver ? deletedDriver.name : ""), snapshot: deletedDriver ? snapshotActivityFields(deletedDriver, driverActivityFieldDefs()) : null });
              render();
              toastWithUndo("Şoför silindi.", function () {
                if (deletedDriver) {
                  state.drivers = state.drivers || [];
                  state.drivers.splice(Math.min(deletedDriverIndex, state.drivers.length), 0, deletedDriver);
                  persistDrivers();
                  logActivity("driver", "restore", { summary: "Şoför geri alındı: " + deletedDriver.name });
                  render();
                }
                toast("Şoför geri alındı.");
              });
            }
          });
        }
        else if (action === "open-help") {
          ev.stopPropagation();
          state.modal = { type: "help" };
          state.accountMenuOpen = false;
          markSupportSeen();
          render();
        }
        else if (action === "toggle-faq") {
          var faqId = el.getAttribute("data-id");
          expandedFaqIds[faqId] = !expandedFaqIds[faqId];
          render();
        }
        else if (action === "toggle-activity-detail") {
          var actId = el.getAttribute("data-id");
          expandedActivityIds[actId] = !expandedActivityIds[actId];
          render();
        }
        else if (action === "open-admin-panel") {
          ev.stopPropagation();
          if (!isAdminUser(state.currentUser)) return;
          if (!state.adminPanelTab) state.adminPanelTab = "health";
          state.modal = { type: "adminPanel" };
          state.accountMenuOpen = false;
          render();
          loadAdminTabData(state.adminPanelTab);
        }
        else if (action === "switch-admin-tab") {
          ev.stopPropagation();
          if (!isAdminUser(state.currentUser)) return;
          state.adminPanelTab = el.getAttribute("data-tab");
          render();
          loadAdminTabData(state.adminPanelTab);
        }
        else if (action === "refresh-health") { loadHealthData(true); fetchPendingDeletions(true); }
        else if (action === "cancel-pending-deletion") {
          ev.stopPropagation();
          if (!isAdminUser(state.currentUser)) return;
          var targetUid = el.getAttribute("data-uid");
          var targetName = el.getAttribute("data-name");
          showConfirm({
            title: "Hesap Kapatmayı İptal Et",
            message: (targetName || "Bu hesabın") + " kapatma sürecini iptal etmek istediğine emin misin? Veriler ve hane olduğu gibi kalmaya devam edecek.",
            confirmLabel: "Evet, İptal Et",
            onConfirm: function () { cancelAccountDeletionAsAdmin(targetUid, targetName); }
          });
        }
        else if (action === "refresh-errors") { loadErrorLogs(true); }
        else if (action === "refresh-support-requests") { loadSupportRequests(true); }
        else if (action === "support-mark-resolved") { setSupportRequestStatus(el.getAttribute("data-id"), "resolved"); }
        else if (action === "support-mark-open") { setSupportRequestStatus(el.getAttribute("data-id"), "open"); }
        else if (action === "refresh-login-audit") { loadLoginAuditLogs(true); }
        else if (action === "refresh-licenses") { loadLicenseAdminData(true); }
        else if (action === "create-license") {
          var presetDays = parseInt(el.getAttribute("data-days"), 10);
          createLicense(presetDays);
        }
        else if (action === "create-license-custom") {
          var customInput = document.getElementById("license-custom-days");
          var customDays = customInput ? parseInt(customInput.value, 10) : NaN;
          createLicense(customDays);
        }
        else if (action === "copy-license-code") {
          var codeVal = el.getAttribute("data-code") || "";
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(codeVal).then(function () { toast("Kod kopyalandı: " + codeVal); })
              .catch(function () { toast("Kopyalanamadı, kod: " + codeVal); });
          } else {
            toast("Kopyalanamadı, kod: " + codeVal);
          }
        }
        else if (action === "revoke-license-code") {
          var revokeCode = el.getAttribute("data-code") || "";
          showConfirm({
            title: "Lisans Kodunu İptal Et",
            message: "\"" + revokeCode + "\" kodunu iptal etmek istediğine emin misin? İptal edilen kod bir daha kullanılamaz.",
            confirmLabel: "İptal Et",
            danger: true,
            onConfirm: function () { revokeLicense(revokeCode); }
          });
        }
        else if (action === "revoke-license-household") {
          var revokeHouseholdId = el.getAttribute("data-household") || "";
          showConfirm({
            title: "Hanenin Lisansını İptal Et",
            message: "Bu hanenin lisansını hemen iptal etmek istediğine emin misin? Hane anında salt-okunur moda geçecek.",
            confirmLabel: "İptal Et",
            danger: true,
            onConfirm: function () { revokeHouseholdLicense(revokeHouseholdId); }
          });
        }
        else if (action === "logout") {
          ev.stopPropagation();
          state.accountMenuOpen = false;
          render();
          showConfirm({
            title: "Çıkış Yap",
            message: "Çıkış yapmak istediğine emin misin?",
            confirmLabel: "Çıkış Yap",
            danger: true,
            onConfirm: function () { logout(); }
          });
        }
      });
    });
    var importInput = document.getElementById("import-input");
    if (importInput) {
      importInput.addEventListener("change", function (ev) {
        var file = ev.target.files && ev.target.files[0];
        if (!file) return;
        if (!hasHouseholdPerm("backup")) {
          toast("Bu hanede yedekleme/geri yükleme yetkin yok.");
          importInput.value = "";
          return;
        }
        importData(file);
      });
    }
  }

  document.addEventListener("click", function (ev) {
    if (state.accountMenuOpen && !ev.target.closest(".account-chip")) {
      state.accountMenuOpen = false;
      render();
    }
  });

  init();
})();






  // NOT: Service worker kaydı artık dosyanın başında (swRegPromise) yapılıyor,
  // burada tekrar kaydetmeye gerek yok.

</script>
</body>
</html>
