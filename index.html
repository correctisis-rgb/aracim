<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Garaj Defteri</title>
<link rel="manifest" href="/aracim/manifest.json">
<link rel="icon" href="/aracim/icon-192.png" type="image/png">

<!-- iOS (Safari) Uyumluluk Detayları -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Aracım">
<link rel="apple-touch-icon" href="/aracim/icon-192.png">

<!-- Mobil Tarayıcı Adres Çubuğu Rengi -->
<meta name="theme-color" content="#9B51E0">
  
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1B1F24;
    --surface: #242930;
    --surface-2: #2C323A;
    --border: #383F47;
    --amber: #F2A93B;
    --blue: #4FA8D8;
    --green: #7BC67E;
    --purple: #C77DE0;
    --red: #E2574C;
    --text: #EDEEF0;
    --muted: #8B939D;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--text);
    font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
  }
  .wrap { max-width: 980px; margin: 0 auto; padding: 20px; }

  .gd-loading { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; min-height: 60vh; color: var(--muted); }
  .loading-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--amber); animation: pulse 1s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: .3; transform: scale(1);} 50% { opacity: 1; transform: scale(1.4);} }

  header.gd-header { margin-bottom: 16px; }
  .logo-area { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
  .app-logo { width: 32px; height: 32px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); }
  .gd-title-eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.14em; color: var(--amber); }
  .version-badge { background: var(--surface-2); border: 1px solid var(--border); color: var(--amber); font-family: 'JetBrains Mono', monospace; font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; margin-left: 6px; }
  .gd-title { display: flex; align-items: center; }
  .gd-title h1 { font-family: 'Oswald', sans-serif; font-weight: 600; font-size: 26px; margin: 2px 0 0; letter-spacing: 0.01em; }
  .storage-note { font-size: 11.5px; color: var(--muted); margin-top: 6px; line-height: 1.5; max-width: 640px; }
  .header-actions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; align-items: center; }
  .sync-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11.5px; font-weight: 600; padding: 5px 10px; border-radius: 999px; border: 1px solid; white-space: nowrap; }

  .car-tabs, .view-tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
  .view-tabs { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 4px; width: fit-content; gap: 4px; }
  .car-tab {
    display: flex; align-items: center; gap: 6px;
    background: var(--surface); border: 1px solid var(--border); color: var(--muted);
    padding: 6px 14px 6px 6px; border-radius: 999px; font-size: 13px; font-weight: 500; cursor: pointer;
    transition: all .15s ease;
  }
  .car-tab:hover { border-color: var(--tab-color, var(--amber)); color: var(--text); }
  .car-tab.active { background: color-mix(in srgb, var(--tab-color, var(--amber)) 16%, var(--surface)); border-color: var(--tab-color, var(--amber)); color: var(--text); }
  .car-tab-add { padding: 8px 14px; border-style: dashed; }
  .car-avatar { width: 22px; height: 22px; border-radius: 50%; object-fit: cover; flex-shrink: 0; background: var(--surface-2); cursor: pointer; transition: transform 0.2s; }
  .car-avatar:hover { transform: scale(1.1); }
  .car-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  .view-tab {
    position: relative; display: flex; align-items: center; gap: 6px;
    background: none; border: none; color: var(--muted); padding: 7px 14px;
    border-radius: 7px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit;
  }
  .view-tab.active { background: var(--surface-2); color: var(--text); }
  .view-tab-flag { position: absolute; top: 4px; right: 6px; width: 6px; height: 6px; border-radius: 50%; background: var(--red); }

  .gd-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
  .span-2 { grid-column: 1 / -1; }
  @media (max-width: 640px) { .gd-grid { grid-template-columns: 1fr; } }

  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-bottom: 14px; }
  .panel h2 { font-family: 'Oswald', sans-serif; font-size: 15px; font-weight: 500; margin: 0 0 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }

  .instrument-panel { display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .gauge-svg { width: 100%; max-width: 220px; }
  .gauge-value { font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 700; fill: var(--text); }
  .gauge-sub { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.12em; fill: var(--muted); }
  .odometer-row { text-align: center; margin-top: 4px; }
  .odometer-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.12em; color: var(--muted); margin-bottom: 4px; }
  .odometer {
    font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 26px;
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    padding: 6px 16px; letter-spacing: 0.04em; color: var(--amber);
    box-shadow: inset 0 0 12px #00000060; display: inline-block;
  }
  .odo-currency { font-size: 15px; margin-left: 2px; color: var(--muted); }

  .donut-wrap { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .donut-canvas-box { width: 150px; height: 150px; flex-shrink: 0; }
  .legend { list-style: none; margin: 0; padding: 0; flex: 1; min-width: 140px; }
  .legend li { display: flex; align-items: center; gap: 8px; font-size: 12.5px; padding: 4px 0; color: var(--text); }
  .legend .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .legend-val { margin-left: auto; font-family: 'JetBrains Mono', monospace; color: var(--muted); font-size: 12px; }

  .empty-hint { color: var(--muted); font-size: 13px; line-height: 1.6; }

  .log-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 10px; }
  .log-header h2 { margin: 0; }

  .btn-primary {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--amber); color: #1B1F24; border: none; border-radius: 8px;
    padding: 9px 14px; font-weight: 600; font-size: 13px; cursor: pointer; font-family: inherit;
    transition: filter .15s ease;
  }
  .btn-primary:hover { filter: brightness(1.08); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary.full { width: 100%; justify-content: center; margin-top: 6px; }
  .btn-secondary {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--surface-2); color: var(--text); border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 13px; font-weight: 500; font-size: 12.5px; cursor: pointer; font-family: inherit;
  }
  .btn-secondary:hover { border-color: var(--amber); }
  .btn-secondary.full { width: 100%; justify-content: center; }

  .expense-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 2px; max-height: 360px; overflow-y: auto; }
  .expense-row { display: grid; grid-template-columns: 36px 1fr auto auto 28px 28px; align-items: center; gap: 12px; padding: 9px 4px; border-bottom: 1px solid var(--border); }
  .expense-row:last-child { border-bottom: none; }
  .exp-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
  .exp-icon-wrap { position: relative; flex-shrink: 0; }
  .receipt-badge {
    position: absolute; bottom: -3px; right: -3px; width: 15px; height: 15px; border-radius: 50%;
    background: var(--surface-2); border: 1px solid var(--border); color: var(--amber);
    display: flex; align-items: center; justify-content: center; font-size: 8px; cursor: pointer; padding: 0;
  }
  .receipt-badge:hover { border-color: var(--amber); }
  .exp-main { display: flex; flex-direction: column; min-width: 0; }
  .exp-cat { font-size: 13.5px; font-weight: 500; }
  .exp-note { font-size: 12px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .exp-date { font-family: 'JetBrains Mono', monospace; font-size: 11.5px; color: var(--muted); }
  .exp-amount { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 13.5px; }
  .exp-del { background: none; border: none; color: var(--muted); cursor: pointer; padding: 8px; border-radius: 6px; font-size: 14px; min-width: 32px; min-height: 32px; }
  .exp-del:hover { color: var(--red); background: #E2574C1A; }

  .car-actions { display: flex; gap: 16px; margin-top: 4px; flex-wrap: wrap; }
  .link-btn { display: inline-flex; align-items: center; gap: 4px; background: none; border: none; color: var(--muted); font-size: 12px; cursor: pointer; text-decoration: underline; font-family: inherit; }
  .link-btn.danger:hover { color: var(--red); }
  .link-btn:hover { color: var(--text); }

  .car-info-card { display: flex; flex-direction: column; gap: 12px; padding: 16px 18px; }
  .car-info-top { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .car-info-photo { width: 62px; height: 62px; border-radius: 14px; object-fit: cover; background: var(--surface-2); flex-shrink: 0; cursor: zoom-in; border: 2px solid var(--border); }
  .car-info-photo-fallback { width: 62px; height: 62px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 26px; flex-shrink: 0; border: 2px solid var(--border); }
  .car-info-main { flex: 1; min-width: 160px; }
  .car-info-name { font-family: 'Oswald', sans-serif; font-size: 20px; font-weight: 600; margin: 0 0 3px; }
  .car-info-meta { font-size: 12.5px; color: var(--muted); }
  .car-info-stats { display: flex; gap: 8px; flex-wrap: wrap; }
  .car-stat-chip { display: inline-flex; align-items: baseline; gap: 6px; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 7px 12px; font-size: 13px; font-family: 'JetBrains Mono', monospace; font-weight: 700; color: var(--amber); }
  .car-stat-chip .csc-label { color: var(--muted); font-family: 'Inter', sans-serif; font-size: 10.5px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; }
  .car-info-actions { display: flex; gap: 16px; flex-wrap: wrap; padding-top: 4px; border-top: 1px solid var(--border); }

  .summary-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 2px; }
  .summary-row { display: grid; grid-template-columns: 40px 1fr auto 28px; align-items: center; gap: 12px; padding: 10px 4px; border-bottom: 1px solid var(--border); }
  .summary-row:last-child { border-bottom: none; }
  .sum-avatar { width: 36px; height: 36px; border-radius: 8px; object-fit: cover; background: var(--surface-2); flex-shrink: 0; cursor: pointer; }
  .sum-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .sum-main { display: flex; flex-direction: column; min-width: 0; }
  .sum-type { font-size: 13.5px; font-weight: 500; }
  .sum-date { font-family: 'JetBrains Mono', monospace; font-size: 11.5px; color: var(--muted); }
  .sum-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11.5px; font-weight: 600; padding: 4px 9px; border-radius: 999px; border: 1px solid; white-space: nowrap; }
  .summary-hint { color: var(--muted); font-size: 11.5px; margin: 12px 0 0; line-height: 1.6; }

  .doc-thumbs { display: flex; gap: 10px; margin-top: 4px; }
  .doc-thumb-btn { width: 56px; height: 56px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface-2); cursor: pointer; overflow: hidden; padding: 0; }
  .doc-thumb-btn img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .doc-thumb-btn.empty { display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 18px; }

  .modal-backdrop { position: fixed; inset: 0; background: #00000090; display: flex; align-items: center; justify-content: center; z-index: 50; padding: 16px; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px; width: 100%; max-width: 400px; max-height: 90vh; overflow-y: auto; }
  .modal.wide { max-width: 460px; }
  .modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .modal-head h3 { margin: 0; font-family: 'Oswald', sans-serif; font-weight: 600; font-size: 18px; }
  .icon-btn { background: none; border: none; color: var(--muted); cursor: pointer; padding: 8px; font-size: 18px; line-height: 1; min-width: 36px; min-height: 36px; display: inline-flex; align-items: center; justify-content: center; }
  .icon-btn:hover { color: var(--text); }

  .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; font-size: 12.5px; color: var(--muted); }
  .field input, .field select {
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text);
    padding: 9px 10px; font-size: 16px; font-family: inherit; width: 100%;
  }
  .field input:focus, .field select:focus { outline: 2px solid var(--amber); outline-offset: 1px; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .field-hint { color: var(--muted); font-size: 11.5px; margin: -4px 0 12px; line-height: 1.5; }

  .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .cat-chip {
    display: flex; align-items: center; gap: 6px;
    background: var(--bg); border: 1px solid var(--border); color: var(--muted);
    padding: 7px 9px; border-radius: 8px; font-size: 12px; cursor: pointer; font-family: inherit;
  }
  .cat-chip.active { border-color: var(--chip-color); color: var(--text); background: color-mix(in srgb, var(--chip-color) 14%, var(--bg)); }

  .photo-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .photo-upload {
    border: 1px dashed var(--border); border-radius: 10px; background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
    padding: 10px; cursor: pointer; position: relative; overflow: hidden; min-height: 100px;
  }
  .photo-upload:hover { border-color: var(--amber); }
  .photo-upload span.pu-label { font-size: 11.5px; color: var(--muted); text-align: center; }
  .photo-upload img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .photo-upload input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .photo-upload.has-photo input[type=file] { pointer-events: none; }
  .photo-upload img { cursor: zoom-in; }
  .photo-edit {
    position: absolute; bottom: 4px; right: 4px; background: #00000099; color: #fff; border: none;
    border-radius: 50%; width: 26px; height: 26px; font-size: 12px; cursor: pointer; z-index: 2;
  }
  .photo-remove {
    position: absolute; top: 4px; right: 4px; background: #00000099; color: #fff; border: none;
    border-radius: 50%; width: 26px; height: 26px; font-size: 13px; cursor: pointer; z-index: 2;
  }

  /* ---------- Lightbox ---------- */
  .lightbox-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.92); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; cursor: zoom-out; animation: fadeIn 0.25s ease-out; }
  .lightbox-content { position: relative; max-width: 90%; max-height: 85vh; display: flex; flex-direction: column; align-items: center; }
  .lightbox-backdrop img { max-width: 100%; max-height: 80vh; border-radius: 10px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); object-fit: contain; border: 2px solid var(--border); }
  .lightbox-caption { color: var(--text); margin-top: 12px; font-family: 'Oswald', sans-serif; font-size: 16px; letter-spacing: 0.05em; text-align: center; background: rgba(0,0,0,0.6); padding: 6px 16px; border-radius: 20px; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .toast { position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%); background: var(--surface-2); border: 1px solid var(--border); color: var(--text); padding: 10px 16px; border-radius: 8px; font-size: 13px; z-index: 70; box-shadow: 0 6px 20px #00000060; max-width: calc(100vw - 32px); text-align: center; }

  /* ---------- Family Section ---------- */
  .family-list { list-style: none; padding: 0; margin: 10px 0 16px 0; display: flex; flex-direction: column; gap: 8px; }
  .family-item { display: flex; align-items: center; justify-content: space-between; background: var(--bg); border: 1px solid var(--border); padding: 8px 12px; border-radius: 8px; }
  .family-name { font-weight: 500; font-size: 13px; }
  .family-role { font-size: 11px; color: var(--amber); background: rgba(242,169,59,0.1); padding: 2px 6px; border-radius: 4px; font-family: 'JetBrains Mono', monospace; }

  /* ---------- auth screen ---------- */
  .auth-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px 26px; width: 100%; max-width: 380px; box-shadow: 0 20px 50px #00000040; }
  .auth-eyebrow { text-align: center; display: block; margin-bottom: 4px; }
  .auth-title { font-family: 'Oswald', sans-serif; font-weight: 600; font-size: 22px; margin: 4px 0 6px; text-align: center; }
  .auth-sub { color: var(--muted); font-size: 12.5px; text-align: center; margin: 0 0 18px; line-height: 1.5; }
  .auth-tabs { display: flex; background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px; padding: 4px; margin-bottom: 18px; gap: 4px; }
  .auth-tab { flex: 1; background: none; border: none; color: var(--muted); padding: 8px; border-radius: 7px; font-size: 12.5px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .auth-tab.active { background: var(--bg); color: var(--amber); }
  .auth-error { background: #E2574C1A; border: 1px solid #E2574C55; color: #E2574C; font-size: 12.5px; padding: 8px 11px; border-radius: 8px; margin: -6px 0 14px; line-height: 1.4; }
  .pw-field { position: relative; }
  .pw-field input { padding-right: 40px; }
  .pw-toggle { position: absolute; right: 4px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--muted); cursor: pointer; font-size: 14px; padding: 6px 8px; }
  .pw-toggle:hover { color: var(--text); }
  .auth-switch { text-align: center; font-size: 12px; color: var(--muted); margin-top: 14px; }
  .auth-switch button { background: none; border: none; color: var(--amber); cursor: pointer; font-family: inherit; font-size: 12px; text-decoration: underline; padding: 0; }

  /* ---------- account chip / menu ---------- */
  .account-chip { position: relative; display: inline-flex; align-items: center; gap: 7px; background: var(--surface); border: 1px solid var(--border); border-radius: 999px; padding: 5px 10px 5px 5px; cursor: pointer; font-size: 12.5px; font-weight: 500; color: var(--text); margin-left: auto; }
  .account-chip:hover { border-color: var(--amber); }
  .account-avatar { border-radius: 50%; object-fit: cover; flex-shrink: 0; display: inline-flex; }
  .account-avatar-fallback { background: var(--amber); color: #1B1F24; text-align: center; font-weight: 700; font-size: 12px; }
  .account-name { max-width: 110px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .account-chevron { color: var(--muted); font-size: 10px; }
  .account-menu { position: absolute; top: calc(100% + 8px); right: 0; background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px; padding: 6px; min-width: 170px; box-shadow: 0 10px 30px #00000050; z-index: 40; }
  .account-menu-item { display: flex; align-items: center; gap: 8px; width: 100%; background: none; border: none; color: var(--text); font-size: 13px; padding: 9px 10px; border-radius: 7px; cursor: pointer; text-align: left; font-family: inherit; }
  .account-menu-item:hover { background: var(--bg); }
  .account-menu-item.danger { color: var(--red); }
  .account-menu-divider { height: 1px; background: var(--border); margin: 4px 2px; }
  .header-top-row { display: flex; align-items: flex-start; justify-content: space-between; width: 100%; gap: 10px; }

  /* ---------- profile modal ---------- */
  .avatar-upload-row { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
  .avatar-upload { width: 76px; height: 76px; border-radius: 50%; border: 1px dashed var(--border); background: var(--bg); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; cursor: pointer; flex-shrink: 0; }
  .avatar-upload:hover { border-color: var(--amber); }
  .avatar-upload img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .avatar-upload span.pu-label { font-size: 10.5px; color: var(--muted); text-align: center; padding: 4px; }
  .avatar-upload input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .avatar-upload-hint { font-size: 11.5px; color: var(--muted); line-height: 1.5; }

<script>
  var firebaseConfig = {

<script>
(function () {
  "use strict";

  var auth = firebase.auth();
  var db = firebase.firestore();
  var unsubscribeUserDoc = null;

  // ---------- service worker kaydı ----------
  // NOT: Bu kayıt artık burada, en başta yapılıyor (sayfa 'load' olayını beklemiyor).
  // enableNotifications() ve disableNotifications() bu promise'i bekleyip
  // getToken() çağrısına DAİMA doğru registration'ı geçiyor. Bu yapılmazsa
  // Firebase SDK'sı kendi varsayılan '/firebase-messaging-sw.js' dosyasını
  // aramaya çalışır ve sitede o dosya olmadığı için 404 hatası verir.
  var swRegPromise = ('serviceWorker' in navigator)
    ? navigator.serviceWorker.register('/aracim/sw.js', { scope: '/aracim/' })
        .then(function (reg) { console.log('Service Worker kayıt başarılı!', reg); return reg; })
        .catch(function (err) { console.warn('Service Worker kaydı başarısız:', err); return null; })
    : Promise.resolve(null);

  // ---------- push notification setup ----------
  // ÖNEMLİ: Aşağıdaki VAPID_KEY'i kendi Firebase projenizden almanız gerekiyor:
  // Firebase Console → Proje Ayarları → Cloud Messaging sekmesi → "Web Push sertifikaları"
  // bölümünden "Anahtar çifti oluştur" deyin, çıkan uzun anahtarı buraya yapıştırın.
  var VAPID_KEY = "BHIIHlP05E6J3R09picg9J8yMjdkxVWlv-bEB26C_NnYo4eytAKSXz7FUvEta1d8AEWr5p_rRURhYQyLo2zmFHw";
  var messaging = null;
  var messagingReady = Promise.resolve(null);
  if (typeof firebase.messaging === "function") {
    try {
      // NOT: firebase-messaging-compat.js'te isSupported() SENKRON çalışır (Promise DEĞİL),
      // modüler (v9+) SDK'daki async versiyondan farklıdır — bu yüzden .then() kullanılmaz.
      var fcmSupported = firebase.messaging.isSupported();
      if (!fcmSupported) {
        console.warn("FCM: bu tarayıcı/ortam desteklenmiyor (isSupported=false).");
      } else {
        messaging = firebase.messaging();
        messaging.onMessage(function (payload) {
          var body = (payload.notification && payload.notification.body) || "Yeni bir hatırlatman var.";
          toast(body);
        });
      }
      messagingReady = Promise.resolve(messaging);
    } catch (e) { console.error("FCM init hata:", e); messagingReady = Promise.resolve(null); }
  } else {
    console.warn("FCM: firebase.messaging fonksiyonu bulunamadı (SDK yüklenmemiş olabilir).");
  }

  // ---------- constants ----------
  var APP_VERSION = "v1.1.3"; // Dynamic Version Tracking
  var APP_UPDATED = "17 Temmuz 2026";
  var CATEGORIES = [
    { id: "yakit", label: "Yakıt", emoji: "⛽", color: "#F2A93B" },
    { id: "bakim", label: "Bakım / Servis", emoji: "🔧", color: "#4FA8D8" },
    { id: "sigorta", label: "Sigorta", emoji: "🛡️", color: "#7BC67E" },
    { id: "vergi", label: "Vergi / Muayene", emoji: "📄", color: "#C77DE0" },
    { id: "otopark", label: "Otopark / Geçiş", emoji: "🅿️", color: "#E2574C" },
    { id: "diger", label: "Diğer", emoji: "•••", color: "#8B939D" }
  ];
  var CAR_COLORS = ["#F2A93B", "#4FA8D8", "#7BC67E", "#C77DE0", "#E2574C"];
  var MONTHS_TR = ["Oca","Şub","Mar","Nis","May","Haz","Tem","Ağu","Eyl","Eki","Kas","Ara"];
  var EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  var PASSWORD_RE = /^(?=.*[a-z])(?=.*[A-Z])(?=.*[^A-Za-z0-9]).{6,}$/;
  var PASSWORD_HINT = "Şifre en az 6 karakter olmalı; en az bir büyük harf, bir küçük harf ve bir sembol (örn. !?%*-) içermeli.";

  function catById(id) {
    for (var i = 0; i < CATEGORIES.length; i++) if (CATEGORIES[i].id === id) return CATEGORIES[i];
    return CATEGORIES[CATEGORIES.length - 1];
  }
  function uid() { return Math.random().toString(36).slice(2, 10) + Date.now().toString(36); }
  function fmtTL(n) { return new Intl.NumberFormat("tr-TR", { style: "currency", currency: "TRY", maximumFractionDigits: 0 }).format(n || 0); }
  function todayStr() { return new Date().toISOString().slice(0, 10); }
  function fmtDateTR(s) { return s ? new Date(s).toLocaleDateString("tr-TR") : ""; }
  function esc(s) { var d = document.createElement("div"); d.textContent = s == null ? "" : String(s); return d.innerHTML; }

  // ---------- LocalStorage Sync for Offline Support ----------
  function getLocalData(key, fallback) {
    try {
      var val = localStorage.getItem("gd_" + key);
      return val ? JSON.parse(val) : fallback;
    } catch(e) { return fallback; }
  }
  function setLocalData(key, val) {
    try { localStorage.setItem("gd_" + key, JSON.stringify(val)); } catch(e) {}
  }

  // ---------- numeric entry helpers ----------
  function groupThousands(digits) {
    digits = digits.replace(/^0+(?=\d)/, "");
    return digits.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
  }
  function formatNumericDisplay(raw, allowDecimal) {
    if (!raw) return "";
    var parts = raw.split(",");
    var intPart = groupThousands(parts[0].replace(/\D/g, ""));
    if (allowDecimal && parts.length > 1) {
      var decPart = parts[1].replace(/\D/g, "").slice(0, 2);
      return (intPart || "0") + "," + decPart;
    }
    return intPart;
  }
  function attachThousandsInput(input, allowDecimal) {
    input.setAttribute("type", "text");
    input.setAttribute("inputmode", allowDecimal ? "decimal" : "numeric");
    input.addEventListener("input", function () {
      var raw = input.value;
      if (allowDecimal) {
        raw = raw.replace(/[^\d,]/g, "");
        var firstComma = raw.indexOf(",");
        if (firstComma !== -1) raw = raw.slice(0, firstComma + 1) + raw.slice(firstComma + 1).replace(/,/g, "");
      } else {
        raw = raw.replace(/\D/g, "");
      }
      input.value = formatNumericDisplay(raw, allowDecimal);
    });
  }
  function parseFormattedNumber(str) {
    if (!str) return null;
    var n = parseFloat(String(str).replace(/\./g, "").replace(",", "."));
    return isNaN(n) ? null : n;
  }

  function daysUntil(dateStr) {
    if (!dateStr) return null;
    var today = new Date(); today.setHours(0,0,0,0);
    var target = new Date(dateStr); target.setHours(0,0,0,0);
    return Math.round((target - today) / 86400000);
  }
  function urgency(days) {
    if (days === null) return { key: "none", label: "Tarih girilmedi", color: "#8B939D" };
    if (days < 0) return { key: "overdue", label: Math.abs(days) + " gün gecikti", color: "#E2574C" };
    if (days === 0) return { key: "today", label: "Bugün", color: "#E2574C" };
    if (days <= 30) return { key: "soon", label: days + " gün kaldı", color: "#E2574C" };
    if (days <= 90) return { key: "watch", label: days + " gün kaldı", color: "#F2A93B" };
    return { key: "ok", label: days + " gün kaldı", color: "#7BC67E" };
  }

  // ---------- image helper ----------
  function compressImage(file, maxDim, quality) {
    maxDim = maxDim || 900; quality = quality || 0.72;
    return new Promise(function (resolve, reject) {
      var reader = new FileReader();
      reader.onload = function () {
        var img = new Image();
        img.onload = function () {
          var w = img.width, h = img.height;
          if (w > h && w > maxDim) { h = Math.round(h * (maxDim / w)); w = maxDim; }
          else if (h > maxDim) { w = Math.round(w * (maxDim / h)); h = maxDim; }
          var canvas = document.createElement("canvas");
          canvas.width = w; canvas.height = h;
          var ctx = canvas.getContext("2d");
          ctx.drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL("image/jpeg", quality));
        };
        img.onerror = reject;
        img.src = reader.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  // ---------- auth helpers ----------
  function authErrorMessage(err) {
    var code = err && err.code;
    switch (code) {
      case "auth/email-already-in-use": return "Bu e-posta ile zaten bir hesap var. Giriş yapmayı dene.";
      case "auth/invalid-email": return "Geçerli bir e-posta adresi gir.";
      case "auth/weak-password": return PASSWORD_HINT;
      case "auth/user-not-found":
      case "auth/wrong-password":
      case "auth/invalid-credential": return "E-posta veya şifre hatalı.";
      case "auth/too-many-requests": return "Çok fazla deneme yapıldı. Biraz sonra tekrar dener misin?";
      case "auth/requires-recent-login": return "Bu işlem için tekrar giriş yapman gerekiyor. Çıkış yapıp tekrar giriş yap.";
      case "auth/network-request-failed": return "Bağlantı sorunu oluştu. İnternetini kontrol edip tekrar dener misin?";
      default: return "Bir şeyler ters gitti, tekrar dener misin?";
    }
  }

  function initials(name) {
    var parts = (name || "?").trim().split(/\s+/).filter(Boolean);
    if (!parts.length) return "?";
    return (parts[0][0] + (parts[1] ? parts[1][0] : "")).toUpperCase();
  }

  function userAvatarHTML(user, size) {
    size = size || 30;
    if (user.avatar) return '<img class="account-avatar" src="' + user.avatar + '" alt="" style="width:' + size + 'px;height:' + size + 'px" />';
    return '<span class="account-avatar account-avatar-fallback" style="width:' + size + 'px;height:' + size + 'px;line-height:' + size + 'px">' + esc(initials(user.name)) + '</span>';
  }

  // ---------- state ----------
  var state = {
    currentUser: null,
    authMode: "login",
    authError: null,
    authBusy: false,
    accountMenuOpen: false,
    online: navigator.onLine,
    cars: getLocalData("cars", null),
    expenses: getLocalData("expenses", null),
    familyMembers: getLocalData("family", []),
    selectedCarId: "all",
    view: "panel",
    modal: null,
    lightbox: null,
    lightboxCaption: "",
    notifStatus: (typeof Notification !== "undefined" ? Notification.permission : "unsupported")
  };

  function defaultCar() {
    return { id: uid(), name: "Arabam", plate: "34 XX 000", color: CAR_COLORS[0], inspectionDate: null, maintenanceDate: null, photo: null, ruhsat: null };
  }

  // --- Offline & Cloud Sync ---
  function persistCars() {
    setLocalData("cars", state.cars);
    if (!state.currentUser || !state.online) return;
    db.collection("users").doc(state.currentUser.id).set({ cars: state.cars }, { merge: true })
      .catch(function (err) { console.error(err); });
  }
  function persistExpenses() {
    setLocalData("expenses", state.expenses);
    if (!state.currentUser || !state.online) return;
    db.collection("users").doc(state.currentUser.id).set({ expenses: state.expenses }, { merge: true })
      .catch(function (err) { console.error(err); });
  }
  function persistFamily() {
    setLocalData("family", state.familyMembers);
    if (!state.currentUser || !state.online) return;
    db.collection("users").doc(state.currentUser.id).set({ familyMembers: state.familyMembers }, { merge: true })
      .catch(function (err) { console.error(err); });
  }

  // --- Push Notifications ---
  function enableNotifications() {
    if (!state.currentUser) { toast("Bildirimleri açmak için giriş yapmalısın."); return; }
    messagingReady.then(function (m) {
      if (!m) { toast("Bu tarayıcı bildirimleri desteklemiyor."); return; }
      Notification.requestPermission().then(function (perm) {
        if (perm !== "granted") {
          toast("Bildirim izni verilmedi. Tarayıcı ayarlarından değiştirebilirsin.");
          state.notifStatus = "denied";
          render();
          return;
        }
        swRegPromise.then(function (reg) {
          if (!reg) { throw new Error("Service worker kaydı bulunamadı. Sayfayı yenileyip tekrar deneyin."); }
          return m.getToken({ vapidKey: VAPID_KEY, serviceWorkerRegistration: reg });
        }).then(function (token) {
          if (!token) { toast("Bildirim anahtarı alınamadı."); return; }
          return db.collection("users").doc(state.currentUser.id).set({
            fcmTokens: firebase.firestore.FieldValue.arrayUnion(token)
          }, { merge: true });
        }).then(function () {
          state.notifStatus = "granted";
          toast("Bildirimler açıldı. Yaklaşan işlemler için hatırlatma alacaksın.");
          render();
        }).catch(function (err) {
          console.error(err);
          toast("Bildirim kaydı başarısız oldu: " + (err && err.message ? err.message : err));
        });
      });
    });
  }

  function disableNotifications() {
    if (!state.currentUser) return;
    messagingReady.then(function (m) {
      if (!m) return;
      swRegPromise.then(function (reg) {
        return m.getToken({ vapidKey: VAPID_KEY, serviceWorkerRegistration: reg || undefined });
      }).then(function (token) {
        if (!token) return;
        return db.collection("users").doc(state.currentUser.id).set({
          fcmTokens: firebase.firestore.FieldValue.arrayRemove(token)
        }, { merge: true });
      }).then(function () {
        state.notifStatus = "default";
        toast("Bildirimler kapatıldı.");
        render();
      }).catch(function (err) { console.error(err); });
    });
  }

  function syncOfflineData() {
    if (state.currentUser && state.online) {
      db.collection("users").doc(state.currentUser.id).set({
        cars: state.cars,
        expenses: state.expenses,
        familyMembers: state.familyMembers
      }, { merge: true }).then(function() {
        toast("Çevrimdışı yapılan değişiklikler buluta yüklendi!");
      });
    }
  }

  function toast(msg) {
    var el = document.createElement("div");
    el.className = "toast";
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(function () { el.remove(); }, 3200);
  }

  function showConfirm(opts) {
    var backdrop = document.createElement("div");
    backdrop.className = "modal-backdrop confirm-backdrop";
    var box = document.createElement("div");
    box.className = "modal confirm-modal";
    box.innerHTML =
      '<div class="modal-head"><h3>' + esc(opts.title || "Emin misin?") + '</h3></div>' +
      '<p class="confirm-message">' + esc(opts.message || "") + '</p>' +
      '<div class="confirm-actions">' +
        '<button type="button" class="btn-secondary" id="confirm-cancel">' + esc(opts.cancelLabel || "Vazgeç") + '</button>' +
        '<button type="button" class="' + (opts.danger ? "btn-danger" : "btn-primary") + '" id="confirm-ok">' + esc(opts.confirmLabel || "Onayla") + '</button>' +
      '</div>';
    backdrop.appendChild(box);
    function cleanup() { backdrop.remove(); }
    box.addEventListener("click", function (ev) { ev.stopPropagation(); });
    backdrop.addEventListener("click", function (ev) {
      if (ev.target === backdrop) { cleanup(); if (opts.onCancel) opts.onCancel(); }
    });
    box.querySelector("#confirm-cancel").addEventListener("click", function () { cleanup(); if (opts.onCancel) opts.onCancel(); });
    box.querySelector("#confirm-ok").addEventListener("click", function () { cleanup(); if (opts.onConfirm) opts.onConfirm(); });
    document.body.appendChild(backdrop);
    box.querySelector("#confirm-ok").focus();
  }

  function exportData() {
    var payload = { cars: state.cars, expenses: state.expenses, family: state.familyMembers, exportedAt: new Date().toISOString() };
    var blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    var slug = state.currentUser ? state.currentUser.name.toLowerCase().replace(/[^a-z0-9ığüşöç]+/gi, "-").replace(/^-+|-+$/g, "") : "yedek";
    a.download = "garaj-defteri-" + slug + "-" + todayStr() + ".json";
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
    toast("Yedek indirildi.");
  }

  function importData(file) {
    var reader = new FileReader();
    reader.onload = function () {
      try {
        var data = JSON.parse(reader.result);
        if (!data || !Array.isArray(data.cars) || !Array.isArray(data.expenses)) throw new Error("invalid");
        showConfirm({
          title: "Yedeği Geri Yükle",
          message: "Mevcut veriler bu yedekle değiştirilecek. Devam edilsin mi?",
          confirmLabel: "Devam Et",
          danger: true,
          onConfirm: function () {
            state.cars = data.cars;
            state.expenses = data.expenses;
            state.familyMembers = data.family || [];
            persistCars(); persistExpenses(); persistFamily();
            toast("Yedek geri yüklendi.");
            render();
          }
        });
      } catch (e) {
        toast("Dosya okunamadı. Geçerli bir yedek dosyası seçtiğinizden emin olun.");
      }
    };
    reader.readAsText(file);
  }

  function loginAs(fbUser) {
    state.currentUser = { id: fbUser.uid, name: fbUser.displayName || "Kullanıcı", email: fbUser.email, avatar: null };
    state.selectedCarId = "all";
    state.view = "panel";
    state.modal = null;
    state.accountMenuOpen = false;
    render();

    if (unsubscribeUserDoc) unsubscribeUserDoc();
    var docRef = db.collection("users").doc(fbUser.uid);
    unsubscribeUserDoc = docRef.onSnapshot(function (snap) {
      if (!snap.exists) {
        docRef.set({
          name: fbUser.displayName || "Kullanıcı",
          email: fbUser.email,
          avatar: null,
          cars: state.cars || [defaultCar()],
          expenses: state.expenses || [],
          familyMembers: state.familyMembers || [],
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        }).catch(function (err) { console.error(err); });
        return;
      }
      var data = snap.data() || {};
      if (!state.currentUser || state.currentUser.id !== fbUser.uid) return;
      state.currentUser = { id: fbUser.uid, name: data.name || fbUser.displayName || "Kullanıcı", email: data.email || fbUser.email, avatar: data.avatar || null };
      
      // Merge with cloud or fallback to local
      state.cars = data.cars || state.cars || [defaultCar()];
      state.expenses = data.expenses || state.expenses || [];
      state.familyMembers = data.familyMembers || state.familyMembers || [];

      setLocalData("cars", state.cars);
      setLocalData("expenses", state.expenses);
      setLocalData("family", state.familyMembers);

      render();
    }, function (err) {
      console.error(err);
      // fallback to local storage if offline error occurs
      if(!state.cars || !state.expenses) {
        state.cars = getLocalData("cars", [defaultCar()]);
        state.expenses = getLocalData("expenses", []);
        state.familyMembers = getLocalData("family", []);
        render();
      }
    });
  }

  function logout() {
    if (unsubscribeUserDoc) { unsubscribeUserDoc(); unsubscribeUserDoc = null; }
    auth.signOut().then(function () {
      state.currentUser = null;
      state.cars = null;
      state.expenses = null;
      state.familyMembers = [];
      state.selectedCarId = "all";
      state.view = "panel";

  // ---------- derived data ----------
  function getVisibleExpenses() {
    if (state.selectedCarId === "all") return state.expenses || [];
    return (state.expenses || []).filter(function (e) { return e.carId === state.selectedCarId; });
  }

  function monthKey(d) { return d.getFullYear() + "-" + d.getMonth(); }

  function recalcCarCurrentKm(carId) {
    var car = (state.cars || []).find(function (c) { return c.id === carId; });
    if (!car) return;
    var kmEntries = (state.expenses || []).filter(function (e) { return e.carId === carId && e.km != null; });
    if (!kmEntries.length) return; // hiç km'li kayıt yoksa dokunma (manuel girilmiş olabilir)
    var maxKm = kmEntries.reduce(function (m, e) { return Math.max(m, e.km); }, 0);
    if (car.currentKm !== maxKm) {
      state.cars = state.cars.map(function (c) { return c.id === carId ? Object.assign({}, c, { currentKm: maxKm }) : c; });
      persistCars();
    }
  }

  function computeCostPerKm(carId) {
    var fuelExpenses = (state.expenses || [])
      .filter(function (e) { return e.carId === carId && e.category === "yakit" && e.km != null; })
      .sort(function (a, b) { return a.km - b.km; });
    if (fuelExpenses.length < 2) return null;
    var recent = fuelExpenses.slice(-5); // en fazla son 5 kayıt (4 segment) üzerinden ortalama al
    var totalDist = 0, totalAmount = 0;
    for (var i = 1; i < recent.length; i++) {
      var dist = recent[i].km - recent[i - 1].km;
      if (dist > 0) { totalDist += dist; totalAmount += Number(recent[i].amount || 0); }
    }
    if (totalDist <= 0) return null;
    return totalAmount / totalDist;
  }

  function computeFuelStats(carId) {
    var fuelExpenses = (state.expenses || [])
      .filter(function (e) { return e.carId === carId && e.category === "yakit" && e.km != null && e.liter != null; })
      .sort(function (a, b) { return a.km - b.km; });
    if (fuelExpenses.length < 2) return null;
    var totalDist = 0, totalLiter = 0, segments = 0;
    for (var i = 1; i < fuelExpenses.length; i++) {
      var dist = fuelExpenses[i].km - fuelExpenses[i - 1].km;
      if (dist > 0) { totalDist += dist; totalLiter += fuelExpenses[i].liter; segments++; }
    }
    if (!segments || totalDist <= 0) return null;
    return { avgConsumption: (totalLiter / totalDist) * 100, totalDist: totalDist, totalLiter: totalLiter };
  }

  function computeDashboard() {
    var visible = getVisibleExpenses();
    var now = new Date();
    var thisKey = monthKey(now);
    var monthTotal = 0, buckets = {};
    visible.forEach(function (e) {
      var d = new Date(e.date), k = monthKey(d);
      buckets[k] = (buckets[k] || 0) + Number(e.amount || 0);
      if (k === thisKey) monthTotal += Number(e.amount || 0);
    });
    var otherKeys = Object.keys(buckets).filter(function (k) { return k !== thisKey; });
    var avg = otherKeys.length ? otherKeys.reduce(function (s, k) { return s + buckets[k]; }, 0) / otherKeys.length : null;
    var gaugePct = avg && avg > 0 ? Math.min(1, monthTotal / (avg * 1.6)) : (monthTotal > 0 ? 0.55 : 0);

    var catMap = {};
    visible.forEach(function (e) { catMap[e.category] = (catMap[e.category] || 0) + Number(e.amount || 0); });
    var categoryData = CATEGORIES.map(function (c) { return { name: c.label, value: catMap[c.id] || 0, color: c.color }; }).filter(function (d) { return d.value > 0; });

    var totalAllTime = visible.reduce(function (s, e) { return s + Number(e.amount || 0); }, 0);
    return { monthTotal: monthTotal, gaugePct: gaugePct, categoryData: categoryData, totalAllTime: totalAllTime };
  }

  function kmUrgency(remaining) {
    if (remaining === null) return { key: "none", label: "Km bilgisi yok", color: "#8B939D" };
    var abs = groupThousands(String(Math.round(Math.abs(remaining))));
    if (remaining <= 0) return { key: "overdue", label: abs + " km geçti", color: "#E2574C" };
    if (remaining <= 1000) return { key: "soon", label: abs + " km kaldı", color: "#E2574C" };
    if (remaining <= 3000) return { key: "watch", label: abs + " km kaldı", color: "#F2A93B" };
    return { key: "ok", label: abs + " km kaldı", color: "#7BC67E" };
  }
  function tierOf(status) {
    if (status.key === "overdue" || status.key === "today" || status.key === "soon") return 0;
    if (status.key === "watch") return 1;
    if (status.key === "ok") return 2;
    return 3;
  }

  function computeSummaryItems() {
    var carsToProcess = state.cars || [];
    var relevant = state.selectedCarId === "all" ? carsToProcess : carsToProcess.filter(function (c) { return c.id === state.selectedCarId; });
    var items = [];
    relevant.forEach(function (c) {
      items.push({ carId: c.id, carName: c.name, carPhoto: c.photo, type: "Muayene", emoji: "🗓️", date: c.inspectionDate || null });
      items.push({ carId: c.id, carName: c.name, carPhoto: c.photo, type: "Bakım / Servis (tarih)", emoji: "🔧", date: c.maintenanceDate || null });
      items.push({ carId: c.id, carName: c.name, carPhoto: c.photo, type: "Trafik Sigortası", emoji: "🛡️", date: c.insuranceDate || null });
      items.push({ carId: c.id, carName: c.name, carPhoto: c.photo, type: "Kasko", emoji: "🚙", date: c.kaskoDate || null });
      items.push({ carId: c.id, carName: c.name, carPhoto: c.photo, type: "Vergi (MTV)", emoji: "💰", date: c.taxDate || null });
      items.push({ carId: c.id, carName: c.name, carPhoto: c.photo, type: "Lastik Değişimi", emoji: "🛞", date: c.tireDate || null });
    });
    items.forEach(function (it) {
      it.days = daysUntil(it.date);
      it.status = urgency(it.days);
      it.dateLabel = it.date ? fmtDateTR(it.date) : "Tarih girilmedi";
      it.tier = tierOf(it.status);
      it.metric = it.days === null ? 99999 : it.days;
    });

    relevant.forEach(function (c) {
      if (c.maintenanceKm == null) return;
      var remaining = c.currentKm != null ? (c.maintenanceKm - c.currentKm) : null;
      var status = kmUrgency(remaining);
      items.push({
        carId: c.id, carName: c.name, carPhoto: c.photo, type: "Bakım / Servis (km)", emoji: "🔧",
        date: null, dateLabel: status.label, status: status, isKm: true,
        tier: tierOf(status), metric: remaining === null ? 99999 : remaining
      });
    });

    items.sort(function (a, b) { return a.tier !== b.tier ? a.tier - b.tier : a.metric - b.metric; });
    return items;
  }

  function bindAuthActions() {
    document.querySelectorAll('[data-action="auth-tab"]').forEach(function (btn) {
      btn.addEventListener("click", function () {
        state.authMode = btn.getAttribute("data-mode");
        state.authError = null;
        renderAuth();
      });
    });
    document.querySelectorAll(".pw-toggle").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var input = document.getElementById(btn.getAttribute("data-target"));
        if (!input) return;
        input.type = input.type === "password" ? "text" : "password";
        btn.textContent = input.type === "password" ? "👁️" : "🙈";
      });
    });
    var submit = document.getElementById("auth-submit");
    if (submit) submit.addEventListener("click", function () {
      if (state.authMode === "register") handleRegister(); else handleLogin();
    });
    document.querySelectorAll(".auth-card input").forEach(function (input) {
      input.addEventListener("keydown", function (ev) {
        if (ev.key === "Enter") { ev.preventDefault(); if (submit) submit.click(); }
      });
    });
  }

  function handleRegister() {
    var name = document.getElementById("r-name").value.trim();
    var email = document.getElementById("r-email").value.trim();
    var pass = document.getElementById("r-pass").value;
    var pass2 = document.getElementById("r-pass2").value;

    if (name.length < 2) { state.authError = "Lütfen ad soyad gir."; renderAuth(); return; }
    if (!EMAIL_RE.test(email)) { state.authError = "Geçerli bir e-posta adresi gir."; renderAuth(); return; }
    if (pass.length < 6 || !PASSWORD_RE.test(pass)) { state.authError = PASSWORD_HINT; renderAuth(); return; }
    if (pass !== pass2) { state.authError = "Şifreler eşleşmiyor."; renderAuth(); return; }

    state.authError = null; state.authBusy = true; renderAuth();
    auth.createUserWithEmailAndPassword(email, pass).then(function (cred) {
      return cred.user.updateProfile({ displayName: name }).then(function () {
        return db.collection("users").doc(cred.user.uid).set({
          name: name, email: email, avatar: null,
          cars: [defaultCar()], expenses: [], familyMembers: [],
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
      });
    }).then(function () {
      state.authBusy = false;
      toast("Hoş geldin, " + name.split(" ")[0] + "! Hesabın oluşturuldu.");
    }).catch(function (err) {
      state.authBusy = false;
      state.authError = authErrorMessage(err);
      renderAuth();
    });
  }

  function handleLogin() {
    var email = document.getElementById("l-email").value.trim();
    var pass = document.getElementById("l-pass").value;
    if (!email || !pass) { state.authError = "E-posta ve şifreni gir."; renderAuth(); return; }

    state.authError = null; state.authBusy = true; renderAuth();
    auth.signInWithEmailAndPassword(email, pass).then(function (cred) {
      state.authBusy = false;
      toast("Tekrar hoş geldin, " + (cred.user.displayName || "").split(" ")[0] + "!");
    }).catch(function (err) {
      state.authBusy = false;
      state.authError = authErrorMessage(err);
      renderAuth();
    });
  }

  function gaugeSVG(pct) {
    var clamped = Math.max(0, Math.min(1, pct));
    var angle = -180 + clamped * 180;
    var rad = angle * Math.PI / 180;
    var cx = 110, cy = 108, r = 84;
    var nx = cx + r * 0.86 * Math.cos(rad), ny = cy + r * 0.86 * Math.sin(rad);
    function arc(s, e, radius) {
      var sr = s * Math.PI / 180, er = e * Math.PI / 180;
      var x1 = cx + radius * Math.cos(sr), y1 = cy + radius * Math.sin(sr);
      var x2 = cx + radius * Math.cos(er), y2 = cy + radius * Math.sin(er);
      var large = (e - s) > 180 ? 1 : 0;
      return "M " + x1 + " " + y1 + " A " + radius + " " + radius + " 0 " + large + " 1 " + x2 + " " + y2;
    }
    var d = window.__dashboardData;
    var monthTotal = d ? d.monthTotal : 0;
    return '<svg viewBox="0 0 220 130" class="gauge-svg" role="img" aria-label="Bu ayki harcama göstergesi">' +
      '<path d="' + arc(-180, -60, r) + '" stroke="#7BC67E" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.85"/>' +
      '<path d="' + arc(-60, -20, r) + '" stroke="#F2A93B" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.85"/>' +
      '<path d="' + arc(-20, 0, r) + '" stroke="#E2574C" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.85"/>' +
      '<line x1="' + cx + '" y1="' + cy + '" x2="' + nx + '" y2="' + ny + '" stroke="#EDEEF0" stroke-width="3" stroke-linecap="round"/>' +
      '<circle cx="' + cx + '" cy="' + cy + '" r="6" fill="#EDEEF0"/>' +
      '<text x="' + cx + '" y="' + (cy - 26) + '" text-anchor="middle" class="gauge-value">' + fmtTL(monthTotal) + '</text>' +
      '<text x="' + cx + '" y="' + (cy - 8) + '" text-anchor="middle" class="gauge-sub">BU AY</text>' +
      '</svg>';
  }

  function drawCharts() {

      charts.donut = new Chart(donutEl, {

        data: {

          datasets: [{ data: d.categoryData.map(function (c) { return c.value; }), backgroundColor: d.categoryData.map(function (c) { return c.color; }), borderWidth: 0 }]
        },
        options: { plugins: { legend: { display: false }, tooltip: { callbacks: { label: function (ctx) { return ctx.label + ": " + fmtTL(ctx.parsed); } } } }, cutout: "62%" }

      var input = modal.querySelector("#avatar-file");

        compressImage(file, 300, 0.8).then(function (dataUrl) {
          modal.__avatar = dataUrl;
          var box = modal.querySelector("#pu-avatar");
          box.innerHTML = '<img src="' + dataUrl + '" alt="" /><input type="file" accept="image/*" id="avatar-file" />';
          bindAvatarInput();
        }).catch(function () { toast("Fotoğraf yüklenemedi."); });
      });
    }
    bindAvatarInput();

    // Family Member Add trigger
    modal.querySelector("#p-add-family").addEventListener("click", function () {
      var famName = modal.querySelector("#fam-name").value.trim();
      var famRole = modal.querySelector("#fam-role").value;
      if (!famName) { toast("Lütfen aile üyesinin adını yazın."); return; }
      
      var newMember = { id: uid(), name: famName, role: famRole };
      state.familyMembers = (state.familyMembers || []).concat([newMember]);
      persistFamily();
      toast("Aile üyesi eklendi.");
      closeModal();
      state.modal = { type: "profile" };
      renderModal();
    });

    // Family Member Delete trigger
    modal.querySelectorAll("[data-family-id]").forEach(function(btn) {
      btn.addEventListener("click", function() {
        var idToDelete = btn.getAttribute("data-family-id");
        var member = (state.familyMembers || []).find(function (f) { return f.id === idToDelete; });
        showConfirm({
          title: "Aile Üyesini Sil",
          message: (member ? esc(member.name) + " adlı üyeyi" : "Bu üyeyi") + " silmek istediğine emin misin?",
          confirmLabel: "Sil",
          danger: true,
          onConfirm: function () {
            state.familyMembers = state.familyMembers.filter(function(f) { return f.id !== idToDelete; });
            persistFamily();
            toast("Aile üyesi silindi.");
            closeModal();
            state.modal = { type: "profile" };
            renderModal();
          }
        });
      });
    });

    modal.querySelector("#p-save").addEventListener("click", function () {
      var name = modal.querySelector("#p-name").value.trim();
      var email = modal.querySelector("#p-email").value.trim();
      if (name.length < 2) { toast("Lütfen ad soyad gir."); return; }
      if (!EMAIL_RE.test(email)) { toast("Geçerli bir e-posta adresi gir."); return; }

      var fbUser = auth.currentUser;
      var btn = modal.querySelector("#p-save");
      btn.disabled = true; btn.textContent = "Kaydediliyor…";
      var tasks = [];
      if (name !== fbUser.displayName) tasks.push(fbUser.updateProfile({ displayName: name }));
      if (email !== fbUser.email) tasks.push(fbUser.updateEmail(email));
      Promise.all(tasks).then(function () {
        return db.collection("users").doc(fbUser.uid).set({ name: name, email: email, avatar: modal.__avatar }, { merge: true });
      }).then(function () {
        toast("Profil güncellendi.");
        closeModal();
      }).catch(function (err) {
        btn.disabled = false; btn.textContent = "Profili Kaydet";
        toast(authErrorMessage(err));
      });
    });

    modal.querySelector("#p-pass-save").addEventListener("click", function () {
      var cur = modal.querySelector("#p-cur-pass").value;
      var next = modal.querySelector("#p-new-pass").value;
      var next2 = modal.querySelector("#p-new-pass2").value;
      if (!cur) { toast("Mevcut şifreni gir."); return; }
      if (next.length < 6 || !PASSWORD_RE.test(next)) { toast(PASSWORD_HINT); return; }
      if (next !== next2) { toast("Yeni şifreler eşleşmiyor."); return; }
      var btn = modal.querySelector("#p-pass-save");
      btn.disabled = true; btn.textContent = "Kontrol ediliyor…";
      var fbUser = auth.currentUser;
      var credential = firebase.auth.EmailAuthProvider.credential(fbUser.email, cur);
      fbUser.reauthenticateWithCredential(credential).then(function () {
        return fbUser.updatePassword(next);
      }).then(function () {
        toast("Şifre güncellendi.");
        closeModal();
      }).catch(function (err) {
        btn.disabled = false; btn.textContent = "Şifreyi Güncelle";
        toast(authErrorMessage(err));
      });
    });

    return modal;
  }

        ev.stopPropagation();
        var key = btn.getAttribute("data-key");
        modal.querySelector('.photo-upload[data-key="' + key + '"] input[type=file]').click();
      });
    });

    modal.querySelector("#f-save").addEventListener("click", function () {
      var name = modal.querySelector("#f-name").value.trim();
      if (!name) { toast("Araç adı gerekli."); return; }
      var patch = {
        name: name,
        plate: modal.querySelector("#f-plate").value.trim(),
        brand: modal.querySelector("#f-brand").value.trim(),
        year: modal.querySelector("#f-year").value.trim(),
        fuelType: modal.querySelector("#f-fuel").value,
        transmission: modal.querySelector("#f-trans").value,
        tankCapacity: parseFormattedNumber(modal.querySelector("#f-tankcap").value),
        inspectionDate: modal.querySelector("#f-inspection").value || null,
        maintenanceDate: modal.querySelector("#f-maintenance").value || null,
        insuranceDate: modal.querySelector("#f-insurance").value || null,
        kaskoDate: modal.querySelector("#f-kasko").value || null,
        insuranceCompany: modal.querySelector("#f-insco").value.trim(),
        policyNo: modal.querySelector("#f-policyno").value.trim(),
        taxDate: modal.querySelector("#f-tax").value || null,
        tireDate: modal.querySelector("#f-tire").value || null,
        vin: modal.querySelector("#f-vin").value.trim(),
        currentKm: parseFormattedNumber(modal.querySelector("#f-km").value),
        maintenanceKm: parseFormattedNumber(modal.querySelector("#f-maintkm").value),
        photo: modal.__photos.carPhoto || null,
        ruhsat: modal.__photos.ruhsatPhoto || null
      };
      if (isEdit) {
        state.cars = state.cars.map(function (c) { return c.id === car.id ? Object.assign({}, c, patch) : c; });
      } else {
        state.cars = (state.cars || []).concat([Object.assign({ id: uid(), color: CAR_COLORS[(state.cars || []).length % CAR_COLORS.length] }, patch)]);
      }
      persistCars();
      closeModal();
      render();
    });

    return modal;
  }

  function photoUploadHTML(key, label, existing) {
    var content = existing
      ? '<img src="' + existing + '" alt="" data-action="open-lightbox" data-src="' + existing + '" data-caption="' + label + '" />' +
        '<button class="photo-remove" data-key="' + key + '" type="button" title="Kaldır">✕</button>' +
        '<button class="photo-edit" data-key="' + key + '" type="button" title="Fotoğrafı değiştir">✏️</button>'
      : '<span class="pu-label">📷<br/>' + label + ' ekle</span>';
    return '<div class="photo-upload' + (existing ? ' has-photo' : '') + '" data-key="' + key + '" id="pu-' + key + '">' + content +
      '<input type="file" accept="image/*" data-key="' + key + '" /></div>';
  }

  function refreshPhotoBox(modal, key) {
    var box = modal.querySelector("#pu-" + key);
    var label = key === "carPhoto" ? "Araç fotoğrafı" : (key === "ruhsatPhoto" ? "Ruhsat görüntüsü" : "Fiş / Fatura");
    var val = modal.__photos[key];
    box.className = "photo-upload" + (val ? " has-photo" : "");
    box.innerHTML = (val
      ? '<img src="' + val + '" alt="" data-action="open-lightbox" data-src="' + val + '" data-caption="' + label + '" />' +
        '<button class="photo-remove" data-key="' + key + '" type="button" title="Kaldır">✕</button>' +
        '<button class="photo-edit" data-key="' + key + '" type="button" title="Fotoğrafı değiştir">✏️</button>'
      : '<span class="pu-label">📷<br/>' + label + ' ekle</span>') +
      '<input type="file" accept="image/*" data-key="' + key + '" />';
    var fileInput = box.querySelector("input[type=file]");
    fileInput.addEventListener("change", function (ev) {
      var file = ev.target.files && ev.target.files[0];
      if (!file) return;
      compressImage(file, 900, 0.72).then(function (dataUrl) {
        modal.__photos[key] = dataUrl;
        refreshPhotoBox(modal, key);
      }).catch(function () { toast("Fotoğraf yüklenemedi."); });
    });
    var removeBtn = box.querySelector(".photo-remove");
    if (removeBtn) removeBtn.addEventListener("click", function (ev) {
      ev.stopPropagation();
      modal.__photos[key] = null;
      refreshPhotoBox(modal, key);
    });
    var editBtn = box.querySelector(".photo-edit");
    if (editBtn) editBtn.addEventListener("click", function (ev) {
      ev.stopPropagation();
      fileInput.click();
    });
  }

  function numberToDisplay(n, allowDecimal) {
    if (n === null || n === undefined || isNaN(n)) return "";
    var parts = String(n).split(".");
    var intPart = groupThousands(parts[0]);
    if (allowDecimal && parts[1]) return intPart + "," + parts[1].slice(0, 2);
    return intPart;
  }

  function buildExpenseModal() {
    var isEdit = state.modal.type === "editExpense";
    var editingExpense = isEdit ? (state.expenses || []).find(function (e) { return e.id === state.modal.expenseId; }) : null;
    var carsList = state.cars || [];
    var defaultCarId = editingExpense ? editingExpense.carId : (state.selectedCarId !== "all" ? state.selectedCarId : (carsList[0] ? carsList[0].id : null));
    var modal = document.createElement("div");
    modal.className = "modal";
    modal.addEventListener("click", function (ev) { ev.stopPropagation(); });

    var carOptions = carsList.map(function (c) { return '<option value="' + c.id + '">' + esc(c.name) + '</option>'; }).join("");
    var catChips = CATEGORIES.map(function (c) {
      return '<button type="button" class="cat-chip" style="--chip-color:' + c.color + '" data-cat="' + c.id + '">' + c.emoji + ' ' + esc(c.label) + '</button>';
    }).join("");
    var familyMembers = state.familyMembers || [];
    var payerOptions = familyMembers.length
      ? '<label class="field"><span>Ödeyen (opsiyonel)</span><select id="e-payer"><option value="">Ben</option>' +
        familyMembers.map(function (f) { return '<option value="' + f.id + '"' + (editingExpense && editingExpense.payerId === f.id ? " selected" : "") + '>' + esc(f.name) + '</option>'; }).join("") +
        '</select></label>'
      : "";

    modal.innerHTML =
      '<div class="modal-head"><h3>' + (isEdit ? "Masraf Düzenle" : "Masraf Ekle") + '</h3><button class="icon-btn" data-action="close-modal">✕</button></div>' +
      '<label class="field"><span>Araç</span><select id="e-car">' + carOptions + '</select></label>' +
      '<label class="field"><span>Kategori</span><div class="cat-grid" id="e-cats">' + catChips + '</div></label>' +
      '<div class="field-row">' +
        '<label class="field"><span>Tutar (₺)</span><input id="e-amount" type="text" inputmode="decimal" value="' + (editingExpense ? numberToDisplay(editingExpense.amount, true) : "") + '" placeholder="Örn. 1.250,50" /></label>' +
        '<label class="field"><span>Tarih</span><input id="e-date" type="date" value="' + (editingExpense ? editingExpense.date : todayStr()) + '" /></label>' +
      '</div>' +
      '<div class="field-row">' +
        '<label class="field"><span>Kilometre (opsiyonel)</span><input id="e-km" type="text" inputmode="numeric" value="' + (editingExpense && editingExpense.km != null ? numberToDisplay(editingExpense.km, false) : "") + '" placeholder="Örn. 84.500" /></label>' +
        '<label class="field" id="e-liter-field"><span>Litre (opsiyonel)</span><input id="e-liter" type="text" inputmode="decimal" value="' + (editingExpense && editingExpense.liter != null ? numberToDisplay(editingExpense.liter, true) : "") + '" placeholder="Örn. 45,5" /></label>' +
      '</div>' +
      '<p class="field-hint" style="margin-top:-6px">Kilometreyi girersen aracın güncel kilometresi otomatik güncellenir.</p>' +
      '<label class="field"><span>Not (opsiyonel)</span><input id="e-note" value="' + (editingExpense ? esc(editingExpense.note || "") : "") + '" placeholder="Örn. Lastik değişimi" /></label>' +
      payerOptions +
      '<label class="field"><span>Fiş / Fatura (opsiyonel)</span></label>' +
      photoUploadHTML("receiptPhoto", "Fiş / Fatura", editingExpense ? editingExpense.receipt || null : null) +
      '<button class="btn-primary full" id="e-save" style="margin-top:12px">' + (isEdit ? "Güncelle" : "Kaydet") + '</button>';

    if (defaultCarId) modal.querySelector("#e-car").value = defaultCarId;
    attachThousandsInput(modal.querySelector("#e-amount"), true);
    attachThousandsInput(modal.querySelector("#e-km"), false);
    attachThousandsInput(modal.querySelector("#e-liter"), true);

    modal.__photos = { receiptPhoto: editingExpense ? editingExpense.receipt || null : null };
    modal.querySelectorAll(".photo-upload input[type=file]").forEach(function (input) {
      input.addEventListener("change", function (ev) {
        var file = ev.target.files && ev.target.files[0];
        if (!file) return;
        var key = input.getAttribute("data-key");
        compressImage(file, 900, 0.72).then(function (dataUrl) {
          modal.__photos[key] = dataUrl;
          refreshPhotoBox(modal, key);
        }).catch(function () { toast("Fotoğraf yüklenemedi."); });
      });
    });
    modal.querySelectorAll(".photo-remove").forEach(function (btn) {
      btn.addEventListener("click", function (ev) {
        ev.stopPropagation();
        var key = btn.getAttribute("data-key");
        modal.__photos[key] = null;
        refreshPhotoBox(modal, key);
      });
    });
    modal.querySelectorAll(".photo-edit").forEach(function (btn) {
      btn.addEventListener("click", function (ev) {
        ev.stopPropagation();
        var key = btn.getAttribute("data-key");
        modal.querySelector('.photo-upload[data-key="' + key + '"] input[type=file]').click();
      });
    });

    var selectedCat = editingExpense ? editingExpense.category : CATEGORIES[0].id;
    var chips = modal.querySelectorAll(".cat-chip");
    var literField = modal.querySelector("#e-liter-field");
    function paintChips() {
      chips.forEach(function (ch) { ch.classList.toggle("active", ch.getAttribute("data-cat") === selectedCat); });
      literField.style.display = selectedCat === "yakit" ? "" : "none";
    }
    chips.forEach(function (ch) {
      ch.addEventListener("click", function () { selectedCat = ch.getAttribute("data-cat"); paintChips(); });
    });
    paintChips();

    modal.querySelector("#e-save").addEventListener("click", function () {
      var carId = modal.querySelector("#e-car").value;
      var amount = parseFormattedNumber(modal.querySelector("#e-amount").value);
      var date = modal.querySelector("#e-date").value;
      var note = modal.querySelector("#e-note").value.trim();
      var km = parseFormattedNumber(modal.querySelector("#e-km").value);
      var liter = selectedCat === "yakit" ? parseFormattedNumber(modal.querySelector("#e-liter").value) : null;
      var payerEl = modal.querySelector("#e-payer");
      var payerId = payerEl && payerEl.value ? payerEl.value : null;
      if (!carId || !amount || amount <= 0 || !date) { toast("Tutar ve tarih gerekli."); return; }
      var payload = {
        carId: carId, category: selectedCat, amount: amount, date: date, note: note,
        km: km, liter: liter, payerId: payerId, receipt: modal.__photos.receiptPhoto || null
      };
      if (isEdit) {
        state.expenses = (state.expenses || []).map(function (e) { return e.id === editingExpense.id ? Object.assign({}, e, payload) : e; });
      } else {
        state.expenses = [Object.assign({ id: uid() }, payload)].concat(state.expenses || []);
      }
      persistExpenses();
      recalcCarCurrentKm(carId);
      closeModal();
      render();
    });

    return modal;
  }

  function closeModal() {
    state.modal = null;
    var el = document.querySelector(".modal-backdrop");
    if (el) el.remove();
  }

  function renderLightbox() {
    var existing = document.querySelector(".lightbox-backdrop");
    if (existing) existing.remove();
    if (!state.lightbox) return;
    
    var backdrop = document.createElement("div");
    backdrop.className = "lightbox-backdrop";
    backdrop.innerHTML = '<div class="lightbox-content">' +
                            '<img src="' + state.lightbox + '" alt="Büyütülmüş Görsel" />' +
                            '<span class="lightbox-caption">' + esc(state.lightboxCaption || "Görsel Önizleme") + '</span>' +
                         '</div>';
    backdrop.addEventListener("click", function () { state.lightbox = null; backdrop.remove(); });
    document.body.appendChild(backdrop);
  }

  // ---------- events ----------
  function bindGlobalActions() {
    document.querySelectorAll("[data-action]").forEach(function (el) {
      el.addEventListener("click", function (ev) {
        var action = el.getAttribute("data-action");
        if (action === "select-car") { state.selectedCarId = el.getAttribute("data-car"); render(); }
        else if (action === "set-view") { state.view = el.getAttribute("data-view"); render(); }
        else if (action === "open-add-car") { state.modal = { type: "addCar" }; render(); }
        else if (action === "open-edit-car") { state.modal = { type: "editCar", carId: el.getAttribute("data-car") }; render(); }
        else if (action === "open-add-expense") { state.modal = { type: "addExpense" }; render(); }
        else if (action === "open-edit-expense") { state.modal = { type: "editExpense", expenseId: el.getAttribute("data-id") }; render(); }
        else if (action === "delete-expense") {
          var id = el.getAttribute("data-id");
          showConfirm({
            title: "Masrafı Sil",
            message: "Bu masraf kaydını silmek istediğine emin misin? Bu işlem geri alınamaz.",
            confirmLabel: "Sil",
            danger: true,
            onConfirm: function () {
              var deleted = (state.expenses || []).find(function (e) { return e.id === id; });
              state.expenses = (state.expenses || []).filter(function (e) { return e.id !== id; });
              persistExpenses();
              if (deleted && deleted.carId) recalcCarCurrentKm(deleted.carId);
              render();
            }
          });
        }
        else if (action === "open-lightbox") {
          ev.stopPropagation();
          state.lightbox = el.getAttribute("data-src");
          state.lightboxCaption = el.getAttribute("data-caption") || "Görsel";
          renderLightbox();
        }
        else if (action === "delete-car") {
          var carId = el.getAttribute("data-car");
          showConfirm({
            title: "Aracı Sil",
            message: "Bu aracı ve tüm masraf kayıtlarını silmek istediğinize emin misiniz? Bu işlem geri alınamaz.",
            confirmLabel: "Sil",
            danger: true,
            onConfirm: function () {
              state.cars = (state.cars || []).filter(function (c) { return c.id !== carId; });
              state.expenses = (state.expenses || []).filter(function (e) { return e.carId !== carId; });
              if (state.selectedCarId === carId) state.selectedCarId = "all";
              persistCars(); persistExpenses(); render();
            }
          });
        }
        else if (action === "close-modal") { closeModal(); }
        else if (action === "close-modal-backdrop" && ev.target === el) { closeModal(); }
        else if (action === "export-data") { exportData(); }
        else if (action === "enable-notifications") { enableNotifications(); }
        else if (action === "disable-notifications") { disableNotifications(); }
        else if (action === "toggle-account-menu") { ev.stopPropagation(); state.accountMenuOpen = !state.accountMenuOpen; render(); }
        else if (action === "open-profile") { ev.stopPropagation(); state.modal = { type: "profile" }; state.accountMenuOpen = false; render(); }
        else if (action === "logout") {
          ev.stopPropagation();
          state.accountMenuOpen = false;
          render();
          showConfirm({
            title: "Çıkış Yap",
            message: "Çıkış yapmak istediğine emin misin?",
            confirmLabel: "Çıkış Yap",
            danger: true,
            onConfirm: function () { logout(); }
          });
        }
      });
    });
    var importInput = document.getElementById("import-input");
    if (importInput) {
      importInput.addEventListener("change", function (ev) {
        var file = ev.target.files && ev.target.files[0];
        if (file) importData(file);
      });
    }
  }

  document.addEventListener("click", function (ev) {
    if (state.accountMenuOpen && !ev.target.closest(".account-chip")) {
      state.accountMenuOpen = false;
      render();
    }
  });

  init();
})();






  // NOT: Service worker kaydı artık dosyanın başında (swRegPromise) yapılıyor,
  // burada tekrar kaydetmeye gerek yok.

</script>
</body>
