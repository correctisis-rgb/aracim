        '<p class="field-hint" style="margin-top:0">Bir işlem için randevu tarihi girersen, o işlem için vade hatırlatmaları durur; sadece randevudan 1 gün önce ve randevu günü hatırlatma alırsın. Randevu günü geçip vade tarihini güncellemezsen bir kez "tarihi güncellemeyi unuttun mu?" hatırlatması alırsın. İpucu: Bu tarihleri araç kartını açmadan, "Yaklaşan İşlemler" listesindeki 📅 Randevu butonundan da hızlıca girebilirsin.</p>' +
        '<div class="field-row">' +
          '<label class="field"><span>Muayene randevusu</span><input id="f-appt-inspection" type="date" value="' + (car && car.appointments && car.appointments.inspectionDate ? car.appointments.inspectionDate : "") + '" /></label>' +
          '<label class="field"><span>Bakım randevusu</span><input id="f-appt-maintenance" type="date" value="' + (car && car.appointments && car.appointments.maintenanceDate ? car.appointments.maintenanceDate : "") + '" /></label>' +
        '</div>' +
        '<div class="field-row">' +
          '<label class="field"><span>Sigorta randevusu</span><input id="f-appt-insurance" type="date" value="' + (car && car.appointments && car.appointments.insuranceDate ? car.appointments.insuranceDate : "") + '" /></label>' +
          '<label class="field"><span>Kasko randevusu</span><input id="f-appt-kasko" type="date" value="' + (car && car.appointments && car.appointments.kaskoDate ? car.appointments.kaskoDate : "") + '" /></label>' +
        '</div>' +
        '<div class="field-row">' +
          '<label class="field"><span>Vergi randevusu</span><input id="f-appt-tax" type="date" value="' + (car && car.appointments && car.appointments.taxDate ? car.appointments.taxDate : "") + '" /></label>' +
          '<label class="field"><span>Lastik randevusu</span><input id="f-appt-tire" type="date" value="' + (car && car.appointments && car.appointments.tireDate ? car.appointments.tireDate : "") + '" /></label>' +
        '</div>' +
      '</div>' +
      '<div class="field-row">' +
        '<label class="field"><span>Güncel kilometre (opsiyonel)</span><input id="f-km" type="text" inputmode="numeric" value="' + (car && car.currentKm != null ? groupThousands(String(car.currentKm)) : "") + '" placeholder="Örn. 84.500" /></label>' +
        '<label class="field"><span>Sonraki bakım km (opsiyonel)</span><input id="f-maintkm" type="text" inputmode="numeric" value="' + (car && car.maintenanceKm != null ? groupThousands(String(car.maintenanceKm)) : "") + '" placeholder="Örn. 95.000" /></label>' +
      '</div>' +
      '<p class="field-hint">Sonraki bakım km alanı, güncel kilometre ile karşılaştırılıp Yaklaşan İşlemler\'de otomatik hatırlatma olarak gösterilir.</p>' +
      '<p class="field-hint">Fotoğrafların (Araç/Ruhsat) üzerine tıklayarak büyük hallerini görebilirsiniz. Çevrimdışı kullanım için sıkıştırılır.</p>' +
      '<button class="btn-primary full" id="f-save">Kaydet</button>';

    attachThousandsInput(modal.querySelector("#f-km"), false);
    attachThousandsInput(modal.querySelector("#f-maintkm"), false);
    attachThousandsInput(modal.querySelector("#f-tankcap"), false);

    modal.__photos = { carPhoto: car ? car.photo : null, ruhsatPhoto: car ? car.ruhsat : null };

    modal.querySelectorAll(".photo-upload input[type=file]").forEach(function (input) {
      input.addEventListener("change", function (ev) {
        var file = ev.target.files && ev.target.files[0];
        if (!file) return;
        var key = input.getAttribute("data-key");
        compressImage(file, 900, 0.72).then(function (dataUrl) {
          modal.__photos[key] = dataUrl;
          refreshPhotoBox(modal, key);
        }).catch(function () { toast("Fotoğraf yüklenemedi."); });
      });
    });
    modal.querySelectorAll(".photo-remove").forEach(function (btn) {
      btn.addEventListener("click", function (ev) {
        ev.stopPropagation();
        var key = btn.getAttribute("data-key");
        modal.__photos[key] = null;
        refreshPhotoBox(modal, key);
      });
    });
    modal.querySelectorAll(".photo-edit").forEach(function (btn) {
      btn.addEventListener("click", function (ev) {
        ev.stopPropagation();
        var key = btn.getAttribute("data-key");
        modal.querySelector('.photo-upload[data-key="' + key + '"] input[type=file]').click();
      });
    });

    modal.querySelector("#f-save").addEventListener("click", function () {
      var name = modal.querySelector("#f-name").value.trim();
      if (!name) { toast("Araç adı gerekli."); return; }
      var selectedDriverId = modal.querySelector("#f-driver").value || null;
      var patch = {
        name: name,
        vehicleType: modal.querySelector("#f-vtype").value,
        plate: modal.querySelector("#f-plate").value.trim(),
        brand: modal.querySelector("#f-brand").value.trim(),
        year: modal.querySelector("#f-year").value.trim(),
        fuelType: modal.querySelector("#f-fuel").value,
        transmission: modal.querySelector("#f-trans").value,
        tankCapacity: parseFormattedNumber(modal.querySelector("#f-tankcap").value),
        inspectionDate: modal.querySelector("#f-inspection").value || null,
        maintenanceDate: modal.querySelector("#f-maintenance").value || null,
        insuranceDate: modal.querySelector("#f-insurance").value || null,
        kaskoDate: modal.querySelector("#f-kasko").value || null,
        insuranceCompany: modal.querySelector("#f-insco").value.trim(),
        policyNo: modal.querySelector("#f-policyno").value.trim(),
        taxDate: modal.querySelector("#f-tax").value || null,
        tireDate: modal.querySelector("#f-tire").value || null,
        vin: modal.querySelector("#f-vin").value.trim(),
        currentKm: parseFormattedNumber(modal.querySelector("#f-km").value),
        maintenanceKm: parseFormattedNumber(modal.querySelector("#f-maintkm").value),
        photo: modal.__photos.carPhoto || null,
        ruhsat: modal.__photos.ruhsatPhoto || null
      };

      // ---------- Randevu tarihleri ----------
      // Her randevu tarihinin yanında, randevu YENİ girildiği ya da
      // DEĞİŞTİĞİ anda o alanın o anki vade tarihini "anlık görüntü"
      // (DueSnapshot) olarak saklıyoruz. send-reminders.js, randevu günü
      // geçtikten sonra vade tarihinin bu anlık görüntüden farklı olup
      // olmadığına bakarak kullanıcının tarihi güncelleyip güncellemediğini
      // anlıyor — randevu her zaman vadeden önce olacağı için doğrudan
      // "vade <= randevu" kıyası işe yaramaz.
      var prevAppt = (car && car.appointments) || {};
      var apptInputMap = {
        inspectionDate: "f-appt-inspection",
        maintenanceDate: "f-appt-maintenance",
        insuranceDate: "f-appt-insurance",
        kaskoDate: "f-appt-kasko",
        taxDate: "f-appt-tax",
        tireDate: "f-appt-tire"
      };
      var appointments = {};
      Object.keys(apptInputMap).forEach(function (key) {
        var apptVal = modal.querySelector("#" + apptInputMap[key]).value || null;
        appointments[key] = apptVal;
        var snapKey = key + "DueSnapshot";
        if (!apptVal) {
          appointments[snapKey] = null; // randevu silindiyse anlık görüntü de temizlenir
        } else if (!prevAppt[key] || prevAppt[key] !== apptVal) {
          appointments[snapKey] = patch[key]; // randevu yeni girildi/değişti: o anki vade tarihini yakala
        } else {
          appointments[snapKey] = prevAppt[snapKey] != null ? prevAppt[snapKey] : patch[key]; // randevu aynı: eski anlık görüntüyü koru
        }
      });
      patch.appointments = appointments;

      var savedCarId;
      if (isEdit) {
        var updatedCar = Object.assign({}, car, patch);
        var carChanges = diffActivityFields(car, updatedCar, carActivityFieldDefs());
        state.cars = state.cars.map(function (c) { return c.id === car.id ? updatedCar : c; });
        logActivity("car", "edit", { carId: car.id, carName: name, summary: "Araç bilgileri güncellendi: " + name, changes: carChanges });
        savedCarId = car.id;
      } else {
        var newCar = Object.assign({ id: uid(), color: CAR_COLORS[(state.cars || []).length % CAR_COLORS.length] }, patch);
        state.cars = (state.cars || []).concat([newCar]);
        logActivity("car", "add", { carId: newCar.id, carName: name, summary: "Yeni araç eklendi: " + name, snapshot: snapshotActivityFields(newCar, carActivityFieldDefs()) });
        savedCarId = newCar.id;
      }
      // Şoför ataması: bu aracı önce tüm şoförlerin araç listesinden çıkar,
      // sonra (seçildiyse) yeni şoförün araç listesine ekle. Böylece bir araca
      // aynı anda en fazla bir şoför atanmış olur.
      if (state.drivers && state.drivers.length) {
        var driversChanged = false;
        state.drivers = state.drivers.map(function (d) {
          var hasCar = (d.carIds || []).indexOf(savedCarId) !== -1;
          var shouldHave = selectedDriverId === d.id;
          if (hasCar === shouldHave) return d;
          driversChanged = true;
          var newCarIds = shouldHave
            ? (d.carIds || []).concat([savedCarId])
            : (d.carIds || []).filter(function (cid) { return cid !== savedCarId; });
          return Object.assign({}, d, { carIds: newCarIds });
        });
        if (driversChanged) persistDrivers();
      }
      persistCars();
      closeModal();
      render();
      toast(isEdit ? "Araç bilgileri kaydedildi." : "Araç eklendi.");
    });

    return modal;
  }


  function buildDriversModal() {
    var modal = document.createElement("div");
    modal.className = "modal wide";
    modal.addEventListener("click", function (ev) { ev.stopPropagation(); });

    var list = state.drivers || [];
    var html = '<div class="modal-head"><h3>🧑‍✈️ Şoförler</h3><button class="icon-btn" data-action="close-modal" aria-label="Kapat">✕</button></div>';
    html += '<p class="field-hint" style="margin-top:-4px">Şoförlerini ekle, hangi araç(lar)ı kullandıklarını belirle. Yurtdışına çıkacak şoförler için pasaport ve vize bilgilerini de burada tutabilirsin.</p>';
    html += '<button type="button" class="btn-primary full" data-action="open-add-driver" style="margin-bottom:14px">+ Şoför Ekle</button>';

    if (!list.length) {
      html += '<p class="mon-empty">Henüz şoför eklenmedi.</p>';
    } else {
      html += '<ul class="err-list">';
      list.forEach(function (d) {
        var carNames = (d.carIds || []).map(function (cid) {
          var c = (state.cars || []).find(function (x) { return x.id === cid; });
          return c ? c.name : null;
        }).filter(Boolean);
        html += '<li class="err-item">' +
          '<div class="err-item-head">' +
            '<span class="driver-item-name">' + esc(d.name) + (d.worksAbroad ? '<span class="driver-abroad-badge">🛂 Yurtdışı</span>' : '') + '</span>' +
            '<span class="driver-item-actions">' +
              '<button type="button" class="exp-del" data-action="open-edit-driver" data-id="' + d.id + '" title="Düzenle" aria-label="Düzenle">✏️</button>' +
              '<button type="button" class="exp-del" data-action="delete-driver" data-id="' + d.id + '" title="Sil" aria-label="Sil">🗑️</button>' +
            '</span>' +
          '</div>' +
          (d.phone ? '<div class="err-item-meta">📞 ' + esc(d.phone) + '</div>' : '') +
          '<div class="err-item-meta">🚗 ' + (carNames.length ? esc(carNames.join(", ")) : "Araç atanmadı") + '</div>' +
        '</li>';
      });
      html += '</ul>';
    }

    modal.innerHTML = html;
    return modal;
  }

  function buildDriverModal() {
    var isEdit = state.modal.type === "editDriver";
    var driversList = state.drivers || [];
    var driver = isEdit ? driversList.find(function (d) { return d.id === state.modal.driverId; }) : null;
    var carsList = state.cars || [];

    var modal = document.createElement("div");
    modal.className = "modal wide";
    modal.addEventListener("click", function (ev) { ev.stopPropagation(); });

    var selectedCarIds = driver ? (driver.carIds || []) : [];
    var worksAbroad = driver ? !!driver.worksAbroad : false;

    modal.innerHTML =
      '<div class="modal-head"><h3>' + (isEdit ? "Şoförü Düzenle" : "Şoför Ekle") + '</h3><button class="icon-btn" data-action="close-modal" aria-label="Kapat">✕</button></div>' +
      '<label class="field"><span>Ad Soyad</span><input id="f-dname" value="' + (driver ? esc(driver.name) : "") + '" placeholder="Örn. Ahmet Yılmaz" /></label>' +
      '<label class="field"><span>Telefon (opsiyonel)</span><input id="f-dphone" value="' + (driver ? esc(driver.phone || "") : "") + '" placeholder="05XX XXX XX XX" inputmode="tel" /></label>' +
      '<label class="field"><span>Araç(lar)</span></label>' +
      '<div class="car-checklist" id="f-dcars">' +
        (carsList.length
          ? carsList.map(function (c) {
              var checked = selectedCarIds.indexOf(c.id) !== -1;
              return '<label class="car-checklist-item"><input type="checkbox" value="' + c.id + '"' + (checked ? " checked" : "") + ' />' + esc(c.name) + (c.plate ? ' <span style="color:var(--muted)">(' + esc(c.plate) + ')</span>' : '') + '</label>';
            }).join("")
          : '<span class="car-checklist-empty">Önce bir araç eklemen gerekiyor.</span>') +
      '</div>' +
      '<p class="field-hint">Bir şoföre en az bir araç atanmalıdır.</p>' +
      '<label class="toggle-row" id="f-dabroad-row"><input type="checkbox" id="f-dabroad"' + (worksAbroad ? " checked" : "") + ' /><span>Yurtdışında çalışacak (pasaport / vize gerekli)</span></label>' +
      '<div class="abroad-fields" id="f-dabroad-fields"' + (worksAbroad ? "" : " hidden") + '>' +
        '<div class="field-row">' +
          '<label class="field"><span>Pasaport no</span><input id="f-dpassno" value="' + (driver ? esc(driver.passportNo || "") : "") + '" placeholder="Pasaport numarası" /></label>' +
          '<label class="field"><span>Pasaport geçerlilik tarihi</span><input id="f-dpassexp" type="date" value="' + (driver && driver.passportExpiry ? driver.passportExpiry : "") + '" /></label>' +
        '</div>' +
        '<div class="field-row">' +
          '<label class="field"><span>Vize ülkesi</span><input id="f-dvisacountry" value="' + (driver ? esc(driver.visaCountry || "") : "") + '" placeholder="Örn. Almanya" /></label>' +
          '<label class="field"><span>Vize no</span><input id="f-dvisano" value="' + (driver ? esc(driver.visaNo || "") : "") + '" placeholder="Vize numarası" /></label>' +
        '</div>' +
        '<label class="field"><span>Vize geçerlilik tarihi</span><input id="f-dvisaexp" type="date" value="' + (driver && driver.visaExpiry ? driver.visaExpiry : "") + '" /></label>' +
      '</div>' +
      '<button class="btn-primary full" id="f-dsave">Kaydet</button>';

    var abroadCheckbox = modal.querySelector("#f-dabroad");
    var abroadFields = modal.querySelector("#f-dabroad-fields");
    abroadCheckbox.addEventListener("change", function () {
      abroadFields.hidden = !abroadCheckbox.checked;
    });

    modal.querySelector("#f-dsave").addEventListener("click", function () {
      var name = modal.querySelector("#f-dname").value.trim();
      if (!name) { toast("Şoförün adı soyadı gerekli."); return; }
      var checkedCarIds = Array.prototype.map.call(modal.querySelectorAll('#f-dcars input[type="checkbox"]:checked'), function (cb) { return cb.value; });
      if (!checkedCarIds.length) { toast("Şoföre en az bir araç atamalısın."); return; }
      var abroad = abroadCheckbox.checked;

      var patch = {
        name: name,
        phone: modal.querySelector("#f-dphone").value.trim(),
        carIds: checkedCarIds,
        worksAbroad: abroad,
        passportNo: abroad ? modal.querySelector("#f-dpassno").value.trim() : "",
        passportExpiry: abroad ? (modal.querySelector("#f-dpassexp").value || null) : null,
        visaCountry: abroad ? modal.querySelector("#f-dvisacountry").value.trim() : "",
        visaNo: abroad ? modal.querySelector("#f-dvisano").value.trim() : "",
        visaExpiry: abroad ? (modal.querySelector("#f-dvisaexp").value || null) : null
      };

      // Bir aracın en fazla bir şoförü olabilir: bu şoföre yeni atanan
      // araçları, önceden başka bir şoföre atanmışsa oradan çıkar.
      var thisDriverId = isEdit ? driver.id : null;
      state.drivers = (state.drivers || []).map(function (d) {
        if (thisDriverId && d.id === thisDriverId) return d; // aşağıda ayrıca güncellenecek
        var overlap = (d.carIds || []).filter(function (cid) { return checkedCarIds.indexOf(cid) !== -1; });
        if (!overlap.length) return d;
        return Object.assign({}, d, { carIds: (d.carIds || []).filter(function (cid) { return checkedCarIds.indexOf(cid) === -1; }) });
      });

      if (isEdit) {
        var updatedDriver = Object.assign({}, driver, patch);
        var driverChanges = diffActivityFields(driver, updatedDriver, driverActivityFieldDefs());
        state.drivers = state.drivers.map(function (d) { return d.id === driver.id ? updatedDriver : d; });
        logActivity("driver", "edit", { summary: "Şoför bilgileri güncellendi: " + name, changes: driverChanges });
      } else {
        var newDriver = Object.assign({ id: uid() }, patch);
        state.drivers = (state.drivers || []).concat([newDriver]);
        logActivity("driver", "add", { summary: "Yeni şoför eklendi: " + name, snapshot: snapshotActivityFields(newDriver, driverActivityFieldDefs()) });
      }
      persistDrivers();
      state.modal = { type: "drivers" };
      render();
      toast(isEdit ? "Şoför bilgileri kaydedildi." : "Şoför eklendi.");
    });

    return modal;
  }


  function photoUploadHTML(key, label, existing) {
    var content = existing
      ? '<img src="' + existing + '" alt="" data-action="open-lightbox" data-src="' + existing + '" data-caption="' + label + '" />' +
        '<button class="photo-remove" data-key="' + key + '" type="button" title="Kaldır">✕</button>' +
        '<button class="photo-edit" data-key="' + key + '" type="button" title="Fotoğrafı değiştir">✏️</button>'
      : '<span class="pu-label">📷<br/>' + label + ' ekle</span>';
    return '<div class="photo-upload' + (existing ? ' has-photo' : '') + '" data-key="' + key + '" id="pu-' + key + '">' + content +
      '<input type="file" accept="image/*" data-key="' + key + '" /></div>';
  }

  function refreshPhotoBox(modal, key) {
    var box = modal.querySelector("#pu-" + key);
    var label = key === "carPhoto" ? "Araç fotoğrafı" : (key === "ruhsatPhoto" ? "Ruhsat görüntüsü" : "Fiş / Fatura");
    var val = modal.__photos[key];
    box.className = "photo-upload" + (val ? " has-photo" : "");
    box.innerHTML = (val
      ? '<img src="' + val + '" alt="" data-action="open-lightbox" data-src="' + val + '" data-caption="' + label + '" />' +
        '<button class="photo-remove" data-key="' + key + '" type="button" title="Kaldır">✕</button>' +
        '<button class="photo-edit" data-key="' + key + '" type="button" title="Fotoğrafı değiştir">✏️</button>'
      : '<span class="pu-label">📷<br/>' + label + ' ekle</span>') +
      '<input type="file" accept="image/*" data-key="' + key + '" />';
    var fileInput = box.querySelector("input[type=file]");
    fileInput.addEventListener("change", function (ev) {
      var file = ev.target.files && ev.target.files[0];
      if (!file) return;
      compressImage(file, 900, 0.72).then(function (dataUrl) {
        modal.__photos[key] = dataUrl;
        refreshPhotoBox(modal, key);
      }).catch(function () { toast("Fotoğraf yüklenemedi."); });
    });
    var removeBtn = box.querySelector(".photo-remove");
    if (removeBtn) removeBtn.addEventListener("click", function (ev) {
      ev.stopPropagation();
      modal.__photos[key] = null;
      refreshPhotoBox(modal, key);
    });
    var editBtn = box.querySelector(".photo-edit");
    if (editBtn) editBtn.addEventListener("click", function (ev) {
      ev.stopPropagation();
      fileInput.click();
    });
  }

  function numberToDisplay(n, allowDecimal) {
    if (n === null || n === undefined || isNaN(n)) return "";
    var parts = String(n).split(".");
    var intPart = groupThousands(parts[0]);
    if (allowDecimal && parts[1]) return intPart + "," + parts[1].slice(0, 2);
    return intPart;
  }

      '<p class="field-hint" style="margin-top:-6px">Kilometreyi girersen aracın güncel kilometresi otomatik güncellenir.</p>' +
      '<div class="km-ocr-row">' +
        '<button type="button" class="btn-secondary full" id="e-km-ocr-btn">📷 Km\'yi gösterge fotoğrafından oku</button>' +
        '<input type="file" accept="image/*" capture="environment" id="e-km-ocr-file" style="display:none" />' +
      '</div>' +
      '<p class="km-ocr-status" id="e-km-ocr-status"></p>' +
      '<label class="field"><span>Not (opsiyonel)</span><input id="e-note" value="' + (editingExpense ? esc(editingExpense.note || "") : "") + '" placeholder="Örn. Lastik değişimi" /></label>' +
      payerOptions +
      '<label class="field"><span>Fiş / Fatura (opsiyonel)</span></label>' +
      photoUploadHTML("receiptPhoto", "Fiş / Fatura", editingExpense ? editingExpense.receipt || null : null) +
      '<button class="btn-primary full" id="e-save" style="margin-top:12px">' + (isEdit ? "Güncelle" : "Kaydet") + '</button>';

    if (defaultCarId) modal.querySelector("#e-car").value = defaultCarId;
    attachThousandsInput(modal.querySelector("#e-amount"), true);
    attachThousandsInput(modal.querySelector("#e-km"), false);
    attachThousandsInput(modal.querySelector("#e-liter"), true);

    var ocrBtn = modal.querySelector("#e-km-ocr-btn");
    var ocrFile = modal.querySelector("#e-km-ocr-file");
    var ocrStatus = modal.querySelector("#e-km-ocr-status");
    ocrBtn.addEventListener("click", function () { ocrFile.click(); });
    ocrFile.addEventListener("change", function (ev) {
      var file = ev.target.files && ev.target.files[0];
      if (!file) return;
      ocrStatus.textContent = "Okuma kütüphanesi yükleniyor…";
      loadTesseract().then(function () {
        ocrStatus.textContent = "Fotoğraf işleniyor…";
        return preprocessImageForOCR(file);
      }).then(function (dataUrl) {
        ocrStatus.textContent = "Okunuyor, birkaç saniye sürebilir…";
        return Tesseract.recognize(dataUrl, "eng");
      }).then(function (result) {
        var guess = extractOdometerGuess(result && result.data && result.data.text);
        if (guess != null) {
          modal.querySelector("#e-km").value = formatNumericDisplay(String(guess), false);
          ocrStatus.textContent = "Tahmini okundu: " + groupThousands(String(guess)) + " km — lütfen kontrol edip gerekirse düzelt.";
        } else {
          ocrStatus.textContent = "Km okunamadı, lütfen elle gir.";
        }
      }).catch(function (err) {
        console.error(err);
        ocrStatus.textContent = "Okuma başarısız oldu, lütfen elle gir.";
      });
    });

    modal.__photos = { receiptPhoto: editingExpense ? editingExpense.receipt || null : null };
    modal.querySelectorAll(".photo-upload input[type=file]").forEach(function (input) {
      input.addEventListener("change", function (ev) {
        var file = ev.target.files && ev.target.files[0];
        if (!file) return;
        var key = input.getAttribute("data-key");
        compressImage(file, 900, 0.72).then(function (dataUrl) {
          modal.__photos[key] = dataUrl;
          refreshPhotoBox(modal, key);
        }).catch(function () { toast("Fotoğraf yüklenemedi."); });
      });
    });
    modal.querySelectorAll(".photo-remove").forEach(function (btn) {
      btn.addEventListener("click", function (ev) {
        ev.stopPropagation();
        var key = btn.getAttribute("data-key");
        modal.__photos[key] = null;
        refreshPhotoBox(modal, key);
      });
    });
    modal.querySelectorAll(".photo-edit").forEach(function (btn) {
      btn.addEventListener("click", function (ev) {
        ev.stopPropagation();
        var key = btn.getAttribute("data-key");
        modal.querySelector('.photo-upload[data-key="' + key + '"] input[type=file]').click();
      });
    });

    var selectedCat = editingExpense ? editingExpense.category : CATEGORIES[0].id;
    var chips = modal.querySelectorAll(".cat-chip");
    var literField = modal.querySelector("#e-liter-field");
    function paintChips() {
      chips.forEach(function (ch) { ch.classList.toggle("active", ch.getAttribute("data-cat") === selectedCat); });
      literField.style.display = selectedCat === "yakit" ? "" : "none";
    }
    chips.forEach(function (ch) {
      ch.addEventListener("click", function () { selectedCat = ch.getAttribute("data-cat"); paintChips(); });
    });
    paintChips();

    modal.querySelector("#e-save").addEventListener("click", function () {
      var carId = modal.querySelector("#e-car").value;
      var amount = parseFormattedNumber(modal.querySelector("#e-amount").value);
      var date = modal.querySelector("#e-date").value;
      var note = modal.querySelector("#e-note").value.trim();
      var km = parseFormattedNumber(modal.querySelector("#e-km").value);
      var liter = selectedCat === "yakit" ? parseFormattedNumber(modal.querySelector("#e-liter").value) : null;
      var payerEl = modal.querySelector("#e-payer");
      var payerId = payerEl && payerEl.value ? payerEl.value : null;
      if (!carId || !amount || amount <= 0 || !date) { toast("Tutar ve tarih gerekli."); return; }
      var payload = {
        carId: carId, category: selectedCat, amount: amount, date: date, note: note,
        km: km, liter: liter, payerId: payerId, receipt: modal.__photos.receiptPhoto || null
      };
      var catInfo = catById(selectedCat);
      var carForLog = (state.cars || []).find(function (c) { return c.id === carId; });
      var carNameForLog = carForLog ? carForLog.name : "";
      if (isEdit) {
        var updatedExpense = Object.assign({}, editingExpense, payload);
        var expenseChanges = diffActivityFields(editingExpense, updatedExpense, expenseActivityFieldDefs());
        state.expenses = (state.expenses || []).map(function (e) { return e.id === editingExpense.id ? updatedExpense : e; });
        logActivity("expense", "edit", { carId: carId, carName: carNameForLog, summary: catInfo.label + " masrafı düzenlendi (" + fmtTL(amount) + ")", changes: expenseChanges });
      } else {
        // "Ekleyen" etiketi için: masraf ilk kez oluşturulurken hane
        // içindeki hangi kullanıcının eklediğini damgalıyoruz. Sonradan
        // düzenlense bile bu bilgi (kim eklediyse o) değişmiyor.
        payload.addedByUid = state.currentUser ? state.currentUser.id : null;
        payload.addedByName = state.currentUser ? state.currentUser.name : null;
        var newExpense = Object.assign({ id: uid() }, payload);
        state.expenses = [newExpense].concat(state.expenses || []);
        logActivity("expense", "add", { carId: carId, carName: carNameForLog, summary: catInfo.label + " masrafı eklendi (" + fmtTL(amount) + ")", snapshot: snapshotActivityFields(newExpense, expenseActivityFieldDefs()) });
      }
      persistExpenses();
      recalcCarCurrentKm(carId);
      closeModal();
      render();
      toast(isEdit ? "Masraf güncellendi." : "Masraf eklendi.");
    });

    return modal;
  }

  function closeModal() {
    stopQrScan();
    state.modal = null;
    document.querySelectorAll(".modal-backdrop").forEach(function (el) { el.remove(); });
  }

  function stopQrScan() {
    if (qrScanRAF) { cancelAnimationFrame(qrScanRAF); qrScanRAF = null; }
    if (qrScanStream) {
      qrScanStream.getTracks().forEach(function (t) { t.stop(); });
      qrScanStream = null;
    }
  }

  function renderLightbox() {
    var existing = document.querySelector(".lightbox-backdrop");
    if (existing) existing.remove();
    if (!state.lightbox) return;
    
    var backdrop = document.createElement("div");
    backdrop.className = "lightbox-backdrop";
    backdrop.innerHTML = '<div class="lightbox-content">' +
                            '<img src="' + state.lightbox + '" alt="Büyütülmüş Görsel" />' +
                            '<span class="lightbox-caption">' + esc(state.lightboxCaption || "Görsel Önizleme") + '</span>' +
                         '</div>';
    backdrop.addEventListener("click", function () { state.lightbox = null; backdrop.remove(); });
    document.body.appendChild(backdrop);
  }

  // ---------- events ----------
  function bindGlobalActions() {
    document.querySelectorAll("[data-action]").forEach(function (el) {
      if (el.getAttribute("role") === "button" && el.tagName !== "BUTTON") {
        el.addEventListener("keydown", function (ev) {
          if (ev.key === "Enter" || ev.key === " ") { ev.preventDefault(); el.click(); }
        });
      }
      el.addEventListener("click", function (ev) {
        var action = el.getAttribute("data-action");
        // Sadece görüntüleyebilen üyeler bu eylemleri tetikleyemez (ilgili
        // düğmeler CSS ile zaten gizleniyor; bu, programatik/eski DOM
        // durumlarına karşı ikinci bir savunma katmanı).
        var EDIT_ONLY_ACTIONS = ["open-add-car", "open-edit-car", "delete-car", "open-add-expense", "open-edit-expense", "delete-expense", "open-add-driver", "open-edit-driver", "delete-driver"];
        if (EDIT_ONLY_ACTIONS.indexOf(action) !== -1 && !canEditHousehold()) {
          toast("Bu hanede sadece görüntüleme yetkin var, düzenleme yapamazsın.");
          return;
        }
        if (action === "select-car") { state.selectedCarId = el.getAttribute("data-car"); render(); }
        else if (action === "set-view") { state.view = el.getAttribute("data-view"); render(); }
        else if (action === "dismiss-onboarding") { state.onboardingDismissed = true; setLocalData("onboarding_dismissed", true); render(); }
        else if (action === "open-add-car") { state.modal = { type: "addCar" }; render(); }
        else if (action === "open-edit-car") { state.modal = { type: "editCar", carId: el.getAttribute("data-car") }; render(); }
        else if (action === "open-quick-appt") {
          state.modal = { type: "quickAppt", carId: el.getAttribute("data-car"), key: el.getAttribute("data-key") };
          render();
        }
        else if (action === "open-add-expense") { state.modal = { type: "addExpense" }; render(); }
        else if (action === "copy-plate") {
          var plateVal = el.getAttribute("data-plate") || "";
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(plateVal).then(function () {
              toast("Plaka kopyalandı: " + plateVal);
            }).catch(function () { toast("Kopyalanamadı, plakayı elle yazabilirsin: " + plateVal); });
          } else {
            toast("Kopyalanamadı, plakayı elle yazabilirsin: " + plateVal);
          }
        }
        else if (action === "open-edit-expense") { state.modal = { type: "editExpense", expenseId: el.getAttribute("data-id") }; render(); }
        else if (action === "delete-expense") {
          var id = el.getAttribute("data-id");
          showConfirm({
            title: "Masrafı Sil",
            message: "Bu masraf kaydını silmek istediğine emin misin? Silme sonrası kısa bir süre geri alabilirsin.",
            confirmLabel: "Sil",
            danger: true,
            onConfirm: function () {
              var deleted = (state.expenses || []).find(function (e) { return e.id === id; });
              if (!deleted) return;
              var deletedIndex = (state.expenses || []).indexOf(deleted);
              var deletedCatInfo = catById(deleted.category);
              var deletedCar = (state.cars || []).find(function (c) { return c.id === deleted.carId; });
              var deletedCarName = deletedCar ? deletedCar.name : "";
              state.expenses = (state.expenses || []).filter(function (e) { return e.id !== id; });
              persistExpenses();
              if (deleted.carId) recalcCarCurrentKm(deleted.carId);
              logActivity("expense", "delete", { carId: deleted.carId, carName: deletedCarName, summary: deletedCatInfo.label + " masrafı silindi (" + fmtTL(deleted.amount) + ")", snapshot: snapshotActivityFields(deleted, expenseActivityFieldDefs()) });
              render();
              toastWithUndo("Masraf silindi.", function () {
                state.expenses = state.expenses || [];
                state.expenses.splice(Math.min(deletedIndex, state.expenses.length), 0, deleted);
                persistExpenses();
                if (deleted.carId) recalcCarCurrentKm(deleted.carId);
                logActivity("expense", "restore", { carId: deleted.carId, carName: deletedCarName, summary: deletedCatInfo.label + " masrafı geri alındı (" + fmtTL(deleted.amount) + ")", snapshot: snapshotActivityFields(deleted, expenseActivityFieldDefs()) });
                render();
                toast("Masraf geri alındı.");
              });
            }
          });
        }
        else if (action === "open-lightbox") {
          ev.stopPropagation();
          state.lightbox = el.getAttribute("data-src");
          state.lightboxCaption = el.getAttribute("data-caption") || "Görsel";
          renderLightbox();
        }
        else if (action === "delete-car") {
          var carId = el.getAttribute("data-car");
          showConfirm({
            title: "Aracı Sil",
            message: "Bu aracı ve tüm masraf kayıtlarını silmek istediğinize emin misiniz? Silme sonrası kısa bir süre geri alabilirsiniz.",
            confirmLabel: "Sil",
            danger: true,
            onConfirm: function () {
              var deletedCar = (state.cars || []).find(function (c) { return c.id === carId; });
              var deletedCarIndex = (state.cars || []).indexOf(deletedCar);
              var deletedExpenses = (state.expenses || []).filter(function (e) { return e.carId === carId; });
              var driversWithCar = (state.drivers || []).filter(function (d) { return (d.carIds || []).indexOf(carId) !== -1; }).map(function (d) { return d.id; });
              var prevSelectedCarId = state.selectedCarId;
              state.cars = (state.cars || []).filter(function (c) { return c.id !== carId; });
              state.expenses = (state.expenses || []).filter(function (e) { return e.carId !== carId; });
              if (driversWithCar.length) {
                state.drivers = (state.drivers || []).map(function (d) {
                  return driversWithCar.indexOf(d.id) !== -1 ? Object.assign({}, d, { carIds: (d.carIds || []).filter(function (cid) { return cid !== carId; }) }) : d;
                });
                persistDrivers();
              }
              if (state.selectedCarId === carId) state.selectedCarId = "all";
              persistCars(); persistExpenses(); render();
              cleanupNotifStateForCar(carId);
              logActivity("car", "delete", { carId: carId, carName: deletedCar ? deletedCar.name : "", summary: "Araç silindi: " + (deletedCar ? deletedCar.name : "") + " (" + deletedExpenses.length + " masraf kaydıyla birlikte)", snapshot: snapshotActivityFields(deletedCar, carActivityFieldDefs()) });
              toastWithUndo("Araç ve " + deletedExpenses.length + " masraf kaydı silindi.", function () {
                if (deletedCar) {
                  state.cars = state.cars || [];
                  state.cars.splice(Math.min(deletedCarIndex, state.cars.length), 0, deletedCar);
                  state.selectedCarId = prevSelectedCarId;
                }
                state.expenses = (state.expenses || []).concat(deletedExpenses);
                if (driversWithCar.length) {
                  state.drivers = (state.drivers || []).map(function (d) {
                    return driversWithCar.indexOf(d.id) !== -1 ? Object.assign({}, d, { carIds: (d.carIds || []).concat([carId]) }) : d;
                  });
                  persistDrivers();
                }
                persistCars(); persistExpenses();
                logActivity("car", "restore", { carId: carId, carName: deletedCar ? deletedCar.name : "", summary: "Araç geri alındı: " + (deletedCar ? deletedCar.name : ""), snapshot: snapshotActivityFields(deletedCar, carActivityFieldDefs()) });
                render();
                toast("Araç geri alındı.");
              });
            }
          });
        }
        else if (action === "close-modal") { closeModal(); }
        else if (action === "close-modal-backdrop" && ev.target === el) { closeModal(); }
        else if (action === "clear-log-filters") {
          state.logFilters = { search: "", category: "all", carId: "all", dateFrom: "", dateTo: "" };
          render();
        }
        else if (action === "share-report") { shareExpenseReport(); }
        else if (action === "add-to-calendar") {
          downloadICS(el.getAttribute("data-title"), el.getAttribute("data-date"), el.getAttribute("data-notes"));
        }
        else if (action === "export-data") { exportData(); }
        else if (action === "enable-notifications") { enableNotifications(); }
        else if (action === "disable-notifications") { disableNotifications(); }
        else if (action === "toggle-account-menu") { ev.stopPropagation(); state.accountMenuOpen = !state.accountMenuOpen; render(); }
        else if (action === "toggle-theme") { ev.stopPropagation(); toggleTheme(); }
        else if (action === "trigger-reminders") { ev.stopPropagation(); state.accountMenuOpen = false; triggerReminders(); render(); }
        else if (action === "open-announcement") {
          ev.stopPropagation();
          if (!isAdminUser(state.currentUser)) return;
          state.modal = { type: "announcement" };
          state.accountMenuOpen = false;
          render();
        }
        else if (action === "open-profile") { ev.stopPropagation(); state.modal = { type: "profile" }; state.accountMenuOpen = false; render(); loadMyLogins(); }
        else if (action === "open-notif-history") {
          ev.stopPropagation();
          state.modal = { type: "notifHistory" };
          state.accountMenuOpen = false;
          markNotifHistorySeen();
          render();
        }
        else if (action === "open-activity-log") {
          ev.stopPropagation();
          state.modal = { type: "activityLog" };
          state.accountMenuOpen = false;
          markActivityLogSeen();
          render();
        }
        else if (action === "open-drivers") {
          ev.stopPropagation();
          state.modal = { type: "drivers" };
          state.accountMenuOpen = false;
          render();
        }
        else if (action === "open-add-driver") { state.modal = { type: "addDriver" }; render(); }
        else if (action === "open-edit-driver") { state.modal = { type: "editDriver", driverId: el.getAttribute("data-id") }; render(); }
        else if (action === "delete-driver") {
          var driverId = el.getAttribute("data-id");
          showConfirm({
            title: "Şoförü Sil",
            message: "Bu şoförü silmek istediğine emin misin?",
            confirmLabel: "Sil",
            danger: true,
            onConfirm: function () {
              var deletedDriver = (state.drivers || []).find(function (d) { return d.id === driverId; });
              var deletedDriverIndex = (state.drivers || []).indexOf(deletedDriver);
              state.drivers = (state.drivers || []).filter(function (d) { return d.id !== driverId; });
              persistDrivers();
              logActivity("driver", "delete", { summary: "Şoför silindi: " + (deletedDriver ? deletedDriver.name : ""), snapshot: deletedDriver ? snapshotActivityFields(deletedDriver, driverActivityFieldDefs()) : null });
              render();
              toastWithUndo("Şoför silindi.", function () {
                if (deletedDriver) {
                  state.drivers = state.drivers || [];
                  state.drivers.splice(Math.min(deletedDriverIndex, state.drivers.length), 0, deletedDriver);
                  persistDrivers();
                  logActivity("driver", "restore", { summary: "Şoför geri alındı: " + deletedDriver.name });
                  render();
                }
                toast("Şoför geri alındı.");
              });
            }
          });
        }
        else if (action === "open-help") {
          ev.stopPropagation();
          state.modal = { type: "help" };
          state.accountMenuOpen = false;
          markSupportSeen();
          render();
        }
        else if (action === "toggle-faq") {
          var faqId = el.getAttribute("data-id");
          expandedFaqIds[faqId] = !expandedFaqIds[faqId];
          render();
        }
        else if (action === "toggle-activity-detail") {
          var actId = el.getAttribute("data-id");
          expandedActivityIds[actId] = !expandedActivityIds[actId];
          render();
        }
        else if (action === "open-health") {
          ev.stopPropagation();
          if (!isAdminUser(state.currentUser)) return;
          state.modal = { type: "health" };
          state.accountMenuOpen = false;
          render();
          loadHealthData();
        }
        else if (action === "open-errors") {
          ev.stopPropagation();
          if (!isAdminUser(state.currentUser)) return;
          state.modal = { type: "errors" };
          state.accountMenuOpen = false;
          render();
          loadErrorLogs();
        }
        else if (action === "open-support-requests") {
          ev.stopPropagation();
          if (!isAdminUser(state.currentUser)) return;
          state.modal = { type: "supportRequests" };
          state.accountMenuOpen = false;
          render();
          loadSupportRequests();
        }
        else if (action === "open-login-audit") {
          ev.stopPropagation();
          if (!isAdminUser(state.currentUser)) return;
          state.modal = { type: "loginAudit" };
          state.accountMenuOpen = false;
          render();
          loadLoginAuditLogs();
        }
        else if (action === "refresh-health") { loadHealthData(true); }
        else if (action === "refresh-errors") { loadErrorLogs(true); }
        else if (action === "refresh-support-requests") { loadSupportRequests(true); }
        else if (action === "support-mark-resolved") { setSupportRequestStatus(el.getAttribute("data-id"), "resolved"); }
        else if (action === "support-mark-open") { setSupportRequestStatus(el.getAttribute("data-id"), "open"); }
        else if (action === "refresh-login-audit") { loadLoginAuditLogs(true); }
        else if (action === "logout") {
          ev.stopPropagation();
          state.accountMenuOpen = false;
          render();
          showConfirm({
            title: "Çıkış Yap",
            message: "Çıkış yapmak istediğine emin misin?",
            confirmLabel: "Çıkış Yap",
            danger: true,
            onConfirm: function () { logout(); }
          });
        }
      });
    });
    var importInput = document.getElementById("import-input");
    if (importInput) {
      importInput.addEventListener("change", function (ev) {
        var file = ev.target.files && ev.target.files[0];
        if (file) importData(file);
      });
    }
  }

  document.addEventListener("click", function (ev) {
    if (state.accountMenuOpen && !ev.target.closest(".account-chip")) {
      state.accountMenuOpen = false;
      render();
    }
  });

  init();
})();






  // NOT: Service worker kaydı artık dosyanın başında (swRegPromise) yapılıyor,
  // burada tekrar kaydetmeye gerek yok.

</script>
