<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link rel="manifest" href="/aracim/manifest.json">

<!-- Mobil Tarayıcı Adres Çubuğu Rengi -->
<meta name="theme-color" content="#9B51E0">
  
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root, html[data-theme="dark"] {
    --bg: #1B1F24;
    --surface: #242930;
    --surface-2: #2C323A;
    --border: #383F47;
    --amber: #F2A93B;
    --blue: #4FA8D8;
    --green: #7BC67E;
    --purple: #C77DE0;
    --red: #E2574C;
    --text: #EDEEF0;
    --muted: #8B939D;
  }
  html[data-theme="light"] {
    --bg: #F5F6F8;
    --surface: #FFFFFF;
    --surface-2: #EEF0F3;
    --border: #DBDFE4;
    --amber: #C9791B;
    --blue: #2E7BAE;
    --green: #2E9B4F;
    --purple: #9B4FC0;
    --red: #D23B2F;
    --text: #1B1F24;
    --muted: #6B7480;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--text);
    font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
  }
  html { transition: background .2s ease; }
  body, .panel, .car-tab, .view-tabs, .account-menu, .auth-card, .toast, .odometer, .exp-icon, .btn-secondary {
    transition: background .2s ease, color .2s ease, border-color .2s ease;
  }
  .theme-toggle {
    display: inline-flex; align-items: center; justify-content: center;
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    cursor: pointer; font-size: 16px; flex-shrink: 0; margin-left: 8px;
  }
  .theme-toggle:hover { border-color: var(--amber); }

  .fab-add-expense {
    position: fixed;
    right: 20px;
    bottom: calc(20px + env(safe-area-inset-bottom, 0px));
    display: flex; align-items: center; gap: 10px;
    height: 52px;
    padding: 0 20px 0 8px;
    border-radius: 999px;
    background: linear-gradient(155deg, #FFC266, var(--amber) 55%);
    color: #1B1F24;
    border: none;
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.01em;
    white-space: nowrap;
    cursor: pointer;
    box-shadow: 0 8px 20px -4px #00000060, 0 2px 6px #00000040;
    z-index: 45;
    transition: transform .18s ease, box-shadow .18s ease, filter .18s ease;
  }
  .fab-add-expense-icon {
    display: flex; align-items: center; justify-content: center;
    width: 36px; height: 36px; border-radius: 50%;
    background: #1B1F24; color: var(--amber);
    font-size: 19px; font-weight: 700; line-height: 1; flex-shrink: 0;
    transition: transform .25s ease;
  }
  .fab-add-expense:hover { filter: brightness(1.05); transform: translateY(-2px); box-shadow: 0 12px 26px -4px #00000070, 0 3px 8px #00000045; }
  .fab-add-expense:hover .fab-add-expense-icon { transform: rotate(90deg); }
  .fab-add-expense:active { transform: translateY(0) scale(0.97); }
  @media (max-width: 480px) {
    .fab-add-expense-label { display: none; }
    .fab-add-expense { padding: 0; width: 52px; justify-content: center; }
  }
  @media (max-width: 640px) {
    .toast { bottom: calc(84px + env(safe-area-inset-bottom, 0px)); }
  }
  .wrap { max-width: 980px; margin: 0 auto; padding: 20px; }

  /* ---------- Accessibility: focus states ---------- */
  a:focus-visible, button:focus-visible, input:focus-visible,
  [data-action]:focus-visible, [tabindex]:focus-visible {
    outline: 2px solid var(--amber); outline-offset: 2px; border-radius: 4px;
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; }
  }

  .gd-loading { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; min-height: 60vh; color: var(--muted); }
  .loading-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--amber); animation: pulse 1s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: .3; transform: scale(1);} 50% { opacity: 1; transform: scale(1.4);} }

  header.gd-header { margin-bottom: 16px; }
  .logo-area { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
  .app-logo { width: 32px; height: 32px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); }
  .gd-title-eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.14em; color: var(--amber); }
  .version-badge { background: var(--surface-2); border: 1px solid var(--border); color: var(--amber); font-family: 'JetBrains Mono', monospace; font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; margin-left: 6px; }
  .gd-title { display: flex; align-items: center; }
  .gd-title h1 { font-family: 'Oswald', sans-serif; font-weight: 600; font-size: 26px; margin: 2px 0 0; letter-spacing: 0.01em; }
  .storage-note { font-size: 11.5px; color: var(--muted); margin-top: 6px; line-height: 1.5; max-width: 640px; }
  .header-actions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; align-items: center; }
  .sync-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11.5px; font-weight: 600; padding: 5px 10px; border-radius: 999px; border: 1px solid; white-space: nowrap; }

  .car-tabs, .view-tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
  .view-tabs { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 4px; width: fit-content; gap: 4px; }
  .car-tab {
    display: flex; align-items: center; gap: 6px;
    background: var(--surface); border: 1px solid var(--border); color: var(--muted);
    padding: 9px 14px 9px 6px; min-height: 40px; border-radius: 999px; font-size: 13px; font-weight: 500; cursor: pointer;
    transition: all .15s ease;
  }
  .car-tab:hover { border-color: var(--tab-color, var(--amber)); color: var(--text); }
  .car-tab.active { background: color-mix(in srgb, var(--tab-color, var(--amber)) 16%, var(--surface)); border-color: var(--tab-color, var(--amber)); color: var(--text); }
  .car-tab-add { padding: 8px 14px; border-style: dashed; }
  .car-avatar { width: 22px; height: 22px; border-radius: 50%; object-fit: cover; flex-shrink: 0; background: var(--surface-2); cursor: pointer; transition: transform 0.2s; }
  .car-avatar:hover { transform: scale(1.1); }
  .car-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  .view-tab {
    position: relative; display: flex; align-items: center; gap: 6px;
    background: none; border: none; color: var(--muted); padding: 10px 14px; min-height: 40px;
    border-radius: 7px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit;
  }
  .view-tab.active { background: var(--surface-2); color: var(--text); }
  .view-tab-flag { position: absolute; top: 4px; right: 6px; width: 6px; height: 6px; border-radius: 50%; background: var(--red); }

  .gd-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
  .span-2 { grid-column: 1 / -1; }
  @media (max-width: 640px) { .gd-grid { grid-template-columns: 1fr; } }

  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-bottom: 14px; }
  .panel h2 { font-family: 'Oswald', sans-serif; font-size: 15px; font-weight: 500; margin: 0 0 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }

  .instrument-panel { display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .gauge-svg { width: 100%; max-width: 220px; }
  .gauge-value { font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 700; fill: var(--text); }
  .gauge-sub { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.12em; fill: var(--muted); }
  .odometer-row { text-align: center; margin-top: 4px; }
  .odometer-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.12em; color: var(--muted); margin-bottom: 4px; }
  .odometer {
    font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 26px;
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    padding: 6px 16px; letter-spacing: 0.04em; color: var(--amber);
    box-shadow: inset 0 0 12px #00000060; display: inline-block;
  }
  .odo-currency { font-size: 15px; margin-left: 2px; color: var(--muted); }

  .donut-wrap { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .donut-canvas-box { width: 150px; height: 150px; flex-shrink: 0; }
  .legend { list-style: none; margin: 0; padding: 0; flex: 1; min-width: 140px; }
  .legend li { display: flex; align-items: center; gap: 8px; font-size: 12.5px; padding: 4px 0; color: var(--text); }
  .legend .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .legend-val { margin-left: auto; font-family: 'JetBrains Mono', monospace; color: var(--muted); font-size: 12px; }

  .empty-hint { color: var(--muted); font-size: 13px; line-height: 1.6; }

  .log-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 10px; }
  .log-header h2 { margin: 0; }

  .btn-primary {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--amber); color: #1B1F24; border: none; border-radius: 8px;
    padding: 9px 14px; font-weight: 600; font-size: 13px; cursor: pointer; font-family: inherit;
    transition: filter .15s ease;
  }
  .btn-primary:hover { filter: brightness(1.08); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary.full { width: 100%; justify-content: center; margin-top: 6px; }
  .btn-secondary {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--surface-2); color: var(--text); border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 13px; font-weight: 500; font-size: 12.5px; cursor: pointer; font-family: inherit;
  }
  .btn-secondary:hover { border-color: var(--amber); }
  .btn-secondary.full { width: 100%; justify-content: center; }

  .expense-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 2px; max-height: 360px; overflow-y: auto; }
  .expense-row { display: grid; grid-template-columns: 36px 1fr auto auto 34px 34px; align-items: center; gap: 10px; padding: 9px 4px; border-bottom: 1px solid var(--border); }
  .expense-row:last-child { border-bottom: none; }
  .exp-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
  .exp-icon-wrap { position: relative; flex-shrink: 0; }
  .receipt-badge {
    position: absolute; bottom: -3px; right: -3px; width: 15px; height: 15px; border-radius: 50%;
    background: var(--surface-2); border: 1px solid var(--border); color: var(--amber);
    display: flex; align-items: center; justify-content: center; font-size: 8px; cursor: pointer; padding: 0;
  }
  .receipt-badge:hover { border-color: var(--amber); }
  .exp-main { display: flex; flex-direction: column; min-width: 0; }
  .exp-cat { font-size: 13.5px; font-weight: 500; }
  .exp-note { font-size: 12px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .exp-date { font-family: 'JetBrains Mono', monospace; font-size: 11.5px; color: var(--muted); }
  .exp-amount { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 13.5px; }
  .exp-del { background: none; border: none; color: var(--muted); cursor: pointer; padding: 8px; border-radius: 6px; font-size: 14px; min-width: 34px; min-height: 34px; }
  .exp-del:hover { color: var(--red); background: #E2574C1A; }

  .car-actions { display: flex; gap: 16px; margin-top: 4px; flex-wrap: wrap; }
  .link-btn { display: inline-flex; align-items: center; gap: 4px; background: none; border: none; color: var(--muted); font-size: 12px; cursor: pointer; text-decoration: underline; font-family: inherit; }
  .link-btn.danger:hover { color: var(--red); }
  .link-btn:hover { color: var(--text); }

  .car-info-card { display: flex; flex-direction: column; gap: 12px; padding: 16px 18px; }
  .car-info-top { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .car-info-photo { width: 62px; height: 62px; border-radius: 14px; object-fit: cover; background: var(--surface-2); flex-shrink: 0; cursor: zoom-in; border: 2px solid var(--border); }
  .car-info-photo-fallback { width: 62px; height: 62px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 26px; flex-shrink: 0; border: 2px solid var(--border); }
  .car-info-main { flex: 1; min-width: 160px; }
  .car-info-name { font-family: 'Oswald', sans-serif; font-size: 20px; font-weight: 600; margin: 0 0 3px; }
  .car-info-meta { font-size: 12.5px; color: var(--muted); }
  .car-info-stats { display: flex; gap: 8px; flex-wrap: wrap; }
  .car-stat-chip { display: inline-flex; align-items: baseline; gap: 6px; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 7px 12px; font-size: 13px; font-family: 'JetBrains Mono', monospace; font-weight: 700; color: var(--amber); }
  .car-stat-chip .csc-label { color: var(--muted); font-family: 'Inter', sans-serif; font-size: 10.5px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; }
  .car-info-actions { display: flex; gap: 16px; flex-wrap: wrap; padding-top: 4px; border-top: 1px solid var(--border); }
  .quick-actions-row { display: flex; gap: 8px; flex-wrap: wrap; padding: 10px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
  .quick-actions-label { flex-basis: 100%; font-size: 10.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); margin-bottom: 2px; }
  .quick-action-chip {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
    padding: 8px 12px; font-size: 12.5px; font-weight: 600; color: var(--text);
    text-decoration: none; font-family: inherit; cursor: pointer;
    transition: border-color .15s ease, transform .15s ease;
  }
  .quick-action-chip:hover { border-color: var(--amber); transform: translateY(-1px); }
  .quick-action-chip .qac-emoji { font-size: 14px; }

  .summary-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 2px; }
  .summary-row { display: grid; grid-template-columns: 40px 1fr auto; align-items: center; gap: 12px; padding: 10px 4px; border-bottom: 1px solid var(--border); }
  .summary-row:last-child { border-bottom: none; }
  .sum-avatar { width: 36px; height: 36px; border-radius: 8px; object-fit: cover; background: var(--surface-2); flex-shrink: 0; cursor: pointer; }
  .sum-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .sum-main { display: flex; flex-direction: column; min-width: 0; }
  .sum-type { font-size: 13.5px; font-weight: 500; overflow-wrap: break-word; }
  .sum-date { font-family: 'JetBrains Mono', monospace; font-size: 11.5px; color: var(--muted); }
  .sum-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11.5px; font-weight: 600; padding: 4px 9px; border-radius: 999px; border: 1px solid; white-space: nowrap; flex-shrink: 0; }
  .sum-extra { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
  .sum-actions { display: flex; align-items: center; gap: 2px; flex-wrap: wrap; flex-shrink: 0; }
  .appt-pill {
    display: inline-flex; align-items: center; gap: 4px;
    border-radius: 999px; padding: 5px 10px; font-size: 11px; font-weight: 600;
    font-family: inherit; white-space: nowrap; cursor: pointer; border: 1px solid;
    transition: filter .15s ease, transform .15s ease;
  }
  .appt-pill:hover { filter: brightness(1.08); transform: translateY(-1px); }
  .appt-pill-empty { background: color-mix(in srgb, var(--amber) 16%, var(--surface)); border-color: color-mix(in srgb, var(--amber) 55%, var(--border)); color: var(--amber); }
  .appt-pill-set { background: color-mix(in srgb, var(--green) 16%, var(--surface)); border-color: color-mix(in srgb, var(--green) 55%, var(--border)); color: var(--green); }
  .appt-callout { background: color-mix(in srgb, var(--amber) 10%, var(--surface)); border: 1px solid color-mix(in srgb, var(--amber) 35%, var(--border)); border-radius: 10px; padding: 12px 14px; margin: 4px 0 10px; }
  .appt-callout-title { font-weight: 600; font-size: 13.5px; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; color: var(--text); }
  .appt-cta {
    grid-column: 1 / -1; display: flex; align-items: center; justify-content: space-between; gap: 10px;
    margin-top: 4px; padding: 8px 10px; border-radius: 8px; font-size: 12.5px; font-weight: 500;
    color: var(--red); background: color-mix(in srgb, var(--red) 12%, transparent);
    border: 1px solid color-mix(in srgb, var(--red) 35%, transparent);
  }
  .appt-cta a.btn-primary { padding: 6px 12px; font-size: 12px; white-space: nowrap; text-decoration: none; }
  .summary-hint { color: var(--muted); font-size: 11.5px; margin: 12px 0 0; line-height: 1.6; }

  .doc-thumbs { display: flex; gap: 10px; margin-top: 4px; }
  .doc-thumb-btn { width: 56px; height: 56px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface-2); cursor: pointer; overflow: hidden; padding: 0; }
  .doc-thumb-btn img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .doc-thumb-btn.empty { display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 18px; }

  .modal-backdrop { position: fixed; inset: 0; background: #00000090; display: flex; align-items: center; justify-content: center; z-index: 50; padding: 16px; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px; width: 100%; max-width: 400px; max-height: 90vh; overflow-y: auto; }
  .modal.wide { max-width: 460px; }
  .modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .modal-head h3 { margin: 0; font-family: 'Oswald', sans-serif; font-weight: 600; font-size: 18px; }
  .icon-btn { background: none; border: none; color: var(--muted); cursor: pointer; padding: 8px; font-size: 18px; line-height: 1; min-width: 40px; min-height: 40px; border-radius: 8px; display: inline-flex; align-items: center; justify-content: center; }
  .icon-btn:focus-visible { background: var(--surface-2); }
  .icon-btn:hover { color: var(--text); }

  .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; font-size: 12.5px; color: var(--muted); }
  .field input, .field select {
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text);
    padding: 9px 10px; font-size: 16px; font-family: inherit; width: 100%;
  }
  .field input:focus, .field select:focus { outline: 2px solid var(--amber); outline-offset: 1px; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .field-hint { color: var(--muted); font-size: 11.5px; margin: -4px 0 12px; line-height: 1.5; }

  .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .cat-chip {
    display: flex; align-items: center; gap: 6px;
    background: var(--bg); border: 1px solid var(--border); color: var(--muted);
    padding: 7px 9px; border-radius: 8px; font-size: 12px; cursor: pointer; font-family: inherit;
  }
  .cat-chip.active { border-color: var(--chip-color); color: var(--text); background: color-mix(in srgb, var(--chip-color) 14%, var(--bg)); }

  .photo-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .photo-upload {
    border: 1px dashed var(--border); border-radius: 10px; background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
    padding: 10px; cursor: pointer; position: relative; overflow: hidden; min-height: 100px;
  }
  .photo-upload:hover { border-color: var(--amber); }
  .photo-upload span.pu-label { font-size: 11.5px; color: var(--muted); text-align: center; }
  .photo-upload img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .photo-upload input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .photo-upload.has-photo input[type=file] { pointer-events: none; }
  .photo-upload img { cursor: zoom-in; }
  .photo-edit {
    position: absolute; bottom: 4px; right: 4px; background: #00000099; color: #fff; border: none;
    border-radius: 50%; width: 26px; height: 26px; font-size: 12px; cursor: pointer; z-index: 2;
  }
  .photo-remove {
    position: absolute; top: 4px; right: 4px; background: #00000099; color: #fff; border: none;
    border-radius: 50%; width: 26px; height: 26px; font-size: 13px; cursor: pointer; z-index: 2;
  }

  /* ---------- Lightbox ---------- */

  function downloadICS(title, dateStr, description) {
    if (!dateStr) { toast("Bu işlem için tarih bilgisi girilmemiş."); return; }

    var dtEnd = endD.getFullYear() + pad2(endD.getMonth() + 1) + pad2(endD.getDate());
    var stamp = new Date().toISOString().replace(/[-:]/g, "").split(".")[0] + "Z";
    var lines = [
      "BEGIN:VCALENDAR", "VERSION:2.0", "PRODID:-//Garaj Defteri//TR", "CALSCALE:GREGORIAN",
      "BEGIN:VEVENT",

  // ---------- Gösterge fotoğrafından km okuma (OCR) ----------
  var tesseractLoadPromise = null;
  function loadTesseract() {
    if (window.Tesseract) return Promise.resolve();
    if (tesseractLoadPromise) return tesseractLoadPromise;
    tesseractLoadPromise = new Promise(function (resolve, reject) {
      var s = document.createElement("script");
      s.src = "https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js";
      s.onload = function () { resolve(); };
      s.onerror = function () { tesseractLoadPromise = null; reject(new Error("Tesseract yüklenemedi")); };
      document.head.appendChild(s);
    });
    return tesseractLoadPromise;
  }
  function preprocessImageForOCR(file) {
    return new Promise(function (resolve, reject) {
      var reader = new FileReader();
      reader.onload = function () {
        var img = new Image();
        img.onload = function () {
          var maxDim = 1000;
          var w = img.width, h = img.height;
          if (w > h && w > maxDim) { h = Math.round(h * (maxDim / w)); w = maxDim; }
          else if (h > maxDim) { w = Math.round(w * (maxDim / h)); h = maxDim; }
          var canvas = document.createElement("canvas");
          canvas.width = w; canvas.height = h;
          var ctx = canvas.getContext("2d");
          ctx.drawImage(img, 0, 0, w, h);
          // gri tonlama + kontrast artırımı: gösterge rakamlarının okunabilirliğini artırır
          var imgData = ctx.getImageData(0, 0, w, h);
          var px = imgData.data;
          for (var i = 0; i < px.length; i += 4) {
            var gray = px[i] * 0.299 + px[i + 1] * 0.587 + px[i + 2] * 0.114;
            gray = (gray - 128) * 1.5 + 128; // kontrast
            gray = Math.max(0, Math.min(255, gray));
            px[i] = px[i + 1] = px[i + 2] = gray;
          }
          ctx.putImageData(imgData, 0, 0);
          resolve(canvas.toDataURL("image/png"));
        };
        img.onerror = reject;
        img.src = reader.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }
  function extractOdometerGuess(rawText) {
    if (!rawText) return null;
    var matches = String(rawText).match(/\d[\d.,\s]{2,}\d|\d{3,}/g);
    if (!matches) return null;
    var candidates = matches
      .map(function (m) { return m.replace(/[^\d]/g, ""); })
      .filter(function (m) { return m.length >= 3 && m.length <= 7; })
      .map(function (m) { return parseInt(m, 10); })
      .filter(function (n) { return !isNaN(n); });
    if (!candidates.length) return null;
    // en uzun (en çok basamaklı) sayıyı tercih et: km değeri genelde en büyük değerdir
    candidates.sort(function (a, b) { return b - a; });
    return candidates[0];
  }

  // ---------- numeric entry helpers ----------
  function groupThousands(digits) {
    digits = digits.replace(/^0+(?=\d)/, "");
    return digits.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
  }
  function formatNumericDisplay(raw, allowDecimal) {
    if (!raw) return "";
    var parts = raw.split(",");
    var intPart = groupThousands(parts[0].replace(/\D/g, ""));
    if (allowDecimal && parts.length > 1) {
      var decPart = parts[1].replace(/\D/g, "").slice(0, 2);
      return (intPart || "0") + "," + decPart;
    }
    return intPart;
  }
  function attachThousandsInput(input, allowDecimal) {
    input.setAttribute("type", "text");
    input.setAttribute("inputmode", allowDecimal ? "decimal" : "numeric");
    input.addEventListener("input", function () {
      var raw = input.value;
      if (allowDecimal) {
        raw = raw.replace(/[^\d,]/g, "");
        var firstComma = raw.indexOf(",");
        if (firstComma !== -1) raw = raw.slice(0, firstComma + 1) + raw.slice(firstComma + 1).replace(/,/g, "");
      } else {
        raw = raw.replace(/\D/g, "");
      }
      input.value = formatNumericDisplay(raw, allowDecimal);
    });
  }

  // ---------- Bildirim aksiyonlarından gelen derin bağlantı ----------
  // sw.js'teki "Evet, randevu aldım" aksiyonu tıklanınca uygulama
  // /aracim/?openAppt=carId:fieldKey şeklinde bir URL ile açılır/odaklanır.
  // Birden fazla farklı tarihe bağlı hatırlatma aynı bildirimde birlikte
  // tetiklendiyse, sw.js bunun yerine tüm listeyi
  // /aracim/?openAppts=carId1:fieldKey1,carId2:fieldKey2 şeklinde gönderir.
  // Araç listesi (Firestore'dan) yüklendiğinde bu parametreleri okuyup
  // ilgili aracın randevu mini-formunu (tekli) ya da bir seçim ekranını
  // (çoklu) otomatik açıyoruz.
  var pendingDeepLink = (function () {
    try {
      var params = new URLSearchParams(window.location.search);
      var multi = params.get("openAppts");
      if (multi) {
        var pairs = multi.split(",").map(function (pair) {
          var idx = pair.indexOf(":");
          if (idx === -1) return null;
          return { carId: pair.slice(0, idx), key: pair.slice(idx + 1) };
        }).filter(Boolean);
        return pairs.length ? { multi: true, items: pairs } : null;
      }
      var val = params.get("openAppt");
      if (!val) return null;
      var idx = val.indexOf(":");
      if (idx === -1) return null;
      return { multi: false, carId: val.slice(0, idx), key: val.slice(idx + 1) };
    } catch (e) { return null; }
  })();
  function tryOpenPendingDeepLink() {
    if (!pendingDeepLink) return;
    if (pendingDeepLink.multi) {
      var validItems = pendingDeepLink.items.filter(function (it) {
        return (state.cars || []).some(function (c) { return c.id === it.carId; });
      });
      if (!validItems.length) return; // araç verisi henüz gelmediyse bir sonraki veri güncellemesinde tekrar denenecek
      pendingDeepLink = null;
      try { window.history.replaceState({}, "", window.location.pathname); } catch (e) {}
      // Geçerli tek bir hatırlatma kaldıysa (ör. diğer araç bu arada
      // silindiyse), doğrudan onun randevu formunu aç; birden fazlaysa
      // kullanıcının seçebileceği bir liste ekranı göster.
      if (validItems.length === 1) {
        state.modal = { type: "quickAppt", carId: validItems[0].carId, key: validItems[0].key };
      } else {
        state.modal = { type: "reminderPicker", items: validItems };
      }
      render();
      return;
    }
    var car = (state.cars || []).find(function (c) { return c.id === pendingDeepLink.carId; });
    if (!car) return; // araç verisi henüz gelmediyse bir sonraki veri güncellemesinde tekrar denenecek
    state.modal = { type: "quickAppt", carId: car.id, key: pendingDeepLink.key };
    pendingDeepLink = null;
    try { window.history.replaceState({}, "", window.location.pathname); } catch (e) {}
    render();
  }

  // --- Ortak hane (household) yardımcıları ---
  function dataDocId() {
    return state.householdId || (state.currentUser && state.currentUser.id) || null;
  }
  function buildMemberProfileEntry(uidVal, name, email) {
    // ÖNEMLİ: Bu obje .set(patch, {merge:true}) ile yazılıyor. Firestore'da
    // set()+merge, nokta içeren string anahtarları ("memberProfiles.uid" gibi)
    // YOL olarak değil, kelimenin tam anlamıyla içinde nokta olan tek bir alan
    // adı olarak yorumlar (dot-notation sadece update() içinde yol anlamına
    // gelir). Bu yüzden burada gerçek iç içe (nested) bir obje kullanıyoruz;
    // Firestore merge:true bunu yaprak (leaf) seviyesinde birleştirir ve
    // memberProfiles haritasındaki diğer üyeleri silmez.
    var patch = { memberProfiles: {} };
    patch.memberProfiles[uidVal] = { name: name || "Üye", email: email || "" };
    return patch;
  }
  function applyHouseholdData(data) {
    state.householdDataLoaded = true;
    state.cars = data.cars || state.cars || [];
    state.expenses = data.expenses || state.expenses || [];
    state.familyMembers = data.familyMembers || state.familyMembers || [];
    state.budgets = data.budgets || state.budgets || {};
    state.householdMembers = Object.keys(data.memberProfiles || {}).map(function (uidKey) {
      var p = (data.memberProfiles || {})[uidKey] || {};
      return { uid: uidKey, name: p.name || "Üye", email: p.email || "" };
    });
    state.notifHistory = data.notifHistory || state.notifHistory || [];
    setLocalData("cars", state.cars);
    setLocalData("expenses", state.expenses);
    setLocalData("family", state.familyMembers);
    setLocalData("budgets", state.budgets);
    setLocalData("notif_history", state.notifHistory);

  }
  // Şu anki kullanıcının, verilen hane belgesinde (memberProfiles/members)
  // kendi kaydı yoksa ekler. Hem kendi hanesi hem de sonradan katıldığı
  // paylaşılan bir hane için kullanılabilir — bu sayede "hane sahibi
  // üyeyi göremiyor" gibi senaryolar, katılma sırası ne olursa olsun
  // kendiliğinden düzelir. arrayUnion kullanır, asla mevcut üyeleri silmez.
  function ensureSelfInHousehold(householdDocId, data) {
    if (!state.currentUser) return;
    var myUid = state.currentUser.id;
    var members = data.members || [];
    var hasProfile = data.memberProfiles && data.memberProfiles[myUid];
    if (members.indexOf(myUid) === -1 || !hasProfile) {
      var patch = buildMemberProfileEntry(myUid, state.currentUser.name, state.currentUser.email);
      patch.members = firebase.firestore.FieldValue.arrayUnion(myUid);
      db.collection("users").doc(householdDocId).set(patch, { merge: true })
        .catch(function (err) { console.error(err); });
    }
  }
  function subscribeHousehold(householdId) {
    if (unsubscribeHouseholdDoc) { unsubscribeHouseholdDoc(); unsubscribeHouseholdDoc = null; }
    state.householdId = householdId;
    var ref = db.collection("users").doc(householdId);
    unsubscribeHouseholdDoc = ref.onSnapshot(function (snap) {
      if (!snap.exists) return;
      var data = snap.data() || {};
      applyHouseholdData(data);
      ensureSelfInHousehold(householdId, data);
      render();
    }, function (err) {
      console.error(err);
      // Hane sahibi bizi ortak haneden çıkarmış olabilir: o durumda bu
      // dokümanı okuma iznimiz kesilir (permission-denied). Sessizce takılı
      // kalmak yerine kendi (boş) hanemize otomatik dönelim.
      if (err && err.code === "permission-denied") {
        handleHouseholdAccessRevoked();
      }
    });
  }

  function handleHouseholdAccessRevoked() {
    if (!state.currentUser) return;
    var myUid = state.currentUser.id;
    if (state.householdId === myUid) return; // zaten kendi hanemizdeyiz, alakasız bir hata
    if (unsubscribeHouseholdDoc) { unsubscribeHouseholdDoc(); unsubscribeHouseholdDoc = null; }
    var ownRef = db.collection("users").doc(myUid);
    ownRef.set({ householdId: firebase.firestore.FieldValue.delete() }, { merge: true })
      .catch(function (err) { console.error(err); })
      .then(function () { return ownRef.get(); })
      .then(function (snap) {
        state.householdId = myUid;
        var ownData = snap.data() || {};
        applyHouseholdData(ownData);
        ensureSelfInHousehold(myUid, ownData);
        toast("Ortak haneden çıkarıldın, kendi hanene döndürüldün.");
        render();
      })
      .catch(function (err) { console.error(err); });
  }

  // Araç silindiğinde, o araca ait vade/randevu/km hatırlatma dedup
  // anahtarları (bkz. send-reminders.js -> stateKey = car.id + "_" + ...)
  // notifState içinde sonsuza kadar kalmasın diye temizler. notifState
  // sadece hatırlatma script'i tarafından okunur, burada tam alan olarak
  // (merge:true ile) geri yazılır — bu yüzden önce mevcut hâlini okumamız
  // gerekiyor.
  function cleanupNotifStateForCar(carId) {
    var docId = dataDocId();
    if (!docId || !carId) return;
    var prefix = carId + "_";
    db.collection("users").doc(docId).get().then(function (snap) {
      if (!snap.exists) return;
      var notifState = (snap.data() || {}).notifState || {};
      var changed = false;
      var cleaned = {};
      Object.keys(notifState).forEach(function (key) {
        if (key.indexOf(prefix) === 0) { changed = true; return; }
        cleaned[key] = notifState[key];
      });
      if (!changed) return;
      return db.collection("users").doc(docId).set({ notifState: cleaned }, { merge: true });
    }).catch(function (err) { console.error("notifState temizliği başarısız:", err); });
  }

  // ---------- Bildirim geçmişi ("gelen kutusu") ----------
  // Push bildirimi telefon kapalıyken/izinsizken kaçırılırsa kullanıcı bu
  // listeden geçmiş hatırlatmaları görebilir (bkz. send-reminders.js ->
  // notifHistory). En son görülen kaydın zaman damgası localStorage'da
  // tutulur, ondan daha yeni kayıt varsa hesap menüsünde küçük bir nokta
  // gösterilir.
  function notifHistoryTimestampMs(entry) {
    var ts = entry && entry.sentAt;
    if (!ts) return 0;
    if (typeof ts.toDate === "function") return ts.toDate().getTime();
    if (typeof ts.seconds === "number") return ts.seconds * 1000;
    var d = new Date(ts);
    return isNaN(d.getTime()) ? 0 : d.getTime();
  }
  function hasUnseenNotifHistory() {
    var list = state.notifHistory || [];
    if (!list.length) return false;
    var lastSeen = getLocalData("notif_history_seen", 0);
    return notifHistoryTimestampMs(list[0]) > lastSeen;
  }
  function markNotifHistorySeen() {
    var list = state.notifHistory || [];
    if (!list.length) return;
    setLocalData("notif_history_seen", notifHistoryTimestampMs(list[0]));
  }

  // --- Push Notifications ---
  function enableNotifications() {
    if (!state.currentUser) { toast("Bildirimleri açmak için giriş yapmalısın."); return; }
    messagingReady.then(function (m) {
      if (!m) { toast("Bu tarayıcı bildirimleri desteklemiyor."); return; }
      Notification.requestPermission().then(function (perm) {
        if (perm !== "granted") {
          toast("Bildirim izni verilmedi. Tarayıcı ayarlarından değiştirebilirsin.");
          state.notifStatus = "denied";
          render();
          return;
        }
        swRegPromise.then(function (reg) {
          if (!reg) { throw new Error("Service worker kaydı bulunamadı. Sayfayı yenileyip tekrar deneyin."); }
          return m.getToken({ vapidKey: VAPID_KEY, serviceWorkerRegistration: reg });
        }).then(function (token) {
          if (!token) { toast("Bildirim anahtarı alınamadı."); return; }
          return db.collection("users").doc(state.currentUser.id).set({
            fcmTokens: firebase.firestore.FieldValue.arrayUnion(token)
          }, { merge: true });
        }).then(function () {
          state.notifStatus = "granted";
          toast("Bildirimler açıldı. Yaklaşan işlemler için hatırlatma alacaksın.");
          render();
        }).catch(function (err) {
          console.error(err);
          toast("Bildirim kaydı başarısız oldu: " + (err && err.message ? err.message : err));
        });
      });
    });
  }

  function disableNotifications() {
    if (!state.currentUser) return;
    messagingReady.then(function (m) {
      if (!m) return;
      swRegPromise.then(function (reg) {
        return m.getToken({ vapidKey: VAPID_KEY, serviceWorkerRegistration: reg || undefined });
      }).then(function (token) {
        if (!token) return;
        return db.collection("users").doc(state.currentUser.id).set({
          fcmTokens: firebase.firestore.FieldValue.arrayRemove(token)
        }, { merge: true });
      }).then(function () {
        state.notifStatus = "default";
        toast("Bildirimler kapatıldı.");
        render();
      }).catch(function (err) { console.error(err); });
    });
  }

  function loadHealthData(force) {
    if (!state.currentUser || !isAdminUser(state.currentUser)) return;
    if (monitoring.healthLoading) return;
    if (monitoring.health && !force) return;
    monitoring.healthLoading = true;

      .then(function (doc) { return doc.exists ? doc.data() : null; })
      .catch(function () { return null; });

    var runLogsP = db.collection("runLogs").orderBy("createdAt", "desc").limit(10).get()
      .then(function (snap) {
        var rows = [];
        snap.forEach(function (d) { rows.push(Object.assign({ id: d.id }, d.data())); });
        return rows;
      })
      .catch(function () { return []; });

    Promise.all([triggerDocP, runLogsP]).then(function (results) {

  // --- İstemci taraflı hata yakalama ---
  var CLIENT_ERROR_LOG_LIMIT = 15;
  var clientErrorLogCount = 0;
  var clientErrorSeen = {};
  function logClientError(info) {
    try {
      if (!db || !navigator.onLine) return;
      if (clientErrorLogCount >= CLIENT_ERROR_LOG_LIMIT) return;
      var key = (info.message || "") + "|" + (info.source || "");
      if (clientErrorSeen[key]) return;
      clientErrorSeen[key] = true;
      clientErrorLogCount++;
      db.collection("errorLogs").add({
        message: (info.message || "Bilinmeyen hata").slice(0, 800),
        stack: (info.stack || "").slice(0, 2000),
        source: info.source || "",
        line: info.line || null,
        col: info.col || null,
        url: window.location.href,
        userAgent: navigator.userAgent,
        userId: state.currentUser ? state.currentUser.id : null,
        userEmail: state.currentUser ? state.currentUser.email : null,
        appVersion: APP_VERSION,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      }).catch(function () { /* sessizce yok say */ });
    } catch (e) { /* hata izleme kendisi hata üretmesin */ }
  }
  window.addEventListener("error", function (ev) {
    logClientError({ message: ev.message, source: ev.filename, line: ev.lineno, col: ev.colno, stack: ev.error && ev.error.stack });
  });
  window.addEventListener("unhandledrejection", function (ev) {
    var reason = ev.reason;
    logClientError({
      message: "Unhandled promise rejection: " + (reason && reason.message ? reason.message : String(reason)),
      stack: reason && reason.stack
    });
  });

  function toast(msg) {
    var el = document.createElement("div");
    el.className = "toast";
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(function () { el.remove(); }, 3200);
  }

  function toastWithUndo(msg, onUndo) {
    document.querySelectorAll(".toast").forEach(function (el) { el.remove(); });
    var el = document.createElement("div");
    el.className = "toast toast-undo";
    var msgSpan = document.createElement("span");
    msgSpan.textContent = msg;
    var btn = document.createElement("button");
    btn.type = "button";
    btn.className = "toast-undo-btn";
    btn.textContent = "↩ Geri Al";
    el.appendChild(msgSpan);
    el.appendChild(btn);
    document.body.appendChild(el);
    var timer = setTimeout(function () { el.remove(); }, 6500);
    btn.addEventListener("click", function () {
      clearTimeout(timer);
      el.remove();
      onUndo();
    });
  }

  function showConfirm(opts) {
    var backdrop = document.createElement("div");
    backdrop.className = "modal-backdrop confirm-backdrop";
    var box = document.createElement("div");
    box.className = "modal confirm-modal";
    box.innerHTML =
      '<div class="modal-head"><h3>' + esc(opts.title || "Emin misin?") + '</h3></div>' +
      '<p class="confirm-message">' + esc(opts.message || "") + '</p>' +
      '<div class="confirm-actions">' +
        '<button type="button" class="btn-secondary" id="confirm-cancel">' + esc(opts.cancelLabel || "Vazgeç") + '</button>' +
        '<button type="button" class="' + (opts.danger ? "btn-danger" : "btn-primary") + '" id="confirm-ok">' + esc(opts.confirmLabel || "Onayla") + '</button>' +
      '</div>';
    backdrop.appendChild(box);
    function cleanup() { backdrop.remove(); }
    box.addEventListener("click", function (ev) { ev.stopPropagation(); });
    backdrop.addEventListener("click", function (ev) {
      if (ev.target === backdrop) { cleanup(); if (opts.onCancel) opts.onCancel(); }
    });
    box.querySelector("#confirm-cancel").addEventListener("click", function () { cleanup(); if (opts.onCancel) opts.onCancel(); });
    box.querySelector("#confirm-ok").addEventListener("click", function () { cleanup(); if (opts.onConfirm) opts.onConfirm(); });
    document.body.appendChild(backdrop);
    box.querySelector("#confirm-ok").focus();
  }

  // ---------- Paylaşılabilir masraf raporu (görsel) ----------
  function buildReportCanvas(list, carLabel) {
    var W = 820;
    var pad = 36;
    var rowH = 46;
    var headerH = 168;
    var footerH = 40;
    var H = headerH + Math.max(list.length, 1) * rowH + footerH;

    var canvas = document.createElement("canvas");
    var scale = 2; // keskin görsel için
    canvas.width = W * scale;
    canvas.height = H * scale;
    var ctx = canvas.getContext("2d");
    ctx.scale(scale, scale);

    // arkaplan
    ctx.fillStyle = "#1B1F24";
    ctx.fillRect(0, 0, W, H);

    // başlık bandı
    ctx.fillStyle = "#242930";
    ctx.fillRect(0, 0, W, headerH);

    ctx.fillStyle = "#F2A93B";
    ctx.font = "700 21px Arial, sans-serif";
    ctx.fillText("🚘 GARAJ DEFTERİ — MASRAF RAPORU", pad, 42);

    ctx.fillStyle = "#EDEEF0";
    ctx.font = "600 16px Arial, sans-serif";
    ctx.fillText(carLabel, pad, 70);

    var total = list.reduce(function (s, e) { return s + (e.amount || 0); }, 0);
    var dates = list.map(function (e) { return e.date; }).filter(Boolean).sort();
    var rangeLabel = dates.length ? (fmtDateTR(dates[0]) + " – " + fmtDateTR(dates[dates.length - 1])) : "";

    ctx.fillStyle = "#8B939D";
    ctx.font = "12.5px Arial, sans-serif";
    ctx.fillText(rangeLabel + " · " + list.length + " kayıt", pad, 92);

    ctx.fillStyle = "#F2A93B";
    ctx.font = "700 24px 'JetBrains Mono', monospace";
    ctx.fillText("Toplam: " + fmtTL(total), pad, 128);

    ctx.fillStyle = "#8B939D";
    ctx.font = "10.5px Arial, sans-serif";
    ctx.fillText("Oluşturulma: " + new Date().toLocaleString("tr-TR"), pad, 150);

    // satırlar
    list.forEach(function (e, i) {
      var rowY = headerH + i * rowH;
      if (i % 2 === 1) {
        ctx.fillStyle = "#20242A";
        ctx.fillRect(0, rowY, W, rowH);
      }
      var cat = catById(e.category);
      var car = (state.cars || []).find(function (c) { return c.id === e.carId; });

      ctx.fillStyle = cat.color;
      ctx.font = "18px Arial, sans-serif";
      ctx.fillText(cat.emoji, pad, rowY + 29);

      ctx.fillStyle = "#EDEEF0";
      ctx.font = "600 14px Arial, sans-serif";
      ctx.fillText(cat.label + (car ? " · " + car.name : ""), pad + 34, rowY + 20);

      ctx.fillStyle = "#8B939D";
      ctx.font = "11.5px Arial, sans-serif";
      var noteText = e.note ? e.note : "—";
      if (noteText.length > 46) noteText = noteText.slice(0, 45) + "…";
      ctx.fillText(noteText, pad + 34, rowY + 36);

      ctx.fillStyle = "#8B939D";
      ctx.font = "11.5px 'JetBrains Mono', monospace";
      ctx.fillText(fmtDateTR(e.date), W - 250, rowY + 27);

      ctx.fillStyle = "#EDEEF0";
      ctx.font = "700 14px 'JetBrains Mono', monospace";
      ctx.textAlign = "right";
      ctx.fillText(fmtTL(e.amount), W - pad, rowY + 27);
      ctx.textAlign = "left";
    });

    // alt bilgi
    ctx.fillStyle = "#8B939D";
    ctx.font = "10.5px Arial, sans-serif";
    ctx.fillText("Garaj Defteri ile oluşturuldu", pad, H - 16);

    return canvas;
  }

  function shareExpenseReport() {
    var list = getFilteredLogExpenses().slice().sort(function (a, b) { return new Date(a.date) - new Date(b.date); });
    if (!list.length) { toast("Paylaşılacak masraf kaydı yok."); return; }

    var car = (state.cars || []).find(function (c) { return c.id === state.selectedCarId; });
    var carLabel = car ? car.name : (logFiltersActive() && state.logFilters.carId !== "all"
      ? ((state.cars || []).find(function (c) { return c.id === state.logFilters.carId; }) || {}).name || "Seçili Araç"
      : "Tüm Araçlar");

    var canvas = buildReportCanvas(list, carLabel);
    canvas.toBlob(function (blob) {
      if (!blob) { toast("Rapor oluşturulamadı."); return; }
      var fileName = "masraf-raporu-" + todayStr() + ".png";

      var file;
      try { file = new File([blob], fileName, { type: "image/png" }); } catch (e) { file = null; }

      if (file && navigator.canShare && navigator.canShare({ files: [file] })) {
        navigator.share({ files: [file], title: "Masraf Raporu", text: carLabel + " masraf raporu" })
          .catch(function (err) { if (err && err.name !== "AbortError") toast("Paylaşım yapılamadı, görsel indiriliyor."); });
      } else {
        var url = URL.createObjectURL(blob);
        var a = document.createElement("a");
        a.href = url;
        a.download = fileName;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
        toast("Rapor görsel olarak indirildi.");
      }
    }, "image/png");
  }

  function importData(file) {
    var reader = new FileReader();
    reader.onload = function () {
      try {
        var data = JSON.parse(reader.result);
        if (!data || !Array.isArray(data.cars) || !Array.isArray(data.expenses)) throw new Error("invalid");
        showConfirm({
          title: "Yedeği Geri Yükle",
          message: "Mevcut veriler bu yedekle değiştirilecek. Devam edilsin mi?",
          confirmLabel: "Devam Et",
          danger: true,
          onConfirm: function () {
            state.cars = data.cars;
            state.expenses = data.expenses;
            state.familyMembers = data.family || [];
            state.budgets = data.budgets || {};
            persistCars(); persistExpenses(); persistFamily(); persistBudgets();
            toast("Yedek geri yüklendi.");
            render();
          }
        });
      } catch (e) {
        toast("Dosya okunamadı. Geçerli bir yedek dosyası seçtiğinizden emin olun.");
      }
    };
    reader.readAsText(file);
  }

  function loginAs(fbUser) {
    state.currentUser = { id: fbUser.uid, name: fbUser.displayName || "Kullanıcı", email: fbUser.email, avatar: null };
    state.householdId = fbUser.uid;
    state.householdMembers = [];
    state.householdDataLoaded = false;
    state.selectedCarId = "all";
    state.view = "panel";
    state.modal = null;
    state.accountMenuOpen = false;
    render();

    if (unsubscribeUserDoc) unsubscribeUserDoc();
    if (unsubscribeHouseholdDoc) { unsubscribeHouseholdDoc(); unsubscribeHouseholdDoc = null; }
    var docRef = db.collection("users").doc(fbUser.uid);
    unsubscribeUserDoc = docRef.onSnapshot(function (snap) {
      if (!snap.exists) {
        var createPatch = buildMemberProfileEntry(fbUser.uid, fbUser.displayName || "Kullanıcı", fbUser.email);
        createPatch.name = fbUser.displayName || "Kullanıcı";
        createPatch.email = fbUser.email;
        createPatch.avatar = null;
        createPatch.members = [fbUser.uid];
        createPatch.cars = state.cars || [];
        createPatch.expenses = state.expenses || [];
        createPatch.familyMembers = state.familyMembers || [];
        createPatch.budgets = state.budgets || {};
        createPatch.createdAt = firebase.firestore.FieldValue.serverTimestamp();
        docRef.set(createPatch, { merge: true }).catch(function (err) { console.error(err); });
        return;
      }
      var data = snap.data() || {};
      if (!state.currentUser || state.currentUser.id !== fbUser.uid) return;

      // Kimlik bilgisi (isim/e-posta/avatar) her zaman kişinin kendi belgesinden gelir;
      // ortak bir haneye katılınca bile kendi adı değişmez.
      state.currentUser = { id: fbUser.uid, name: data.name || fbUser.displayName || "Kullanıcı", email: data.email || fbUser.email, avatar: data.avatar || null };

      // Bu kişi kendi hane belgesinde (memberProfiles/members) henüz kayıtlı
      // değilse ekleyelim (bkz. ensureSelfInHousehold).
      ensureSelfInHousehold(fbUser.uid, data);

      var targetHousehold = data.householdId || fbUser.uid;
      if (targetHousehold === fbUser.uid) {
        // Kendi hanesi: aynı belge hem kimlik hem paylaşılan veri kaynağı
        if (unsubscribeHouseholdDoc) { unsubscribeHouseholdDoc(); unsubscribeHouseholdDoc = null; }
        state.householdId = fbUser.uid;
        applyHouseholdData(data);
      } else if (state.householdId !== targetHousehold) {
        subscribeHousehold(targetHousehold);
      }

      render();
    }, function (err) {
      console.error(err);
      // fallback to local storage if offline error occurs
      if(!state.cars || !state.expenses) {
        state.cars = getLocalData("cars", []);
        state.expenses = getLocalData("expenses", []);
        state.familyMembers = getLocalData("family", []);
        state.budgets = getLocalData("budgets", {});
        render();
        tryOpenPendingDeepLink();
      }
    });
  }

    var patch = buildMemberProfileEntry(uidVal, name, email);
    patch.members = firebase.firestore.FieldValue.arrayUnion(uidVal);
    return patch;
  }

  function joinHousehold(rawCode) {
    var code = (rawCode || "").trim();
    if (!code) { toast("Lütfen bir davet kodu gir."); return; }
    if (!state.currentUser) return;
    var myUid = state.currentUser.id;
    if (code === state.householdId) { toast("Zaten bu ortak hanedesin."); return; }
    showConfirm({
      title: "Ortak Haneye Katıl",
      message: "Bu işlemle kendi araç/masraf kayıtların yerine, kodun sahibinin ortak hanesindeki veriler kullanılmaya başlanacak. Devam edilsin mi?",
      confirmLabel: "Katıl",
      danger: true,
      onConfirm: function () {
        var targetRef = db.collection("users").doc(code);
        var patch = buildMemberProfileEntry(myUid, state.currentUser.name, state.currentUser.email);
        patch.members = firebase.firestore.FieldValue.arrayUnion(myUid);
        targetRef.set(patch, { merge: true }).then(function () {
          return db.collection("users").doc(myUid).set({ householdId: code }, { merge: true });
        }).then(function () {
          subscribeHousehold(code);
          closeModal();
          state.modal = { type: "profile" };
          render();
          toast("Ortak haneye katıldın.");
        }).catch(function (err) {
          console.error(err);
          toast("Katılma başarısız oldu: kod geçersiz olabilir veya izin reddedildi.");
        });
      }
    });
  }

  function leaveHousehold() {
    if (!state.currentUser) return;
    var myUid = state.currentUser.id;
    if (state.householdId === myUid) { toast("Zaten kendi hanendesin."); return; }
    var oldHouseholdId = state.householdId;
    showConfirm({
      title: "Ortak Haneden Ayrıl",
      message: "Bu ortak hesaptan ayrılacak ve kendi tek kullanıcı hanene döneceksin. Emin misin?",
      confirmLabel: "Ayrıl",
      danger: true,
      onConfirm: function () {
        var householdRef = db.collection("users").doc(oldHouseholdId);
        var ownRef = db.collection("users").doc(myUid);
        var removePatch = {};
        removePatch.members = firebase.firestore.FieldValue.arrayRemove(myUid);
        removePatch["memberProfiles." + myUid] = firebase.firestore.FieldValue.delete();
        householdRef.update(removePatch).catch(function (err) { console.error(err); });
        ownRef.set({ householdId: firebase.firestore.FieldValue.delete() }, { merge: true }).then(function () {
          if (unsubscribeHouseholdDoc) { unsubscribeHouseholdDoc(); unsubscribeHouseholdDoc = null; }
          state.householdId = myUid;
          return ownRef.get();
        }).then(function (snap) {
          applyHouseholdData(snap.data() || {});
          closeModal();
          state.modal = { type: "profile" };

  // ---------- derived data ----------
  function getVisibleExpenses() {
    if (state.selectedCarId === "all") return state.expenses || [];
    return (state.expenses || []).filter(function (e) { return e.carId === state.selectedCarId; });
  }

  function logFiltersActive() {
    var f = state.logFilters || {};
    return !!(f.search || (f.category && f.category !== "all") || (f.carId && f.carId !== "all") || f.dateFrom || f.dateTo);
  }

  function getFilteredLogExpenses() {
    var list = getVisibleExpenses();
    var f = state.logFilters || {};
    if (state.selectedCarId === "all" && f.carId && f.carId !== "all") {
      list = list.filter(function (e) { return e.carId === f.carId; });
    }
    if (f.category && f.category !== "all") {
      list = list.filter(function (e) { return e.category === f.category; });
    }
    if (f.dateFrom) {
      list = list.filter(function (e) { return e.date && e.date >= f.dateFrom; });
    }
    if (f.dateTo) {
      list = list.filter(function (e) { return e.date && e.date <= f.dateTo; });
    }
    if (f.search) {
      var q = f.search.toLocaleLowerCase("tr-TR");
      list = list.filter(function (e) {
        var cat = catById(e.category);
        var car = (state.cars || []).find(function (c) { return c.id === e.carId; });
        var hay = [cat.label, e.note || "", car ? car.name : "", fmtDateTR(e.date)].join(" ").toLocaleLowerCase("tr-TR");
        return hay.indexOf(q) !== -1;
      });
    }
    return list;
  }

  function monthKey(d) { return d.getFullYear() + "-" + d.getMonth(); }

  function recalcCarCurrentKm(carId) {
    var car = (state.cars || []).find(function (c) { return c.id === carId; });
    if (!car) return;
    var kmEntries = (state.expenses || []).filter(function (e) { return e.carId === carId && e.km != null; });
    if (!kmEntries.length) return; // hiç km'li kayıt yoksa dokunma (manuel girilmiş olabilir)
    var maxKm = kmEntries.reduce(function (m, e) { return Math.max(m, e.km); }, 0);
    if (car.currentKm !== maxKm) {
      state.cars = state.cars.map(function (c) { return c.id === carId ? Object.assign({}, c, { currentKm: maxKm }) : c; });
      persistCars();
    }
  }

  function computeCostPerKm(carId) {
    var fuelExpenses = (state.expenses || [])
      .filter(function (e) { return e.carId === carId && e.category === "yakit" && e.km != null; })
      .sort(function (a, b) { return a.km - b.km; });
    if (fuelExpenses.length < 2) return null;
    var recent = fuelExpenses.slice(-5); // en fazla son 5 kayıt (4 segment) üzerinden ortalama al
    var totalDist = 0, totalAmount = 0;
    for (var i = 1; i < recent.length; i++) {
      var dist = recent[i].km - recent[i - 1].km;
      if (dist > 0) { totalDist += dist; totalAmount += Number(recent[i].amount || 0); }
    }
    if (totalDist <= 0) return null;
    return totalAmount / totalDist;
  }

  function computeFuelStats(carId) {
    var fuelExpenses = (state.expenses || [])
      .filter(function (e) { return e.carId === carId && e.category === "yakit" && e.km != null && e.liter != null; })
      .sort(function (a, b) { return a.km - b.km; });
    if (fuelExpenses.length < 2) return null;
    var totalDist = 0, totalLiter = 0, segments = 0;
    for (var i = 1; i < fuelExpenses.length; i++) {
      var dist = fuelExpenses[i].km - fuelExpenses[i - 1].km;
      if (dist > 0) { totalDist += dist; totalLiter += fuelExpenses[i].liter; segments++; }
    }
    if (!segments || totalDist <= 0) return null;
    return { avgConsumption: (totalLiter / totalDist) * 100, totalDist: totalDist, totalLiter: totalLiter };
  }

  function computeDashboard() {
    var visible = getVisibleExpenses();
    var now = new Date();
    var thisKey = monthKey(now);
    var monthTotal = 0, buckets = {};
    visible.forEach(function (e) {
      var d = new Date(e.date), k = monthKey(d);
      buckets[k] = (buckets[k] || 0) + Number(e.amount || 0);
      if (k === thisKey) monthTotal += Number(e.amount || 0);
    });
    var otherKeys = Object.keys(buckets).filter(function (k) { return k !== thisKey; });
    var avg = otherKeys.length ? otherKeys.reduce(function (s, k) { return s + buckets[k]; }, 0) / otherKeys.length : null;
    var gaugePct = avg && avg > 0 ? Math.min(1, monthTotal / (avg * 1.6)) : (monthTotal > 0 ? 0.55 : 0);

    var catMap = {};
    visible.forEach(function (e) { catMap[e.category] = (catMap[e.category] || 0) + Number(e.amount || 0); });
    var categoryData = CATEGORIES.map(function (c) { return { name: c.label, value: catMap[c.id] || 0, color: c.color }; }).filter(function (d) { return d.value > 0; });

    var totalAllTime = visible.reduce(function (s, e) { return s + Number(e.amount || 0); }, 0);
    return { monthTotal: monthTotal, gaugePct: gaugePct, categoryData: categoryData, totalAllTime: totalAllTime };
  }

  // ---------- Analiz: aylık trend, bütçe, yakıt serileri ----------
  function computeMonthlyTrend(monthsBack) {
    var visible = getVisibleExpenses();
    var now = new Date();
    var months = [];
    for (var i = monthsBack - 1; i >= 0; i--) {
      var d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      months.push({ key: monthKey(d), label: MONTHS_TR[d.getMonth()] + " " + String(d.getFullYear()).slice(2), total: 0 });
    }
    visible.forEach(function (e) {
      if (!e.date) return;
      var k = monthKey(new Date(e.date));
      var bucket = null;
      for (var j = 0; j < months.length; j++) { if (months[j].key === k) { bucket = months[j]; break; } }
      if (bucket) bucket.total += Number(e.amount || 0);
    });
    return months;
  }

  function budgetKey() { return state.selectedCarId || "all"; }

  function computeBudgetInfo() {
    var key = budgetKey();
    var budget = (state.budgets || {})[key];
    var monthTotal = computeDashboard().monthTotal;
    if (!budget || budget <= 0) return { key: key, budget: null, spent: monthTotal, pct: 0, status: "none" };
    var pct = monthTotal / budget;
    var status = pct >= 1 ? "over" : pct >= 0.85 ? "watch" : "ok";
    return { key: key, budget: budget, spent: monthTotal, pct: Math.min(1, pct), rawPct: pct, status: status };
  }

  function computeFuelSeries(carId) {
    var fuelExpenses = (state.expenses || [])
      .filter(function (e) { return e.carId === carId && e.category === "yakit" && e.km != null; })
      .sort(function (a, b) { return a.km - b.km; });
    var consumptionSeries = [];
    for (var i = 1; i < fuelExpenses.length; i++) {
      var prev = fuelExpenses[i - 1], cur = fuelExpenses[i];
      var dist = cur.km - prev.km;
      if (dist <= 0) continue;
      var point = { date: cur.date, dateLabel: fmtDateTR(cur.date), costPerKm: Number(cur.amount || 0) / dist };
      if (cur.liter != null) point.consumption = (cur.liter / dist) * 100;
      consumptionSeries.push(point);
    }
    var priceSeries = fuelExpenses
      .filter(function (e) { return e.liter != null && e.liter > 0; })
      .sort(function (a, b) { return new Date(a.date) - new Date(b.date); })
      .map(function (e) { return { date: e.date, dateLabel: fmtDateTR(e.date), price: Number(e.amount || 0) / e.liter }; });
    return { consumptionSeries: consumptionSeries, priceSeries: priceSeries };
  }

  function kmUrgency(remaining) {
    if (remaining === null) return { key: "none", label: "Km bilgisi yok", color: "#8B939D" };
    var abs = groupThousands(String(Math.round(Math.abs(remaining))));
    if (remaining <= 0) return { key: "overdue", label: abs + " km geçti", color: "#E2574C" };
    if (remaining <= 1000) return { key: "soon", label: abs + " km kaldı", color: "#E2574C" };
    if (remaining <= 3000) return { key: "watch", label: abs + " km kaldı", color: "#F2A93B" };
    return { key: "ok", label: abs + " km kaldı", color: "#7BC67E" };
  }
  function tierOf(status) {
    if (status.key === "overdue" || status.key === "today" || status.key === "soon") return 0;
    if (status.key === "watch") return 1;
    if (status.key === "ok") return 2;
    return 3;
  }

  function computeSummaryItems() {
    var carsToProcess = state.cars || [];
    var relevant = state.selectedCarId === "all" ? carsToProcess : carsToProcess.filter(function (c) { return c.id === state.selectedCarId; });
    var items = [];
    relevant.forEach(function (c) {
      items.push({ carId: c.id, carName: c.name, carPhoto: c.photo, type: "Muayene", emoji: "🗓️", date: c.inspectionDate || null, apptKey: "inspectionDate", apptDate: (c.appointments && c.appointments.inspectionDate) || null });
      items.push({ carId: c.id, carName: c.name, carPhoto: c.photo, type: "Bakım / Servis (tarih)", emoji: "🔧", date: c.maintenanceDate || null, apptKey: "maintenanceDate", apptDate: (c.appointments && c.appointments.maintenanceDate) || null });
      items.push({ carId: c.id, carName: c.name, carPhoto: c.photo, type: "Trafik Sigortası", emoji: "🛡️", date: c.insuranceDate || null, apptKey: "insuranceDate", apptDate: (c.appointments && c.appointments.insuranceDate) || null });
      items.push({ carId: c.id, carName: c.name, carPhoto: c.photo, type: "Kasko", emoji: "🚙", date: c.kaskoDate || null, apptKey: "kaskoDate", apptDate: (c.appointments && c.appointments.kaskoDate) || null });
      items.push({ carId: c.id, carName: c.name, carPhoto: c.photo, type: "Vergi (MTV)", emoji: "💰", date: c.taxDate || null, apptKey: "taxDate", apptDate: (c.appointments && c.appointments.taxDate) || null });
      items.push({ carId: c.id, carName: c.name, carPhoto: c.photo, type: "Lastik Değişimi", emoji: "🛞", date: c.tireDate || null, apptKey: "tireDate", apptDate: (c.appointments && c.appointments.tireDate) || null });
    });
    items.forEach(function (it) {
      it.days = daysUntil(it.date);
      it.status = urgency(it.days);
      it.dateLabel = it.date ? fmtDateTR(it.date) : "Tarih girilmedi";
      if (it.apptDate) it.dateLabel += " · 📅 Randevu: " + fmtDateTR(it.apptDate);
      it.tier = tierOf(it.status);
      it.metric = it.days === null ? 99999 : it.days;
    });

    relevant.forEach(function (c) {
      if (c.maintenanceKm == null) return;
      var remaining = c.currentKm != null ? (c.maintenanceKm - c.currentKm) : null;
      var status = kmUrgency(remaining);
      items.push({
        carId: c.id, carName: c.name, carPhoto: c.photo, type: "Bakım / Servis (km)", emoji: "🔧",
        date: null, dateLabel: status.label, status: status, isKm: true,
        tier: tierOf(status), metric: remaining === null ? 99999 : remaining
      });
    });

    items.sort(function (a, b) { return a.tier !== b.tier ? a.tier - b.tier : a.metric - b.metric; });
    return items;
  }

        '<label class="field"><span>Şifre (Tekrar)</span><div class="pw-field"><input id="r-pass2" type="password" placeholder="Şifreni tekrar gir" autocomplete="new-password" /><button type="button" class="pw-toggle" data-target="r-pass2" aria-label="Şifreyi göster/gizle">👁️</button></div></label>' +
        '<button type="button" class="btn-primary full" id="auth-submit" ' + (state.authBusy ? "disabled" : "") + '>' + (state.authBusy ? "Hesap oluşturuluyor…" : "Hesap Oluştur") + '</button>';
    } else {
      html +=
        '<label class="field"><span>E-posta</span><input id="l-email" type="email" placeholder="ornek@eposta.com" autocomplete="email" /></label>' +
        '<label class="field"><span>Şifre</span><div class="pw-field"><input id="l-pass" type="password" placeholder="Şifren" autocomplete="current-password" /><button type="button" class="pw-toggle" data-target="l-pass" aria-label="Şifreyi göster/gizle">👁️</button></div></label>' +
        '<button type="button" class="link-btn" id="forgot-pass-link" style="margin:-6px 0 10px;">Şifremi unuttum?</button>' +
        '<button type="button" class="btn-primary full" id="auth-submit" ' + (state.authBusy ? "disabled" : "") + '>' + (state.authBusy ? "Giriş yapılıyor…" : "Giriş Yap") + '</button>';

  function bindAuthActions() {
    var authThemeBtn = document.getElementById("auth-theme-toggle");
    if (authThemeBtn) authThemeBtn.addEventListener("click", function () { toggleTheme(); });
    document.querySelectorAll('[data-action="auth-tab"]').forEach(function (btn) {
      btn.addEventListener("click", function () {
        state.authMode = btn.getAttribute("data-mode");
        state.authError = null;
        renderAuth();
      });
    });
    document.querySelectorAll(".pw-toggle").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var input = document.getElementById(btn.getAttribute("data-target"));
        if (!input) return;
        input.type = input.type === "password" ? "text" : "password";
        btn.textContent = input.type === "password" ? "👁️" : "🙈";
      });
    });
    var submit = document.getElementById("auth-submit");
    if (submit) submit.addEventListener("click", function () {
      if (state.authMode === "register") handleRegister(); else handleLogin();
    });
    var forgotBtn = document.getElementById("forgot-pass-link");
    if (forgotBtn) forgotBtn.addEventListener("click", handleForgotPassword);
    document.querySelectorAll(".auth-card input").forEach(function (input) {
      input.addEventListener("keydown", function (ev) {
        if (ev.key === "Enter") { ev.preventDefault(); if (submit) submit.click(); }
      });
    });
  }

  function handleRegister() {
    var name = document.getElementById("r-name").value.trim();
    var email = document.getElementById("r-email").value.trim();
    var pass = document.getElementById("r-pass").value;
    var pass2 = document.getElementById("r-pass2").value;

    if (name.length < 2) { state.authError = "Lütfen ad soyad gir."; renderAuth(); return; }
    if (!EMAIL_RE.test(email)) { state.authError = "Geçerli bir e-posta adresi gir."; renderAuth(); return; }
    if (pass.length < 6 || !PASSWORD_RE.test(pass)) { state.authError = PASSWORD_HINT; renderAuth(); return; }
    if (pass !== pass2) { state.authError = "Şifreler eşleşmiyor."; renderAuth(); return; }

    state.authError = null; state.authBusy = true; renderAuth();
    auth.createUserWithEmailAndPassword(email, pass).then(function (cred) {
      return cred.user.updateProfile({ displayName: name }).then(function () {
        var patch = buildMemberProfileEntryWithMembers(cred.user.uid, name, email);
        patch.name = name; patch.email = email; patch.avatar = null;
        patch.cars = []; patch.expenses = []; patch.familyMembers = [];
        patch.createdAt = firebase.firestore.FieldValue.serverTimestamp();
        // merge:true kullanılır: aynı anda auth durum dinleyicisinin (loginAs)
        // tetiklediği paralel bir belge oluşturma yazımıyla çakışırsa, birbirlerinin
        // memberProfiles/members alanlarını ezmesinler.
        return db.collection("users").doc(cred.user.uid).set(patch, { merge: true });
      });
    }).then(function () {
      state.authBusy = false;
      toast("Hoş geldin, " + name.split(" ")[0] + "! Hesabın oluşturuldu.");
    }).catch(function (err) {
      state.authBusy = false;
      state.authError = authErrorMessage(err);
      renderAuth();
    });
  }

  function handleLogin() {
    var email = document.getElementById("l-email").value.trim();
    var pass = document.getElementById("l-pass").value;
    if (!email || !pass) { state.authError = "E-posta ve şifreni gir."; renderAuth(); return; }

    state.authError = null; state.authBusy = true; renderAuth();
    auth.signInWithEmailAndPassword(email, pass).then(function (cred) {
      state.authBusy = false;
      toast("Tekrar hoş geldin, " + (cred.user.displayName || "").split(" ")[0] + "!");
    }).catch(function (err) {
      state.authBusy = false;
      state.authError = authErrorMessage(err);
      renderAuth();
    });
  }

  function handleForgotPassword() {
    var emailInput = document.getElementById("l-email");
    var email = emailInput ? emailInput.value.trim() : "";
    if (!EMAIL_RE.test(email)) {
      state.authError = "Şifre sıfırlama bağlantısı göndermek için önce e-posta alanına geçerli bir adres gir.";
      renderAuth();
      return;
    }

    state.authError = null;
    var btn = document.getElementById("forgot-pass-link");
    if (btn) { btn.disabled = true; btn.textContent = "Gönderiliyor…"; }

    auth.sendPasswordResetEmail(email).then(function () {
      if (btn) { btn.disabled = false; btn.textContent = "Şifremi unuttum?"; }
      toast("Şifre sıfırlama bağlantısı " + email + " adresine gönderildi. Gelen kutunu (ve spam klasörünü) kontrol et.");
    }).catch(function (err) {
      if (btn) { btn.disabled = false; btn.textContent = "Şifremi unuttum?"; }
      if (err && err.code === "auth/user-not-found") {
        state.authError = "Bu e-posta ile kayıtlı bir hesap bulunamadı.";
      } else {
        state.authError = authErrorMessage(err);
      }
      renderAuth();
    });
  }

  function getOnboardingSteps() {
    var carsList = state.cars || [];
    var expensesList = state.expenses || [];
    return [
      { key: "car", label: "Aracını ekle", done: carsList.length > 0, actionLabel: "Araç Ekle", action: "open-add-car" },
      { key: "expense", label: "İlk masrafını gir", done: expensesList.length > 0, actionLabel: "Masraf Ekle", action: (carsList.length > 0 ? "open-add-expense" : null) },
      { key: "notif", label: "Bildirimleri aç (bakım hatırlatıcıları için)", done: state.notifStatus === "granted", actionLabel: "Bildirimleri Aç", action: (state.notifStatus !== "unsupported" && state.notifStatus !== "granted" ? "enable-notifications" : null) }
    ];
  }

  function renderOnboardingCard() {
    var steps = getOnboardingSteps();
    var allDone = steps.every(function (s) { return s.done; });
    if (allDone && !state.onboardingDismissed) {
      state.onboardingDismissed = true;
      setLocalData("onboarding_dismissed", true);
    }
    if (state.onboardingDismissed || allDone) return "";

    var html = '<section class="onboard-card" aria-label="Başlangıç rehberi">' +
      '<div class="onboard-head">' +
        '<div><p class="onboard-title">👋 Garaj Defteri\'ne hoş geldin!</p>' +
        '<p class="onboard-sub">Başlamak için şu birkaç adımı tamamla:</p></div>' +
        '<button type="button" class="icon-btn onboard-close" data-action="dismiss-onboarding" aria-label="Rehberi kapat" title="Kapat">✕</button>' +
      '</div>' +
      '<ul class="onboard-steps">';
    steps.forEach(function (s, i) {
      html += '<li class="onboard-step ' + (s.done ? "done" : "") + '">' +
        '<span class="onboard-step-badge">' + (s.done ? "✓" : (i + 1)) + '</span>' +
        '<span class="onboard-step-label">' + esc(s.label) + '</span>' +

    if (car.transmission) detailBits.push(esc(car.transmission));
    if (car.plate) detailBits.push(esc(car.plate));

  // uygular.
  var APPT_FIELD_LABELS = {

  // "harici siteye git" seçeneğini randevu formunun içine de ekliyoruz.

  function saveCarAppointmentField(carId, fieldKey, apptVal) {
    var car = (state.cars || []).find(function (c) { return c.id === carId; });
    if (!car) return;
    var prevAppt = car.appointments || {};
    var snapKey = fieldKey + "DueSnapshot";
    var appointments = Object.assign({}, prevAppt);
    appointments[fieldKey] = apptVal || null;
    if (!apptVal) {
      appointments[snapKey] = null;
    } else if (!prevAppt[fieldKey] || prevAppt[fieldKey] !== apptVal) {
      appointments[snapKey] = car[fieldKey] || null;
    } else {
      appointments[snapKey] = prevAppt[snapKey] != null ? prevAppt[snapKey] : (car[fieldKey] || null);
    }
    state.cars = (state.cars || []).map(function (c) { return c.id === carId ? Object.assign({}, c, { appointments: appointments }) : c; });
    persistCars();
    closeModal();
    render();
    toast(apptVal ? "Randevu kaydedildi." : "Randevu kaldırıldı.");
  }

  function gaugeSVG(pct) {
    var clamped = Math.max(0, Math.min(1, pct));
    var angle = -180 + clamped * 180;
    var rad = angle * Math.PI / 180;
    var cx = 110, cy = 108, r = 84;
    var nx = cx + r * 0.86 * Math.cos(rad), ny = cy + r * 0.86 * Math.sin(rad);
    function arc(s, e, radius) {
      var sr = s * Math.PI / 180, er = e * Math.PI / 180;
      var x1 = cx + radius * Math.cos(sr), y1 = cy + radius * Math.sin(sr);
      var x2 = cx + radius * Math.cos(er), y2 = cy + radius * Math.sin(er);
      var large = (e - s) > 180 ? 1 : 0;
      return "M " + x1 + " " + y1 + " A " + radius + " " + radius + " 0 " + large + " 1 " + x2 + " " + y2;
    }
    var d = window.__dashboardData;
    var monthTotal = d ? d.monthTotal : 0;
    return '<svg viewBox="0 0 220 130" class="gauge-svg" role="img" aria-label="Bu ayki harcama göstergesi">' +
      '<path d="' + arc(-180, -60, r) + '" stroke="#7BC67E" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.85"/>' +
      '<path d="' + arc(-60, -20, r) + '" stroke="#F2A93B" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.85"/>' +
      '<path d="' + arc(-20, 0, r) + '" stroke="#E2574C" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.85"/>' +
      '<line x1="' + cx + '" y1="' + cy + '" x2="' + nx + '" y2="' + ny + '" stroke="#EDEEF0" stroke-width="3" stroke-linecap="round"/>' +
      '<circle cx="' + cx + '" cy="' + cy + '" r="6" fill="#EDEEF0"/>' +
      '<text x="' + cx + '" y="' + (cy - 26) + '" text-anchor="middle" class="gauge-value">' + fmtTL(monthTotal) + '</text>' +
      '<text x="' + cx + '" y="' + (cy - 8) + '" text-anchor="middle" class="gauge-sub">BU AY</text>' +
      '</svg>';
  }

  function drawCharts() {
    if (typeof Chart === "undefined") return;

    var d = window.__dashboardData;
    var donutEl = document.getElementById("donutChart");
    if (d && donutEl && d.categoryData.length) {
      if (charts.donut) charts.donut.destroy();
      charts.donut = new Chart(donutEl, {
        type: "doughnut",
        data: {
          labels: d.categoryData.map(function (c) { return c.name; }),
          datasets: [{ data: d.categoryData.map(function (c) { return c.value; }), backgroundColor: d.categoryData.map(function (c) { return c.color; }), borderWidth: 0 }]
        },
        options: { plugins: { legend: { display: false }, tooltip: { callbacks: { label: function (ctx) { return ctx.label + ": " + fmtTL(ctx.parsed); } } } }, cutout: "62%" }
      });
    }

    var a = window.__analysisData;
    if (!a) return;

    var trendEl = document.getElementById("trendChart");
    if (trendEl && a.months && a.months.some(function (m) { return m.total > 0; })) {
      if (charts.trend) charts.trend.destroy();
      charts.trend = new Chart(trendEl, {
        type: "bar",
        data: {
          labels: a.months.map(function (m) { return m.label; }),
          datasets: [{ data: a.months.map(function (m) { return m.total; }), backgroundColor: "#F2A93B", borderRadius: 6, maxBarThickness: 46 }]
        },
        options: {
          maintainAspectRatio: false,
          plugins: { legend: { display: false }, tooltip: { callbacks: { label: function (ctx) { return fmtTL(ctx.parsed.y); } } } },
          scales: {
            x: { grid: { display: false }, ticks: { color: "#8B939D" } },
            y: { grid: { color: "#383F47" }, ticks: { color: "#8B939D" } }
          }
        }
      });
    }

    var consumptionEl = document.getElementById("consumptionChart");
    if (consumptionEl && a.fuelSeries) {
      var consPts = a.fuelSeries.consumptionSeries.filter(function (p) { return p.consumption != null; });
      if (consPts.length) {
        if (charts.consumption) charts.consumption.destroy();
        charts.consumption = new Chart(consumptionEl, {
          type: "line",
          data: {
            labels: consPts.map(function (p) { return p.dateLabel; }),
            datasets: [{ data: consPts.map(function (p) { return p.consumption; }), borderColor: "#4FA8D8", backgroundColor: "#4FA8D833", tension: 0.3, fill: true, pointRadius: 3 }]
          },
          options: {
            maintainAspectRatio: false,
            plugins: { legend: { display: false }, tooltip: { callbacks: { label: function (ctx) { return ctx.parsed.y.toFixed(1).replace(".", ",") + " L/100km"; } } } },
            scales: {
              x: { grid: { display: false }, ticks: { color: "#8B939D" } },
              y: { grid: { color: "#383F47" }, ticks: { color: "#8B939D" } }
            }
          }
        });
      }
    }

    var priceEl = document.getElementById("priceChart");
    if (priceEl && a.fuelSeries && a.fuelSeries.priceSeries.length > 1) {
      if (charts.price) charts.price.destroy();
      charts.price = new Chart(priceEl, {
        type: "line",
        data: {
          labels: a.fuelSeries.priceSeries.map(function (p) { return p.dateLabel; }),
          datasets: [{ data: a.fuelSeries.priceSeries.map(function (p) { return p.price; }), borderColor: "#C77DE0", backgroundColor: "#C77DE033", tension: 0.3, fill: true, pointRadius: 3 }]
        },
        options: {
          maintainAspectRatio: false,
          plugins: { legend: { display: false }, tooltip: { callbacks: { label: function (ctx) { return fmtTL(ctx.parsed.y) + "/L"; } } } },
          scales: {
            x: { grid: { display: false }, ticks: { color: "#8B939D" } },
            y: { grid: { color: "#383F47" }, ticks: { color: "#8B939D" } }
          }
        }
      });
    }
  }

  function renderAnalysisPanel() {
    var carsList = state.cars || [];
    var selectedCar = carsList.find(function (c) { return c.id === state.selectedCarId; });
    var scopeLabel = selectedCar ? selectedCar.name : "Tüm Araçlar";
    var months = computeMonthlyTrend(6);
    var budgetInfo = computeBudgetInfo();
    var fuelSeries = null;

    var html = '<main class="gd-grid">';

    // trend chart
    html += '<section class="panel span-2"><h2>Aylık Harcama Trendi — ' + esc(scopeLabel) + ' (Son 6 Ay)</h2>';
    if (!months.some(function (m) { return m.total > 0; })) {
      html += '<p class="empty-hint">Henüz masraf kaydı yok. Trend grafiği burada dolacak.</p>';
    } else {
      html += '<div class="chart-box"><canvas id="trendChart"></canvas></div>';
    }
    html += '</section>';

    // budget panel
    html += '<section class="panel"><h2>Aylık Bütçe — ' + esc(scopeLabel) + '</h2>' +
      '<div class="budget-row">' +
        '<input type="text" inputmode="numeric" id="budget-input" placeholder="Örn. 5.000" value="' + (budgetInfo.budget ? groupThousands(String(Math.round(budgetInfo.budget))) : "") + '" aria-label="Aylık bütçe tutarı" />' +
