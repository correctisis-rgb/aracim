<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Garaj Defteri - Akıllı Taşıt Asistanı</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1B1F24;
    --surface: #242930;
    --surface-2: #2C323A;
    --border: #383F47;
    --amber: #F2A93B;
    --blue: #4FA8D8;
    --green: #7BC67E;
    --purple: #C77DE0;
    --red: #E2574C;
    --text: #EDEEF0;
    --muted: #8B939D;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--text);
    font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
  }
  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 20px;
  }
  
  /* Navbar */
  .navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 25px;
  }
  .logo-wrapper {
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
    user-select: none;
  }
  .account-chip {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    padding: 6px 14px;
    border-radius: 30px;
    border: 1px solid var(--border);
    cursor: pointer;
    position: relative;
    font-size: 14px;
    transition: all 0.2s;
  }
  .account-chip:hover {
    background: var(--surface-2);
  }
  .account-menu {
    position: absolute;
    top: 45px; right: 0;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 180px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    z-index: 100;
    overflow: hidden;
  }
  .account-menu button {
    display: block;
    width: 100%;
    padding: 10px 15px;
    background: none;
    border: none;
    color: var(--text);
    text-align: left;
    font-size: 13px;
    cursor: pointer;
  }
  .account-menu button:hover {
    background: rgba(255,255,255,0.05);
  }

  /* Gauges & Summary */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    margin-bottom: 25px;
  }
  .gauge-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    display: flex;
    align-items: center;
    justify-content: space-around;
  }
  .gauge-svg {
    transform: rotate(-90deg);
  }
  .gauge-value {
    font-family: 'Oswald', sans-serif;
    font-size: 24px;
    font-weight: 700;
  }
  .gauge-label {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 5px;
  }

  /* Dynamic Alert Engine CSS */
  .alerts-container {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 25px;
  }
  .alert-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 4px solid var(--muted);
    border-radius: 8px;
    padding: 12px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 15px;
    transition: transform 0.2s;
  }
  .alert-card:hover {
    transform: translateX(3px);
  }
  .alert-card.danger { border-left-color: var(--red); }
  .alert-card.warning { border-left-color: var(--amber); }
  .alert-card.success { border-left-color: var(--green); }
  .alert-card.info { border-left-color: var(--blue); }
  
  .alert-content {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .alert-title {
    font-weight: 600;
    font-size: 13px;
    color: var(--text);
  }
  .alert-desc {
    font-size: 11px;
    color: var(--muted);
  }
  .alert-badge {
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    font-family: 'JetBrains Mono', monospace;
    white-space: nowrap;
  }
  .alert-badge.danger { background: rgba(226, 87, 76, 0.15); color: var(--red); }
  .alert-badge.warning { background: rgba(242, 169, 59, 0.15); color: var(--amber); }
  .alert-badge.success { background: rgba(123, 198, 126, 0.15); color: var(--green); }
  .alert-badge.info { background: rgba(79, 168, 216, 0.15); color: var(--blue); }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 10px;
    margin-bottom: 25px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 10px;
  }
  .tab-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 15px;
    font-weight: 500;
    padding: 8px 16px;
    cursor: pointer;
    border-radius: 6px;
    transition: all 0.2s;
  }
  .tab-btn:hover {
    color: var(--text);
    background: rgba(255,255,255,0.03);
  }
  .tab-btn.active {
    color: var(--blue);
    background: rgba(79,168,216,0.1);
  }

  /* Buttons */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    border: none;
    border-radius: 8px;
    padding: 10px 18px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .btn-primary { background: var(--blue); color: #1B1F24; font-weight: 600; }
  .btn-primary:hover { opacity: 0.9; }
  .btn-secondary { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--border); }
  .btn-muted { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-muted:hover { color: var(--text); background: rgba(255,255,255,0.02); }
  .btn-danger { background: var(--red); color: var(--text); }
  .btn-danger:hover { opacity: 0.9; }
  .btn-icon {
    padding: 0;
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--surface-2);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-icon:hover { background: var(--border); }

  /* Cards & Lists */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 20px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 4px 15px rgba(0,0,0,0.15);
  }
  .card-header {
    padding: 15px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .card-body {
    padding: 20px;
    flex: 1;
  }
  .card-footer {
    padding: 15px 20px;
    border-top: 1px solid var(--border);
    background: rgba(0,0,0,0.1);
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    flex-wrap: wrap;
  }

  /* Maintenance Tracker Elements */
  .progress-bar-container {
    background: var(--surface-2);
    border-radius: 10px;
    height: 8px;
    width: 100%;
    overflow: hidden;
    margin: 8px 0;
    border: 1px solid rgba(255,255,255,0.03);
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--blue), var(--green));
    border-radius: 10px;
    transition: width 0.4s ease;
  }
  .progress-bar-fill.danger {
    background: var(--red);
  }

  /* Image Upload & Styling */
  .car-img-container {
    height: 160px;
    background: var(--surface-2);
    position: relative;
    overflow: hidden;
  }
  .car-img {
    width: 100%; height: 100%;
    object-fit: cover;
  }
  .no-img {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    font-size: 45px;
    color: var(--muted);
    opacity: 0.3;
  }
  .car-form-img {
    width: 100%;
    max-height: 160px;
    object-fit: cover;
    border-radius: 8px;
    border: 1px solid var(--border);
  }

  /* Form & Modals */
  .form-group {
    margin-bottom: 15px;
  }
  .form-group label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
    font-weight: 500;
  }
  .form-control {
    width: 100%;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    outline: none;
    transition: border 0.2s;
  }
  .form-control:focus {
    border-color: var(--blue);
  }
  .form-row {
    display: flex;
    gap: 15px;
  }
  .form-row > * {
    flex: 1;
  }
  @media (max-width: 600px) {
    .form-row {
      flex-direction: column;
      gap: 0;
    }
  }

  /* Fuel Logs Table inside Modal */
  .fuel-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
    font-size: 13px;
  }
  .fuel-table th, .fuel-table td {
    padding: 10px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }
  .fuel-table th {
    color: var(--muted);
    font-weight: 500;
  }
  .fuel-table tr:hover {
    background: rgba(255, 255, 255, 0.02);
  }

  /* Modal Overlays */
  .modal-backdrop {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    padding: 15px;
  }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    width: 100%;
    max-width: 500px;
    max-height: 90vh;
    display: flex;
    flex-direction: column;
    box-shadow: 0 15px 40px rgba(0,0,0,0.6);
  }
  .modal-header {
    padding: 15px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .modal-header h2 { margin: 0; font-size: 18px; font-weight: 600; }
  .modal-body {
    padding: 20px;
    overflow-y: auto;
    flex: 1;
  }
  .modal-footer {
    padding: 15px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
    gap: 10px;
  }

  /* Toast & Confirm Dialogs */
  .toast {
    position: fixed;
    bottom: 20px; right: 20px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-left: 4px solid var(--blue);
    padding: 12px 20px;
    border-radius: 8px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.4);
    z-index: 300;
    font-size: 14px;
    display: none;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .confirm-backdrop {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.75);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 400;
    padding: 15px;
  }
  .confirm-modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    max-width: 400px;
    width: 100%;
    padding: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }
  .confirm-header { font-weight: 600; font-size: 16px; margin-bottom: 10px; }
  .confirm-body { font-size: 14px; color: var(--muted); margin-bottom: 20px; line-height: 1.5; }
  .confirm-footer { display: flex; justify-content: flex-end; gap: 10px; }

  .badge {
    display: inline-block;
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
  }
  .badge-blue { background: rgba(79,168,216,0.15); color: var(--blue); }
  .badge-amber { background: rgba(242,169,59,0.15); color: var(--amber); }

  /* Utilities */
  .avatar {
    width: 24px; height: 24px;
    border-radius: 50%;
    background: var(--border);
    object-fit: cover;
  }
</style>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>

<div id="app"></div>
<div id="modal-container"></div>
<div id="toast" class="toast"></div>

<script>
  // Firebase Configuration - Canlı Bağlantınız Korundu
  var firebaseConfig = {
    apiKey: "AIzaSyDq...",
    authDomain: "garaj-defteri-49e05.firebaseapp.com",
    projectId: "garaj-defteri-49e05",
    storageBucket: "garaj-defteri-49e05.appspot.com",
    messagingSenderId: "569722421319",
    appId: "1:569722421319:web:5712e08e6f1f413dbfa4d6"
  };
  firebase.initializeApp(firebaseConfig);

  // Uygulama Durum Yönetimi (State)
  var state = {
    user: null,
    cars: [],
    expenses: [],
    family: [],
    offlineQueue: [],
    filterCarId: "all",
    modal: null, // { type: 'car'|'expense'|'family'|'profile'|'fuel', data?: any }
    accountMenuOpen: false,
    view: "cars" // 'cars' | 'expenses' | 'family'
  };

  // Veri Saklama ve Firebase Eşitleme Yapıları
  function persistCars() {
    localStorage.setItem("garaj_cars", JSON.stringify(state.cars));
    saveToFirebase();
  }
  function persistExpenses() {
    localStorage.setItem("garaj_expenses", JSON.stringify(state.expenses));
    saveToFirebase();
  }
  function persistFamily() {
    localStorage.setItem("garaj_family", JSON.stringify(state.family));
    saveToFirebase();
  }

  function saveToFirebase() {
    if (!state.user) return;
    var userId = state.user.uid;
    var db = firebase.firestore();
    var dataToSave = {
      cars: state.cars,
      expenses: state.expenses,
      family: state.family,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    };

    if (navigator.onLine) {
      db.collection("users").doc(userId).set(dataToSave, { merge: true })
        .then(function() {
          showToast("Bulut senkronizasyonu sağlandı.", "success");
        })
        .catch(function(err) {
          console.error("Bulut eşitleme hatası:", err);
          state.offlineQueue.push(dataToSave);
          localStorage.setItem("garaj_offline_queue", JSON.stringify(state.offlineQueue));
        });
    } else {
      state.offlineQueue.push(dataToSave);
      localStorage.setItem("garaj_offline_queue", JSON.stringify(state.offlineQueue));
      showToast("Çevrimdışı mod: Değişiklikler yerel diske kaydedildi.");
    }
  }

  function syncOfflineData() {
    if (!navigator.onLine || state.offlineQueue.length === 0 || !state.user) return;
    var userId = state.user.uid;
    var db = firebase.firestore();
    var lastQueueItem = state.offlineQueue[state.offlineQueue.length - 1];

    db.collection("users").doc(userId).set(lastQueueItem, { merge: true })
      .then(function() {
        state.offlineQueue = [];
        localStorage.removeItem("garaj_offline_queue");
        showToast("Çevrimdışı verileriniz başarıyla bulut ile eşitlendi!", "success");
        render();
      })
      .catch(function(err) {
        console.error("Çevrimdışı senkronizasyon başarısız:", err);
      });
  }

  window.addEventListener("online", syncOfflineData);
  window.addEventListener("offline", function() {
    showToast("İnternet bağlantısı koptu. Çevrimdışı çalışılıyor.");
  });

  function loadLocalData() {
    var localCars = localStorage.getItem("garaj_cars");
    var localExpenses = localStorage.getItem("garaj_expenses");
    var localFamily = localStorage.getItem("garaj_family");
    var queue = localStorage.getItem("garaj_offline_queue");

    if (localCars) state.cars = JSON.parse(localCars);
    if (localExpenses) state.expenses = JSON.parse(localExpenses);
    if (localFamily) state.family = JSON.parse(localFamily);
    if (queue) state.offlineQueue = JSON.parse(queue);
  }

  // Firebase Kimlik Doğrulama Dinleyicisi
  firebase.auth().onAuthStateChanged(function (user) {
    if (user) {
      state.user = user;
      loadLocalData();
      render();

      var db = firebase.firestore();
      db.collection("users").doc(user.uid).get()
        .then(function(doc) {
          if (doc.exists) {
            var data = doc.data();
            state.cars = data.cars || [];
            state.expenses = data.expenses || [];
            state.family = data.family || [];

            localStorage.setItem("garaj_cars", JSON.stringify(state.cars));
            localStorage.setItem("garaj_expenses", JSON.stringify(state.expenses));
            localStorage.setItem("garaj_family", JSON.stringify(state.family));
            render();
          }
          syncOfflineData();
        })
        .catch(function(err) {
          console.error("Firestore veri çekme hatası:", err);
          render();
        });
    } else {
      state.user = null;
      loadLocalData();
      render();
    }
  });

  // Google ile Giriş Yapma Fonksiyonu
  function googleLogin() {
    var provider = new firebase.auth.GoogleAuthProvider();
    firebase.auth().signInWithPopup(provider)
      .then(function(result) {
        showToast("Giriş yapıldı: " + result.user.displayName, "success");
      })
      .catch(function(err) {
        console.error(err);
        showToast("Giriş başarısız oldu.", "danger");
      });
  }

  // Güvenli Çıkış Yapma Fonksiyonu
  function logout() {
    firebase.auth().signOut().then(function() {
      state.user = null;
      state.cars = [];
      state.expenses = [];
      state.family = [];
      localStorage.removeItem("garaj_cars");
      localStorage.removeItem("garaj_expenses");
      localStorage.removeItem("garaj_family");
      showToast("Oturum kapatıldı.");
      render();
    });
  }

  // Base64 Görsel Sıkıştırma Fonksiyonu (Kota Koruyucu)
  function compressImage(file, maxWidthOrHeight, callback) {
    var reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = function (ev) {
      var img = new Image();
      img.src = ev.target.result;
      img.onload = function () {
        var canvas = document.createElement("canvas");
        var width = img.width;
        var height = img.height;

        if (width > height) {
          if (width > maxWidthOrHeight) {
            height *= maxWidthOrHeight / width;
            width = maxWidthOrHeight;
          }
        } else {
          if (height > maxWidthOrHeight) {
            width *= maxWidthOrHeight / height;
            height = maxWidthOrHeight;
          }
        }

        canvas.width = width;
        canvas.height = height;
        var ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, width, height);
        var base64 = canvas.toDataURL("image/jpeg", 0.72);
        callback(base64);
      };
    };
  }

  // Modals Controller
  function openModal(type, data) {
    state.modal = { type: type, data: data };
    render();
  }
  function closeModal() {
    state.modal = null;
    render();
  }

  // Toast & Confirm Çekirdeği
  function showToast(msg, type) {
    var el = document.getElementById("toast");
    if (!el) return;
    el.innerText = msg;
    el.style.borderLeftColor = type === "success" ? "var(--green)" : type === "danger" ? "var(--red)" : "var(--blue)";
    el.style.display = "block";
    setTimeout(function() {
      el.style.display = "none";
    }, 3200);
  }

  function showConfirm(options) {
    var backdrop = document.createElement("div");
    backdrop.className = "confirm-backdrop";
    backdrop.innerHTML = `
      <div class="confirm-modal">
        <div class="confirm-header">${options.title}</div>
        <div class="confirm-body">${options.message}</div>
        <div class="confirm-footer">
          <button class="btn btn-muted" id="confirm-cancel-btn">Vazgeç</button>
          <button class="btn ${options.danger ? "btn-danger" : "btn-primary"}" id="confirm-ok-btn">${options.confirmLabel || "Tamam"}</button>
        </div>
      </div>
    `;
    document.body.appendChild(backdrop);
    document.getElementById("confirm-cancel-btn").onclick = function() {
      backdrop.remove();
    };
    document.getElementById("confirm-ok-btn").onclick = function() {
      backdrop.remove();
      if (options.onConfirm) options.onConfirm();
    };
  }

  // Akıllı Tarih Kontrol & Hatırlatıcı Motoru
  function getDaysRemaining(dateStr) {
    if (!dateStr) return null;
    var today = new Date();
    today.setHours(0,0,0,0);
    var targetDate = new Date(dateStr);
    targetDate.setHours(0,0,0,0);
    var diffTime = targetDate - today;
    return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
  }

  function checkAlerts() {
    var alerts = [];
    state.cars.forEach(function(car) {
      // 1. Muayene Sorgusu
      if (car.muayeneTarihi) {
        var rem = getDaysRemaining(car.muayeneTarihi);
        if (rem !== null) {
          if (rem <= 15) {
            alerts.push({
              type: "danger",
              title: `${car.plaka} - Muayene Geçerliliği Doluyor!`,
              desc: `TÜVTÜRK Araç muayene süreniz dolmak üzere ya da doldu. Lütfen randevu alın.`,
              val: rem <= 0 ? "Süresi Geçti" : `${rem} Gün Kaldı`,
              date: car.muayeneTarihi
            });
          } else if (rem <= 30) {
            alerts.push({
              type: "warning",
              title: `${car.plaka} - Muayene Zamanı Yaklaşıyor`,
              desc: `Araç muayene bitiş tarihine az bir zaman kaldı. Kontrollerinizi yapın.`,
              val: `${rem} Gün Kaldı`,
              date: car.muayeneTarihi
            });
          }
        }
      }
      
      // 2. Trafik Sigortası Sorgusu
      if (car.sigortaTarihi) {
        var rem = getDaysRemaining(car.sigortaTarihi);
        if (rem !== null) {
          if (rem <= 15) {
            alerts.push({
              type: "danger",
              title: `${car.plaka} - Trafik Sigortası Bitiyor!`,
              desc: `Zorunlu Trafik Sigortanızın yenilenme zamanı geldi. Trafiğe cezasız çıkmak için poliçenizi tazeleyin.`,
              val: rem <= 0 ? "Süresi Doldu" : `${rem} Gün Kaldı`,
              date: car.sigortaTarihi
            });
          } else if (rem <= 30) {
            alerts.push({
              type: "warning",
              title: `${car.plaka} - Sigorta Yenileme Yaklaştı`,
              desc: `Trafik sigortası bitiş tarihi yaklaşıyor. Sigortacınızdan teklif isteyebilirsiniz.`,
              val: `${rem} Gün Kaldı`,
              date: car.sigortaTarihi
            });
          }
        }
      }

      // 3. Kasko Sorgusu
      if (car.kaskoTarihi) {
        var rem = getDaysRemaining(car.kaskoTarihi);
        if (rem !== null && rem <= 15) {
          alerts.push({
            type: "warning",
            title: `${car.plaka} - Kasko Poliçesi Sona Eriyor`,
            desc: `Aracınızın isteğe bağlı kasko koruma poliçesi bitiş aşamasında.`,
            val: rem <= 0 ? "Bitti" : `${rem} Gün Kaldı`,
            date: car.kaskoTarihi
          });
        }
      }

      // 4. Periyodik Bakım Sorgusu
      if (car.guncelKm && car.bakimHedefKm) {
        var kmLeft = car.bakimHedefKm - car.guncelKm;
        if (kmLeft <= 1000) {
          alerts.push({
            type: kmLeft <= 0 ? "danger" : "warning",
            title: `${car.plaka} - Periyodik Bakım Zamanı!`,
            desc: kmLeft <= 0 
              ? `Planlanan bakım kilometresi ${Math.abs(kmLeft).toLocaleString('tr-TR')} km aşıldı! Yağ ve filtre bakımlarını acilen yaptırın.` 
              : `Bakım zamanına sadece ${kmLeft.toLocaleString('tr-TR')} km kaldı. Randevu planlayın.`,
            val: kmLeft <= 0 ? "Bakım Geçti" : `${kmLeft.toLocaleString('tr-TR')} KM Kaldı`,
            date: `Hedef: ${car.bakimHedefKm.toLocaleString('tr-TR')} KM`
          });
        }
      }
    });
    return alerts;
  }

  // Yakıt İstatistik Hesaplama Motoru
  function calculateFuelStats(car) {
    if (!car.fuelLogs || car.fuelLogs.length < 2) {
      return { avgLiters: null, costPerKm: null, totalSpent: 0 };
    }
    // Kilometreye göre sırala (Eskiden yeniye)
    var logs = car.fuelLogs.slice().sort(function(a, b) { return a.km - b.km; });
    var firstKm = logs[0].km;
    var lastKm = logs[logs.length - 1].km;
    var totalKm = lastKm - firstKm;

    if (totalKm <= 0) return { avgLiters: null, costPerKm: null, totalSpent: 0 };

    // İlk depodan sonra alınan yakıt miktarını ve maliyetini topla
    var totalLiters = 0;
    var totalCost = 0;
    for (var i = 1; i < logs.length; i++) {
      totalLiters += parseFloat(logs[i].liter || 0);
      totalCost += parseFloat(logs[i].total || 0);
    }

    var avgLiters = (totalLiters / totalKm) * 100;
    var costPerKm = totalCost / totalKm;

    return {
      avgLiters: avgLiters.toFixed(2),
      costPerKm: costPerKm.toFixed(2),
      totalSpent: totalCost
    };
  }

  // Veri Format Araçları
  function fmtTL(val) {
    if (!val && val !== 0) return "0,00 TL";
    return parseFloat(val).toLocaleString("tr-TR", { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + " TL";
  }
  function groupThousands(val) {
    if (!val && val !== 0) return "";
    return val.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
  }
  function formatDate(dateStr) {
    if (!dateStr) return "-";
    var pts = dateStr.split("-");
    if (pts.length !== 3) return dateStr;
    return pts[2] + "." + pts[1] + "." + pts[0];
  }

  // JSON formatında veri yedekleme ve aktarma
  function exportData() {
    var dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify({
      cars: state.cars,
      expenses: state.expenses,
      family: state.family
    }, null, 2));
    var dlAnchor = document.createElement("a");
    dlAnchor.setAttribute("href", dataStr);
    dlAnchor.setAttribute("download", "garaj_defteri_yedek.json");
    document.body.appendChild(dlAnchor);
    dlAnchor.click();
    dlAnchor.remove();
  }

  function importData(file) {
    var reader = new FileReader();
    reader.onload = function(e) {
      try {
        var parsed = JSON.parse(e.target.result);
        if (parsed.cars || parsed.expenses || parsed.family) {
          state.cars = parsed.cars || [];
          state.expenses = parsed.expenses || [];
          state.family = parsed.family || [];
          persistCars();
          persistExpenses();
          persistFamily();
          showToast("Yedek başarıyla yüklendi!", "success");
          render();
        } else {
          showToast("Geçersiz yedek dosyası.", "danger");
        }
      } catch(err) {
        showToast("Dosya okuma hatası.", "danger");
      }
    };
    reader.readAsText(file);
  }

  // --- MERKEZİ GÜVENLİ OLAY DELEGASYON SİSTEMİ (BUG ÇÖZÜMÜ) ---
  
  function initEvents() {
    // Tüm click olayları döküman seviyesinde tek elden kontrol edilir (Çift tetiklenme kesinlikle yaşanmaz)
    document.addEventListener("click", function (ev) {
      var el = ev.target.closest("[data-action]");
      if (!el) return;

      ev.stopPropagation(); // Bubbling (kabarcıklanma) sorunlarını önler.
      var action = el.getAttribute("data-action");

      // Menü & Tab Değişimleri
      if (action === "tab-cars") {
        state.view = "cars";
        render();
      }
      else if (action === "tab-expenses") {
        state.view = "expenses";
        render();
      }
      else if (action === "tab-family") {
        state.view = "family";
        render();
      }
      else if (action === "toggle-account-menu") {
        state.accountMenuOpen = !state.accountMenuOpen;
        render();
      }
      else if (action === "open-profile") {
        state.modal = { type: "profile" };
        state.accountMenuOpen = false;
        render();
      }
      else if (action === "logout") {
        state.accountMenuOpen = false;
        render();
        showConfirm({
          title: "Çıkış Yap",
          message: "Hesabınızdan çıkış yapmak istediğinize emin misiniz?",
          confirmLabel: "Çıkış Yap",
          danger: true,
          onConfirm: function () { logout(); }
        });
      }
      else if (action === "google-login") {
        googleLogin();
      }

      // Modal Açılışları
      else if (action === "open-add-car") {
        openModal("car");
      }
      else if (action === "open-edit-car") {
        var id = el.getAttribute("data-id");
        var car = state.cars.find(function(c) { return c.id === id; });
        openModal("car", car);
      }
      else if (action === "open-add-expense") {
        openModal("expense");
      }
      else if (action === "open-edit-expense") {
        var id = el.getAttribute("data-id");
        var exp = state.expenses.find(function(e) { return e.id === id; });
        openModal("expense", exp);
      }
      else if (action === "open-add-family") {
        openModal("family");
      }
      else if (action === "open-edit-family") {
        var id = el.getAttribute("data-id");
        var fam = state.family.find(function(f) { return f.id === id; });
        openModal("family", fam);
      }
      else if (action === "open-fuel") {
        var id = el.getAttribute("data-id");
        var car = state.cars.find(function(c) { return c.id === id; });
        openModal("fuel", car);
      }

      // Resim Yükleme ve Kaldırma Tetikleyicileri
      else if (action === "trigger-file-input") {
        var targetId = el.getAttribute("data-target");
        var input = document.getElementById(targetId);
        if (input) input.click();
      }
      else if (action === "remove-car-img") {
        var imgType = el.getAttribute("data-type");
        var wrapperId = imgType === "ruhsat" ? "car-ruhsat-wrapper" : "car-image-wrapper";
        var inputId = imgType === "ruhsat" ? "car-ruhsat-input" : "car-image-input";
        var defaultText = imgType === "ruhsat" ? "Ruhsat Yükle" : "Fotoğraf Yükle";
        var icon = imgType === "ruhsat" ? "📑" : "📷";

        document.getElementById(wrapperId).innerHTML = `
          <div style="padding:25px; border:2px dashed var(--border); border-radius:8px; text-align:center; cursor:pointer;" data-action="trigger-file-input" data-target="${inputId}">
            <span style="font-size:24px; color:var(--muted);">${icon}</span>
            <div style="font-size:12px; color:var(--muted); margin-top:5px;">${defaultText}</div>
          </div>
        `;
        var input = document.getElementById(inputId);
        if (input) input.value = "";
      }

      // Verileri Kaydetme Olayları
      else if (action === "save-car") {
        var plaka = document.getElementById("car-plaka").value.trim().toUpperCase();
        var marka = document.getElementById("car-marka").value.trim();
        var model = document.getElementById("car-model").value.trim();
        var yil = parseInt(document.getElementById("car-yil").value) || 0;
        var guncelKm = parseInt(document.getElementById("car-guncelKm").value.replace(/\./g, "")) || 0;
        
        var muayeneTarihi = document.getElementById("car-muayeneTarihi").value;
        var sigortaTarihi = document.getElementById("car-sigortaTarihi").value;
        var kaskoTarihi = document.getElementById("car-kaskoTarihi").value;
        var bakimHedefKm = parseInt(document.getElementById("car-bakimHedefKm").value.replace(/\./g, "")) || 0;
        var bakimNotu = document.getElementById("car-bakimNotu").value.trim();

        var mainImgEl = document.getElementById("car-image-preview");
        var image = mainImgEl ? mainImgEl.src : "";

        var ruhsatImgEl = document.getElementById("car-ruhsat-preview");
        var ruhsatImage = ruhsatImgEl ? ruhsatImgEl.src : "";

        if (!plaka || !marka || !model || !yil || !guncelKm) {
          showToast("Lütfen plaka, marka, model, yıl ve kilometre alanlarını doldurun.", "danger");
          return;
        }

        var isEdit = !!state.modal.data && !!state.modal.data.id;
        if (isEdit) {
          var carId = state.modal.data.id;
          state.cars = state.cars.map(function (c) {
            if (c.id === carId) {
              return {
                id: carId, plaka: plaka, marka: marka, model: model, yil: yil, guncelKm: guncelKm,
                muayeneTarihi: muayeneTarihi, sigortaTarihi: sigortaTarihi, kaskoTarihi: kaskoTarihi,
                bakimHedefKm: bakimHedefKm, bakimNotu: bakimNotu, image: image, ruhsatImage: ruhsatImage,
                fuelLogs: c.fuelLogs || []
              };
            }
            return c;
          });
          showToast("Araç başarıyla güncellendi.", "success");
        } else {
          var newCar = {
            id: "car_" + Date.now(), plaka: plaka, marka: marka, model: model, yil: yil, guncelKm: guncelKm,
            muayeneTarihi: muayeneTarihi, sigortaTarihi: sigortaTarihi, kaskoTarihi: kaskoTarihi,
            bakimHedefKm: bakimHedefKm, bakimNotu: bakimNotu, image: image, ruhsatImage: ruhsatImage,
            fuelLogs: []
          };
          state.cars.push(newCar);
          showToast("Yeni araç garaja eklendi.", "success");
        }
        persistCars();
        closeModal();
      }
      else if (action === "save-expense") {
        var carId = document.getElementById("exp-carId").value;
        var date = document.getElementById("exp-date").value;
        var category = document.getElementById("exp-category").value;
        var amount = parseFloat(document.getElementById("exp-amount").value.replace(/\./g, "").replace(",", ".")) || 0;
        var desc = document.getElementById("exp-desc").value.trim();

        if (!carId || !date || !category || !amount) {
          showToast("Lütfen tüm zorunlu (*) alanları doldurun.", "danger");
          return;
        }

        var isEdit = !!state.modal.data && !!state.modal.data.id;
        if (isEdit) {
          var expId = state.modal.data.id;
          state.expenses = state.expenses.map(function (e) {
            if (e.id === expId) {
              return { id: expId, carId: carId, date: date, category: category, amount: amount, desc: desc };
            }
            return e;
          });
          showToast("Gider kaydı güncellendi.", "success");
        } else {
          var newExp = {
            id: "exp_" + Date.now(), carId: carId, date: date, category: category, amount: amount, desc: desc
          };
          state.expenses.push(newExp);
          showToast("Yeni masraf kaydı eklendi.", "success");
        }
        persistExpenses();
        closeModal();
      }
      else if (action === "save-family") {
        var name = document.getElementById("fam-name").value.trim();
        var relation = document.getElementById("fam-relation").value.trim();
        var email = document.getElementById("fam-email").value.trim();
        var phone = document.getElementById("fam-phone").value.trim();

        if (!name) {
          showToast("Ad Soyad girmek zorunludur.", "danger");
          return;
        }

        var isEdit = !!state.modal.data && !!state.modal.data.id;
        if (isEdit) {
          var id = state.modal.data.id;
          state.family = state.family.map(function(f) {
            if (f.id === id) {
              return { id: id, name: name, relation: relation, email: email, phone: phone };
            }
            return f;
          });
          showToast("Aile üyesi güncellendi.", "success");
        } else {
          var newFam = {
            id: "fam_" + Date.now(), name: name, relation: relation, email: email, phone: phone
          };
          state.family.push(newFam);
          showToast("Aile üyesi başarıyla eklendi.", "success");
        }
        persistFamily();
        closeModal();
      }
      else if (action === "save-fuel") {
        var carId = el.getAttribute("data-car-id");
        var date = document.getElementById("fuel-date").value;
        var km = parseInt(document.getElementById("fuel-km").value.replace(/\./g, "")) || 0;
        var liter = parseFloat(document.getElementById("fuel-liter").value) || 0;
        var price = parseFloat(document.getElementById("fuel-price").value) || 0;
        var total = parseFloat(document.getElementById("fuel-total").value) || 0;

        if (!date || !km || !liter || !total) {
          showToast("Lütfen tarih, km, litre ve tutar bilgilerini girin.", "danger");
          return;
        }

        var car = state.cars.find(function(c) { return c.id === carId; });
        if (car) {
          car.fuelLogs = car.fuelLogs || [];
          car.fuelLogs.push({
            id: "fuel_" + Date.now(), date: date, km: km, liter: liter, price: price, total: total
          });
          if (km > (car.guncelKm || 0)) {
            car.guncelKm = km;
          }
          showToast("Yakıt alım kaydı işlendi.", "success");
          persistCars();
          state.modal = { type: "fuel", data: car }; // Refresh Modal
          render();
        }
      }

      // Verileri Silme Olayları
      else if (action === "delete-car") {
        var id = el.getAttribute("data-id");
        showConfirm({
          title: "Aracı Sil",
          message: "Bu aracı, ait tüm masrafları ve yakıt geçmişini kalıcı olarak silmek istediğinizden emin misiniz?",
          confirmLabel: "Sil",
          danger: true,
          onConfirm: function() {
            state.cars = state.cars.filter(function(c) { return c.id !== id; });
            state.expenses = state.expenses.filter(function(e) { return e.carId !== id; });
            showToast("Araç garajdan çıkarıldı.");
            persistCars();
            persistExpenses();
            render();
          }
        });
      }
      else if (action === "delete-expense") {
        var id = el.getAttribute("data-id");
        showConfirm({
          title: "Masrafı Sil",
          message: "Seçili masraf kaydını silmek istediğinize emin misiniz?",
          confirmLabel: "Kayıt Sil",
          danger: true,
          onConfirm: function() {
            state.expenses = state.expenses.filter(function(e) { return e.id !== id; });
            showToast("Masraf kaydı silindi.");
            persistExpenses();
            render();
          }
        });
      }
      else if (action === "delete-family") {
        var id = el.getAttribute("data-id");
        showConfirm({
          title: "Aile Üyesini Sil",
          message: "Bu aile üyesini silmek istediğinize emin misiniz?",
          confirmLabel: "Erişimi Kaldır",
          danger: true,
          onConfirm: function() {
            state.family = state.family.filter(function(f) { return f.id !== id; });
            showToast("Üye kaydı silindi.");
            persistFamily();
            render();
          }
        });
      }
      else if (action === "delete-fuel") {
        var carId = el.getAttribute("data-car-id");
        var fuelId = el.getAttribute("data-fuel-id");
        showConfirm({
          title: "Yakıt Kaydını Sil",
          message: "Bu yakıt dolum kaydını silmek istediğinize emin misiniz?",
          confirmLabel: "Sil",
          danger: true,
          onConfirm: function() {
            var car = state.cars.find(function(c) { return c.id === carId; });
            if (car && car.fuelLogs) {
              car.fuelLogs = car.fuelLogs.filter(function(log) { return log.id !== fuelId; });
              showToast("Yakıt alımı silindi.");
              persistCars();
              state.modal = { type: "fuel", data: car }; // Refresh Modal
              render();
            }
          }
        });
      }

      // Modalları Kapatma
      else if (action === "close-modal") {
        closeModal();
      }
      else if (action === "close-modal-backdrop" && ev.target === el) {
        closeModal();
      }
      else if (action === "export-data") {
        exportData();
      }
    });

    // Medya Sıkıştırma Değişim Olayları
    document.addEventListener("change", function(ev) {
      var target = ev.target;
      if (!target) return;

      if (target.id === "car-image-input" || target.id === "car-ruhsat-input") {
        var file = target.files && target.files[0];
        if (file) {
          var isRuhsat = target.id === "car-ruhsat-input";
          var previewId = isRuhsat ? "car-ruhsat-preview" : "car-image-preview";
          var wrapperId = isRuhsat ? "car-ruhsat-wrapper" : "car-image-wrapper";
          compressImage(file, isRuhsat ? 300 : 900, function(base64) {
            document.getElementById(wrapperId).innerHTML = `
              <div style="position:relative;">
                <img src="${base64}" id="${previewId}" class="car-form-img" />
                <button class="btn btn-danger btn-icon" style="position:absolute; top:5px; right:5px;" data-action="remove-car-img" data-type="${isRuhsat ? 'ruhsat' : 'main'}">✕</button>
              </div>
            `;
          });
        }
      }
      else if (target.id === "import-input") {
        var file = target.files && target.files[0];
        if (file) importData(file);
      }
    });

    // Yakıt Ekleme Sayfasında Otomatik Tutar Hesaplayıcı (UX Kolaylığı)
    document.addEventListener("input", function(ev) {
      var target = ev.target;
      if (!target) return;

      if (target.id === "fuel-liter" || target.id === "fuel-price") {
        var literVal = parseFloat(document.getElementById("fuel-liter").value) || 0;
        var priceVal = parseFloat(document.getElementById("fuel-price").value) || 0;
        var totalInput = document.getElementById("fuel-total");
        if (totalInput && literVal && priceVal) {
          totalInput.value = (literVal * priceVal).toFixed(2);
        }
      }
    });

    // Menü dışına tıklandığında menüyü kapatma kontrolü
    document.addEventListener("click", function (ev) {
      if (state.accountMenuOpen && !ev.target.closest(".account-chip")) {
        state.accountMenuOpen = false;
        render();
      }
    });
  }

  // Sayfa yüklendiğinde olay dinleyicileri yalnızca 1 kez atanır.
  document.addEventListener("DOMContentLoaded", function() {
    initEvents();
  });
</script>
</body>
</html>
