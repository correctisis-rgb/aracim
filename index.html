        (budgetInfo.budget ? '<button type="button" class="btn-secondary" id="budget-clear">Kaldır</button>' : '') +
      '</div>';
    if (budgetInfo.budget) {
      var pctLabel = Math.round((budgetInfo.rawPct || 0) * 100);
      var barColor = budgetInfo.status === "over" ? "#E2574C" : budgetInfo.status === "watch" ? "#F2A93B" : "#7BC67E";
      html += '<div class="budget-stats-line"><span>Bu ay harcanan</span><strong>' + fmtTL(budgetInfo.spent) + ' / ' + fmtTL(budgetInfo.budget) + '</strong></div>' +
        '<div class="budget-bar-track"><div class="budget-bar-fill" style="width:' + Math.min(100, pctLabel) + '%;background:' + barColor + '"></div></div>' +
        '<p class="fuel-chart-note">' + (budgetInfo.status === "over" ? "⚠️ Bu ay bütçeni %" + (pctLabel - 100) + " aştın." : pctLabel + "% kullanıldı.") + '</p>';
    } else {
      html += '<p class="empty-hint">Bu ay ne kadar harcadığını takip etmek için bir bütçe belirle.</p>';

    if (selectedCar) {

      var hasPrice = fuelSeries.priceSeries.length > 1;

        html += '<section class="panel span-2"><h2>Litre Fiyatı Değişimi — ' + esc(selectedCar.name) + '</h2>' +
          '<div class="chart-box short"><canvas id="priceChart"></canvas></div>' +
          '<p class="fuel-chart-note">Her dolumun tutar/litre oranını gösterir; fiyat artışlarını ve istasyon farklarını takip etmene yardımcı olur.</p></section>';
      }
      if (!hasConsumption && !hasPrice) {
        html += '<section class="panel span-2"><p class="empty-hint">Bu araç için yakıt grafiklerini görmek üzere en az iki yakıt kaydını km ve litre bilgisiyle girmen gerekiyor.</p></section>';
      }

        (state.selectedCarId === "all" && carsList.length > 1 ?
          '<select id="log-filter-car" aria-label="Araca göre filtrele">' +
            '<option value="all">Tüm Araçlar</option>' +
            carsList.map(function (c) { return '<option value="' + c.id + '"' + (f.carId === c.id ? " selected" : "") + '>' + esc(c.name) + '</option>'; }).join("") +
          '</select>' : '') +
        '<input type="date" id="log-filter-from" value="' + esc(f.dateFrom || "") + '" title="Başlangıç tarihi" aria-label="Başlangıç tarihi" />' +
        '<input type="date" id="log-filter-to" value="' + esc(f.dateTo || "") + '" title="Bitiş tarihi" aria-label="Bitiş tarihi" />' +
        (filtersActive ? '<button type="button" class="log-filter-clear" data-action="clear-log-filters">✕ Temizle</button>' : '') +
        '</div>';
      if (filtersActive) {
        html += '<p class="log-result-count">' + visible.length + ' / ' + totalCount + ' kayıt gösteriliyor</p>';
      }
    }

    if (visible.length === 0) {
      html += filtersActive
        ? '<p class="empty-hint">Filtrelere uyan kayıt yok. "Temizle" ile tüm kayıtları tekrar görebilirsin.</p>'
        : '<p class="empty-hint">Kayıt yok. İlk masrafını eklediğinde defter burada dolmaya başlar.</p>';
    } else {
      html += '<ul class="expense-list">';
      visible.forEach(function (e) {
        var cat = catById(e.category);
        var car = (state.cars || []).find(function (c) { return c.id === e.carId; });
        var noteBits = [];
        if (e.note) noteBits.push(esc(e.note));
        if (e.km != null) noteBits.push(groupThousands(String(e.km)) + " km");
        if (e.liter != null) noteBits.push(String(e.liter).replace(".", ",") + " L");
        var payer = e.payerId ? (state.familyMembers || []).find(function (f) { return f.id === e.payerId; }) : null;
        if (payer) noteBits.push("Ödeyen: " + esc(payer.name));
        var noteText = noteBits.length ? noteBits.join(" · ") : "—";
        var receiptBadge = e.receipt ? '<button type="button" class="receipt-badge" data-action="open-lightbox" data-src="' + e.receipt + '" data-caption="Fiş / Fatura" title="Fişi gör" aria-label="Fişi gör">📎</button>' : "";
        html += '<li class="expense-row">' +
          '<span class="exp-icon-wrap"><span class="exp-icon" style="background:' + cat.color + '22;color:' + cat.color + '">' + cat.emoji + '</span>' + receiptBadge + '</span>' +
          '<span class="exp-main"><span class="exp-cat">' + esc(cat.label) + (car ? " · " + esc(car.name) : "") + '</span>' +
          '<span class="exp-note">' + noteText + '</span></span>' +
          '<span class="exp-date">' + fmtDateTR(e.date) + '</span>' +
          '<span class="exp-amount">' + fmtTL(e.amount) + '</span>' +
          '<button class="exp-del" data-action="open-edit-expense" data-id="' + e.id + '" title="Düzenle" aria-label="Düzenle">✏️</button>' +
          '<button class="exp-del" data-action="delete-expense" data-id="' + e.id + '" title="Sil" aria-label="Sil">🗑️</button>' +
          '</li>';
      });
      html += '</ul>';
    }
    html += '</section>';
    return html;
  }

  // ---------- modals ----------
  function renderModal() {
    // Önceki modal-backdrop'ları temizle — aksi halde render() modal açıkken
    // birden fazla kez çağrıldığında (örn. Yenile butonuna basınca: önce
    // "yükleniyor" durumu, sonra veri gelince tekrar) üst üste yeni backdrop'lar
    // eklenir; bu da arka planın gittikçe kararmasına ve aynı pencerenin
    // birden fazla kez görünmesine yol açar.
    document.querySelectorAll(".modal-backdrop").forEach(function (el) { el.remove(); });

    var backdrop = document.createElement("div");
    backdrop.className = "modal-backdrop";
    backdrop.setAttribute("data-action", "close-modal-backdrop");

    if (state.modal.type === "addCar" || state.modal.type === "editCar") {
      backdrop.appendChild(buildCarModal());
    } else if (state.modal.type === "addExpense" || state.modal.type === "editExpense") {
      backdrop.appendChild(buildExpenseModal());
    } else if (state.modal.type === "profile") {
      backdrop.appendChild(buildProfileModal());
    } else if (state.modal.type === "quickAppt") {
      backdrop.appendChild(buildQuickApptModal());
    } else if (state.modal.type === "reminderPicker") {
      backdrop.appendChild(buildReminderPickerModal());
    } else if (state.modal.type === "notifHistory") {
      backdrop.appendChild(buildNotifHistoryModal());
    } else if (state.modal.type === "health") {
      backdrop.appendChild(buildHealthModal());
    } else if (state.modal.type === "errors") {
      backdrop.appendChild(buildErrorsModal());
    } else if (state.modal.type === "announcement") {
      backdrop.appendChild(buildAnnouncementModal());
    }
    document.body.appendChild(backdrop);
  }

        '<button type="button" class="btn-secondary full" id="app-share">📤 Uygulamayı Paylaş</button>' +

        '<input id="household-code-display" readonly value="' + esc(state.householdId || "") + '" style="flex:1" />' +
        '<button type="button" class="btn-secondary" id="household-copy">📋 Kopyala</button>' +

      var input = modal.querySelector("#avatar-file");

        compressImage(file, 300, 0.8).then(function (dataUrl) {
          modal.__avatar = dataUrl;
          var box = modal.querySelector("#pu-avatar");
          box.innerHTML = '<img src="' + dataUrl + '" alt="" /><input type="file" accept="image/*" id="avatar-file" />';

      var email = modal.querySelector("#p-email").value.trim();
      if (name.length < 2) { toast("Lütfen ad soyad gir."); return; }
      if (!EMAIL_RE.test(email)) { toast("Geçerli bir e-posta adresi gir."); return; }

      var fbUser = auth.currentUser;
      var btn = modal.querySelector("#p-save");
      btn.disabled = true; btn.textContent = "Kaydediliyor…";
      var tasks = [];
      if (name !== fbUser.displayName) tasks.push(fbUser.updateProfile({ displayName: name }));
      if (email !== fbUser.email) tasks.push(fbUser.updateEmail(email));
      Promise.all(tasks).then(function () {
        return db.collection("users").doc(fbUser.uid).set({ name: name, email: email, avatar: modal.__avatar }, { merge: true });
      }).then(function () {
        toast("Profil güncellendi.");
        closeModal();
      }).catch(function (err) {
        btn.disabled = false; btn.textContent = "Profili Kaydet";
        toast(authErrorMessage(err));
      });
    });

    modal.querySelector("#p-pass-save").addEventListener("click", function () {
      var cur = modal.querySelector("#p-cur-pass").value;
      var next = modal.querySelector("#p-new-pass").value;

      if (!cur) { toast("Mevcut şifreni gir."); return; }
      if (next.length < 6 || !PASSWORD_RE.test(next)) { toast(PASSWORD_HINT); return; }
      if (next !== next2) { toast("Yeni şifreler eşleşmiyor."); return; }
      var btn = modal.querySelector("#p-pass-save");
      btn.disabled = true; btn.textContent = "Kontrol ediliyor…";
      var fbUser = auth.currentUser;
      var credential = firebase.auth.EmailAuthProvider.credential(fbUser.email, cur);
      fbUser.reauthenticateWithCredential(credential).then(function () {
        return fbUser.updatePassword(next);
      }).then(function () {
        toast("Şifre güncellendi.");
        closeModal();
      }).catch(function (err) {
        btn.disabled = false; btn.textContent = "Şifreyi Güncelle";
        toast(authErrorMessage(err));
      });
    });

    return modal;
  }

  function fmtDateTime(ts) {
    try {
      var d = ts && typeof ts.toDate === "function" ? ts.toDate() : (ts ? new Date(ts) : null);
      if (!d || isNaN(d.getTime())) return "—";
      return d.toLocaleString("tr-TR", { day: "2-digit", month: "2-digit", year: "numeric", hour: "2-digit", minute: "2-digit" });
    } catch (e) { return "—"; }
  }

  function renderRunLogRecipients(r) {
    var list = r.recipients || r.results || r.details || r.users || null;
    if (!list || !list.length) return "";

    // Yeni format: her giriş bir hane, içinde üye kırılımı var (bkz.
    // send-reminders.js -> recipients.push({ household, members })). Ortak
    // hanede kimin bildirim aldığını (sadece toplam token sayısı değil, ad/
    // e-posta ve kaç cihazına gittiğini) burada gösteriyoruz.
    if (list[0] && list[0].members) {
      var groupHtml = "";
      list.forEach(function (group) {
        groupHtml += '<div class="mon-recipient-group">' +
          '<div class="mon-recipient-group-title">🏠 ' + esc(group.household || "Hane") + '</div>' +
          '<ul class="mon-recipients">' +
          (group.members || []).map(function (m) {
            var label = m.name || m.email || "Bilinmeyen kullanıcı";
            var devText = (m.deviceCount != null) ? (m.deviceCount + " cihaz") : "";
            var ok = m.success !== false;
            return '<li class="mon-recipient-row">' +
              '<span class="mon-recipient-email">' + esc(label) + (m.email && m.name ? ' <span class="mon-recipient-sub">(' + esc(m.email) + ')</span>' : '') + '</span>' +
              '<span class="mon-recipient-sub">' + esc(devText) + '</span>' +
              (ok ? '<span class="mon-badge ok">✓</span>' : '<span class="mon-badge bad">✗' + (m.failed ? (' ' + m.failed) : '') + '</span>') +
              '</li>';
          }).join("") +
          '</ul></div>';
      });
      return groupHtml;
    }

    // Eski (düz) format ile geriye dönük uyumluluk.
    var html = '<ul class="mon-recipients">';
    list.forEach(function (u) {
      var email = u.email || u.userEmail || u.name || u.id || "Bilinmeyen kullanıcı";
      var ok = u.success !== false && !u.error;
      html += '<li class="mon-recipient-row"><span class="mon-recipient-email">' + esc(email) + '</span>' +
        (ok ? '<span class="mon-badge ok">✓</span>' : '<span class="mon-badge bad">✗' + (u.error ? (' ' + esc(String(u.error))) : '') + '</span>') +
        '</li>';
    });
    html += '</ul>';
    return html;
  }

  function buildNotifHistoryModal() {

      list.forEach(function (entry) {
        var items = entry.items || [];
        html += '<li class="err-item">' +
          '<div class="err-item-head">' +
            '<span class="err-item-time">' + fmtDateTime(entry.sentAt) + '</span>' +

            : (entry.body ? '<div class="err-item-meta">' + esc(entry.body) + '</div>' : '')) +

    var modal = document.createElement("div");
    modal.className = "modal wide";
    modal.addEventListener("click", function (ev) { ev.stopPropagation(); });

    var html = '<div class="modal-head"><h3>🩺 Sağlık</h3><button class="icon-btn" data-action="close-modal" aria-label="Kapat">✕</button></div>';

    } else if (monitoring.health) {
      var trig = monitoring.health.trigger;
      html += '<p class="profile-section-title">Hatırlatma Tetikleyici</p>';
      if (trig) {
        var pending = !!trig.requested;
        html += '<div class="mon-row"><span class="mon-label">Durum</span><span class="mon-value">' +
          (pending ? '<span class="mon-badge warn">⏳ Bekliyor</span>' : '<span class="mon-badge ok">✓ İşlendi</span>') + '</span></div>';
        html += '<div class="mon-row"><span class="mon-label">Son İstek</span><span class="mon-value">' + fmtDateTime(trig.requestedAt) + '</span></div>';
        if (trig.requestedBy) {
          html += '<div class="mon-row"><span class="mon-label">İsteyen</span><span class="mon-value">' + esc(trig.requestedBy) + '</span></div>';
        }
        if (trig.processedAt) {
          html += '<div class="mon-row"><span class="mon-label">İşlenme Zamanı</span><span class="mon-value">' + fmtDateTime(trig.processedAt) + '</span></div>';
        }
      } else {
        html += '<p class="mon-empty">Henüz tetikleme kaydı yok.</p>';
      }

      html += '<p class="profile-section-title">Son Çalışmalar</p>';
      var runLogs = monitoring.health.runLogs || [];
      if (!runLogs.length) {
        html += '<p class="mon-empty">Kayıtlı çalışma bulunamadı (runLogs koleksiyonu boş).</p>';
      } else {
        html += '<ul class="err-list">';
        runLogs.forEach(function (r) {
          var ok = r.success !== false && !r.error;
          html += '<li class="err-item">' +
            '<div class="err-item-head">' +
              '<span class="err-item-time">' + fmtDateTime(r.createdAt) + '</span>' +
              (ok ? '<span class="mon-badge ok">✓ Başarılı</span>' : '<span class="mon-badge bad">✗ Hata</span>') +
            '</div>' +
            '<div class="err-item-msg">' + esc(r.summary || (typeof r.sentCount === "number" ? (r.sentCount + " bildirim gönderildi") : "Detay yok")) + '</div>' +
            (r.error ? '<div class="err-item-meta">' + esc(String(r.error)) + '</div>' : '') +
            renderRunLogRecipients(r) +
          '</li>';
        });
        html += '</ul>';
      }
    }

    modal.innerHTML = html;
    return modal;
  }

  function buildErrorsModal() {
    var modal = document.createElement("div");
    modal.className = "modal wide";
    modal.addEventListener("click", function (ev) { ev.stopPropagation(); });

    var html = '<div class="modal-head"><h3>🐞 Hata İzleme</h3><button class="icon-btn" data-action="close-modal" aria-label="Kapat">✕</button></div>';
    html += '<div class="mon-refresh-row"><button type="button" data-action="refresh-errors">↻ Yenile</button></div>';

    if (monitoring.errorsLoading && !monitoring.errors) {
      html += '<p class="mon-loading">Yükleniyor…</p>';
    } else if (monitoring.errorsError) {
      html += '<p class="mon-empty">Veriler alınamadı: ' + esc(monitoring.errorsError) + '</p>';
    } else {
      var errs = monitoring.errors || [];
      if (!errs.length) {
        html += '<p class="mon-empty">Kayıtlı hata bulunamadı. 🎉</p>';
      } else {
        html += '<ul class="err-list">';
        errs.forEach(function (e) {
          html += '<li class="err-item">' +
            '<div class="err-item-head">' +
              '<span class="err-item-time">' + fmtDateTime(e.createdAt) + '</span>' +
              '<span class="err-item-user">' + esc(e.userEmail || "anonim") + '</span>' +
            '</div>' +
            '<div class="err-item-msg">' + esc(e.message || "Bilinmeyen hata") + '</div>' +
            '<div class="err-item-meta">' + esc((e.source || "") + (e.line ? (":" + e.line) : "")) + (e.appVersion ? (" · " + esc(e.appVersion)) : "") + '</div>' +
          '</li>';
        });
        html += '</ul>';
      }
    }

    modal.innerHTML = html;
    return modal;
  }

  function buildAnnouncementModal() {
    var modal = document.createElement("div");
    modal.className = "modal wide";
    modal.addEventListener("click", function (ev) { ev.stopPropagation(); });

    modal.innerHTML =
      '<div class="modal-head"><h3>📢 Duyuru / Bakım Mesajı</h3><button class="icon-btn" data-action="close-modal" aria-label="Kapat">✕</button></div>' +
      '<p class="field-hint" style="margin-top:-4px">Bu mesaj, bildirimleri açık olan <strong>tüm kullanıcılara</strong> anında push bildirimi olarak gönderilir (örn. planlı bakım, kesinti, yeni özellik duyurusu).</p>' +
      '<label class="field"><span>Başlık</span><input id="ann-title" maxlength="80" placeholder="Örn. Planlı Bakım Duyurusu" /></label>' +
      '<label class="field"><span>Mesaj</span><textarea id="ann-body" maxlength="300" rows="4" placeholder="Örn. Bu gece 02:00–03:00 arası sistem bakımda olacak, bu süre boyunca uygulamaya erişim kesintili olabilir." style="width:100%; background:var(--bg); border:1px solid var(--border); border-radius:8px; color:var(--text); padding:10px; font-size:14px; font-family:inherit; resize:vertical;"></textarea></label>' +
      '<p class="km-ocr-status" id="ann-charcount">0 / 300</p>' +
      '<button type="button" class="btn-primary full" id="ann-send" style="margin-top:6px">📢 Tüm Kullanıcılara Gönder</button>';

    var bodyEl = modal.querySelector("#ann-body");
    var countEl = modal.querySelector("#ann-charcount");
    bodyEl.addEventListener("input", function () {
      countEl.textContent = bodyEl.value.length + " / 300";
    });

    modal.querySelector("#ann-send").addEventListener("click", function () {
      var title = modal.querySelector("#ann-title").value.trim();
      var body = bodyEl.value.trim();
      if (!title) { toast("Lütfen bir başlık yaz."); return; }
      if (!body) { toast("Lütfen bir mesaj yaz."); return; }

      showConfirm({
        title: "Duyuruyu Gönder",
        message: '"' + title + '" başlıklı bu mesaj tüm kullanıcılara push bildirimi olarak gönderilecek. Emin misin?',
        confirmLabel: "Gönder",
        onConfirm: function () {
          var btn = modal.querySelector("#ann-send");
          btn.disabled = true; btn.textContent = "Gönderiliyor…";
          if (!auth.currentUser) {
            btn.disabled = false; btn.textContent = "📢 Tüm Kullanıcılara Gönder";
            toast("Oturum bulunamadı, tekrar giriş yapın.");
            return;
          }
          auth.currentUser.getIdToken().then(function (idToken) {
            return fetch(ANNOUNCEMENT_TRIGGER_URL, {
              method: "POST",
              headers: {
                "Authorization": "Bearer " + idToken,
                "Content-Type": "application/json"
              },
              body: JSON.stringify({ title: title, body: body })
            });
          }).then(function (r) {
            return r.json().then(function (data) { return { ok: r.ok, data: data }; });
          }).then(function (result) {
            if (result.ok && result.data && result.data.ok) {
              toast(`Duyuru gönderildi: ${result.data.sentCount} cihaza ulaştı.`);
              closeModal();
            } else {
              var msg = (result.data && result.data.error) ? result.data.error : "bilinmeyen hata";
              btn.disabled = false; btn.textContent = "📢 Tüm Kullanıcılara Gönder";
              toast("Duyuru gönderilemedi: " + msg);
            }
          }).catch(function (err) {
            console.error(err);
            btn.disabled = false; btn.textContent = "📢 Tüm Kullanıcılara Gönder";
            toast("Duyuru gönderilemedi: " + (err && err.message ? err.message : err));
          });
        }
      });
    });

    return modal;
  }

        name: name,
        plate: modal.querySelector("#f-plate").value.trim(),
        brand: modal.querySelector("#f-brand").value.trim(),
        year: modal.querySelector("#f-year").value.trim(),
        fuelType: modal.querySelector("#f-fuel").value,

        inspectionDate: modal.querySelector("#f-inspection").value || null,
        maintenanceDate: modal.querySelector("#f-maintenance").value || null,

        insuranceCompany: modal.querySelector("#f-insco").value.trim(),
        policyNo: modal.querySelector("#f-policyno").value.trim(),

        maintenanceKm: parseFormattedNumber(modal.querySelector("#f-maintkm").value),
        photo: modal.__photos.carPhoto || null,
        ruhsat: modal.__photos.ruhsatPhoto || null
      };

      // ---------- Randevu tarihleri ----------
      // Her randevu tarihinin yanında, randevu YENİ girildiği ya da
      // DEĞİŞTİĞİ anda o alanın o anki vade tarihini "anlık görüntü"
      // (DueSnapshot) olarak saklıyoruz. send-reminders.js, randevu günü
      // geçtikten sonra vade tarihinin bu anlık görüntüden farklı olup
      // olmadığına bakarak kullanıcının tarihi güncelleyip güncellemediğini
      // anlıyor — randevu her zaman vadeden önce olacağı için doğrudan
      // "vade <= randevu" kıyası işe yaramaz.
      var prevAppt = (car && car.appointments) || {};
      var apptInputMap = {
        inspectionDate: "f-appt-inspection",
        maintenanceDate: "f-appt-maintenance",
        insuranceDate: "f-appt-insurance",
        kaskoDate: "f-appt-kasko",
        taxDate: "f-appt-tax",
        tireDate: "f-appt-tire"
      };
      var appointments = {};
      Object.keys(apptInputMap).forEach(function (key) {
        var apptVal = modal.querySelector("#" + apptInputMap[key]).value || null;
        appointments[key] = apptVal;
        var snapKey = key + "DueSnapshot";
        if (!apptVal) {
          appointments[snapKey] = null; // randevu silindiyse anlık görüntü de temizlenir
        } else if (!prevAppt[key] || prevAppt[key] !== apptVal) {
          appointments[snapKey] = patch[key]; // randevu yeni girildi/değişti: o anki vade tarihini yakala
        } else {
          appointments[snapKey] = prevAppt[snapKey] != null ? prevAppt[snapKey] : patch[key]; // randevu aynı: eski anlık görüntüyü koru
        }
      });
      patch.appointments = appointments;

      if (isEdit) {
        state.cars = state.cars.map(function (c) { return c.id === car.id ? Object.assign({}, c, patch) : c; });
      } else {
        state.cars = (state.cars || []).concat([Object.assign({ id: uid(), color: CAR_COLORS[(state.cars || []).length % CAR_COLORS.length] }, patch)]);
      }
      persistCars();
      closeModal();
      render();
    });

    return modal;
  }


  function photoUploadHTML(key, label, existing) {

  function refreshPhotoBox(modal, key) {
    var box = modal.querySelector("#pu-" + key);
    var label = key === "carPhoto" ? "Araç fotoğrafı" : (key === "ruhsatPhoto" ? "Ruhsat görüntüsü" : "Fiş / Fatura");
    var val = modal.__photos[key];
    box.className = "photo-upload" + (val ? " has-photo" : "");
    box.innerHTML = (val
      ? '<img src="' + val + '" alt="" data-action="open-lightbox" data-src="' + val + '" data-caption="' + label + '" />' +
        '<button class="photo-remove" data-key="' + key + '" type="button" title="Kaldır">✕</button>' +
        '<button class="photo-edit" data-key="' + key + '" type="button" title="Fotoğrafı değiştir">✏️</button>'
      : '<span class="pu-label">📷<br/>' + label + ' ekle</span>') +
      '<input type="file" accept="image/*" data-key="' + key + '" />';
    var fileInput = box.querySelector("input[type=file]");
    fileInput.addEventListener("change", function (ev) {
      var file = ev.target.files && ev.target.files[0];
      if (!file) return;
      compressImage(file, 900, 0.72).then(function (dataUrl) {
        modal.__photos[key] = dataUrl;
        refreshPhotoBox(modal, key);
      }).catch(function () { toast("Fotoğraf yüklenemedi."); });
    });
    var removeBtn = box.querySelector(".photo-remove");
    if (removeBtn) removeBtn.addEventListener("click", function (ev) {
      ev.stopPropagation();
      modal.__photos[key] = null;
      refreshPhotoBox(modal, key);
    });
    var editBtn = box.querySelector(".photo-edit");
    if (editBtn) editBtn.addEventListener("click", function (ev) {
      ev.stopPropagation();
      fileInput.click();
    });
  }

  function numberToDisplay(n, allowDecimal) {

    var parts = String(n).split(".");
    var intPart = groupThousands(parts[0]);
    if (allowDecimal && parts[1]) return intPart + "," + parts[1].slice(0, 2);
    return intPart;
  }

      '</div>' +
      '<p class="km-ocr-status" id="e-km-ocr-status"></p>' +
      '<label class="field"><span>Not (opsiyonel)</span><input id="e-note" value="' + (editingExpense ? esc(editingExpense.note || "") : "") + '" placeholder="Örn. Lastik değişimi" /></label>' +
      payerOptions +
      '<label class="field"><span>Fiş / Fatura (opsiyonel)</span></label>' +
      photoUploadHTML("receiptPhoto", "Fiş / Fatura", editingExpense ? editingExpense.receipt || null : null) +
      '<button class="btn-primary full" id="e-save" style="margin-top:12px">' + (isEdit ? "Güncelle" : "Kaydet") + '</button>';

    if (defaultCarId) modal.querySelector("#e-car").value = defaultCarId;
    attachThousandsInput(modal.querySelector("#e-amount"), true);
    attachThousandsInput(modal.querySelector("#e-km"), false);
    attachThousandsInput(modal.querySelector("#e-liter"), true);

    var ocrBtn = modal.querySelector("#e-km-ocr-btn");
    var ocrFile = modal.querySelector("#e-km-ocr-file");
    var ocrStatus = modal.querySelector("#e-km-ocr-status");
    ocrBtn.addEventListener("click", function () { ocrFile.click(); });
    ocrFile.addEventListener("change", function (ev) {
      var file = ev.target.files && ev.target.files[0];
      if (!file) return;
      ocrStatus.textContent = "Okuma kütüphanesi yükleniyor…";
      loadTesseract().then(function () {
        ocrStatus.textContent = "Fotoğraf işleniyor…";
        return preprocessImageForOCR(file);
      }).then(function (dataUrl) {
        ocrStatus.textContent = "Okunuyor, birkaç saniye sürebilir…";
        return Tesseract.recognize(dataUrl, "eng");
      }).then(function (result) {
        var guess = extractOdometerGuess(result && result.data && result.data.text);
        if (guess != null) {
          modal.querySelector("#e-km").value = formatNumericDisplay(String(guess), false);
          ocrStatus.textContent = "Tahmini okundu: " + groupThousands(String(guess)) + " km — lütfen kontrol edip gerekirse düzelt.";
        } else {
          ocrStatus.textContent = "Km okunamadı, lütfen elle gir.";
        }
      }).catch(function (err) {
        console.error(err);
        ocrStatus.textContent = "Okuma başarısız oldu, lütfen elle gir.";
      });
    });

    modal.__photos = { receiptPhoto: editingExpense ? editingExpense.receipt || null : null };
    modal.querySelectorAll(".photo-upload input[type=file]").forEach(function (input) {
      input.addEventListener("change", function (ev) {
        var file = ev.target.files && ev.target.files[0];
        if (!file) return;
        var key = input.getAttribute("data-key");
        compressImage(file, 900, 0.72).then(function (dataUrl) {
          modal.__photos[key] = dataUrl;
          refreshPhotoBox(modal, key);
        }).catch(function () { toast("Fotoğraf yüklenemedi."); });
      });
    });
    modal.querySelectorAll(".photo-remove").forEach(function (btn) {
      btn.addEventListener("click", function (ev) {
        ev.stopPropagation();
        var key = btn.getAttribute("data-key");
        modal.__photos[key] = null;
        refreshPhotoBox(modal, key);
      });
    });
    modal.querySelectorAll(".photo-edit").forEach(function (btn) {
      btn.addEventListener("click", function (ev) {
        ev.stopPropagation();
        var key = btn.getAttribute("data-key");
        modal.querySelector('.photo-upload[data-key="' + key + '"] input[type=file]').click();
      });
    });

    var selectedCat = editingExpense ? editingExpense.category : CATEGORIES[0].id;
    var chips = modal.querySelectorAll(".cat-chip");
    var literField = modal.querySelector("#e-liter-field");
    function paintChips() {
      chips.forEach(function (ch) { ch.classList.toggle("active", ch.getAttribute("data-cat") === selectedCat); });
      literField.style.display = selectedCat === "yakit" ? "" : "none";
    }
    chips.forEach(function (ch) {
      ch.addEventListener("click", function () { selectedCat = ch.getAttribute("data-cat"); paintChips(); });
    });
    paintChips();

    modal.querySelector("#e-save").addEventListener("click", function () {
      var carId = modal.querySelector("#e-car").value;
      var amount = parseFormattedNumber(modal.querySelector("#e-amount").value);
      var date = modal.querySelector("#e-date").value;
      var note = modal.querySelector("#e-note").value.trim();
      var km = parseFormattedNumber(modal.querySelector("#e-km").value);
      var liter = selectedCat === "yakit" ? parseFormattedNumber(modal.querySelector("#e-liter").value) : null;
      var payerEl = modal.querySelector("#e-payer");
      var payerId = payerEl && payerEl.value ? payerEl.value : null;
      if (!carId || !amount || amount <= 0 || !date) { toast("Tutar ve tarih gerekli."); return; }
      var payload = {
        carId: carId, category: selectedCat, amount: amount, date: date, note: note,
        km: km, liter: liter, payerId: payerId, receipt: modal.__photos.receiptPhoto || null
      };
      if (isEdit) {
        state.expenses = (state.expenses || []).map(function (e) { return e.id === editingExpense.id ? Object.assign({}, e, payload) : e; });
      } else {
        state.expenses = [Object.assign({ id: uid() }, payload)].concat(state.expenses || []);
      }
      persistExpenses();
      recalcCarCurrentKm(carId);
      closeModal();
      render();
    });

    return modal;
  }

  function closeModal() {
    state.modal = null;
    document.querySelectorAll(".modal-backdrop").forEach(function (el) { el.remove(); });
  }

  function renderLightbox() {
    var existing = document.querySelector(".lightbox-backdrop");
    if (existing) existing.remove();
    if (!state.lightbox) return;
    
    var backdrop = document.createElement("div");
    backdrop.className = "lightbox-backdrop";
    backdrop.innerHTML = '<div class="lightbox-content">' +
                            '<img src="' + state.lightbox + '" alt="Büyütülmüş Görsel" />' +
                            '<span class="lightbox-caption">' + esc(state.lightboxCaption || "Görsel Önizleme") + '</span>' +
                         '</div>';
    backdrop.addEventListener("click", function () { state.lightbox = null; backdrop.remove(); });
    document.body.appendChild(backdrop);
  }

  // ---------- events ----------
  function bindGlobalActions() {
    document.querySelectorAll("[data-action]").forEach(function (el) {
      if (el.getAttribute("role") === "button" && el.tagName !== "BUTTON") {
        el.addEventListener("keydown", function (ev) {
          if (ev.key === "Enter" || ev.key === " ") { ev.preventDefault(); el.click(); }
        });
      }
      el.addEventListener("click", function (ev) {
        var action = el.getAttribute("data-action");
        if (action === "select-car") { state.selectedCarId = el.getAttribute("data-car"); render(); }
        else if (action === "set-view") { state.view = el.getAttribute("data-view"); render(); }
        else if (action === "dismiss-onboarding") { state.onboardingDismissed = true; setLocalData("onboarding_dismissed", true); render(); }
        else if (action === "open-add-car") { state.modal = { type: "addCar" }; render(); }
        else if (action === "open-edit-car") { state.modal = { type: "editCar", carId: el.getAttribute("data-car") }; render(); }
        else if (action === "open-quick-appt") {
          state.modal = { type: "quickAppt", carId: el.getAttribute("data-car"), key: el.getAttribute("data-key") };
          render();
        }
        else if (action === "open-add-expense") { state.modal = { type: "addExpense" }; render(); }
        else if (action === "copy-plate") {
          var plateVal = el.getAttribute("data-plate") || "";
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(plateVal).then(function () {
              toast("Plaka kopyalandı: " + plateVal);
            }).catch(function () { toast("Kopyalanamadı, plakayı elle yazabilirsin: " + plateVal); });
          } else {
            toast("Kopyalanamadı, plakayı elle yazabilirsin: " + plateVal);
          }
        }
        else if (action === "open-edit-expense") { state.modal = { type: "editExpense", expenseId: el.getAttribute("data-id") }; render(); }
        else if (action === "delete-expense") {
          var id = el.getAttribute("data-id");
          showConfirm({
            title: "Masrafı Sil",
            message: "Bu masraf kaydını silmek istediğine emin misin? Silme sonrası kısa bir süre geri alabilirsin.",
            confirmLabel: "Sil",
            danger: true,
            onConfirm: function () {
              var deleted = (state.expenses || []).find(function (e) { return e.id === id; });
              if (!deleted) return;
              var deletedIndex = (state.expenses || []).indexOf(deleted);
              state.expenses = (state.expenses || []).filter(function (e) { return e.id !== id; });
              persistExpenses();
              if (deleted.carId) recalcCarCurrentKm(deleted.carId);
              render();
              toastWithUndo("Masraf silindi.", function () {
                state.expenses = state.expenses || [];
                state.expenses.splice(Math.min(deletedIndex, state.expenses.length), 0, deleted);
                persistExpenses();
                if (deleted.carId) recalcCarCurrentKm(deleted.carId);
                render();
                toast("Masraf geri alındı.");
              });
            }
          });
        }
        else if (action === "open-lightbox") {
          ev.stopPropagation();
          state.lightbox = el.getAttribute("data-src");
          state.lightboxCaption = el.getAttribute("data-caption") || "Görsel";
          renderLightbox();
        }
        else if (action === "delete-car") {
          var carId = el.getAttribute("data-car");
          showConfirm({
            title: "Aracı Sil",
            message: "Bu aracı ve tüm masraf kayıtlarını silmek istediğinize emin misiniz? Silme sonrası kısa bir süre geri alabilirsiniz.",
            confirmLabel: "Sil",
            danger: true,
            onConfirm: function () {
              var deletedCar = (state.cars || []).find(function (c) { return c.id === carId; });
              var deletedCarIndex = (state.cars || []).indexOf(deletedCar);
              var deletedExpenses = (state.expenses || []).filter(function (e) { return e.carId === carId; });
              var prevSelectedCarId = state.selectedCarId;
              state.cars = (state.cars || []).filter(function (c) { return c.id !== carId; });
              state.expenses = (state.expenses || []).filter(function (e) { return e.carId !== carId; });
              if (state.selectedCarId === carId) state.selectedCarId = "all";
              persistCars(); persistExpenses(); render();
              cleanupNotifStateForCar(carId);
              toastWithUndo("Araç ve " + deletedExpenses.length + " masraf kaydı silindi.", function () {
                if (deletedCar) {
                  state.cars = state.cars || [];
                  state.cars.splice(Math.min(deletedCarIndex, state.cars.length), 0, deletedCar);
                  state.selectedCarId = prevSelectedCarId;
                }
                state.expenses = (state.expenses || []).concat(deletedExpenses);
                persistCars(); persistExpenses();
                render();
                toast("Araç geri alındı.");
              });
            }
          });
        }
        else if (action === "close-modal") { closeModal(); }
        else if (action === "close-modal-backdrop" && ev.target === el) { closeModal(); }
        else if (action === "clear-log-filters") {
          state.logFilters = { search: "", category: "all", carId: "all", dateFrom: "", dateTo: "" };
          render();
        }
        else if (action === "share-report") { shareExpenseReport(); }
        else if (action === "add-to-calendar") {
          downloadICS(el.getAttribute("data-title"), el.getAttribute("data-date"), el.getAttribute("data-notes"));
        }
        else if (action === "export-data") { exportData(); }
        else if (action === "enable-notifications") { enableNotifications(); }
        else if (action === "disable-notifications") { disableNotifications(); }
        else if (action === "toggle-account-menu") { ev.stopPropagation(); state.accountMenuOpen = !state.accountMenuOpen; render(); }
        else if (action === "toggle-theme") { ev.stopPropagation(); toggleTheme(); }
        else if (action === "trigger-reminders") { ev.stopPropagation(); state.accountMenuOpen = false; triggerReminders(); render(); }
        else if (action === "open-announcement") {
          ev.stopPropagation();
          if (!isAdminUser(state.currentUser)) return;
          state.modal = { type: "announcement" };
          state.accountMenuOpen = false;
          render();
        }
        else if (action === "open-profile") { ev.stopPropagation(); state.modal = { type: "profile" }; state.accountMenuOpen = false; render(); }
        else if (action === "open-notif-history") {
          ev.stopPropagation();
          state.modal = { type: "notifHistory" };
          state.accountMenuOpen = false;
          markNotifHistorySeen();
          render();
        }
        else if (action === "open-health") {
          ev.stopPropagation();
          if (!isAdminUser(state.currentUser)) return;
          state.modal = { type: "health" };
          state.accountMenuOpen = false;
          render();
          loadHealthData();
        }
        else if (action === "open-errors") {
          ev.stopPropagation();
          if (!isAdminUser(state.currentUser)) return;
          state.modal = { type: "errors" };
          state.accountMenuOpen = false;
          render();
          loadErrorLogs();
        }
        else if (action === "refresh-health") { loadHealthData(true); }
        else if (action === "refresh-errors") { loadErrorLogs(true); }
        else if (action === "logout") {
          ev.stopPropagation();
          state.accountMenuOpen = false;
          render();
          showConfirm({
            title: "Çıkış Yap",
            message: "Çıkış yapmak istediğine emin misin?",
            confirmLabel: "Çıkış Yap",
            danger: true,
            onConfirm: function () { logout(); }
          });
        }
      });
    });
    var importInput = document.getElementById("import-input");
    if (importInput) {
      importInput.addEventListener("change", function (ev) {
        var file = ev.target.files && ev.target.files[0];
        if (file) importData(file);
      });
    }
  }

  document.addEventListener("click", function (ev) {
    if (state.accountMenuOpen && !ev.target.closest(".account-chip")) {
      state.accountMenuOpen = false;
      render();
    }
  });

  init();
})();






  // NOT: Service worker kaydı artık dosyanın başında (swRegPromise) yapılıyor,
  // burada tekrar kaydetmeye gerek yok.

</script>
</body>
