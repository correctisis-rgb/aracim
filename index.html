      items.push({ carId: c.id, carName: c.name, carPhoto: c.photo, type: "Muayene", emoji: "🗓️", date: c.inspectionDate || null, apptKey: "inspectionDate", apptDate: (c.appointments && c.appointments.inspectionDate) || null });
      items.push({ carId: c.id, carName: c.name, carPhoto: c.photo, type: "Bakım / Servis (tarih)", emoji: "🔧", date: c.maintenanceDate || null, apptKey: "maintenanceDate", apptDate: (c.appointments && c.appointments.maintenanceDate) || null });
      items.push({ carId: c.id, carName: c.name, carPhoto: c.photo, type: "Trafik Sigortası", emoji: "🛡️", date: c.insuranceDate || null, apptKey: "insuranceDate", apptDate: (c.appointments && c.appointments.insuranceDate) || null });
      items.push({ carId: c.id, carName: c.name, carPhoto: c.photo, type: "Kasko", emoji: "🚙", date: c.kaskoDate || null, apptKey: "kaskoDate", apptDate: (c.appointments && c.appointments.kaskoDate) || null });
      items.push({ carId: c.id, carName: c.name, carPhoto: c.photo, type: "Vergi (MTV)", emoji: "💰", date: c.taxDate || null, apptKey: "taxDate", apptDate: (c.appointments && c.appointments.taxDate) || null });
      items.push({ carId: c.id, carName: c.name, carPhoto: c.photo, type: "Lastik Değişimi", emoji: "🛞", date: c.tireDate || null, apptKey: "tireDate", apptDate: (c.appointments && c.appointments.tireDate) || null });
    });
    items.forEach(function (it) {
      // Randevu tarihi girilmişse artık hatırlatma o tarihe göre çalışır:
      // geri sayım (gün kaldı, renk, aciliyet sırası) randevu gününe göre
      // yapılır — bkz. buildQuickApptModal üzerindeki açıklama.
      it.days = daysUntil(it.apptDate || it.date);
      it.status = urgency(it.days);
      it.dateLabel = it.date ? fmtDateTR(it.date) : "Tarih girilmedi";
      if (it.apptDate) it.dateLabel += " · 📅 Randevu: " + fmtDateTR(it.apptDate);
      it.tier = tierOf(it.status);
      it.metric = it.days === null ? 99999 : it.days;
    });

    relevant.forEach(function (c) {
      if (c.maintenanceKm == null) return;
      var remaining = c.currentKm != null ? (c.maintenanceKm - c.currentKm) : null;
      var status = kmUrgency(remaining);
      items.push({
        carId: c.id, carName: c.name, carPhoto: c.photo, type: "Bakım / Servis (km)", emoji: "🔧",
        date: null, dateLabel: status.label, status: status, isKm: true,
        tier: tierOf(status), metric: remaining === null ? 99999 : remaining
      });
    });

    items.sort(function (a, b) { return a.tier !== b.tier ? a.tier - b.tier : a.metric - b.metric; });
    return items;
  }

    if (state.authError) html += '<p class="auth-error">⚠️ ' + esc(state.authError) + '</p>';

  function bindAuthActions() {
    var authThemeBtn = document.getElementById("auth-theme-toggle");
    if (authThemeBtn) authThemeBtn.addEventListener("click", function () { toggleTheme(); });
    document.querySelectorAll('[data-action="auth-tab"]').forEach(function (btn) {
      btn.addEventListener("click", function () {
        state.authMode = btn.getAttribute("data-mode");
        state.authError = null;
        renderAuth();
      });
    });
    document.querySelectorAll(".pw-toggle").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var input = document.getElementById(btn.getAttribute("data-target"));
        if (!input) return;
        input.type = input.type === "password" ? "text" : "password";
        btn.textContent = input.type === "password" ? "👁️" : "🙈";
      });
    });
    var consentBox = document.getElementById("r-consent");
    if (consentBox) consentBox.addEventListener("change", function () {
      state.authConsentChecked = consentBox.checked;
      if (consentBox.checked) state.authConsentError = false;
    });
    var submit = document.getElementById("auth-submit");
    if (submit) submit.addEventListener("click", function () {
      if (state.authMode === "register") handleRegister(); else handleLogin();
    });
    var forgotBtn = document.getElementById("forgot-pass-link");
    if (forgotBtn) forgotBtn.addEventListener("click", handleForgotPassword);
    document.querySelectorAll(".auth-card input").forEach(function (input) {
      input.addEventListener("keydown", function (ev) {
        if (ev.key === "Enter") { ev.preventDefault(); if (submit) submit.click(); }
      });
    });
  }

  function handleRegister() {
    var name = document.getElementById("r-name").value.trim();
    var email = document.getElementById("r-email").value.trim();
    var pass = document.getElementById("r-pass").value;
    var pass2 = document.getElementById("r-pass2").value;

    if (name.length < 2) { state.authError = "Lütfen ad soyad gir."; renderAuth(); return; }
    if (!EMAIL_RE.test(email)) { state.authError = "Geçerli bir e-posta adresi gir."; renderAuth(); return; }
    if (pass.length < 6 || !PASSWORD_RE.test(pass)) { state.authError = PASSWORD_HINT; renderAuth(); return; }
    if (pass !== pass2) { state.authError = "Şifreler eşleşmiyor."; renderAuth(); return; }
    if (!state.authConsentChecked) {
      state.authConsentError = true;
      state.authError = "Devam etmek için Gizlilik Politikası ve KVKK Aydınlatma Metni ile Kullanım Şartları'nı kabul etmelisin.";
      renderAuth();
      return;
    }

    state.authError = null; state.authBusy = true; renderAuth();
    pendingAuthAction = "register";
    auth.createUserWithEmailAndPassword(email, pass).then(function (cred) {
      cred.user.sendEmailVerification().catch(function (err) { console.error(err); });
      return cred.user.updateProfile({ displayName: name }).then(function () {
        var patch = buildMemberProfileEntryWithMembers(cred.user.uid, name, email);
        patch.name = name; patch.email = email; patch.avatar = null;
        patch.cars = []; patch.expenses = []; patch.familyMembers = [];
        patch.createdAt = firebase.firestore.FieldValue.serverTimestamp();
        // KVKK: açık rıza/onay kaydı — hangi metin sürümünü, ne zaman kabul ettiği
        patch.consent = {
          policyVersion: LEGAL_DOC_VERSION,
          acceptedAt: firebase.firestore.FieldValue.serverTimestamp()
        };
        // merge:true kullanılır: aynı anda auth durum dinleyicisinin (loginAs)
        // tetiklediği paralel bir belge oluşturma yazımıyla çakışırsa, birbirlerinin
        // memberProfiles/members alanlarını ezmesinler.
        return db.collection("users").doc(cred.user.uid).set(patch, { merge: true });
      });
    }).then(function () {
      state.authBusy = false;
      toast("Hoş geldin, " + name.split(" ")[0] + "! Hesabın oluşturuldu.");
    }).catch(function (err) {
      state.authBusy = false;
      state.authError = authErrorMessage(err);
      renderAuth();
    });
  }

  function handleLogin() {
    var email = document.getElementById("l-email").value.trim();
    var pass = document.getElementById("l-pass").value;
    if (!email || !pass) { state.authError = "E-posta ve şifreni gir."; renderAuth(); return; }

    state.authError = null; state.authBusy = true; renderAuth();
    pendingAuthAction = "login";
    auth.signInWithEmailAndPassword(email, pass).then(function (cred) {
      state.authBusy = false;
      toast("Tekrar hoş geldin, " + (cred.user.displayName || "").split(" ")[0] + "!");
    }).catch(function (err) {
      state.authBusy = false;
      state.authError = authErrorMessage(err);
      renderAuth();
    });
  }

  function handleForgotPassword() {
    var emailInput = document.getElementById("l-email");
    var email = emailInput ? emailInput.value.trim() : "";
    if (!EMAIL_RE.test(email)) {
      state.authError = "Şifre sıfırlama bağlantısı göndermek için önce e-posta alanına geçerli bir adres gir.";
      renderAuth();
      return;
    }

    state.authError = null;
    var btn = document.getElementById("forgot-pass-link");
    if (btn) { btn.disabled = true; btn.textContent = "Gönderiliyor…"; }

    auth.sendPasswordResetEmail(email).then(function () {
      if (btn) { btn.disabled = false; btn.textContent = "Şifremi unuttum?"; }
      toast("Şifre sıfırlama bağlantısı " + email + " adresine gönderildi. Gelen kutunu (ve spam klasörünü) kontrol et.");
    }).catch(function (err) {
      if (btn) { btn.disabled = false; btn.textContent = "Şifremi unuttum?"; }
      if (err && err.code === "auth/user-not-found") {
        state.authError = "Bu e-posta ile kayıtlı bir hesap bulunamadı.";
      } else {
        state.authError = authErrorMessage(err);
      }
      renderAuth();
    });
  }

  function preserveChartCanvases() {
    preservedCanvasEls = {};

      var el = document.getElementById(id);

  function restoreChartCanvases() {
    Object.keys(preservedCanvasEls).forEach(function (id) {
      var freshEl = document.getElementById(id);
      var oldEl = preservedCanvasEls[id];

    } else if (state.carsTabsExpanded && filteredCarsList.length > CAR_TABS_LIMIT) {
      html += '<button type="button" class="car-tab car-tab-more" data-action="toggle-cars-expanded">▴ Daha Az Göster</button>';
    }
    html += '<button class="car-tab car-tab-add" data-action="open-add-car">+ Araç Ekle</button>';
    html += '</nav>';
    if (state.carFilterText && filteredCarsList.length === 0) {
      html += '<p class="entity-search-empty">"' + esc(state.carFilterText) + '" ile eşleşen araç bulunamadı.</p>';
    }

    var selectedCar = carsList.find(function (c) { return c.id === state.selectedCarId; });
    if (selectedCar) html += renderCarInfoCard(selectedCar);

    if (carsList.length === 0) {
      html += renderEmptyCarsState();
    } else {
      // view tabs
      var summaryItems = computeSummaryItems();
      var hasUrgent = summaryItems.some(function (it) { return it.status.key === "overdue" || it.status.key === "today" || it.status.key === "soon"; });
      html += '<nav class="view-tabs" aria-label="Görünüm seçimi">' +
        (myPerms.seeExpenses ? '<button class="view-tab ' + (state.view === "panel" ? "active" : "") + '" data-action="set-view" data-view="panel">📊 Panel</button>' : '') +
        (myPerms.seeExpenses ? '<button class="view-tab ' + (state.view === "analiz" ? "active" : "") + '" data-action="set-view" data-view="analiz">📈 Analiz</button>' : '') +
        '<button class="view-tab ' + (state.view === "ozet" ? "active" : "") + '" data-action="set-view" data-view="ozet">✅ Özet' + (hasUrgent ? '<span class="view-tab-flag"></span>' : '') + '</button>' +
        '</nav>';

      if (state.view === "ozet") {
        html += renderSummaryPanel(summaryItems);
      } else if (state.view === "analiz" && myPerms.seeExpenses) {
        html += renderAnalysisPanel();
      } else if (myPerms.seeExpenses) {
        html += renderDashboard(summaryItems);
      }

      if (myPerms.seeExpenses) html += renderLogPanel();
      else html += '<section class="panel"><p class="empty-hint">Bu hanede masrafları görüntüleme yetkin yok.</p></section>';
    }

    if (carsList.length > 0) {
      html += '<button type="button" class="fab-add-expense" data-action="open-add-expense" aria-label="Masraf Ekle">' +
        '<span class="fab-add-expense-icon">+</span>' +
        '<span class="fab-add-expense-label">Masraf Ekle</span>' +
      '</button>';
    }

    } // end mainSection "cars" branch

    // Çevrimdışı/senkron durumu sadece header'da kalırsa kullanıcı aşağı
    // kaydırınca gözden kaçabiliyor; bu yüzden ekranda sabit kalan küçük
    // bir gösterge de ekleniyor. Her şey yolundayken (çevrimiçi ve
    // bekleyen kayıt yoksa) hiçbir şey göstermiyor ki gereksiz yer kaplamasın.
    if (user && (!state.online || state.pendingSyncCount > 0)) {
      html += '<div class="floating-sync-pill" role="status" style="' + (!state.online ? 'background:#E2574C;color:#fff' : 'background:var(--amber);color:#1B1F24') + '">' +
        (!state.online
          ? offlineStatusLabel()
          : '⏳ ' + state.pendingSyncCount + ' kayıt senkronize edilecek') +
        '</div>';
    }

    preserveChartCanvases();
    app.innerHTML = html;
    restoreChartCanvases();

    if (state.mainSection !== "drivers" && state.mainSection !== "calendar" && (state.view === "panel" || state.view === "analiz")) drawCharts();
    if (state.modal) renderModal();
    if (state.lightbox) renderLightbox();

    bindGlobalActions();
    bindLogFilters();
    bindLogInfiniteScroll();
    bindEntitySearchFilters();
    bindAnalysisPanel();

    if (activeId) {
      var restoredEl = document.getElementById(activeId);
      if (restoredEl) {
        restoredEl.focus();
        if (activeSelStart !== null && typeof restoredEl.setSelectionRange === "function") {
          try { restoredEl.setSelectionRange(activeSelStart, activeSelEnd); } catch (e) {}
        }
      }
    }
  }

  function getOnboardingSteps() {
    var carsList = visibleCarsForMe();
    var expensesList = state.expenses || [];
    return [
      { key: "car", label: "Aracını ekle", done: carsList.length > 0, actionLabel: "Araç Ekle", action: "open-add-car" },
      { key: "expense", label: "İlk masrafını gir", done: expensesList.length > 0, actionLabel: "Masraf Ekle", action: (carsList.length > 0 ? "open-add-expense" : null) },
      { key: "notif", label: "Bildirimleri aç (bakım hatırlatıcıları için)", done: state.notifStatus === "granted", actionLabel: "Bildirimleri Aç", action: (state.notifStatus !== "unsupported" && state.notifStatus !== "granted" ? "enable-notifications" : null) }
    ];
  }

  function renderOnboardingCard() {
    var steps = getOnboardingSteps();
    var allDone = steps.every(function (s) { return s.done; });
    if (allDone && !state.onboardingDismissed) {
      state.onboardingDismissed = true;
      setLocalData("onboarding_dismissed", true);
    }
    if (state.onboardingDismissed || allDone) return "";

    var html = '<section class="onboard-card" aria-label="Başlangıç rehberi">' +
      '<div class="onboard-head">' +
        '<div><p class="onboard-title">👋 Garaj Defteri\'ne hoş geldin!</p>' +
        '<p class="onboard-sub">Başlamak için şu birkaç adımı tamamla:</p></div>' +
        '<button type="button" class="icon-btn onboard-close" data-action="dismiss-onboarding" aria-label="Rehberi kapat" title="Kapat">✕</button>' +
      '</div>' +
      '<ul class="onboard-steps">';
    steps.forEach(function (s, i) {
      html += '<li class="onboard-step ' + (s.done ? "done" : "") + '">' +
        '<span class="onboard-step-badge">' + (s.done ? "✓" : (i + 1)) + '</span>' +
        '<span class="onboard-step-label">' + esc(s.label) + '</span>' +
        (!s.done && s.action ? '<button type="button" class="btn-secondary onboard-step-action" data-action="' + s.action + '">' + esc(s.actionLabel) + '</button>' : '') +
        '</li>';
    });
    html += '</ul></section>';
    return html;
  }

  function renderEmptyCarsState() {
    return '<section class="panel empty-state">' +
      '<span class="empty-state-icon" aria-hidden="true">🚗</span>' +
      '<h2 class="empty-state-title">Henüz araç eklemedin</h2>' +
      '<p class="empty-state-text">Aracını ekleyerek masraflarını takip etmeye, muayene &amp; bakım hatırlatıcıları almaya başlayabilirsin.</p>' +
      '<button type="button" class="btn-primary" data-action="open-add-car">+ İlk Aracını Ekle</button>' +
      '</section>';
  }

  function renderDashboard(summaryItems) {
    var d = computeDashboard();
    var html = '<main class="gd-grid">';

    // gauge panel
    html += '<section class="panel instrument-panel">' + gaugeSVG(d.gaugePct) +
      '<div class="odometer-row"><div class="odometer-label">TOPLAM (tüm zamanlar)</div>' +
      '<div class="odometer">' + fmtTL(d.totalAllTime).replace("₺", "") + '<span class="odo-currency">₺</span></div></div></section>';

    // category donut
    html += '<section class="panel"><h2>Kategori Dağılımı (tüm zamanlar)</h2>';
    if (d.categoryData.length === 0) {
      html += '<p class="empty-hint">Henüz masraf kaydı yok. Gösterge burada dolacak.</p>';
    } else {
      html += '<div class="donut-wrap"><div class="donut-canvas-box"><canvas id="donutChart"></canvas></div><ul class="legend">';
      d.categoryData.forEach(function (c) {
        html += '<li><span class="dot" style="background:' + c.color + '"></span>' + esc(c.name) + '<span class="legend-val">' + fmtTL(c.value) + '</span></li>';
      });
      html += '</ul></div>';
    }
    html += '</section>';

    // upcoming events
    html += renderUpcomingPanel(summaryItems || []);

    html += '</main>';
    window.__dashboardData = d;
    return html;
  }

  function renderCarInfoCard(car) {
    var photo = car.photo
      ? '<img class="car-info-photo" src="' + car.photo + '" alt="" data-action="open-lightbox" data-src="' + car.photo + '" data-caption="' + esc(car.name) + '" />'
      : '<span class="car-info-photo-fallback" style="background:' + car.color + '22;color:' + car.color + '">🚗</span>';

    var detailBits = [];
    if (car.brand) detailBits.push(esc(car.brand));
    if (car.year) detailBits.push(esc(car.year));
    if (car.fuelType) detailBits.push(esc(car.fuelType));
    if (car.transmission) detailBits.push(esc(car.transmission));
    if (car.plate) detailBits.push(esc(car.plate));
    var meta = detailBits.length ? detailBits.join(" · ") : "Detayları eklemek için düzenle'ye dokun";

    var costPerKm = computeCostPerKm(car.id);
    var fuelStats = computeFuelStats(car.id);

    var stats = "";
    if (car.currentKm != null) stats += '<span class="car-stat-chip"><span class="csc-label">Km</span>🛣️ ' + new Intl.NumberFormat("tr-TR").format(car.currentKm) + '</span>';
    if (car.tankCapacity != null) stats += '<span class="car-stat-chip"><span class="csc-label">Depo</span>🛢️ ' + new Intl.NumberFormat("tr-TR").format(car.tankCapacity) + ' lt</span>';
    if (costPerKm != null) stats += '<span class="car-stat-chip"><span class="csc-label">Km başı yakıt (ort.)</span>⛽ ' + new Intl.NumberFormat("tr-TR", { style: "currency", currency: "TRY", maximumFractionDigits: 2 }).format(costPerKm) + '</span>';
    if (fuelStats) stats += '<span class="car-stat-chip"><span class="csc-label">Ort. tüketim</span>⛽ ' + fuelStats.avgConsumption.toFixed(1).replace(".", ",") + ' L/100km</span>';
    if (!stats) stats = '<span class="empty-hint" style="font-size:12px">Km ve masraf ekledikçe istatistikler burada görünecek.</span>';

    return '<section class="panel car-info-card">' +
      '<div class="car-info-top">' + photo +
        '<div class="car-info-main"><h2 class="car-info-name">' + esc(car.name) + '</h2><p class="car-info-meta">' + meta + '</p></div>' +
      '</div>' +
      '<div class="car-info-stats">' + stats + '</div>' +
      '<div class="quick-actions-row">' +
        '<span class="quick-actions-label">Hızlı İşlemler</span>' +
        (car.plate ? '<button type="button" class="quick-action-chip" data-action="copy-plate" data-plate="' + esc(car.plate) + '"><span class="qac-emoji">📋</span>Plakayı Kopyala</button>' : '') +
        '<a class="quick-action-chip" href="https://www.tuvturk.com.tr" target="_blank" rel="noopener noreferrer"><span class="qac-emoji">🚦</span>TÜVTÜRK Randevu / Sorgu</a>' +
        '<a class="quick-action-chip" href="https://www.turkiye.gov.tr/araclarim" target="_blank" rel="noopener noreferrer"><span class="qac-emoji">🏛️</span>e-Devlet — Araçlarım</a>' +
      '</div>' +
      '<div class="car-info-actions">' +
        (car.ruhsat ? '<button class="link-btn" data-action="open-lightbox" data-src="' + car.ruhsat + '" data-caption="' + esc(car.name) + ' Ruhsatı">🪪 Ruhsatı Gör</button>' : '') +
        '<button class="link-btn" data-action="open-edit-car" data-car="' + car.id + '">✏️ Araç / Ruhsat Düzenle</button>' +
        '<button class="link-btn danger" data-action="delete-car" data-car="' + car.id + '">🗑️ Bu aracı sil</button>' +
      '</div>' +
      '</section>';
  }

  // ---------- Hızlı randevu kaydı (Yaklaşan İşlemler'deki 📅 butonu) ----------
  // Araç düzenleme formundaki gizli "Randevu aldın mı?" bölümüne girmeden,
  // doğrudan ana ekrandan tek bir alan için randevu tarihi girilebilsin diye.
  // Aynı DueSnapshot mantığını (bkz. araç kaydetme handler'ı) tek alan için
  // uygular.
  var APPT_FIELD_LABELS = {
    inspectionDate: "Muayene", maintenanceDate: "Bakım / Servis",
    insuranceDate: "Trafik Sigortası", kaskoDate: "Kasko",
    taxDate: "Vergi (MTV)", tireDate: "Lastik Değişimi"
  };
  var APPT_FIELD_EMOJI = {
    inspectionDate: "🗓️", maintenanceDate: "🔧",
    insuranceDate: "🛡️", kaskoDate: "🚙",
    taxDate: "💰", tireDate: "🛞"
  };
  // sw.js'teki APPT_EXTERNAL_LINKS ile aynı liste. iOS bildirimlerde "Hayır"
  // aksiyon düğmesini WebKit kısıtlaması yüzünden gösteremediğimizden, aynı
  // "harici siteye git" seçeneğini randevu formunun içine de ekliyoruz.
  var APPT_EXTERNAL_LINKS = {
    inspectionDate: { url: "https://www.tuvturk.com.tr", label: "TÜVTÜRK'ten randevu al" }
  };
  function saveCarAppointmentField(carId, fieldKey, apptVal) {
    // "Yaklaşan İşlemler" listesindeki 📅 düğmesi ve randevu modalındaki
    // Kaydet/Kaldır düğmeleri data-action üzerinden değil doğrudan
    // addEventListener ile bağlı; bindGlobalActions()'daki MANAGE_ONLY_ACTIONS
    // kontrolü bu yüzden buraya ulaşmaz. Asıl yazma işlemi burada
    // gerçekleştiği için gerçek yetki kontrolü de burada yapılmalı.
    if (!hasHouseholdPerm("manage")) {
      toast("Bu hanede randevu/tarih düzenleme yetkin yok.");
      return;
    }
    var car = (state.cars || []).find(function (c) { return c.id === carId; });
    if (!car) return;
    var prevAppt = car.appointments || {};
    var prevVal = prevAppt[fieldKey] || null;
    var snapKey = fieldKey + "DueSnapshot";
    var appointments = Object.assign({}, prevAppt);
    appointments[fieldKey] = apptVal || null;
    if (!apptVal) {
      appointments[snapKey] = null;
    } else if (!prevAppt[fieldKey] || prevAppt[fieldKey] !== apptVal) {
      appointments[snapKey] = car[fieldKey] || null;
    } else {
      appointments[snapKey] = prevAppt[snapKey] != null ? prevAppt[snapKey] : (car[fieldKey] || null);
    }
    state.cars = (state.cars || []).map(function (c) { return c.id === carId ? Object.assign({}, c, { appointments: appointments }) : c; });
    persistCars();
    // Randevu eklemek/değiştirmek/kaldırmak da bir "işlem"dir; aktivite
    // geçmişinde görünmesi için ayrı bir kayıt atıyoruz. Değer değişmediyse
    // (aynı tarih tekrar kaydedildiyse) gereksiz log oluşturmuyoruz.
    if (prevVal !== (apptVal || null)) {
      var apptLabel = APPT_FIELD_LABELS[fieldKey] || fieldKey;
      var summary;
      if (!apptVal) summary = apptLabel + " randevusu kaldırıldı.";
      else if (!prevVal) summary = apptLabel + " için randevu alındı: " + fmtDateTR(apptVal);
      else summary = apptLabel + " randevusu güncellendi: " + fmtDateTR(apptVal);
      logActivity("car", apptVal ? "edit" : "delete", {
        carId: carId, carName: car.name, icon: "📅", summary: summary,
        changes: [{ label: apptLabel + " randevusu", from: prevVal ? fmtDateTR(prevVal) : "—", to: apptVal ? fmtDateTR(apptVal) : "—" }]
      });
    }
    closeModal();
    render();
    toast(apptVal ? "Randevu kaydedildi." : "Randevu kaldırıldı.");
  }

  function buildQuickApptModal() {
    var m = state.modal || {};
    var car = (state.cars || []).find(function (c) { return c.id === m.carId; });
    var modal = document.createElement("div");
    modal.className = "modal";
    modal.addEventListener("click", function (ev) { ev.stopPropagation(); });
    var current = (car && car.appointments && car.appointments[m.key]) || "";
    var label = APPT_FIELD_LABELS[m.key] || m.label || "İşlem";
    var extLink = APPT_EXTERNAL_LINKS[m.key];
    modal.innerHTML =
      '<div class="modal-head"><h3>📅 Randevu — ' + esc(label) + '</h3><button class="icon-btn" data-action="close-modal" aria-label="Kapat">✕</button></div>' +
      '<p class="field-hint" style="margin-top:-4px">Randevu tarihi girersen bu işlem için vade hatırlatmaları durur; sadece randevudan 1 gün önce ve randevu günü bildirim alırsın.</p>' +
      '<label class="field"><span>Randevu tarihi</span><input type="date" id="qa-date" value="' + esc(current) + '" /></label>' +
      '<div class="budget-row">' +
      (current ? '<button type="button" class="btn-secondary full" id="qa-clear">Randevuyu Kaldır</button>' : '') +
      '<button type="button" class="btn-primary full" id="qa-save">Kaydet</button>' +
      '</div>' +
      (extLink ? '<a class="link-btn" href="' + esc(extLink.url) + '" target="_blank" rel="noopener noreferrer" style="display:block;text-align:center;margin-top:10px">Hayır, henüz almadım — ' + esc(extLink.label) + ' →</a>' : '');
    modal.querySelector("#qa-save").addEventListener("click", function () {
      var val = modal.querySelector("#qa-date").value || null;
      saveCarAppointmentField(m.carId, m.key, val);
    });
    var clearBtn = modal.querySelector("#qa-clear");
    if (clearBtn) clearBtn.addEventListener("click", function () { saveCarAppointmentField(m.carId, m.key, null); });
    return modal;
  }

  // Bildirimde birden fazla farklı tarihe bağlı hatırlatma birlikte
  // tetiklendiğinde (bkz. pendingDeepLink), tek bir randevu formuna
  // atlamak yerine kullanıcının hangisi için işlem yapacağını seçebileceği
  // bir liste ekranı gösteririz. Bir öğeye dokununca normal "open-quick-appt"
  // aksiyonu üzerinden ilgili randevu formu açılır.
  function buildReminderPickerModal() {
    var m = state.modal || {};
    var items = (m.items || []).map(function (it) {
      var car = (state.cars || []).find(function (c) { return c.id === it.carId; });
      return {
        carId: it.carId,
        key: it.key,
        carName: car ? car.name : "Araç",
        label: APPT_FIELD_LABELS[it.key] || it.key,
        emoji: APPT_FIELD_EMOJI[it.key] || "📌"
      };
    });
    var modal = document.createElement("div");
    modal.className = "modal";
    modal.addEventListener("click", function (ev) { ev.stopPropagation(); });
    var html = '<div class="modal-head"><h3>🔔 Hatırlatmalar</h3><button class="icon-btn" data-action="close-modal" aria-label="Kapat">✕</button></div>' +
      '<p class="field-hint" style="margin-top:-4px">Birden fazla hatırlatman var. Randevu almak ya da tarih güncellemek için birini seç:</p>' +
      '<ul class="err-list">' +
      items.map(function (it) {
        return '<li class="err-item">' +
          '<div class="err-item-msg">' + it.emoji + ' ' + esc(it.carName) + ' — ' + esc(it.label) + '</div>' +
          '<button type="button" class="btn-secondary full" data-action="open-quick-appt" data-car="' + esc(it.carId) + '" data-key="' + esc(it.key) + '" style="margin-top:8px">Randevu / Tarih Gir →</button>' +
          '</li>';
      }).join("") +
      '</ul>';
    modal.innerHTML = html;
    return modal;
  }

  function appointmentButtonHTML(it) {
    if (!it.apptKey || !it.date) return "";
    var hasAppt = !!it.apptDate;
    if (!hasAppt && (it.days == null || it.days > 30)) return "";
    var cls = hasAppt ? "appt-pill appt-pill-set" : "appt-pill appt-pill-empty";
    var text = hasAppt ? ("📅 " + fmtDateTR(it.apptDate)) : "📅 Randevu Ekle";
    return '<button type="button" class="' + cls + '" data-action="open-quick-appt" data-car="' + it.carId + '" data-key="' + it.apptKey + '" title="' + (hasAppt ? "Randevuyu düzenle" : "Randevu tarihi ekle") + '">' + text + '</button>';
  }

  function calendarButtonHTML(it) {
    if (!it.date) return "";
    var ownerName = it.carName || it.driverName || "";
    var title = it.type + (ownerName ? (" · " + ownerName) : "");
    var notes = (ownerName ? (ownerName + " için ") : "") + it.type;
    return '<button class="exp-del" data-action="add-to-calendar" data-title="' + esc(title) + '" data-date="' + esc(it.date) + '" data-notes="' + esc(notes) + '" title="Takvime ekle" aria-label="Takvime ekle">📅</button>';
  }

  function appointmentCTAHTML(it) {
    if (it.type !== "Muayene") return "";
    if (it.apptDate) return ""; // randevu zaten alınmış, tekrar hatırlatmaya gerek yok
    if (it.days == null || it.days > 30) return "";
    return '<div class="appt-cta">⚠️ Randevu almak için tıklayın' +
      '<a class="btn-primary" href="https://www.tuvturk.com.tr" target="_blank" rel="noopener noreferrer">Randevu Al</a></div>';
  }

  function renderUpcomingPanel(items) {
    var upcoming = items.filter(function (it) { return it.tier < 3; }).slice(0, 5);
    var html = '<section class="panel span-2"><h2>Yaklaşan İşlemler</h2>';
    if (items.length === 0) {
      html += '<p class="empty-hint">Önce bir araç ekleyin, muayene/sigorta/bakım tarihleri burada listelenecek.</p>';
    } else if (upcoming.length === 0) {
      html += '<p class="empty-hint">Tarih veya km girilmiş yaklaşan işlem yok. Araç bilgilerinden ekleyebilirsiniz.</p>';
    } else {
      html += '<ul class="summary-list">';
      upcoming.forEach(function (it) {
        var avatar = it.carPhoto ? '<img class="sum-avatar" src="' + it.carPhoto + '" alt="" data-action="open-lightbox" data-src="' + it.carPhoto + '" data-caption="' + esc(it.carName) + '" />' : '<span class="sum-icon" style="background:' + it.status.color + '22;color:' + it.status.color + '">' + it.emoji + '</span>';
        var showIcon = (it.status.key === "overdue" || it.status.key === "today" || it.status.key === "soon") ? "⚠️ " : (it.status.key === "ok" ? "✅ " : "");
        html += '<li class="summary-row">' + avatar +
          '<span class="sum-main"><span class="sum-type">' + esc(it.type) + ' · ' + esc(it.carName) + '</span>' +
          '<span class="sum-date">' + esc(it.dateLabel) + '</span></span>' +
          '<span class="sum-extra">' +
            '<span class="sum-badge" style="color:' + it.status.color + ';border-color:' + it.status.color + '55;background:' + it.status.color + '18">' + showIcon + esc(it.status.label) + '</span>' +
            '<span class="sum-actions">' +
              appointmentButtonHTML(it) +
              calendarButtonHTML(it) +
              '<button class="exp-del" data-action="open-edit-car" data-car="' + it.carId + '" title="Düzenle" aria-label="Düzenle">✏️</button>' +
            '</span>' +
          '</span>' +
          appointmentCTAHTML(it) +
          '</li>';
      });
      html += '</ul>';

  function gaugeSVG(pct) {
    var clamped = Math.max(0, Math.min(1, pct));
    var angle = -180 + clamped * 180;
    var rad = angle * Math.PI / 180;
    var cx = 110, cy = 108, r = 84;
    var nx = cx + r * 0.86 * Math.cos(rad), ny = cy + r * 0.86 * Math.sin(rad);
    function arc(s, e, radius) {
      var sr = s * Math.PI / 180, er = e * Math.PI / 180;
      var x1 = cx + radius * Math.cos(sr), y1 = cy + radius * Math.sin(sr);
      var x2 = cx + radius * Math.cos(er), y2 = cy + radius * Math.sin(er);
      var large = (e - s) > 180 ? 1 : 0;
      return "M " + x1 + " " + y1 + " A " + radius + " " + radius + " 0 " + large + " 1 " + x2 + " " + y2;
    }
    var d = window.__dashboardData;
    var monthTotal = d ? d.monthTotal : 0;
    return '<svg viewBox="0 0 220 130" class="gauge-svg" role="img" aria-label="Bu ayki harcama göstergesi">' +
      '<path d="' + arc(-180, -60, r) + '" stroke="#7BC67E" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.85"/>' +
      '<path d="' + arc(-60, -20, r) + '" stroke="#F2A93B" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.85"/>' +
      '<path d="' + arc(-20, 0, r) + '" stroke="#E2574C" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.85"/>' +
      '<line x1="' + cx + '" y1="' + cy + '" x2="' + nx + '" y2="' + ny + '" stroke="#EDEEF0" stroke-width="3" stroke-linecap="round"/>' +
      '<circle cx="' + cx + '" cy="' + cy + '" r="6" fill="#EDEEF0"/>' +
      '<text x="' + cx + '" y="' + (cy - 26) + '" text-anchor="middle" class="gauge-value">' + fmtTL(monthTotal) + '</text>' +
      '<text x="' + cx + '" y="' + (cy - 8) + '" text-anchor="middle" class="gauge-sub">BU AY</text>' +
      '</svg>';
  }

  // Chart oluşturmak/güncellemek yerine sadece gerekliyse dokunur:
  // - veri (signature) değişmemişse ve canvas hâlâ aynı chart'a bağlıysa: hiçbir şey yapma
  // - veri değişmişse ve chart zaten o canvas'a bağlıysa: destroy+new yerine data+update()
  // - canvas yeni (view ilk kez açıldı, farklı bir DOM düğümü vs.): destroy (varsa) + new Chart()
  function updateOrCreateChart(key, canvasEl, sig, config) {
    if (!canvasEl) return;
    if (chartDataSig[key] === sig && charts[key] && charts[key].canvas === canvasEl) {
      return; // veri aynı, canvas aynı -> yeniden çizmeye gerek yok
    }
    if (charts[key] && charts[key].canvas === canvasEl) {
      charts[key].data = config.data;
      if (config.options) charts[key].options = config.options;
      charts[key].update();
    } else {
      if (charts[key]) charts[key].destroy();
      charts[key] = new Chart(canvasEl, config);
    }
    chartDataSig[key] = sig;
  }

          },
          options: {

              y: { grid: { color: "#383F47" }, ticks: { color: "#8B939D" } }
            }
          }
        });

    }

    var priceEl = document.getElementById("priceChart");
    if (priceEl && a.fuelSeries && a.fuelSeries.priceSeries.length > 1) {

      updateOrCreateChart("price", priceEl, priceSig, {
        type: "line",

  var logInfiniteScrollObserver = null;
  function bindLogInfiniteScroll() {
    var sentinel = document.getElementById("log-load-more-sentinel");
    if (logInfiniteScrollObserver) { logInfiniteScrollObserver.disconnect(); logInfiniteScrollObserver = null; }
    if (!sentinel || typeof IntersectionObserver === "undefined") return;
    logInfiniteScrollObserver = new IntersectionObserver(function (entries) {
      entries.forEach(function (entry) {
        if (entry.isIntersecting) {
          var prevScrollYForLog = window.scrollY;
          state.logVisibleCount = (state.logVisibleCount || 20) + 20;
          render();
          window.scrollTo(0, prevScrollYForLog);
        }
      });
    }, { rootMargin: "200px" });
    logInfiniteScrollObserver.observe(sentinel);
  }

  function buildHouseholdScanModal() {
    var modal = document.createElement("div");
    modal.className = "modal";
    modal.addEventListener("click", function (ev) { ev.stopPropagation(); });
    modal.innerHTML =
      '<div class="modal-head"><h3>📷 QR Okut</h3><button class="icon-btn" data-action="close-modal" aria-label="Kapat">✕</button></div>' +
      '<p class="field-hint" style="margin-top:-4px">Ortak hane sahibinin sana gösterdiği davet QR kodunu kameraya tut.</p>' +
      '<div class="qr-scan-wrap"><video id="qr-scan-video" autoplay playsinline muted></video><div class="qr-scan-frame"></div></div>' +
      '<canvas id="qr-scan-canvas" style="display:none;"></canvas>' +
      '<p class="field-hint" id="qr-scan-status">Kamera açılıyor…</p>' +
      '<button type="button" class="btn-secondary full" data-action="close-modal">İptal</button>';

    var video = modal.querySelector("#qr-scan-video");
    var canvas = modal.querySelector("#qr-scan-canvas");
    var statusEl = modal.querySelector("#qr-scan-status");
    var ctx = canvas.getContext("2d", { willReadFrequently: true });
    var done = false;

    function tick() {
      if (done) return;
      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        var imageData;
        try {
          imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        } catch (e) {
          imageData = null;
        }
        var result = (imageData && window.jsQR) ? jsQR(imageData.data, imageData.width, imageData.height) : null;
        if (result && result.data) {
          done = true;
          var scannedCode = result.data.trim();
          stopQrScan();
          closeModal();
          state.modal = { type: "profile" };
          render();
          joinHousehold(scannedCode);
          return;
        }
      }
      qrScanRAF = requestAnimationFrame(tick);
    }

    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      statusEl.textContent = "Bu cihaz/tarayıcı kamera erişimini desteklemiyor.";
    } else {
      loadJsQR().then(function () {
        return navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
      }).then(function (stream) {
        qrScanStream = stream;
        video.srcObject = stream;
        statusEl.textContent = "Kodu çerçeve içine getir…";
        qrScanRAF = requestAnimationFrame(tick);
      }).catch(function (err) {
        console.error(err);
        statusEl.textContent = (err && err.message === "QR okuyucu yüklenemedi")
          ? "QR okuma kütüphanesi yüklenemedi, internet bağlantını kontrol et."
          : "Kameraya erişilemedi: izin verildiğinden emin ol.";
      });
    }

    return modal;
  }

          if (cb) cb.checked = src.perms[def.key] !== false;
        });
        toast(src.label.replace(/^👑\s*/, "") + " yetkileri kopyalandı. Uygulamak için Kaydet'e bas.");
        copySelect.value = ""; // aynı üyeyi tekrar seçebilmek için sıfırla
      });
    }

    modal.querySelector("#mp-save").addEventListener("click", function () {
      var newPerms = {};
      HOUSEHOLD_PERM_DEFS.forEach(function (def) {
        var cb = modal.querySelector('[data-perm="' + def.key + '"]');
        newPerms[def.key] = !!(cb && cb.checked);
      });
      var newCarIds = carsAllCb && carsAllCb.checked ? null : Array.prototype.slice.call(modal.querySelectorAll("#mp-cars-list input:checked")).map(function (cb) { return cb.value; });
      var newDriverIds = driversAllCb && driversAllCb.checked ? null : Array.prototype.slice.call(modal.querySelectorAll("#mp-drivers-list input:checked")).map(function (cb) { return cb.value; });
      var btn = modal.querySelector("#mp-save");
      btn.disabled = true; btn.textContent = "Kaydediliyor…";
      setMemberPerms(uid, newPerms, newCarIds, newDriverIds);
    });

    return modal;
  }

  // Hane sahibinin hesabını kapatması, kendi verisi dışında ortak hanedeki
  // TÜM üyelerin verisini de anında ve geri döndürülemez şekilde sildiği
  // için (bkz. users/{householdId} = tüm hanenin ortak belgesi), bu süre
  // içinde bekleme (grace period) uygulanır. Bekleme süresi boyunca:
  //  - Veriler ve tüm üyelerin erişimi olduğu gibi kalır (sadece bir uyarı
  //    banner'ı gösterilir), böylece kimse aniden veri kaybetmez.
  //  - Hane sahibi bu süre içinde tekrar giriş yapıp işlemi iptal edebilir.
  //  - Süre dolduğunda gerçek/kalıcı silme işlemi backend tarafında
  //    (planlı bir Cloud Function ile) gerçekleştirilir — bkz. aşağıdaki not.
  var ACCOUNT_DELETION_GRACE_DAYS = 10;

  function pendingDeletionDaysLeft(pd) {
    if (!pd || !pd.deleteAt) return null;
    var deleteAtMs = typeof pd.deleteAt.toMillis === "function" ? pd.deleteAt.toMillis() : new Date(pd.deleteAt).getTime();
    if (isNaN(deleteAtMs)) return null;
    var msLeft = deleteAtMs - Date.now();
    return Math.max(0, Math.ceil(msLeft / (24 * 60 * 60 * 1000)));
  }

  // KVKK "unutulma hakkı" — hesabı ve tüm ilişkili verileri kalıcı olarak siler.
  // Sadece kendi verisi silinen durumlar için kullanılır: (a) ortak hanenin
  // sıradan bir üyesi kendi hesabını kapatıyor, ya da (b) hane sahibi ama
  // hanesinde başka hiç üye yok. Her iki durumda da işlem yalnızca kendi
  // users/{myUid} belgesini etkiler, başka kimsenin verisine dokunmaz.
  function deleteAccountAndData(currentPassword) {
    var fbUser = auth.currentUser;
    if (!fbUser) return;
    var myUid = fbUser.uid;
    var wasInOtherHousehold = state.householdId && state.householdId !== myUid;
    var oldHouseholdId = state.householdId;

    toast("Hesabın siliniyor…");
    var credential = firebase.auth.EmailAuthProvider.credential(fbUser.email, currentPassword);
    fbUser.reauthenticateWithCredential(credential).then(function () {
      // Ortak bir hanenin üyesiyse, önce o haneden kendini çıkar.
      if (wasInOtherHousehold) {
        // Aynı yarış durumu burada da geçerli: dinleyiciyi çıkış yazısından
        // önce kapatıyoruz (bkz. leaveHousehold() içindeki not).
        if (unsubscribeHouseholdDoc) { unsubscribeHouseholdDoc(); unsubscribeHouseholdDoc = null; }
        var removePatch = {};
        removePatch.members = firebase.firestore.FieldValue.arrayRemove(myUid);
        removePatch["memberProfiles." + myUid] = firebase.firestore.FieldValue.delete();
        return db.collection("users").doc(oldHouseholdId).update(removePatch).catch(function (err) { console.error(err); });
      }
    }).then(function () {
      // Kendi veri belgesini (araçlar, masraflar, fotoğraflar, aktivite geçmişi vb.) sil.
      return db.collection("users").doc(myUid).delete();
    }).then(function () {
      // Firebase Authentication hesabını sil.
      return fbUser.delete();
    }).then(function () {
      try {
        ["cars", "expenses", "pending_sync_count", "notif_history", "activity_log_seen", "notif_history_seen"].forEach(function (k) {
          try { localStorage.removeItem("gd_" + k); } catch (e2) {}
        });
      } catch (e) {}
      closeModal();
      toast("Hesabın ve tüm verilerin kalıcı olarak silindi.");
    }).catch(function (err) {
      console.error(err);
      if (err && err.code === "auth/wrong-password") {
        toast("Şifre hatalı. Hesabın silinmedi.");
      } else {
        toast("Hesap silinirken bir hata oluştu: " + authErrorMessage(err));
      }
    });
  }

  // Hane sahibi, hanesinde başka üyeler VARKEN hesabını kapatmak istediğinde
  // kullanılır. Ortak veriyi anında silmek yerine bir bekleme süresi
  // (ACCOUNT_DELETION_GRACE_DAYS gün) başlatır; bu süre boyunca diğer
  // üyeler verilerine erişmeye devam eder ve bir uyarı banner'ı görür. Hane
  // sahibi bu süre içinde tekrar giriş yapıp cancelAccountDeletion() ile
  // işlemi iptal edebilir. Süre dolunca kalıcı silme, backend'de çalışan
  // planlı bir Cloud Function tarafından gerçekleştirilmelidir (bkz. not).
  function requestOwnerAccountDeletion(currentPassword) {
    var fbUser = auth.currentUser;
    if (!fbUser) return;
    var myUid = fbUser.uid;

    toast("Hesabın kapatma süreci başlatılıyor…");
    var credential = firebase.auth.EmailAuthProvider.credential(fbUser.email, currentPassword);
    fbUser.reauthenticateWithCredential(credential).then(function () {
      var deleteAt = new Date(Date.now() + ACCOUNT_DELETION_GRACE_DAYS * 24 * 60 * 60 * 1000);
      return db.collection("users").doc(myUid).set({
        pendingDeletion: {
          requestedAt: firebase.firestore.FieldValue.serverTimestamp(),
          requestedByName: (state.currentUser && state.currentUser.name) || "",
          deleteAt: deleteAt
        }
      }, { merge: true });
    }).then(function () {
      closeModal();
      toast("Hesabın kapatma sürecine alındı. " + ACCOUNT_DELETION_GRACE_DAYS + " gün içinde tüm hane verileri kalıcı olarak silinecek. Fikrini değiştirirsen bu süre içinde tekrar giriş yapıp iptal edebilirsin.");
      return auth.signOut();
    }).catch(function (err) {
      console.error(err);
      if (err && err.code === "auth/wrong-password") {
        toast("Şifre hatalı. Hesabın kapatılmadı.");
      } else {
        toast("İşlem başlatılırken bir hata oluştu: " + authErrorMessage(err));
      }
    });
  }

  // Bekleme süresi dolmadan önce hane sahibinin fikrini değiştirmesi
  // durumunda çağrılır; pendingDeletion alanını temizler, hane ve tüm
  // üyelerin verisi/erişimi normal şekilde devam eder.
  function cancelAccountDeletion() {
    var fbUser = auth.currentUser;
    if (!fbUser) return;
    db.collection("users").doc(fbUser.uid).set({
      pendingDeletion: firebase.firestore.FieldValue.delete()
    }, { merge: true }).then(function () {
      toast("Hesabını kapatma işlemi iptal edildi. Verilerin ve hanen olduğu gibi duruyor.");
      render();
    }).catch(function (err) {
      console.error(err);
      toast("İptal edilirken bir hata oluştu: " + authErrorMessage(err));
    });
  }

  function fmtDateTime(ts) {
    try {
      var d = ts && typeof ts.toDate === "function" ? ts.toDate() : (ts ? new Date(ts) : null);
      if (!d || isNaN(d.getTime())) return "—";
      return d.toLocaleString("tr-TR", { day: "2-digit", month: "2-digit", year: "numeric", hour: "2-digit", minute: "2-digit" });
    } catch (e) { return "—"; }
  }

  function renderRunLogRecipients(r) {
    var list = r.recipients || r.results || r.details || r.users || null;
    if (!list || !list.length) return "";

    // Yeni format: her giriş bir hane, içinde üye kırılımı var (bkz.
    // send-reminders.js -> recipients.push({ household, members })). Ortak
    // hanede kimin bildirim aldığını (sadece toplam token sayısı değil, ad/
    // e-posta ve kaç cihazına gittiğini) burada gösteriyoruz.
    if (list[0] && list[0].members) {
      var groupHtml = "";
      list.forEach(function (group) {
        groupHtml += '<div class="mon-recipient-group">' +
          '<div class="mon-recipient-group-title">🏠 ' + esc(group.household || "Hane") + '</div>' +
          '<ul class="mon-recipients">' +
          (group.members || []).map(function (m) {
            var label = m.name || m.email || "Bilinmeyen kullanıcı";
            var devText = (m.deviceCount != null) ? (m.deviceCount + " cihaz") : "";
            var ok = m.success !== false;
            return '<li class="mon-recipient-row">' +
              '<span class="mon-recipient-email">' + esc(label) + (m.email && m.name ? ' <span class="mon-recipient-sub">(' + esc(m.email) + ')</span>' : '') + '</span>' +
              '<span class="mon-recipient-sub">' + esc(devText) + '</span>' +
              (ok ? '<span class="mon-badge ok">✓</span>' : '<span class="mon-badge bad">✗' + (m.failed ? (' ' + m.failed) : '') + '</span>') +
              '</li>';
          }).join("") +
          '</ul></div>';
      });
      return groupHtml;
    }

    // Eski (düz) format ile geriye dönük uyumluluk.
    var html = '<ul class="mon-recipients">';
    list.forEach(function (u) {
      var email = u.email || u.userEmail || u.name || u.id || "Bilinmeyen kullanıcı";
      var ok = u.success !== false && !u.error;
      html += '<li class="mon-recipient-row"><span class="mon-recipient-email">' + esc(email) + '</span>' +
        (ok ? '<span class="mon-badge ok">✓</span>' : '<span class="mon-badge bad">✗' + (u.error ? (' ' + esc(String(u.error))) : '') + '</span>') +
        '</li>';
    });
    html += '</ul>';
    return html;
  }

  function buildActivityDetailHTML(entry) {

      entry.changes.forEach(function (c) {
        html += '<div class="act-detail-row">' +
          '<span class="act-detail-label">' + esc(c.label) + '</span>' +
          '<span class="act-old">' + esc(c.from) + '</span>' +
          '<span class="act-arrow">→</span>' +
          '<span class="act-new">' + esc(c.to) + '</span>' +
        '</div>';
      });

      entry.snapshot.forEach(function (s) {

          '<span class="act-detail-label">' + esc(s.label) + '</span>' +
          '<span class="act-snap-value">' + esc(s.value) + '</span>' +

      });

  function buildHelpModal() {
    var modal = document.createElement("div");
    modal.className = "modal wide";
    modal.addEventListener("click", function (ev) { ev.stopPropagation(); });

    var html = '<div class="modal-head"><h3>🆘 Yardım &amp; Destek</h3><button class="icon-btn" data-action="close-modal" aria-label="Kapat">✕</button></div>';
    html += '<p class="field-hint" style="margin-top:-4px">Sık sorulan sorulara göz atabilir ya da yaşadığın bir sorunu doğrudan bize bildirebilirsin.</p>';

    html += '<p class="profile-section-title">Sıkça Sorulan Sorular</p>';
    html += '<ul class="err-list">';
    getFaqItems().forEach(function (item) {
      var isExpanded = !!expandedFaqIds[item.id];
      html += '<li class="err-item act-item' + (isExpanded ? " expanded" : "") + '" data-action="toggle-faq" data-id="' + esc(item.id) + '">' +
        '<div class="err-item-msg">' + esc(item.q) + ' <span class="act-item-caret">▶</span></div>' +
        '<div class="faq-answer">' + esc(item.a) + '</div>' +
      '</li>';
    });
    html += '</ul>';

    html += '<div class="help-contact-row">📧 Sorularının cevabını bulamadın mı? Bize doğrudan yazabilirsin: <a href="mailto:' + esc(SUPPORT_EMAIL) + '">' + esc(SUPPORT_EMAIL) + '</a></div>';

    html += '<p class="profile-section-title">Sorun Bildir</p>';
    html += '<p class="field-hint" style="margin-top:-4px">Karşılaştığın hatayı veya isteğini kısaca anlat; ekibimize iletilecek.</p>';
    html += '<label class="field"><span>Açıklama</span><textarea id="support-msg" maxlength="1000" rows="4" placeholder="Örn. Masraf eklerken fotoğraf yüklenmiyor..." style="width:100%; background:var(--bg); border:1px solid var(--border); border-radius:8px; color:var(--text); padding:10px; font-size:14px; font-family:inherit; resize:vertical;"></textarea></label>';
    html += '<p class="support-charcount" id="support-charcount">0 / 1000</p>';
    // Basit "honeypot" alanı: gerçek kullanıcılara görünmez/erişilmez, ama
    // formu otomatik dolduran botlar genelde bunu da doldurur. Dolu gelirse
    // gönderim sessizce yok sayılır.
    html += '<div style="position:absolute; left:-9999px; width:1px; height:1px; overflow:hidden;" aria-hidden="true">' +
      '<label>Web sitesi<input type="text" id="support-hp" name="website" tabindex="-1" autocomplete="off"></label>' +
    '</div>';
    var sentToday = supportSendsLast24h();
    var cooldownRemaining = supportCooldownRemainingMs();
    var limitReached = sentToday >= SUPPORT_DAILY_LIMIT;
    html += '<p class="field-hint" id="support-limit-hint" style="margin-top:-2px">Bugün ' + sentToday + ' / ' + SUPPORT_DAILY_LIMIT + ' talep gönderdin.' +
      (limitReached ? ' Günlük sınıra ulaştın, lütfen yarın tekrar dene ya da bize e-posta ile ulaş.' : '') + '</p>';
    html += '<button type="button" class="btn-primary full" id="support-send"' + (limitReached ? ' disabled' : '') + '>' +
      (limitReached ? '🚫 Günlük Sınıra Ulaşıldı' : (cooldownRemaining > 0 ? '⏳ Az Önce Gönderdin' : '🐞 Sorunu Gönder')) + '</button>';

    html += '<p class="profile-section-title">Taleplerim</p>';
    var myRows = monitoring.mySupportRequests;
    if (myRows === null) {
      html += '<p class="mon-loading">Yükleniyor…</p>';
    } else if (monitoring.mySupportRequestsError) {
      html += '<p class="mon-empty">Talepler alınamadı: ' + esc(monitoring.mySupportRequestsError) + '</p>';
    } else if (!myRows.length) {
      html += '<p class="mon-empty">Henüz gönderdiğin bir destek talebi yok.</p>';
    } else {
      html += '<ul class="err-list">';
      myRows.forEach(function (r) {
        var isResolved = r.status === "resolved";
        html += '<li class="err-item">' +
          '<div class="err-item-head">' +
            '<span class="err-item-time">' + fmtDateTime(r.createdAt) + '</span>' +
            (isResolved ? '<span class="mon-badge ok">✓ Çözüldü</span>' : '<span class="mon-badge warn">⏳ İnceleniyor</span>') +
          '</div>' +
          '<div class="err-item-msg">' + esc(r.message || "") + '</div>' +
        '</li>';
      });
      html += '</ul>';
    }

    modal.innerHTML = html;

    var msgEl = modal.querySelector("#support-msg");
    var countEl = modal.querySelector("#support-charcount");
    var hpEl = modal.querySelector("#support-hp");
    var sendBtn = modal.querySelector("#support-send");
    msgEl.addEventListener("input", function () {
      countEl.textContent = msgEl.value.length + " / 1000";
    });

    // Bekleme süresi dolana kadar butonu kilitli tutup geri sayımı gösterir.
    var cooldownInterval = null;
    function tickCooldown() {
      var remaining = supportCooldownRemainingMs();
      if (sentToday >= SUPPORT_DAILY_LIMIT) { return; } // günlük sınır zaten devrede, dokunma
      if (remaining <= 0) {
        sendBtn.disabled = false;
        sendBtn.textContent = "🐞 Sorunu Gönder";
        if (cooldownInterval) { clearInterval(cooldownInterval); cooldownInterval = null; }
        return;
      }
      sendBtn.disabled = true;
      sendBtn.textContent = "⏳ " + Math.ceil(remaining / 1000) + " sn sonra tekrar dene";
    }
    if (!limitReached && cooldownRemaining > 0) {
      tickCooldown();
      cooldownInterval = setInterval(tickCooldown, 1000);
    }

    sendBtn.addEventListener("click", function () {
      // Honeypot doluysa büyük olasılıkla bot: kullanıcıya normalmiş gibi
      // davranıp sessizce hiçbir şey göndermeden çık.
      if (hpEl && hpEl.value) {
        toast("Bildirimin için teşekkürler, en kısa sürede inceleyeceğiz.");
        closeModal();
        return;
      }
      if (supportSendsLast24h() >= SUPPORT_DAILY_LIMIT) {
        toast("Bugün için destek talebi gönderme sınırına ulaştın. Lütfen yarın tekrar dene ya da " + SUPPORT_EMAIL + " adresine yaz.");
        return;
      }
      var remaining = supportCooldownRemainingMs();
      if (remaining > 0) {
        toast("Çok sık deneme yapıyorsun, " + Math.ceil(remaining / 1000) + " saniye sonra tekrar dene.");
        return;
      }
      var message = msgEl.value.trim();
      if (!message) { toast("Lütfen sorununu kısaca açıkla."); return; }
      if (message.length < SUPPORT_MIN_LENGTH) { toast("Lütfen sorununu biraz daha ayrıntılı yaz (en az " + SUPPORT_MIN_LENGTH + " karakter)."); return; }
      if (isDuplicateSupportMessage(message)) { toast("Bu talebi zaten gönderdin, ekibimiz inceliyor."); return; }
      if (!db) { toast("Bağlantı kurulamadı, tekrar dene."); return; }

      var btn = sendBtn;
      btn.disabled = true; btn.textContent = "Gönderiliyor…";

      submitSupportRequest(message).then(function () {
        if (cooldownInterval) { clearInterval(cooldownInterval); cooldownInterval = null; }
        setLocalData("last_support_send", Date.now());
        toast("Bildirimin için teşekkürler, en kısa sürede inceleyeceğiz.");
        closeModal();
      }).catch(function (err) {
        btn.disabled = false; btn.textContent = "🐞 Sorunu Gönder";
        if (err && err.code === "support/daily-limit") {
          toast("Bugün için destek talebi gönderme sınırına ulaştın. Lütfen yarın tekrar dene ya da " + SUPPORT_EMAIL + " adresine yaz.");
        } else if (err && err.code === "permission-denied") {
          toast("Çok sık deneme yaptın ya da günlük sınıra ulaştın. Lütfen biraz sonra tekrar dene.");
        } else {
          toast("Gönderilemedi: " + (err && err.message ? err.message : err));
        }
      });
    });

    return modal;
  }

  // ---------- Admin Panel: tek ekran, sekmeli ----------
  // Önceden Sağlık / Hata İzleme / Destek Talepleri / Lisans Yönetimi /
  // Giriş Kayıtları ayrı ayrı modallar olarak hesap menüsünden açılıyordu.
  // Artık hepsi tek bir "Admin Panel" modalı içinde sekmeler halinde
  // gösteriliyor (bkz. open-admin-panel / switch-admin-tab aksiyonları ve

  function fmtDateShort(ms) {
    if (!ms) return "—";
    var d = new Date(ms);
    return d.toLocaleDateString("tr-TR");
  }
  function licenseExpiresMsFromField(lic) {
    if (!lic || !lic.expiresAt) return null;
    if (typeof lic.expiresAt.toMillis === "function") return lic.expiresAt.toMillis();
    if (typeof lic.expiresAt.seconds === "number") return lic.expiresAt.seconds * 1000;
    var t = new Date(lic.expiresAt).getTime();
    return isNaN(t) ? null : t;
  }

  function buildAnnouncementModal() {
    var modal = document.createElement("div");
    modal.className = "modal wide";
    modal.addEventListener("click", function (ev) { ev.stopPropagation(); });

    modal.innerHTML =
      '<div class="modal-head"><h3>📢 Duyuru / Bakım Mesajı</h3><button class="icon-btn" data-action="close-modal" aria-label="Kapat">✕</button></div>' +
      '<p class="field-hint" style="margin-top:-4px">Bu mesaj, bildirimleri açık olan <strong>tüm kullanıcılara</strong> anında push bildirimi olarak gönderilir (örn. planlı bakım, kesinti, yeni özellik duyurusu).</p>' +
      '<label class="field"><span>Başlık</span><input id="ann-title" maxlength="80" placeholder="Örn. Planlı Bakım Duyurusu" /></label>' +
      '<label class="field"><span>Mesaj</span><textarea id="ann-body" maxlength="300" rows="4" placeholder="Örn. Bu gece 02:00–03:00 arası sistem bakımda olacak, bu süre boyunca uygulamaya erişim kesintili olabilir." style="width:100%; background:var(--bg); border:1px solid var(--border); border-radius:8px; color:var(--text); padding:10px; font-size:14px; font-family:inherit; resize:vertical;"></textarea></label>' +
      '<p class="km-ocr-status" id="ann-charcount">0 / 300</p>' +
      '<button type="button" class="btn-primary full" id="ann-send" style="margin-top:6px">📢 Tüm Kullanıcılara Gönder</button>';

    var bodyEl = modal.querySelector("#ann-body");
    var countEl = modal.querySelector("#ann-charcount");
    bodyEl.addEventListener("input", function () {
      countEl.textContent = bodyEl.value.length + " / 300";
    });

    modal.querySelector("#ann-send").addEventListener("click", function () {
      var title = modal.querySelector("#ann-title").value.trim();
      var body = bodyEl.value.trim();
      if (!title) { toast("Lütfen bir başlık yaz."); return; }
      if (!body) { toast("Lütfen bir mesaj yaz."); return; }

      showConfirm({
        title: "Duyuruyu Gönder",
        message: '"' + title + '" başlıklı bu mesaj tüm kullanıcılara push bildirimi olarak gönderilecek. Emin misin?',
        confirmLabel: "Gönder",
        onConfirm: function () {
          var btn = modal.querySelector("#ann-send");
          btn.disabled = true; btn.textContent = "Gönderiliyor…";
          if (!auth.currentUser) {
            btn.disabled = false; btn.textContent = "📢 Tüm Kullanıcılara Gönder";
            toast("Oturum bulunamadı, tekrar giriş yapın.");
            return;
          }
          auth.currentUser.getIdToken().then(function (idToken) {
            return fetch(ANNOUNCEMENT_TRIGGER_URL, {
              method: "POST",
              headers: {
                "Authorization": "Bearer " + idToken,
                "Content-Type": "application/json"
              },
              body: JSON.stringify({ title: title, body: body })
            });
          }).then(function (r) {
            return r.json().then(function (data) { return { ok: r.ok, data: data }; });
          }).then(function (result) {
            if (result.ok && result.data && result.data.ok) {
              toast(`Duyuru gönderildi: ${result.data.sentCount} cihaza ulaştı.`);
              closeModal();
            } else {
              var msg = (result.data && result.data.error) ? result.data.error : "bilinmeyen hata";
              btn.disabled = false; btn.textContent = "📢 Tüm Kullanıcılara Gönder";
              toast("Duyuru gönderilemedi: " + msg);
            }
          }).catch(function (err) {
            console.error(err);
            btn.disabled = false; btn.textContent = "📢 Tüm Kullanıcılara Gönder";
            toast("Duyuru gönderilemedi: " + (err && err.message ? err.message : err));
          });
        }
      });
    });

    return modal;
  }

      '<label class="field"><span>Depo hacmi (lt, opsiyonel)</span><input id="f-tankcap" type="text" inputmode="numeric" value="' + (car && car.tankCapacity != null ? groupThousands(String(car.tankCapacity)) : "") + '" placeholder="Örn. 50" /></label>' +
      '<div class="field-row">' +
        '<label class="field"><span>Muayene tarihi</span><input id="f-inspection" type="date" value="' + (car && car.inspectionDate ? car.inspectionDate : "") + '" /></label>' +
        '<label class="field"><span>Sonraki bakım tarihi</span><input id="f-maintenance" type="date" value="' + (car && car.maintenanceDate ? car.maintenanceDate : "") + '" /></label>' +
      '</div>' +
      '<div class="field-row">' +
        '<label class="field"><span>Trafik sigortası bitiş</span><input id="f-insurance" type="date" value="' + (car && car.insuranceDate ? car.insuranceDate : "") + '" /></label>' +
        '<label class="field"><span>Kasko bitiş (opsiyonel)</span><input id="f-kasko" type="date" value="' + (car && car.kaskoDate ? car.kaskoDate : "") + '" /></label>' +
      '</div>' +
      '<div class="field-row">' +
        '<label class="field"><span>Sigorta şirketi (opsiyonel)</span><input id="f-insco" value="' + (car ? esc(car.insuranceCompany || "") : "") + '" placeholder="Örn. Anadolu Sigorta" /></label>' +
        '<label class="field"><span>Poliçe no (opsiyonel)</span><input id="f-policyno" value="' + (car ? esc(car.policyNo || "") : "") + '" placeholder="Poliçe numarası" /></label>' +
      '</div>' +
      '<div class="field-row">' +
        '<label class="field"><span>Vergi (MTV) ödeme tarihi</span><input id="f-tax" type="date" value="' + (car && car.taxDate ? car.taxDate : "") + '" /></label>' +
        '<label class="field"><span>Lastik değişimi (opsiyonel)</span><input id="f-tire" type="date" value="' + (car && car.tireDate ? car.tireDate : "") + '" /></label>' +

        '<div class="field-row">' +
          '<label class="field"><span>Muayene randevusu</span><input id="f-appt-inspection" type="date" value="' + (car && car.appointments && car.appointments.inspectionDate ? car.appointments.inspectionDate : "") + '" /></label>' +
          '<label class="field"><span>Bakım randevusu</span><input id="f-appt-maintenance" type="date" value="' + (car && car.appointments && car.appointments.maintenanceDate ? car.appointments.maintenanceDate : "") + '" /></label>' +
        '</div>' +
        '<div class="field-row">' +
          '<label class="field"><span>Sigorta randevusu</span><input id="f-appt-insurance" type="date" value="' + (car && car.appointments && car.appointments.insuranceDate ? car.appointments.insuranceDate : "") + '" /></label>' +
          '<label class="field"><span>Kasko randevusu</span><input id="f-appt-kasko" type="date" value="' + (car && car.appointments && car.appointments.kaskoDate ? car.appointments.kaskoDate : "") + '" /></label>' +
        '</div>' +
        '<div class="field-row">' +
          '<label class="field"><span>Vergi randevusu</span><input id="f-appt-tax" type="date" value="' + (car && car.appointments && car.appointments.taxDate ? car.appointments.taxDate : "") + '" /></label>' +
          '<label class="field"><span>Lastik randevusu</span><input id="f-appt-tire" type="date" value="' + (car && car.appointments && car.appointments.tireDate ? car.appointments.tireDate : "") + '" /></label>' +
        '</div>' +
      '</div>' +
      '<div class="field-row">' +
        '<label class="field"><span>Güncel kilometre (opsiyonel)</span><input id="f-km" type="text" inputmode="numeric" value="' + (car && car.currentKm != null ? groupThousands(String(car.currentKm)) : "") + '" placeholder="Örn. 84.500" /></label>' +
        '<label class="field"><span>Sonraki bakım km (opsiyonel)</span><input id="f-maintkm" type="text" inputmode="numeric" value="' + (car && car.maintenanceKm != null ? groupThousands(String(car.maintenanceKm)) : "") + '" placeholder="Örn. 95.000" /></label>' +
      '</div>' +
      '<p class="field-hint">Sonraki bakım km alanı, güncel kilometre ile karşılaştırılıp Yaklaşan İşlemler\'de otomatik hatırlatma olarak gösterilir.</p>' +
      '<p class="field-hint">Fotoğrafların (Araç/Ruhsat) üzerine tıklayarak büyük hallerini görebilirsiniz. Çevrimdışı kullanım için sıkıştırılır.</p>' +
      '<button class="btn-primary full" id="f-save">Kaydet</button>';

    attachThousandsInput(modal.querySelector("#f-km"), false);
    attachThousandsInput(modal.querySelector("#f-maintkm"), false);
    attachThousandsInput(modal.querySelector("#f-tankcap"), false);

    modal.__photos = { carPhoto: car ? car.photo : null, ruhsatPhoto: car ? car.ruhsat : null };

    modal.querySelectorAll(".photo-upload input[type=file]").forEach(function (input) {
      bindPhotoUploadInput(input, function (dataUrl) {
        var key = input.getAttribute("data-key");
        modal.__photos[key] = dataUrl;
        refreshPhotoBox(modal, key);
      });
    });
    modal.querySelectorAll(".photo-remove").forEach(function (btn) {
      btn.addEventListener("click", function (ev) {
        ev.stopPropagation();
        var key = btn.getAttribute("data-key");
        modal.__photos[key] = null;
        refreshPhotoBox(modal, key);
      });
    });
    modal.querySelectorAll(".photo-edit").forEach(function (btn) {
      btn.addEventListener("click", function (ev) {
        ev.stopPropagation();
        var key = btn.getAttribute("data-key");
        modal.querySelector('.photo-upload[data-key="' + key + '"] input[type=file]').click();
      });
    });

    modal.querySelector("#f-save").addEventListener("click", function () {
      var name = modal.querySelector("#f-name").value.trim();
      if (!name) { toast("Araç adı gerekli."); return; }
      var selectedDriverId = modal.querySelector("#f-driver").value || null;
      var patch = {
        name: name,
        vehicleType: modal.querySelector("#f-vtype").value,
        plate: modal.querySelector("#f-plate").value.trim(),
        brand: modal.querySelector("#f-brand").value.trim(),
        year: modal.querySelector("#f-year").value.trim(),
        fuelType: modal.querySelector("#f-fuel").value,
        transmission: modal.querySelector("#f-trans").value,
        tankCapacity: parseFormattedNumber(modal.querySelector("#f-tankcap").value),
        inspectionDate: modal.querySelector("#f-inspection").value || null,
        maintenanceDate: modal.querySelector("#f-maintenance").value || null,
        insuranceDate: modal.querySelector("#f-insurance").value || null,
        kaskoDate: modal.querySelector("#f-kasko").value || null,
        insuranceCompany: modal.querySelector("#f-insco").value.trim(),
        policyNo: modal.querySelector("#f-policyno").value.trim(),
        taxDate: modal.querySelector("#f-tax").value || null,
        tireDate: modal.querySelector("#f-tire").value || null,
        vin: modal.querySelector("#f-vin").value.trim(),
        currentKm: parseFormattedNumber(modal.querySelector("#f-km").value),
        maintenanceKm: parseFormattedNumber(modal.querySelector("#f-maintkm").value),
        photo: modal.__photos.carPhoto || null,
        ruhsat: modal.__photos.ruhsatPhoto || null
      };

      // ---------- Randevu tarihleri ----------
      // Her randevu tarihinin yanında, randevu YENİ girildiği ya da
      // DEĞİŞTİĞİ anda o alanın o anki vade tarihini "anlık görüntü"
      // (DueSnapshot) olarak saklıyoruz. send-reminders.js, randevu günü
      // geçtikten sonra vade tarihinin bu anlık görüntüden farklı olup
      // olmadığına bakarak kullanıcının tarihi güncelleyip güncellemediğini
      // anlıyor — randevu her zaman vadeden önce olacağı için doğrudan
      // "vade <= randevu" kıyası işe yaramaz.
      var prevAppt = (car && car.appointments) || {};
      var apptInputMap = {
        inspectionDate: "f-appt-inspection",
        maintenanceDate: "f-appt-maintenance",
        insuranceDate: "f-appt-insurance",
        kaskoDate: "f-appt-kasko",
        taxDate: "f-appt-tax",
        tireDate: "f-appt-tire"
      };
      var appointments = {};
      Object.keys(apptInputMap).forEach(function (key) {
        var apptVal = modal.querySelector("#" + apptInputMap[key]).value || null;
        appointments[key] = apptVal;
        var snapKey = key + "DueSnapshot";
        if (!apptVal) {
          appointments[snapKey] = null; // randevu silindiyse anlık görüntü de temizlenir
        } else if (!prevAppt[key] || prevAppt[key] !== apptVal) {
          appointments[snapKey] = patch[key]; // randevu yeni girildi/değişti: o anki vade tarihini yakala
        } else {
          appointments[snapKey] = prevAppt[snapKey] != null ? prevAppt[snapKey] : patch[key]; // randevu aynı: eski anlık görüntüyü koru
        }
      });
      patch.appointments = appointments;

      var savedCarId;
      if (isEdit) {
        var updatedCar = Object.assign({}, car, patch);
        // Randevu tarihleri ayrı bir nesnede tutulduğu için genel araç
        // diff'ine dahil olmaz; ayrıca hesaplayıp aynı log kaydına ekliyoruz
        // (bkz. appointmentActivityFieldDefs).
        var apptChanges = diffActivityFields(prevAppt, appointments, appointmentActivityFieldDefs());
        var carChanges = diffActivityFields(car, updatedCar, carActivityFieldDefs()).concat(apptChanges);
        state.cars = state.cars.map(function (c) { return c.id === car.id ? updatedCar : c; });
        logActivity("car", "edit", { carId: car.id, carName: name, summary: "Araç bilgileri güncellendi: " + name, changes: carChanges });
        savedCarId = car.id;
      } else {
        var newCar = Object.assign({ id: uid(), color: CAR_COLORS[(state.cars || []).length % CAR_COLORS.length] }, patch);
        state.cars = (state.cars || []).concat([newCar]);
        var newCarSnapshot = snapshotActivityFields(newCar, carActivityFieldDefs()).concat(snapshotActivityFields(appointments, appointmentActivityFieldDefs()));
        logActivity("car", "add", { carId: newCar.id, carName: name, summary: "Yeni araç eklendi: " + name, snapshot: newCarSnapshot });
        savedCarId = newCar.id;
      }
      // Şoför ataması: bu aracı önce tüm şoförlerin araç listesinden çıkar,
      // sonra (seçildiyse) yeni şoförün araç listesine ekle. Böylece bir araca
      // aynı anda en fazla bir şoför atanmış olur.
      if (state.drivers && state.drivers.length) {
        var driversChanged = false;
        state.drivers = state.drivers.map(function (d) {
          var hasCar = (d.carIds || []).indexOf(savedCarId) !== -1;
          var shouldHave = selectedDriverId === d.id;
          if (hasCar === shouldHave) return d;
          driversChanged = true;
          var newCarIds = shouldHave
            ? (d.carIds || []).concat([savedCarId])
            : (d.carIds || []).filter(function (cid) { return cid !== savedCarId; });
          return Object.assign({}, d, { carIds: newCarIds });
        });
      }
      persistFields(driversChanged ? ["cars", "drivers"] : ["cars"]);
      closeModal();
      render();
      toast(isEdit ? "Araç bilgileri kaydedildi." : "Araç eklendi.");
    });

    return modal;
  }


  function renderDriversSection() {
    var list = visibleDriversForMe();
    var html = '<section class="panel">';
    html += '<div style="display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:4px;"><h2 style="margin:0; font-family:\'Oswald\', sans-serif; font-size:16px; letter-spacing:0.02em;">🧑‍✈️ Şoförler</h2></div>';
    html += '<p class="field-hint" style="margin-top:2px">Şoförlerini ekle, hangi araç(lar)ı kullandıklarını belirle. Ehliyet, SRC, psikoteknik ve sağlık raporu tarihlerini, yurtdışına çıkacaklar için pasaport ve vize bilgilerini de burada tutabilirsin.</p>';
    html += '<button type="button" class="btn-primary full" data-action="open-add-driver" style="margin-bottom:14px">+ Şoför Ekle</button>';

    html += buildEntitySearchBoxHTML("driver-filter-search", "clear-driver-filter", state.driverFilterText, "🔎 İsim, telefon veya araç ile ara...", "Şoförlerde ara");

    // Arama kutusuna yazılan metin hem alttaki şoför listesini hem de
    // "Yaklaşan Şoför Belgeleri" listesini filtrelesin diye, önce filtrelenmiş
    // şoför id'leri hesaplanıp yaklaşan belgeler bu id'lere göre daraltılıyor.
    var filteredList = filterDriversByText(list, state.driverFilterText);
    var filteredDriverIds = {};
    filteredList.forEach(function (d) { filteredDriverIds[d.id] = true; });

    var driverUpcomingItems = computeDriverSummaryItems().filter(function (it) { return it.tier < 3 && filteredDriverIds[it.driverId]; });
    if (driverUpcomingItems.length) {
      var DRIVER_UPCOMING_LIMIT = 4;
      var upcomingCollapsed = !state.driverUpcomingExpanded && driverUpcomingItems.length > DRIVER_UPCOMING_LIMIT;
      var upcomingToShow = upcomingCollapsed ? driverUpcomingItems.slice(0, DRIVER_UPCOMING_LIMIT) : driverUpcomingItems;
      html += '<div style="margin-bottom:18px">';
      html += '<h3 style="margin:0 0 8px; font-size:13px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.03em;">⏰ Yaklaşan Şoför Belgeleri</h3>';
      html += '<ul class="summary-list">';
      upcomingToShow.forEach(function (it) {
        var showIcon = (it.status.key === "overdue" || it.status.key === "today" || it.status.key === "soon") ? "⚠️ " : (it.status.key === "ok" ? "✅ " : "");
        html += '<li class="summary-row">' +
          '<span class="sum-icon" style="background:' + it.status.color + '22;color:' + it.status.color + '">' + it.emoji + '</span>' +
          '<span class="sum-main"><span class="sum-type">' + esc(it.type) + ' · ' + esc(it.driverName) + '</span>' +
          '<span class="sum-date">' + esc(it.dateLabel) + '</span></span>' +
          '<span class="sum-extra">' +
            '<span class="sum-badge" style="color:' + it.status.color + ';border-color:' + it.status.color + '55;background:' + it.status.color + '18">' + showIcon + esc(it.status.label) + '</span>' +
            '<span class="sum-actions">' +
              calendarButtonHTML(it) +
              '<button class="exp-del" data-action="open-edit-driver" data-id="' + it.driverId + '" title="Düzenle" aria-label="Düzenle">✏️</button>' +
            '</span>' +
          '</span>' +
          '</li>';
      });
      html += '</ul>';
      if (upcomingCollapsed) {
        html += '<button type="button" class="btn-secondary" data-action="toggle-driver-upcoming-expanded" style="margin-top:8px">▾ Tümünü Gör (' + driverUpcomingItems.length + ')</button>';
      } else if (state.driverUpcomingExpanded && driverUpcomingItems.length > DRIVER_UPCOMING_LIMIT) {
        html += '<button type="button" class="btn-secondary" data-action="toggle-driver-upcoming-expanded" style="margin-top:8px">▴ Daha Az Göster</button>';
      }
      html += '</div>';
    }

    if (!list.length) {
      html += '<p class="mon-empty">Henüz şoför eklenmedi.</p>';
    } else if (!filteredList.length) {
      html += '<p class="entity-search-empty">"' + esc(state.driverFilterText) + '" ile eşleşen şoför bulunamadı.</p>';
    } else {
      // Liste uzayıp ekranı kaplamasın diye varsayılan olarak sadece ilk
      // birkaç şoför gösterilir; kalanı "Tümünü Göster" ile açılır.
      var DRIVER_LIST_LIMIT = 4;
      var driversCollapsed = !state.driverFilterText && !state.driversListExpanded && filteredList.length > DRIVER_LIST_LIMIT;
      var driversToShow = driversCollapsed ? filteredList.slice(0, DRIVER_LIST_LIMIT) : filteredList;
      html += '<ul class="err-list" style="max-height:none">';
      driversToShow.forEach(function (d) {
        var carNames = (d.carIds || []).map(function (cid) {
          var c = (state.cars || []).find(function (x) { return x.id === cid; });
          if (!c) return null;
          return c.name + (c.plate ? " (" + c.plate + ")" : "");
        }).filter(Boolean);
        html += '<li class="err-item">' +
          '<div class="err-item-head">' +
            '<span class="driver-item-name">' + esc(d.name) + (d.worksAbroad ? '<span class="driver-abroad-badge">🛂 Yurtdışı</span>' : '') + '</span>' +
            '<span class="driver-item-actions">' +
              '<button type="button" class="exp-del" data-action="open-edit-driver" data-id="' + d.id + '" title="Düzenle" aria-label="Düzenle">✏️</button>' +
              '<button type="button" class="exp-del" data-action="delete-driver" data-id="' + d.id + '" title="Sil" aria-label="Sil">🗑️</button>' +
            '</span>' +
          '</div>' +
          (d.phone ? '<div class="err-item-meta">📞 ' + esc(d.phone) + '</div>' : '') +
          '<div class="err-item-meta">🚗 ' + (carNames.length ? esc(carNames.join(", ")) : "Araç atanmadı") + '</div>' +
          (d.licenseClass ? '<div class="err-item-meta">🪪 Ehliyet: ' + esc(d.licenseClass) + '</div>' : '') +
        '</li>';
      });
      html += '</ul>';
      if (driversCollapsed) {
        html += '<button type="button" class="btn-secondary" data-action="toggle-drivers-expanded" style="margin-top:10px">▾ Tümünü Göster (' + filteredList.length + ')</button>';
      } else if (state.driversListExpanded && filteredList.length > DRIVER_LIST_LIMIT) {
        html += '<button type="button" class="btn-secondary" data-action="toggle-drivers-expanded" style="margin-top:10px">▴ Daha Az Göster</button>';
      }
    }

    html += '</section>';
    return html;
  }

  function buildDriverModal() {

    var driversList = visibleDriversForMe();
    var driver = isEdit ? driversList.find(function (d) { return d.id === state.modal.driverId; }) : null;
    var carsList = visibleCarsForMe();

    var modal = document.createElement("div");
    modal.className = "modal wide";
    modal.addEventListener("click", function (ev) { ev.stopPropagation(); });

    var selectedCarIds = driver ? (driver.carIds || []) : [];
    var worksAbroad = driver ? !!driver.worksAbroad : false;

    // Bu araç başka bir şoföre atanmışsa (düzenlenen şoför hariç), araç no -> o şoförün adı eşlemesi.
    var carOwnerName = {};

        (carsList.length

      '</div>' +
      '<div class="field-row">' +

        '<label class="field"><span>SRC belgesi geçerlilik tarihi</span><input id="f-dsrcexp" type="date" value="' + (driver && driver.srcExpiry ? driver.srcExpiry : "") + '" /></label>' +
      '</div>' +
      '<div class="field-row">' +
        '<label class="field"><span>Psikoteknik belgesi geçerlilik tarihi</span><input id="f-dpsikoexp" type="date" value="' + (driver && driver.psikoteknikExpiry ? driver.psikoteknikExpiry : "") + '" /></label>' +

      render();
